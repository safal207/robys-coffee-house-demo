language: "ru-RU"
tone_instructions: "Пиши кратко и технически. Приоритизируй реальные дефекты, безопасность, регрессии и проверяемые доказательства; не засоряй review косметическими замечаниями."
enable_free_tier: true

reviews:
  profile: "assertive"
  request_changes_workflow: false
  high_level_summary: true
  high_level_summary_instructions: |
    Суммируй цель изменения, основные риски, затронутые пользовательские сценарии
    и проверяемые доказательства. Отдельно отмечай generated-файлы и integrity manifest.
  high_level_summary_in_walkthrough: true
  review_status: false
  review_details: true
  commit_status: false
  fail_commit_status: false
  collapse_walkthrough: true
  changed_files_summary: true
  sequence_diagrams: false
  estimate_code_review_effort: true
  assess_linked_issues: true
  related_issues: true
  related_prs: true
  suggested_labels: false
  suggested_reviewers: false
  auto_assign_reviewers: false
  in_progress_fortune: false
  poem: false
  enable_prompt_for_ai_agents: true
  path_filters:
    - "!assets/**"
    - "!lighthouse/reports/**"
    - "!.lighthouseci/**"
    - "!app.js"
    - "!featured-gallery.js"
    - "!social-offer.js"
    - "!discover-rotation.js"
  path_instructions:
    - path: ".github/workflows/**"
      instructions: |
        Проверяй least privilege, pinning сторонних Actions по commit SHA,
        безопасность pull_request против pull_request_target, отсутствие выполнения
        недоверенного PR-кода с write-token и корректность merge/status gates.
    - path: "scripts/**"
      instructions: |
        Ищи недетерминированность, небезопасную работу с путями и shell quoting,
        скрытое ослабление проверок, сетевые зависимости, утечки секретов и случаи,
        когда проверка может ложно завершиться успешно.
    - path: "src/**"
      instructions: |
        Это source of truth. Проверяй TypeScript-корректность, состояние UI,
        обработку ошибок, мобильные сценарии, мультиязычность и доступность.
    - path: "**/*.html"
      instructions: |
        Проверяй CSP-совместимость, progressive enhancement, noscript fallback,
        семантику, клавиатурную доступность, reduced motion и отсутствие удалённых
        недоверенных ресурсов.
    - path: "**/*.css"
      instructions: |
        Проверяй mobile-first поведение, overflow, focus-visible, reduced motion,
        контраст, safe-area и регрессии на узких экранах.
    - path: "integrity-manifest.json"
      instructions: |
        Этот файл должен генерироваться, а не редактироваться вручную. Проверяй,
        что защищённые байты, размеры и SHA-256 соответствуют изменённым файлам.
    - path: "**/*.md"
      instructions: |
        Проверяй техническую достоверность команд и контрактов. Не оставляй
        косметические замечания, если они не влияют на понимание или выполнение.
  auto_review:
    enabled: false
    auto_incremental_review: false
    drafts: false

chat:
  auto_reply: false
