<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#1d1d21" />
  <title>Обновление Roby's</title>
  <style>
    body{margin:0;min-height:100vh;display:grid;place-items:center;padding:24px;color:#f5f5f2;background:#1d1d21;font-family:Arial,sans-serif;text-align:center}.card{max-width:420px;padding:34px;border:1px solid rgba(255,255,255,.1);background:#111114;border-radius:26px;box-shadow:0 24px 70px rgba(0,0,0,.45)}.word{display:flex;justify-content:center;align-items:center;margin-bottom:12px;font-size:34px;font-weight:900;letter-spacing:-4px}.o{display:inline-block;width:25px;height:16px;margin:2px 3px 0 2px;border:5px solid #b32035;border-radius:50%;transform:rotate(-8deg)}.sub{margin-bottom:24px;font-size:11px;font-style:italic;font-weight:300;letter-spacing:5px}.spinner{width:34px;height:34px;margin:22px auto 0;border:3px solid rgba(255,255,255,.12);border-top-color:#b32035;border-radius:50%;animation:spin .8s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
  <main class="card">
    <div class="word"><span>R</span><span class="o"></span><span>BY’S</span></div>
    <div class="sub">COFFEE HOUSE</div>
    <h1>Обновляем стиль</h1>
    <p>Удаляю старый кеш и открываю версию в цветах фирменной чашки.</p>
    <div class="spinner" aria-label="Загрузка"></div>
  </main>
  <script>
    (async () => {
      try {
        if ('serviceWorker' in navigator) {
          const registrations = await navigator.serviceWorker.getRegistrations();
          await Promise.all(registrations.map((registration) => registration.unregister()));
        }
        if ('caches' in window) {
          const keys = await caches.keys();
          await Promise.all(keys.map((key) => caches.delete(key)));
        }
        try { localStorage.setItem('robys-build', 'cup-20260619-1'); } catch {}
      } finally {
        location.replace('./?build=cup-20260619-1');
      }
    })();
  </script>
</body>
</html>
