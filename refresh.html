<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#173d32" />
  <title>Обновление Roby's</title>
  <style>
    body{margin:0;min-height:100vh;display:grid;place-items:center;padding:24px;color:#173d32;background:#f7f0e4;font-family:system-ui,-apple-system,sans-serif;text-align:center}.card{max-width:420px;padding:34px;border:1px solid rgba(23,61,50,.14);background:#fffdf8;border-radius:28px;box-shadow:0 24px 70px rgba(23,61,50,.14)}.mark{display:grid;width:72px;height:72px;margin:0 auto 20px;place-items:center;color:#fff;background:#173d32;border-radius:50%;font:700 34px Georgia,serif}.spinner{width:34px;height:34px;margin:22px auto 0;border:3px solid rgba(23,61,50,.16);border-top-color:#173d32;border-radius:50%;animation:spin .8s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
  <main class="card">
    <div class="mark">R</div>
    <h1>Обновляем Roby's</h1>
    <p>Удаляю старый кеш и открываю новую TypeScript-версию сайта.</p>
    <div class="spinner" aria-label="Загрузка"></div>
  </main>
  <script>
    (async () => {
      try {
        if ('serviceWorker' in navigator) {
          const registrations = await navigator.serviceWorker.getRegistrations();
          await Promise.all(registrations.map((registration) => registration.unregister()));
        }
        if ('caches' in window) {
          const keys = await caches.keys();
          await Promise.all(keys.map((key) => caches.delete(key)));
        }
        try { localStorage.setItem('robys-build', 'world-20260619-2'); } catch {}
      } finally {
        location.replace('./?build=world-20260619-2#menu');
      }
    })();
  </script>
</body>
</html>
