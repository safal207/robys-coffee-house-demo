<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#080608" />
  <title>Обновление Roby's</title>
  <style>
    body{margin:0;min-height:100vh;display:grid;place-items:center;padding:24px;color:#f8edf1;background:radial-gradient(circle at 50% 0,rgba(151,22,62,.24),transparent 35%),linear-gradient(180deg,#10080c,#080608);font-family:system-ui,-apple-system,sans-serif;text-align:center}.card{max-width:420px;padding:34px;border:1px solid rgba(255,255,255,.1);background:rgba(23,16,20,.92);border-radius:28px;box-shadow:0 24px 70px rgba(0,0,0,.48)}.mark{display:grid;width:72px;height:72px;margin:0 auto 20px;place-items:center;color:#fff;background:linear-gradient(145deg,#c02b5a,#4b0b1d);border-radius:50%;font:700 34px Georgia,serif;box-shadow:0 15px 40px rgba(151,22,62,.35)}.spinner{width:34px;height:34px;margin:22px auto 0;border:3px solid rgba(255,255,255,.12);border-top-color:#e44f7b;border-radius:50%;animation:spin .8s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
  <main class="card">
    <div class="mark">R</div>
    <h1>Обновляем Roby's</h1>
    <p>Удаляю старый кеш и открываю рубиновую версию с видео.</p>
    <div class="spinner" aria-label="Загрузка"></div>
  </main>
  <script>
    (async () => {
      try {
        if ('serviceWorker' in navigator) {
          const registrations = await navigator.serviceWorker.getRegistrations();
          await Promise.all(registrations.map((registration) => registration.unregister()));
        }
        if ('caches' in window) {
          const keys = await caches.keys();
          await Promise.all(keys.map((key) => caches.delete(key)));
        }
        try { localStorage.setItem('robys-build', 'ruby-20260619-1'); } catch {}
      } finally {
        location.replace('./?build=ruby-20260619-1');
      }
    })();
  </script>
</body>
</html>
