  <style>body{margin:0;min-height:100vh;display:grid;place-items:center;padding:24px;background:#f4f1ec;color:#312b2a;font-family:Arial,sans-serif;text-align:center}.card{max-width:420px;padding:36px;background:#fff;border:1px solid #ddd5ce;border-radius:24px}.logo{font-size:38px;font-weight:900}.logo b{color:#b84d58}.sub{margin:6px 0 24px;letter-spacing:4px}.spinner{width:30px;height:30px;margin:20px auto;border:3px solid #ddd;border-top-color:#b84d58;border-radius:50%;animation:spin .8s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}</style>

<body>
  <main class="card"><div class="logo">R<b>O</b>BY’S</div><div class="sub">COFFEE HOUSE</div><h1>Ускоряем сайт</h1><p>Очищаю старый кеш и открываю версию с мгновенными критическими стилями.</p><div class="spinner"></div></main>
  <script>(async()=>{try{if('serviceWorker'in navigator){const r=await navigator.serviceWorker.getRegistrations();await Promise.all(r.map(x=>x.unregister()))}if('caches'in window){const k=await caches.keys();await Promise.all(k.map(x=>caches.delete(x)))}}finally{location.replace('./?build=perf-inline-20260619-11')}})();</script>
