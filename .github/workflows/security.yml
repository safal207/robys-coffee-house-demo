name: Security contract

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: '43 4 * * 1'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  security-contract:
    name: Security foundation gates
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Build generated runtime
        run: npm run build

      - name: Verify security contracts and scan secrets
        env:
          SECURITY_DIFF_BASE: ${{ github.event.pull_request.base.sha || github.event.before || '' }}
        run: npm run verify:security

      - name: Block high and critical dependency advisories
        run: npm audit --audit-level=high

      - name: Upload security evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: security-contract-${{ github.run_id }}
          path: .artifacts/*security*.json
          if-no-files-found: warn
          retention-days: 30
