name: One-shot clean pairing finalizer

on:
  push:
    branches:
      - agent/clean-pairing-cards

permissions:
  contents: write

concurrency:
  group: one-shot-clean-pairing-finalizer
  cancel-in-progress: false

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out exact branch head
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0
          persist-credentials: true

      - name: Regenerate integrity manifest
        run: node scripts/generate-integrity-manifest.mjs

      - name: Remove one-shot workflow and commit generated evidence
        shell: bash
        run: |
          set -euo pipefail
          rm .github/workflows/one-shot-clean-pairing-finalizer.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add integrity-manifest.json .github/workflows/one-shot-clean-pairing-finalizer.yml
          git commit -m "chore: refresh integrity evidence"
          git push origin "HEAD:${GITHUB_REF_NAME}"
