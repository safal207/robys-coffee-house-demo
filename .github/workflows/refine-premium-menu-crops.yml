name: Refine premium menu crops

on:
  push:
    branches: [feat/premium-menu-pairing-cards]
  pull_request:
    types: [synchronize]
    branches: [main]

permissions:
  contents: write

jobs:
  refine:
    if: github.event_name == 'push' || github.head_ref == 'feat/premium-menu-pairing-cards'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout feature branch without persisted credentials
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: feat/premium-menu-pairing-cards
          persist-credentials: false
          fetch-depth: 1

      - name: Apply researched logo and image-crop refinements
        run: |
          python3 - <<'PY'
          from pathlib import Path

          js_path = Path('menu-page.js')
          js = js_path.read_text(encoding='utf-8')
          old = '  row.className = visual ? "full-menu-item full-menu-item--visual" : "full-menu-item";\n'
          new = old + '  if (visual) row.dataset.pairing = item.journeyId ?? item.id;\n'
          if new not in js:
              if js.count(old) != 1:
                  raise SystemExit('Expected visual row class assignment exactly once')
              js = js.replace(old, new, 1)
          js_path.write_text(js, encoding='utf-8')

          css_path = Path('menu.css')
          css = css_path.read_text(encoding='utf-8')
          marker = '/* PREMIUM-MENU-CROP-TUNING-V2 */'
          if marker in css:
              raise SystemExit('Crop tuning block already present')
          css += '''

/* PREMIUM-MENU-CROP-TUNING-V2 */
.menu-page-hero{padding-top:42px}
.menu-page-brand .brand-copy strong{width:46px;height:50px;border-width:9px;transform:translateY(2px)}
.full-menu-item-media{position:relative}
.full-menu-item-media img{object-position:50% 62%;transform-origin:center center;transition:transform .5s cubic-bezier(.2,.7,.2,1),filter .25s ease}
.full-menu-item--visual:hover .full-menu-item-media img{transform:none;filter:saturate(1.03)}
.full-menu-item--visual[data-pairing="cool-lime-macaron"] .full-menu-item-media img,
.full-menu-item--visual[data-pairing="cool-lime-macaron"]:hover .full-menu-item-media img{object-position:50% 62%;transform:scale(1.10) translate3d(-3%,3%,0)}
.full-menu-item--visual[data-pairing="iced-san-sebastian"] .full-menu-item-media img,
.full-menu-item--visual[data-pairing="iced-san-sebastian"]:hover .full-menu-item-media img{object-position:50% 60%;transform:scale(1.08) translate3d(-2%,2.5%,0)}
@media(max-width:680px){
  .menu-page-hero{padding-top:42px}
  .menu-page-brand .brand-copy strong{width:41px;height:45px;border-width:8px;transform:translateY(3px)}
  .full-menu-item-media{aspect-ratio:316/202}
  .full-menu-item--visual[data-pairing="cool-lime-macaron"] .full-menu-item-media img,
  .full-menu-item--visual[data-pairing="cool-lime-macaron"]:hover .full-menu-item-media img{object-position:50% 63%;transform:scale(1.20) translate3d(-6%,6%,0)}
  .full-menu-item--visual[data-pairing="iced-san-sebastian"] .full-menu-item-media img,
  .full-menu-item--visual[data-pairing="iced-san-sebastian"]:hover .full-menu-item-media img{object-position:50% 61%;transform:scale(1.15) translate3d(-4%,5%,0)}
}
@media(max-width:390px){
  .menu-page-brand .brand-copy strong{width:37px;height:41px;border-width:7px;transform:translateY(3px)}
}
'''
          css_path.write_text(css, encoding='utf-8')
          PY

      - name: Regenerate and validate evidence
        run: |
          npm ci --ignore-scripts
          npm run build
          node scripts/generate-integrity-manifest.mjs
          npm run verify:integrity
          npm run verify:taste-journey-posters
          node scripts/verify-pairing-catalog-parity.mjs
          node scripts/verify-pairing-cta.mjs
          node --check menu-page.js

      - name: Remove temporary files
        run: |
          rm .github/workflows/refine-premium-menu-crops.yml
          rm -f docs/tmp-pr177-refine-trigger.md

      - name: Commit and push final crop refinement
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: refine menu logo and pairing crops"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push origin HEAD:feat/premium-menu-pairing-cards
