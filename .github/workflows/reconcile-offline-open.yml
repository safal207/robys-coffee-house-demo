name: Reconcile offline feature PR

on:
  pull_request:
    branches:
      - main
    types:
      - opened

permissions:
  contents: write

jobs:
  reconcile:
    if: github.event.pull_request.head.ref == 'fix/android-download-offline'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/android-download-offline
          fetch-depth: 0
      - name: Merge main and preserve current SEO
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git merge -s ours origin/main -m 'Merge latest main into offline Android feature'
          git checkout origin/main -- index.html menu.html lighthouse-live-summary.json lighthouse-summary.json sitemap.xml integrity-manifest.json
      - name: Add offline and Android wiring
        shell: python
        run: |
          from pathlib import Path
          pwa = '  <script defer src="pwa.js?v=offline-20260627-4"></script>'
          android = '  <script defer src="android-download.js?v=android-verified-20260627-1"></script>'
          for name in ('index.html', 'menu.html'):
              path = Path(name)
              html = path.read_text(encoding='utf-8').replace("worker-src 'none'", "worker-src 'self'")
              if pwa not in html:
                  html = html.replace('</head>', f'{pwa}\n</head>', 1)
              if name == 'index.html' and android not in html:
                  html = html.replace(pwa, f'{pwa}\n{android}', 1)
              path.write_text(html, encoding='utf-8')
      - name: Build and verify
        run: |
          npm ci
          npm run build
          npm run integrity:generate
          npm run check
      - name: Commit reconciled feature
        run: |
          git add -A
          git diff --cached --check
          git commit -m 'chore: reconcile offline feature with latest main'
          git push origin HEAD:fix/android-download-offline
