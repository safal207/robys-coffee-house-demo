name: Fix premium menu poster cache

on:
  pull_request:
    types: [synchronize]
    branches: [main]

permissions:
  contents: write

jobs:
  fix:
    if: github.head_ref == 'feat/premium-menu-pairing-cards'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout feature branch without persisted credentials
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: feat/premium-menu-pairing-cards
          persist-credentials: false
          fetch-depth: 1

      - name: Preserve HQ Discover assets beside compact menu cards
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('sw.js')
          source = path.read_text(encoding='utf-8')
          anchor = '  "./src/pairings-data/final/cool-lime-macaron-card.webp",\n  "./src/pairings-data/final/iced-san-sebastian-card.webp",'
          replacement = '  "./src/pairings-data/final/cool-lime-macaron-hq.webp",\n  "./src/pairings-data/approved/iced-san-sebastian-hq.png",\n' + anchor
          if source.count(anchor) != 1:
              raise SystemExit('Expected compact pairing cache entries exactly once')
          if '"./src/pairings-data/final/cool-lime-macaron-hq.webp"' in source:
              raise SystemExit('HQ pairing cache entries are already restored')
          path.write_text(source.replace(anchor, replacement, 1), encoding='utf-8')
          PY

      - name: Validate build, posters and generated evidence
        run: |
          npm ci --ignore-scripts
          npm run build
          npm run verify:taste-journey-posters
          node scripts/generate-integrity-manifest.mjs
          npm run verify:integrity
          node scripts/verify-pairing-catalog-parity.mjs
          node scripts/verify-pairing-cta.mjs

      - name: Remove one-time workflow
        run: rm .github/workflows/fix-premium-menu-poster-cache.yml

      - name: Commit and push cache compatibility fix
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: retain HQ poster assets in offline cache"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push origin HEAD:feat/premium-menu-pairing-cards
