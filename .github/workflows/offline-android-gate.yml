name: Offline Android gate

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  offline-android:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: |
          npm ci
          npm install --no-save --package-lock=false playwright@1.53.2
          npx playwright install --with-deps chromium

      - name: Build site
        run: npm run build

      - name: Start local site
        run: |
          python3 -m http.server 4173 --bind 127.0.0.1 > /tmp/robys-offline-server.log 2>&1 &
          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:4173/index.html > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat /tmp/robys-offline-server.log
          exit 1

      - name: Verify direct APK and offline menu
        env:
          BASE_URL: http://127.0.0.1:4173
        run: node scripts/verify-offline-browser.mjs

      - name: Upload server log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: offline-android-${{ github.run_id }}
          path: /tmp/robys-offline-server.log
          if-no-files-found: warn
          retention-days: 14
