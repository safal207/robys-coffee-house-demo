name: Bootstrap responsive gallery

on:
  push:
    branches:
      - gallery-original-quality-v5
    paths:
      - .github/workflows/bootstrap-responsive-gallery.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout gallery branch
        uses: actions/checkout@v4
        with:
          ref: gallery-original-quality-v5
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install project dependencies
        run: npm ci

      - name: Install WebP tools
        run: sudo apt-get update && sudo apt-get install -y webp

      - name: Generate responsive candidates and runtime
        run: bash scripts/build-responsive-gallery.sh

      - name: Commit generated responsive gallery
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            src/products/gallery-v5 \
            src/featured-gallery.ts \
            featured-gallery.js \
            index.html \
            qa/gallery.spec.ts \
            scripts/verify-gallery-assets.sh
          if git diff --cached --quiet; then
            echo "Responsive gallery is already current."
            exit 0
          fi
          git commit -m "perf: add responsive gallery srcset candidates"
          git push origin HEAD:gallery-original-quality-v5
