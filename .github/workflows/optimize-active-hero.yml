name: One-shot active hero optimizer

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]
    paths:
      - .github/workflows/optimize-active-hero.yml

permissions:
  contents: write

concurrency:
  group: optimize-active-hero-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  optimize:
    if: >-
      github.repository == 'safal207/robys-coffee-house-demo' &&
      github.head_ref == 'perf/optimize-active-hero'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      INPUT_VIDEO: src/robys-ambience-clean.mp4
      OUTPUT_VIDEO: ${{ runner.temp }}/robys-ambience-clean.mp4
      PASSLOG: ${{ runner.temp }}/robys-hero-pass
      PASS1_VIDEO: ${{ runner.temp }}/robys-hero-pass1.mp4
      METADATA_FILE: ${{ runner.temp }}/hero-metadata.json
    steps:
      - name: Checkout optimization branch
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: perf/optimize-active-hero
          fetch-depth: 0
          persist-credentials: true

      - name: Inspect source hero
        run: |
          set -euo pipefail
          test -f "$INPUT_VIDEO"
          stat -c 'source_bytes=%s' "$INPUT_VIDEO"
          ffprobe -v error \
            -show_entries format=duration,size \
            -show_entries stream=width,height,codec_name,codec_type \
            -of json "$INPUT_VIDEO"

      - name: Encode pass one
        run: |
          set -euo pipefail
          ffmpeg -hide_banner -loglevel error -y \
            -i "$INPUT_VIDEO" -an -vf 'scale=480:-2' \
            -c:v libx264 -preset slow -profile:v main -level 3.1 \
            -b:v 200k -pass 1 -passlogfile "$PASSLOG" \
            -pix_fmt yuv420p "$PASS1_VIDEO"

      - name: Encode pass two
        run: |
          set -euo pipefail
          ffmpeg -hide_banner -loglevel error -y \
            -i "$INPUT_VIDEO" -an -vf 'scale=480:-2' \
            -c:v libx264 -preset slow -profile:v main -level 3.1 \
            -b:v 200k -pass 2 -passlogfile "$PASSLOG" \
            -pix_fmt yuv420p -movflags +faststart "$OUTPUT_VIDEO"

      - name: Validate optimized media
        run: |
          set -euo pipefail
          bytes="$(stat -c %s "$OUTPUT_VIDEO")"
          echo "optimized_bytes=$bytes"
          test "$bytes" -ge 20000
          test "$bytes" -le 256000
          test "$(ffprobe -v error -select_streams v:0 -show_entries stream=codec_name -of default=nw=1:nk=1 "$OUTPUT_VIDEO")" = 'h264'
          test -z "$(ffprobe -v error -select_streams a -show_entries stream=index -of csv=p=0 "$OUTPUT_VIDEO")"
          ffprobe -v error \
            -show_entries format=duration,size \
            -show_entries stream=width,height,codec_name,codec_type \
            -of json "$OUTPUT_VIDEO" > "$METADATA_FILE"
          jq -e '(.format.duration | tonumber) >= 1 and (.format.duration | tonumber) <= 8' "$METADATA_FILE" >/dev/null
          jq -e '[.streams[] | select(.codec_type == "video")] | length == 1' "$METADATA_FILE" >/dev/null
          jq . "$METADATA_FILE"

      - name: Update product references and integrity evidence
        run: |
          set -euo pipefail
          mv "$OUTPUT_VIDEO" "$INPUT_VIDEO"

          python3 - <<'PY'
          import re
          from pathlib import Path

          old_video = 'src/robys-ambience-clean.mp4?v=20260627-2'
          new_video = 'src/robys-ambience-clean.mp4?v=20260711-1'
          for filename in ('index.html', 'qa.js'):
              path = Path(filename)
              text = path.read_text(encoding='utf-8')
              if old_video not in text:
                  raise SystemExit(f'{filename}: expected active hero URL not found')
              path.write_text(text.replace(old_video, new_video), encoding='utf-8')

          build_pattern = re.compile(r'(<meta\b[^>]*name=["\']robys-build["\'][^>]*content=["\'])[^"\']+(["\'])', re.I)
          for filename in ('index.html', 'menu.html'):
              path = Path(filename)
              text = path.read_text(encoding='utf-8')
              updated, count = build_pattern.subn(r'\g<1>20260711-1\g<2>', text, count=1)
              if count != 1:
                  raise SystemExit(f'{filename}: robys-build marker not updated')
              path.write_text(updated, encoding='utf-8')
          PY

          node scripts/generate-integrity-manifest.mjs
          node scripts/generate-integrity-manifest.mjs --check
          node scripts/verify-integrity-manifest.mjs

      - name: Commit optimized product files and remove one-shot workflow
        run: |
          set -euo pipefail
          rm .github/workflows/optimize-active-hero.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add \
            .github/workflows/optimize-active-hero.yml \
            src/robys-ambience-clean.mp4 \
            index.html \
            menu.html \
            qa.js \
            integrity-manifest.json
          git diff --cached --stat
          git commit -m 'perf: optimize active hero video'
          git push origin HEAD:perf/optimize-active-hero
