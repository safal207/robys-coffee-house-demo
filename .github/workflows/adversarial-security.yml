name: Adversarial browser security

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: '11 4 * * 2'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: adversarial-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  adversarial-browser:
    name: ADV-001 hostile browser probes
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Build generated runtime
        run: npm run build

      - name: Install browser test tooling
        run: npm install --no-save --package-lock=false playwright@1.52.0

      - name: Install deterministic Chromium
        run: npx playwright install --with-deps chromium

      - name: Run hostile browser probes
        run: node scripts/adversarial-browser.mjs

      - name: Upload adversarial evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: adversarial-browser-${{ github.run_id }}
          path: .artifacts/adversarial-browser-report.json
          if-no-files-found: warn
          retention-days: 30
