name: Finalize approved homepage hero video

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  finalize-hero:
    if: github.event.pull_request.head.ref == 'feat/replace-homepage-hero-20260626'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: feat/replace-homepage-hero-20260626

      - name: Install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Build the reviewed production hero from the approved source
        shell: bash
        run: |
          set -euo pipefail
          source_url='https://lh3.googleusercontent.com/gps-cs-s/APNQkAEVtziKsuMFJQEwP2oTHQKS5X7ytwBkhtMUKONpoglWIOELyxfAeQEaOK2teNhT6zcnQXmwtaNFNN30e6bmDi6zk4wS7NGwkw3zon7SHptSZ0wg5ktFcyHXnam3f96GMz4FH5VO=m37'
          source_file="$RUNNER_TEMP/approved-hero-source.mp4"
          curl --location --fail --retry 3 --connect-timeout 20 --user-agent 'Mozilla/5.0' "$source_url" --output "$source_file"

          source_sha="$(sha256sum "$source_file" | awk '{print $1}')"
          test "$source_sha" = 'fccdd95aa9ac5c870f8a63ebd6a190d80fd2dcace98e3d69e57a6cade1e542aa'

          ffmpeg -y -v error \
            -i "$source_file" \
            -an \
            -vf 'scale=432:768:flags=lanczos,fps=30' \
            -c:v libx264 \
            -preset medium \
            -crf 39 \
            -pix_fmt yuv420p \
            -movflags +faststart \
            src/robys-hero-mobile-lite.mp4

      - name: Verify the reviewed performance and media contracts
        shell: bash
        run: |
          set -euo pipefail
          file='src/robys-hero-mobile-lite.mp4'
          bytes="$(stat -c %s "$file")"
          test "$bytes" -le 83000

          codec="$(ffprobe -v error -select_streams v:0 -show_entries stream=codec_name -of default=noprint_wrappers=1:nokey=1 "$file")"
          width="$(ffprobe -v error -select_streams v:0 -show_entries stream=width -of default=noprint_wrappers=1:nokey=1 "$file")"
          height="$(ffprobe -v error -select_streams v:0 -show_entries stream=height -of default=noprint_wrappers=1:nokey=1 "$file")"
          fps="$(ffprobe -v error -select_streams v:0 -show_entries stream=r_frame_rate -of default=noprint_wrappers=1:nokey=1 "$file")"
          duration="$(ffprobe -v error -show_entries format=duration -of default=noprint_wrappers=1:nokey=1 "$file")"
          audio_streams="$(ffprobe -v error -select_streams a -show_entries stream=index -of csv=p=0 "$file" | wc -l)"

          test "$codec" = 'h264'
          test "$width" = '432'
          test "$height" = '768'
          test "$fps" = '30/1'
          test "$audio_streams" = '0'
          awk -v duration="$duration" 'BEGIN { exit !(duration > 11.9 && duration < 12.1) }'

          node scripts/verify-media.mjs

      - name: Bust the browser cache
        shell: python
        run: |
          from pathlib import Path

          path = Path('index.html')
          source = path.read_text(encoding='utf-8')
          old = 'src/robys-hero-mobile-lite.mp4?v=20260626-12'
          new = 'src/robys-hero-mobile-lite.mp4?v=20260626-13'
          if old in source:
              path.write_text(source.replace(old, new, 1), encoding='utf-8')
          elif new not in source:
              raise SystemExit('Expected hero source was not found')

      - name: Commit the final production rendition
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src/robys-hero-mobile-lite.mp4 index.html
          git diff --cached --check
          if git diff --cached --quiet; then
            echo 'Final approved hero is already staged.'
            exit 0
          fi
          git commit -m 'perf: fit approved hero within reviewed baseline'
          git push origin HEAD:feat/replace-homepage-hero-20260626
