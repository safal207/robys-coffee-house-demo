name: Temporary export PR 167 tree SHA

on:
  push:
    branches:
      - sync/pr-167-main-20260706

permissions:
  contents: write

jobs:
  export:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out control branch
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Export synchronized tree SHA
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p tmp
          git rev-parse f4a2f118e1416e9c29972a6151494d7d8af57567^{tree} > tmp/pr167-tree-sha.txt
          rm .github/workflows/temp-export-pr167-tree-sha.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all
          git diff --cached --check
          git commit -m "chore: export PR #167 synchronized tree SHA"
          git push origin HEAD:sync/pr-167-main-20260706
