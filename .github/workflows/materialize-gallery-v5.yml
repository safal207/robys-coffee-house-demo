name: Materialize gallery v5 binaries

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/materialize-gallery-v5.yml"
      - "src/products/gallery-v5/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  materialize:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.head.ref == 'gallery-original-quality-v5'
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Checkout PR branch with history
        uses: actions/checkout@v4
        with:
          ref: gallery-original-quality-v5
          fetch-depth: 0

      - name: Install ImageMagick
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y imagemagick

      - name: Restore uploaded masters and generate WebP files
        run: |
          set -euo pipefail
          source_commit="6773dc598196c1ebd5e186039a5d69f39b687222"
          mkdir -p /tmp/gallery-masters src/products/gallery-v5

          git show "$source_commit:src/products/gallery-v5/file_0000000019b871f49f012c220e8b9048.png" > /tmp/gallery-masters/latte.png
          git show "$source_commit:src/products/gallery-v5/file_000000001d2471f4920009e2a71dfbdf.png" > /tmp/gallery-masters/lotus-cheesecake.png
          git show "$source_commit:src/products/gallery-v5/file_000000006eec71f4bc128885a3c4bb29.png" > /tmp/gallery-masters/san-sebastian.png
          git show "$source_commit:src/products/gallery-v5/file_00000000968871f4aa70ba2c02861061.png" > /tmp/gallery-masters/nutella-croissant.png
          git show "$source_commit:src/products/gallery-v5/file_00000000aacc71f4b1ecba06d47b915b.png" > /tmp/gallery-masters/croissant.png
          git show "$source_commit:src/products/gallery-v5/file_00000000abdc722fb870a11490d0cc23.png" > /tmp/gallery-masters/iced-latte.png

          for input in /tmp/gallery-masters/*.png; do
            name=$(basename "$input" .png)
            convert "$input" -strip -quality 92 -define webp:method=6 "src/products/gallery-v5/${name}.webp"
          done

          sha256sum src/products/gallery-v5/*.webp
          bash scripts/verify-gallery-assets.sh

      - name: Commit real binary files
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/products/gallery-v5/*.webp
          if git diff --cached --quiet; then
            echo "Gallery binaries are already materialized."
            exit 0
          fi
          git commit -m "fix: materialize optimized gallery WebP binaries"
          git push origin HEAD:gallery-original-quality-v5
