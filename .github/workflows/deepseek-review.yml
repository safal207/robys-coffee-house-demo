name: DeepSeek PR review

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    if: >-
      github.event.issue.pull_request != null &&
      (github.event.comment.body == '/deepseek review' ||
       github.event.comment.body == '/deepseek deep-review') &&
      (github.event.comment.author_association == 'OWNER' ||
       github.event.comment.author_association == 'MEMBER' ||
       github.event.comment.author_association == 'COLLABORATOR')
    concurrency:
      group: deepseek-review-${{ github.event.issue.number }}
      cancel-in-progress: true
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GH_TOKEN: ${{ github.token }}
      REPOSITORY: ${{ github.repository }}
      PR_NUMBER: ${{ github.event.issue.number }}

    steps:
      - name: Checkout trusted reviewer code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.repository.default_branch }}
          persist-credentials: false

      - name: Fetch current PR input
        run: |
          gh api "repos/${REPOSITORY}/pulls/${PR_NUMBER}" > /tmp/deepseek-pr.json
          gh api -H 'Accept: application/vnd.github.v3.diff' \
            "repos/${REPOSITORY}/pulls/${PR_NUMBER}" > /tmp/deepseek-pr.diff

      - name: Prepare current-head review input
        id: prepare
        env:
          COMMAND: ${{ github.event.comment.body }}
          PR_JSON_FILE: /tmp/deepseek-pr.json
          DIFF_FILE: /tmp/deepseek-pr.diff
        run: python3 scripts/deepseek-review.py prepare

      - name: Run DeepSeek API review
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          MODEL: ${{ steps.prepare.outputs.model }}
          MODE: ${{ steps.prepare.outputs.mode }}
          RESPONSE_FILE: /tmp/deepseek-review-response.txt
        run: python3 scripts/deepseek-review.py infer

      - name: Re-read PR head
        run: gh api "repos/${REPOSITORY}/pulls/${PR_NUMBER}" > /tmp/deepseek-current-pr.json

      - name: Build current-head review comment
        env:
          RESPONSE_FILE: /tmp/deepseek-review-response.txt
          CURRENT_PR_JSON_FILE: /tmp/deepseek-current-pr.json
          HEAD_SHA: ${{ steps.prepare.outputs.head_sha }}
          MODEL: ${{ steps.prepare.outputs.model }}
          MODE: ${{ steps.prepare.outputs.mode }}
          TRUNCATED: ${{ steps.prepare.outputs.truncated }}
        run: python3 scripts/deepseek-review.py publish

      - name: Build failure comment
        if: failure()
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: python3 scripts/deepseek-review.py failure

      - name: Publish or update reviewer result
        if: always()
        run: |
          test -f /tmp/deepseek-review-comment.json
          existing_id="$(
            gh api --paginate "repos/${REPOSITORY}/issues/${PR_NUMBER}/comments" \
              --jq '.[] | select(.user.login == "github-actions[bot]" and (.body | contains("<!-- deepseek-pr-review -->"))) | .id' \
              | tail -n 1
          )"
          if [ -n "${existing_id}" ]; then
            gh api --method PATCH "repos/${REPOSITORY}/issues/comments/${existing_id}" \
              --input /tmp/deepseek-review-comment.json
          else
            gh api --method POST "repos/${REPOSITORY}/issues/${PR_NUMBER}/comments" \
              --input /tmp/deepseek-review-comment.json
          fi
