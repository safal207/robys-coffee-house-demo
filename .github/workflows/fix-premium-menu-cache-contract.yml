name: Fix premium menu cache contract

on:
  pull_request:
    types: [synchronize]
    branches: [main]

permissions:
  contents: write

jobs:
  fix:
    if: github.head_ref == 'feat/premium-menu-pairing-cards'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout feature branch without persisted credentials
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: feat/premium-menu-pairing-cards
          persist-credentials: false
          fetch-depth: 1

      - name: Restore revisioned cache marker contract
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('sw.js')
          source = path.read_text(encoding='utf-8')
          old = 'const CACHE_VERSION = "robys-offline-v13-20260707-premium-menu-pairings";'
          new = 'const CACHE_VERSION = "robys-offline-v13-20260707-premium-menu-pairings-10750cdfa32c-58d387ca0c01-96b566c9731e";'
          if source.count(old) != 1:
              raise SystemExit('Expected exactly one unrevisioned premium menu cache marker')
          path.write_text(source.replace(old, new, 1), encoding='utf-8')
          PY

      - name: Verify canonical build and generated evidence
        run: |
          npm ci --ignore-scripts
          npm run build
          node scripts/generate-integrity-manifest.mjs
          npm run verify:integrity
          node scripts/verify-pairing-catalog-parity.mjs
          node scripts/verify-pairing-cta.mjs
          node --check menu-page.js
          node --check pwa.js
          node --check sw.js

      - name: Remove one-time workflow
        run: rm .github/workflows/fix-premium-menu-cache-contract.yml

      - name: Commit and push repaired branch
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: restore revisioned premium menu cache marker"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push origin HEAD:feat/premium-menu-pairing-cards
