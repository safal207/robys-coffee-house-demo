name: Finalize PR 177 manifest

on:
  push:
    branches:
      - feat/premium-menu-pairing-cards

permissions:
  contents: write

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out exact branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: feat/premium-menu-pairing-cards
          fetch-depth: 1
          persist-credentials: false

      - name: Generate canonical integrity manifest
        run: |
          npm ci --ignore-scripts
          npm run build
          node scripts/generate-integrity-manifest.mjs
          npm run verify:integrity
          node --check menu-page.js

      - name: Remove one-time workflow
        run: rm .github/workflows/finalize-pr177-manifest.yml

      - name: Commit generated evidence
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add integrity-manifest.json .github/workflows/finalize-pr177-manifest.yml
          git commit -m "chore: finalize generated integrity evidence"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push origin HEAD:feat/premium-menu-pairing-cards
