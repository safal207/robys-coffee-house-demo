name: Finalize pairing cache

on:
  push:
    branches: [cache-pairing-assets]

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: cache-pairing-assets
          fetch-depth: 0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Generate and validate integrity manifest
        run: |
          npm run integrity:generate
          npm run verify:integrity
          npm run build
          npm run verify:menu-content
          npm run verify:security
          node --check sw.js
      - name: Commit manifest
        run: |
          git config user.name "Roby's cache bot"
          git config user.email "cache-bot@users.noreply.github.com"
          git add integrity-manifest.json sw.js
          if git diff --cached --quiet; then
            echo "No manifest changes"
            exit 0
          fi
          git commit -m "chore: refresh integrity after pairing cache update"
          git push origin HEAD:cache-pairing-assets
