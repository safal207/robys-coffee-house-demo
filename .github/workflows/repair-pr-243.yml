name: Repair PR 243 on current main

on:
  push:
    branches:
      - agent/align-logo-with-reference
    paths:
      - .github/workflows/repair-pr-243.yml

permissions:
  contents: write

concurrency:
  group: repair-pr-243
  cancel-in-progress: false

jobs:
  repair:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: agent/align-logo-with-reference
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Merge current main without losing the approved logo change
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main
          set +e
          git merge --no-commit --no-ff origin/main
          merge_status=$?
          set -e

          conflicts="$(git diff --name-only --diff-filter=U || true)"
          unexpected="$(printf '%s\n' "$conflicts" | sed '/^$/d;/^brand-photo-logo\.css$/d')"
          if [ -n "$unexpected" ]; then
            echo "Unexpected merge conflicts:"
            printf '%s\n' "$unexpected"
            exit 1
          fi

          git show origin/main:brand-photo-logo.css > brand-photo-logo.css
          python - <<'PY'
          from pathlib import Path

          path = Path('brand-photo-logo.css')
          text = path.read_text()

          replacements = {
              'robys-header-master-v1.svg?v=20260723-identity-v1': 'robys-header-master-v1.svg?v=20260723-identity-v2',
              'max-width:128px!important;\n    padding:6px 8px!important;\n    overflow:hidden!important;': 'max-width:136px!important;\n    padding:6px 12px!important;\n    overflow:hidden!important;\n    border-radius:999px!important;\n    box-shadow:0 10px 26px rgba(17,17,17,.16)!important;',
              'max-width:112px!important;\n    padding:5px 7px!important;': 'max-width:118px!important;\n    padding:5px 10px!important;',
              'width:96px!important;\n    max-width:96px!important;\n    padding:5px 6px!important;': 'width:100px!important;\n    max-width:100px!important;\n    padding:5px 8px!important;',
          }

          for old, new in replacements.items():
              if old not in text:
                  raise SystemExit(f'Expected logo identity block not found: {old!r}')
              text = text.replace(old, new, 1)

          path.write_text(text)
          PY

          git add brand-photo-logo.css
          if [ "$merge_status" -ne 0 ] && git diff --name-only --diff-filter=U | grep -q .; then
            echo "Unresolved conflicts remain"
            git diff --name-only --diff-filter=U
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Regenerate integrity manifest
        run: npm run integrity:generate

      - name: Verify bounded identity change
        run: |
          npm run verify:brand-identity
          npm run build
          npm run typecheck
          npm run verify:integrity
          npm run verify:regression
          git diff --check

      - name: Remove one-shot workflow and commit repaired branch
        shell: bash
        run: |
          set -euo pipefail
          git rm .github/workflows/repair-pr-243.yml
          git add -A
          git commit -m "chore: sync responsive logo change with current main"
          git push origin HEAD:agent/align-logo-with-reference
