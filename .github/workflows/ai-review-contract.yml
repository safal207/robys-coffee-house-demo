name: AI review request contract

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  contents: read
  issues: read
  pull-requests: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 7
    steps:
      - name: Wait for fresh Codex and Jules requests
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pr = context.payload.pull_request;
            const trusted = new Set(['OWNER', 'MEMBER', 'COLLABORATOR']);
            const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

            const { data: commit } = await github.rest.repos.getCommit({
              owner,
              repo,
              ref: pr.head.sha,
            });
            const headTime = Date.parse(
              commit.commit.committer?.date ?? commit.commit.author?.date,
            ) - 60_000;

            for (let attempt = 1; attempt <= 15; attempt += 1) {
              const comments = await github.paginate(
                github.rest.issues.listComments,
                { owner, repo, issue_number: pr.number, per_page: 100 },
              );
              const command = (item, value) =>
                trusted.has(item.author_association) &&
                Date.parse(item.created_at) >= headTime &&
                (item.body ?? '').trim().toLowerCase() === value;

              const hasCodex = comments.some((item) =>
                command(item, '@codex review'),
              );
              const hasJules = comments.some((item) =>
                command(item, '@jules review'),
              );

              if (hasCodex && hasJules) {
                await core.summary
                  .addHeading('AI review request contract')
                  .addTable([
                    [
                      { data: 'Fresh request', header: true },
                      { data: 'Found', header: true },
                    ],
                    ['@codex review', 'yes'],
                    ['@jules review', 'yes'],
                  ])
                  .write();
                core.notice('Fresh Codex and Jules review requests verified.');
                return;
              }

              core.info(
                `Waiting for fresh review requests (attempt ${attempt}/15): Codex=${hasCodex}, Jules=${hasJules}`,
              );
              if (attempt < 15) await sleep(20_000);
            }

            core.setFailed(
              'Post separate fresh @codex review and @jules review comments after the latest PR commit.',
            );
