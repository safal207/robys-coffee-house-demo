name: AI review contract

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  # Required for the immutable workflow-run freshness anchor.
  actions: read
  # Required to inspect exact-head check runs for the cooperation report.
  checks: read
  # Required to check out the trusted verifier and default-branch reporter.
  contents: read
  # Required to publish or update the trusted cooperation report/diagnostic.
  issues: write
  # Required for native pull-request review evidence and PR metadata.
  pull-requests: read
  # Required for native exact-head CodeRabbit commit-status evidence.
  statuses: read

jobs:
  verify:
    name: Verify exact-head independent review
    runs-on: ubuntu-latest
    concurrency:
      group: ai-review-contract-${{ github.repository }}-${{ github.event.pull_request.number }}-${{ github.event.pull_request.head.sha }}
      cancel-in-progress: true
    timeout-minutes: 22
    env:
      GH_TOKEN: ${{ github.token }}
      REPOSITORY: ${{ github.repository }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
      EXPECTED_HEAD: ${{ github.event.pull_request.head.sha }}
      EXPECTED_HEAD_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name }}
    steps:
      - name: Check out trusted timestamp verifier
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: 577dfd5eebe75038ee067830e6b0c70815fcc837
          fetch-depth: 1
          persist-credentials: false
          show-progress: false

      - name: Wait for native exact-head CodeRabbit evidence
        id: verify
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        with:
          script: |
            const verify = require('./scripts/verify-ai-review-contract.cjs');
            await verify({ github, context, core });

      - name: Check out trusted cooperation reporter
        id: reporter_checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.repository.default_branch }}
          path: .trusted-cooperation
          fetch-depth: 1
          persist-credentials: false
          show-progress: false

      - name: Configure cooperation evidence paths
        id: configure
        run: |
          set -euo pipefail
          prefix="${RUNNER_TEMP}/cooperation-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          {
            echo "PR_JSON_FILE=${prefix}-pr.json"
            echo "HEAD_COMMIT_FILE=${prefix}-head.json"
            echo "COMMENTS_FILE=${prefix}-comments.json"
            echo "REVIEWS_FILE=${prefix}-reviews.json"
            echo "REVIEW_COMMENTS_FILE=${prefix}-review-comments.json"
            echo "THREADS_FILE=${prefix}-threads.json"
            echo "RAW_CHECKS_FILE=${prefix}-checks-raw.json"
            echo "CHECKS_FILE=${prefix}-checks-normalized.json"
            echo "STATUSES_FILE=${prefix}-statuses.json"
            echo "FILES_FILE=${prefix}-files.json"
            echo "COMMENT_FILE=${prefix}-comment.json"
          } >> "${GITHUB_ENV}"

      - name: Collect exact-head cooperation evidence
        id: rest_evidence
        run: |
          set -euo pipefail
          gh api "repos/${REPOSITORY}/pulls/${PR_NUMBER}" > "${PR_JSON_FILE}"
          HEAD_SHA="$(jq -r '.head.sha' "${PR_JSON_FILE}")"
          HEAD_REPOSITORY="$(jq -r '.head.repo.full_name // ""' "${PR_JSON_FILE}")"
          if [ "${HEAD_SHA}" != "${EXPECTED_HEAD}" ]; then
            echo "PR head changed after exact-head verification: ${EXPECTED_HEAD} -> ${HEAD_SHA}" >&2
            exit 1
          fi
          if [ -z "${HEAD_REPOSITORY}" ] || [ "${HEAD_REPOSITORY}" != "${EXPECTED_HEAD_REPOSITORY}" ]; then
            echo "PR head repository changed or is unavailable: ${EXPECTED_HEAD_REPOSITORY} -> ${HEAD_REPOSITORY:-missing}" >&2
            exit 1
          fi
          if [ "${HEAD_REPOSITORY}" = "${REPOSITORY}" ]; then
            echo "same_repository=true" >> "${GITHUB_OUTPUT}"
          else
            echo "same_repository=false" >> "${GITHUB_OUTPUT}"
            echo "Fork PR detected (${HEAD_REPOSITORY}); trusted comment publishing is disabled."
          fi

          gh api "repos/${REPOSITORY}/commits/${HEAD_SHA}" > "${HEAD_COMMIT_FILE}"
          gh api --paginate --slurp \
            "repos/${REPOSITORY}/issues/${PR_NUMBER}/comments?per_page=100" \
            | jq 'add // []' > "${COMMENTS_FILE}"
          gh api --paginate --slurp \
            "repos/${REPOSITORY}/pulls/${PR_NUMBER}/reviews?per_page=100" \
            | jq 'add // []' > "${REVIEWS_FILE}"
          gh api --paginate --slurp \
            "repos/${REPOSITORY}/pulls/${PR_NUMBER}/comments?per_page=100" \
            | jq 'add // []' > "${REVIEW_COMMENTS_FILE}"
          gh api --paginate --slurp \
            "repos/${REPOSITORY}/pulls/${PR_NUMBER}/files?per_page=100" \
            | jq 'add // []' > "${FILES_FILE}"
          gh api --paginate -H 'Accept: application/vnd.github+json' \
            "repos/${REPOSITORY}/commits/${HEAD_SHA}/check-runs?per_page=100" \
            | jq -s '{check_runs: (map(.check_runs // []) | add // [])}' \
            > "${RAW_CHECKS_FILE}"
          gh api --paginate --slurp \
            "repos/${REPOSITORY}/commits/${HEAD_SHA}/statuses?per_page=100" \
            | jq 'add // []' > "${STATUSES_FILE}"

      - name: Build workflow-level check evidence after verifier success
        id: normalize_self
        run: |
          set -euo pipefail
          run_ids_file="${RUNNER_TEMP}/cooperation-workflow-run-ids.txt"
          workflow_jsonl="${RUNNER_TEMP}/cooperation-workflow-runs.jsonl"
          workflow_checks="${RUNNER_TEMP}/cooperation-workflow-checks.json"
          external_checks="${RUNNER_TEMP}/cooperation-external-checks.json"
          : > "${workflow_jsonl}"

          jq -r '
            .check_runs[]
            | (.details_url // .html_url // "")
            | try capture("/actions/runs/(?<id>[0-9]+)").id catch empty
          ' "${RAW_CHECKS_FILE}" | sort -u > "${run_ids_file}"

          while IFS= read -r run_id; do
            [ -n "${run_id}" ] || continue
            gh api "repos/${REPOSITORY}/actions/runs/${run_id}" \
              --jq '{id: .id, name: .name, status: .status, conclusion: .conclusion, details_url: .html_url, head_sha: .head_sha, event: .event, app: {slug: "github-actions"}}' \
              >> "${workflow_jsonl}"
          done < "${run_ids_file}"

          jq -s '.' "${workflow_jsonl}" > "${workflow_checks}"
          expected_run_count="$(sed '/^$/d' "${run_ids_file}" | wc -l | tr -d ' ')"
          actual_run_count="$(jq 'length' "${workflow_checks}")"
          if [ "${actual_run_count}" != "${expected_run_count}" ]; then
            echo "Workflow metadata collection was incomplete: expected ${expected_run_count}, got ${actual_run_count}." >&2
            exit 1
          fi

          mismatched_heads="$(
            jq --arg expected "${EXPECTED_HEAD}" '[.[] | select(.head_sha != $expected)] | length' "${workflow_checks}"
          )"
          if [ "${mismatched_heads}" != "0" ]; then
            echo "Workflow metadata contains checks from a different head." >&2
            jq -r --arg expected "${EXPECTED_HEAD}" '.[] | select(.head_sha != $expected) | "id=\(.id) name=\(.name) head=\(.head_sha)"' "${workflow_checks}" >&2
            exit 1
          fi

          jq '[
            .check_runs[]
            | select(
                ((.details_url // .html_url // "") | test("/actions/runs/[0-9]+") | not)
              )
          ]' "${RAW_CHECKS_FILE}" > "${external_checks}"

          jq -n \
            --slurpfile workflows "${workflow_checks}" \
            --slurpfile external "${external_checks}" \
            '{check_runs: ($workflows[0] + $external[0])}' \
            > "${CHECKS_FILE}"

          github_actions_workflow_count="$(
            jq '[.check_runs[] | select(.app.slug == "github-actions")] | length' "${CHECKS_FILE}"
          )"
          if [ "${github_actions_workflow_count}" != "${actual_run_count}" ]; then
            echo "Workflow provenance mapping was incomplete: expected ${actual_run_count}, got ${github_actions_workflow_count}." >&2
            exit 1
          fi

          current_matches="$(
            jq --argjson run_id "${GITHUB_RUN_ID}" '
              [.check_runs[]
               | select(
                   .id == $run_id and
                   .name == "AI review contract" and
                   .app.slug == "github-actions" and
                   .status != "completed"
                 )]
              | length
            ' "${CHECKS_FILE}"
          )"
          if [ "${current_matches}" != "1" ]; then
            echo "Expected exactly one in-progress AI review workflow for current run ${GITHUB_RUN_ID}; found ${current_matches}." >&2
            jq -r --argjson run_id "${GITHUB_RUN_ID}" '
              .check_runs[]
              | select(.id == $run_id)
              | "id=\(.id) name=\(.name) app=\(.app.slug // "missing") status=\(.status) conclusion=\(.conclusion // "null") head=\(.head_sha // "external")"
            ' "${CHECKS_FILE}" >&2
            exit 1
          fi

          tmp_checks="${CHECKS_FILE}.tmp"
          jq --argjson run_id "${GITHUB_RUN_ID}" '
            .check_runs |= map(
              if (.id == $run_id and .name == "AI review contract" and .app.slug == "github-actions" and .status != "completed")
              then .status = "completed" | .conclusion = "success"
              else .
              end
            )
          ' "${CHECKS_FILE}" > "${tmp_checks}"
          mv "${tmp_checks}" "${CHECKS_FILE}"

          normalized_count="$(
            jq --argjson run_id "${GITHUB_RUN_ID}" '
              [.check_runs[]
               | select(
                   .id == $run_id and
                   .name == "AI review contract" and
                   .app.slug == "github-actions" and
                   .status == "completed" and
                   .conclusion == "success"
                 )]
              | length
            ' "${CHECKS_FILE}"
          )"
          test "${normalized_count}" = "1"
          echo "Built workflow-level evidence with GitHub Actions provenance and normalized the current AI workflow after verifier success."

      - name: Collect complete GraphQL review evidence
        id: graphql_evidence
        run: python3 .trusted-cooperation/scripts/fetch-review-threads.py

      - name: Build causal cooperation report
        id: build_report
        run: python3 .trusted-cooperation/scripts/ai-review-cooperation.py report

      - name: Require merge-ready cooperation conclusion
        id: validate_report
        run: |
          set -euo pipefail
          test -s "${COMMENT_FILE}"
          jq -e '.body | type == "string" and length > 0' "${COMMENT_FILE}" >/dev/null
          conclusion="$(
            jq -r '.body' "${COMMENT_FILE}" \
              | sed -nE 's/^\*\*Overall conclusion:\*\* \*\*(READY|READY_WITH_ADVISORY_GAPS)\*\*.*$/\1/p' \
              | head -n 1
          )"
          if [ -z "${conclusion}" ]; then
            echo "Cooperation report is not merge-ready:" >&2
            jq -r '.body' "${COMMENT_FILE}" >&2
            exit 1
          fi
          echo "Validated cooperation conclusion: ${conclusion}"

      - name: Publish or update trusted cooperation report
        id: publish_report
        if: steps.rest_evidence.outputs.same_repository == 'true'
        run: |
          set -euo pipefail
          CURRENT_HEAD="$(gh api "repos/${REPOSITORY}/pulls/${PR_NUMBER}" --jq '.head.sha')"
          if [ "${CURRENT_HEAD}" != "${EXPECTED_HEAD}" ]; then
            echo "PR head changed before publishing: ${EXPECTED_HEAD} -> ${CURRENT_HEAD}" >&2
            exit 1
          fi

          body_bytes="$(jq -r '.body' "${COMMENT_FILE}" | wc -c | tr -d ' ')"
          if [ "${body_bytes}" -gt 65000 ]; then
            echo "Cooperation report exceeds GitHub comment limit: ${body_bytes} bytes" >&2
            exit 1
          fi

          existing_id="$(
            gh api --paginate "repos/${REPOSITORY}/issues/${PR_NUMBER}/comments" \
              --jq '.[] | select(.user.login == "github-actions[bot]" and (.body | contains("<!-- ai-review-cooperation -->"))) | .id' \
              | tail -n 1
          )"
          if [ -n "${existing_id}" ]; then
            gh api --method PATCH "repos/${REPOSITORY}/issues/comments/${existing_id}" \
              -H 'Accept: application/vnd.github+json' \
              --input "${COMMENT_FILE}"
          else
            gh api --method POST "repos/${REPOSITORY}/issues/${PR_NUMBER}/comments" \
              -H 'Accept: application/vnd.github+json' \
              --input "${COMMENT_FILE}"
          fi

      - name: Record fork publication boundary
        if: steps.rest_evidence.outputs.same_repository == 'false'
        run: |
          echo "Cooperation evidence is merge-ready, but trusted comment publishing is unsupported for fork PRs." >&2
          echo "The review ledger remains fail-closed because no trusted cooperation report can be created." >&2
          exit 1

      - name: Upload cooperation evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ai-cooperation-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            ${{ env.PR_JSON_FILE }}
            ${{ env.HEAD_COMMIT_FILE }}
            ${{ env.COMMENTS_FILE }}
            ${{ env.REVIEWS_FILE }}
            ${{ env.REVIEW_COMMENTS_FILE }}
            ${{ env.THREADS_FILE }}
            ${{ env.RAW_CHECKS_FILE }}
            ${{ env.CHECKS_FILE }}
            ${{ env.STATUSES_FILE }}
            ${{ env.FILES_FILE }}
            ${{ env.COMMENT_FILE }}
          if-no-files-found: warn
          retention-days: 3

      - name: Publish cooperation failure diagnostic
        if: ${{ failure() && steps.verify.outcome == 'success' && github.event.pull_request.head.repo.full_name == github.repository }}
        continue-on-error: true
        env:
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          REPORTER_CHECKOUT_OUTCOME: ${{ steps.reporter_checkout.outcome }}
          CONFIGURE_OUTCOME: ${{ steps.configure.outcome }}
          REST_OUTCOME: ${{ steps.rest_evidence.outcome }}
          NORMALIZE_OUTCOME: ${{ steps.normalize_self.outcome }}
          GRAPHQL_OUTCOME: ${{ steps.graphql_evidence.outcome }}
          BUILD_OUTCOME: ${{ steps.build_report.outcome }}
          VALIDATE_OUTCOME: ${{ steps.validate_report.outcome }}
          PUBLISH_OUTCOME: ${{ steps.publish_report.outcome }}
        run: |
          set -euo pipefail
          printf -v body '%s\n' \
            '<!-- ai-review-cooperation-diagnostic -->' \
            '## AI cooperation publishing failed / AI işbirliği raporu yayımlanamadı / Сбой публикации AI cooperation report' \
            '' \
            "Exact-head CodeRabbit verification succeeded for PR #${PR_NUMBER}, but report publishing did not complete." \
            "PR #${PR_NUMBER} için exact-head CodeRabbit doğrulaması başarılı oldu, ancak rapor yayımlanamadı." \
            "Проверка CodeRabbit для точного head PR #${PR_NUMBER} прошла, но публикация отчета не завершилась." \
            '' \
            '| Stage / Aşama / Этап | Outcome / Sonuç / Результат |' \
            '|---|---|' \
            "| trusted reporter checkout / güvenilir reporter checkout / trusted checkout | ${REPORTER_CHECKOUT_OUTCOME:-unknown} |" \
            "| configure / yapılandırma / настройка | ${CONFIGURE_OUTCOME:-unknown} |" \
            "| REST evidence / REST kanıtı / REST-доказательства | ${REST_OUTCOME:-unknown} |" \
            "| workflow-level check evidence / workflow-level check kanıtı / workflow-level evidence | ${NORMALIZE_OUTCOME:-unknown} |" \
            "| GraphQL evidence / GraphQL kanıtı / GraphQL-доказательства | ${GRAPHQL_OUTCOME:-unknown} |" \
            "| build report / rapor oluşturma / построение отчета | ${BUILD_OUTCOME:-unknown} |" \
            "| validate conclusion / sonucu doğrulama / проверка заключения | ${VALIDATE_OUTCOME:-unknown} |" \
            "| publish report / raporu yayımlama / публикация отчета | ${PUBLISH_OUTCOME:-unknown} |" \
            '' \
            "Run / Çalıştırma / Запуск: ${RUN_URL}"

          diagnostic_payload="${RUNNER_TEMP}/cooperation-diagnostic.json"
          jq -n --arg body "${body}" '{body: $body}' > "${diagnostic_payload}"
          existing_id="$(
            gh api --paginate "repos/${REPOSITORY}/issues/${PR_NUMBER}/comments" \
              --jq '.[] | select(.user.login == "github-actions[bot]" and (.body | contains("<!-- ai-review-cooperation-diagnostic -->"))) | .id' \
              | tail -n 1
          )"
          if [ -n "${existing_id}" ]; then
            gh api --method PATCH "repos/${REPOSITORY}/issues/comments/${existing_id}" \
              -H 'Accept: application/vnd.github+json' \
              --input "${diagnostic_payload}"
          else
            gh api --method POST "repos/${REPOSITORY}/issues/${PR_NUMBER}/comments" \
              -H 'Accept: application/vnd.github+json' \
              --input "${diagnostic_payload}"
          fi
