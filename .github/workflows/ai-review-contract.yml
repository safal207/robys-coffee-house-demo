name: AI review contract

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  # Required for the immutable workflow-run freshness anchor.
  actions: read
  # The verifier is always loaded from the protected default branch, never from PR code.
  contents: read
  # Required for trusted exact-head reviewer request comments.
  issues: read
  # Required for native exact-head pull-request review evidence.
  pull-requests: read
  # Kept read-only during the staged migration because the pre-patch verifier used it.
  statuses: read

jobs:
  verify:
    name: Verify exact-head independent review
    runs-on: ubuntu-latest
    timeout-minutes: 17
    steps:
      - name: Check out trusted default-branch verifier
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 1
          persist-credentials: false
          show-progress: false
      - name: Wait for request-bound independent review evidence
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        with:
          script: |
            const verify = require('./scripts/verify-ai-review-contract.cjs');
            await verify({ github, context, core });
