name: AI review contract

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  issues: read
  pull-requests: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Wait for current-head AI review evidence
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pr = context.payload.pull_request;
            const trusted = new Set(['OWNER', 'MEMBER', 'COLLABORATOR']);
            const codexLogins = new Set([
              'chatgpt-codex-connector[bot]',
              'chatgpt-codex-connector',
            ]);
            const codeRabbitLogins = new Set([
              'coderabbitai[bot]',
              'coderabbitai',
            ]);
            const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

            const evidenceAfter = Date.parse(pr.updated_at);
            const currentHead = pr.head.sha.toLowerCase();
            const timeOf = (item) => Date.parse(item.submitted_at ?? item.created_at ?? 0);
            const updatedTimeOf = (item) => Date.parse(
              item.updated_at ?? item.submitted_at ?? item.created_at ?? 0,
            );
            const isFresh = (item) => timeOf(item) >= evidenceAfter;
            const bodyOf = (item) => (item.body ?? '').trim();
            const commandLinesOf = (item) => bodyOf(item)
              .toLowerCase()
              .split(/\r?\n/)
              .map((line) => line.trim())
              .filter(Boolean);
            const isCommand = (item, value) => (
              trusted.has(item.author_association) &&
              isFresh(item) &&
              commandLinesOf(item).includes(value)
            );
            const nativeReviewMatchesHead = (review) => (
              review.commit_id?.toLowerCase() === currentHead
            );
            const bodyNamesHead = (body) => new RegExp(
              `(^|[^0-9a-f])${currentHead}([^0-9a-f]|$)`,
              'i',
            ).test(body ?? '');
            const isCodexReview = (review) => (
              codexLogins.has(review.user?.login) &&
              isFresh(review) &&
              nativeReviewMatchesHead(review)
            );
            const isCodeRabbitReview = (review) => (
              codeRabbitLogins.has(review.user?.login) &&
              isFresh(review) &&
              nativeReviewMatchesHead(review)
            );
            const isDeepSeekEvidence = (comment) => (
              comment.user?.login === 'github-actions[bot]' &&
              isFresh(comment) &&
              bodyOf(comment).includes('<!-- deepseek-pr-review -->') &&
              bodyNamesHead(comment.body)
            );

            for (let attempt = 1; attempt <= 30; attempt += 1) {
              const [comments, reviews] = await Promise.all([
                github.paginate(
                  github.rest.issues.listComments,
                  { owner, repo, issue_number: pr.number, per_page: 100 },
                ),
                github.paginate(
                  github.rest.pulls.listReviews,
                  { owner, repo, pull_number: pr.number, per_page: 100 },
                ),
              ]);

              const codexRequests = comments.filter((item) => isCommand(item, '@codex review'));
              const codeRabbitRequests = comments.filter((item) => isCommand(item, '@coderabbitai review'));
              const deepSeekRequests = comments.filter((item) => isCommand(item, '/deepseek review'));
              const latestCodeRabbitRequestAt = codeRabbitRequests.reduce(
                (latest, request) => Math.max(latest, Date.parse(request.created_at)),
                0,
              );

              const codexReview = reviews.find(isCodexReview);
              const codeRabbitReview = reviews.find(isCodeRabbitReview);
              const codeRabbitStatusComment = comments.find((item) => {
                const body = bodyOf(item);
                const statusTime = updatedTimeOf(item);
                return (
                  codeRabbitRequests.length > 0 &&
                  codeRabbitLogins.has(item.user?.login) &&
                  statusTime >= evidenceAfter &&
                  statusTime >= latestCodeRabbitRequestAt &&
                  body.includes('<!-- This is an auto-generated comment: summarize by coderabbit.ai -->') &&
                  body.includes('No new commits to review since the last review.')
                );
              });
              const deepSeekEvidence = comments.find(isDeepSeekEvidence);

              const hasCodexRequest = codexRequests.length > 0;
              const hasCodeRabbitRequest = codeRabbitRequests.length > 0;
              const hasDeepSeekRequest = deepSeekRequests.length > 0;
              const hasCodexEvidence = Boolean(codexReview);
              const hasCodeRabbitEvidence = Boolean(codeRabbitReview || codeRabbitStatusComment);
              const hasDeepSeekEvidence = Boolean(deepSeekEvidence);

              if (
                hasCodexRequest &&
                hasCodeRabbitRequest &&
                hasDeepSeekRequest &&
                hasCodexEvidence &&
                hasCodeRabbitEvidence &&
                hasDeepSeekEvidence
              ) {
                await core.summary
                  .addHeading('AI review contract')
                  .addTable([
                    [
                      { data: 'Reviewer', header: true },
                      { data: 'Fresh request', header: true },
                      { data: 'Exact-head evidence', header: true },
                    ],
                    ['Codex', 'yes', 'yes'],
                    ['CodeRabbit', 'yes', 'yes'],
                    ['DeepSeek', 'yes', 'yes'],
                  ])
                  .write();
                core.notice(
                  `Exact-head AI evidence verified for ${pr.head.sha}: Codex, CodeRabbit and DeepSeek complete.`,
                );
                return;
              }

              core.info(
                `Waiting for exact-head AI evidence (attempt ${attempt}/30): ` +
                  `Codex=${hasCodexRequest}/${hasCodexEvidence}, ` +
                  `CodeRabbit=${hasCodeRabbitRequest}/${hasCodeRabbitEvidence}, ` +
                  `DeepSeek=${hasDeepSeekRequest}/${hasDeepSeekEvidence}`,
              );
              if (attempt < 30) await sleep(20_000);
            }

            core.setFailed(
              'Post fresh @codex review, @coderabbitai review and /deepseek review commands after the latest head update, then wait for exact-head evidence from all three reviewers.',
            );
