name: AI review contract

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  # Required for the immutable workflow-run freshness anchor.
  actions: read
  # Required for native pull-request review evidence.
  pull-requests: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Wait for native exact-head CodeRabbit review
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        with:
          script: |
            const { owner, repo } = context.repo;
            const pr = context.payload.pull_request;
            const currentHead = pr.head.sha.toLowerCase();
            const codeRabbitLogins = new Set(['coderabbitai[bot]', 'coderabbitai']);
            const immutableTimeOf = (item) => {
              const parsed = Date.parse(item.submitted_at ?? item.created_at ?? 0);
              return Number.isFinite(parsed) ? parsed : 0;
            };

            const run = await github.rest.actions.getWorkflowRun({
              owner,
              repo,
              run_id: context.runId,
            });
            const headUpdateAnchor = Date.parse(run.data.created_at ?? 0);
            if (!Number.isFinite(headUpdateAnchor) || headUpdateAnchor <= 0) {
              core.setFailed('Unable to determine the immutable current-head workflow anchor.');
              return;
            }

            for (let attempt = 1; attempt <= 30; attempt += 1) {
              const reviews = await github.paginate(
                github.rest.pulls.listReviews,
                { owner, repo, pull_number: pr.number, per_page: 100 },
              );
              const exactHeadReview = reviews.find((review) => (
                codeRabbitLogins.has(review.user?.login) &&
                review.commit_id?.toLowerCase() === currentHead &&
                immutableTimeOf(review) >= headUpdateAnchor
              ));

              if (exactHeadReview) {
                core.notice(`Verified native CodeRabbit PR review for exact head ${pr.head.sha}.`);
                return;
              }

              core.info(
                `Waiting for native exact-head CodeRabbit review ` +
                `(${attempt}/30); head=${pr.head.sha}`,
              );
              if (attempt < 30) {
                await new Promise((resolve) => setTimeout(resolve, 20_000));
              }
            }

            core.setFailed(
              'Require a CodeRabbit-authored pull-request review object whose commit_id equals the current head and whose immutable submission time follows this current-head workflow run. Issue comments and generated summaries never count.',
            );
