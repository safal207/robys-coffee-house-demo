name: AI review contract

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  # Required for the immutable workflow-run freshness anchor.
  actions: read
  # Required to inspect exact-head check runs for the cooperation report.
  checks: read
  # Required to check out the trusted verifier and default-branch reporter.
  contents: read
  # Required to publish or update the trusted cooperation report/diagnostic.
  issues: write
  # Required for native pull-request review evidence and PR metadata.
  pull-requests: read
  # Required for native exact-head CodeRabbit commit-status evidence.
  statuses: read

jobs:
  verify:
    name: Verify exact-head independent review
    runs-on: ubuntu-latest
    timeout-minutes: 22
    env:
      GH_TOKEN: ${{ github.token }}
      REPOSITORY: ${{ github.repository }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
      EXPECTED_HEAD: ${{ github.event.pull_request.head.sha }}
    steps:
      - name: Check out trusted timestamp verifier
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: 577dfd5eebe75038ee067830e6b0c70815fcc837
          fetch-depth: 1
          persist-credentials: false
          show-progress: false

      - name: Wait for native exact-head CodeRabbit evidence
        id: verify
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        with:
          script: |
            const verify = require('./scripts/verify-ai-review-contract.cjs');
            await verify({ github, context, core });

      - name: Check out trusted cooperation reporter
        id: reporter_checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.repository.default_branch }}
          path: .trusted-cooperation
          fetch-depth: 1
          persist-credentials: false
          show-progress: false

      - name: Configure cooperation evidence paths
        id: configure
        run: |
          set -euo pipefail
          prefix="${RUNNER_TEMP}/cooperation-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          {
            echo "PR_JSON_FILE=${prefix}-pr.json"
            echo "HEAD_COMMIT_FILE=${prefix}-head.json"
            echo "COMMENTS_FILE=${prefix}-comments.json"
            echo "REVIEWS_FILE=${prefix}-reviews.json"
            echo "REVIEW_COMMENTS_FILE=${prefix}-review-comments.json"
            echo "THREADS_FILE=${prefix}-threads.json"
            echo "CHECKS_FILE=${prefix}-checks.json"
            echo "STATUSES_FILE=${prefix}-statuses.json"
            echo "FILES_FILE=${prefix}-files.json"
            echo "COMMENT_FILE=${prefix}-comment.json"
          } >> "${GITHUB_ENV}"

      - name: Collect exact-head cooperation evidence
        id: rest_evidence
        run: |
          set -euo pipefail
          gh api "repos/${REPOSITORY}/pulls/${PR_NUMBER}" > "${PR_JSON_FILE}"
          HEAD_SHA="$(jq -r '.head.sha' "${PR_JSON_FILE}")"
          if [ "${HEAD_SHA}" != "${EXPECTED_HEAD}" ]; then
            echo "PR head changed after exact-head verification: ${EXPECTED_HEAD} -> ${HEAD_SHA}" >&2
            exit 1
          fi

          gh api "repos/${REPOSITORY}/commits/${HEAD_SHA}" > "${HEAD_COMMIT_FILE}"
          gh api --paginate --slurp \
            "repos/${REPOSITORY}/issues/${PR_NUMBER}/comments?per_page=100" \
            | jq 'add // []' > "${COMMENTS_FILE}"
          gh api --paginate --slurp \
            "repos/${REPOSITORY}/pulls/${PR_NUMBER}/reviews?per_page=100" \
            | jq 'add // []' > "${REVIEWS_FILE}"
          gh api --paginate --slurp \
            "repos/${REPOSITORY}/pulls/${PR_NUMBER}/comments?per_page=100" \
            | jq 'add // []' > "${REVIEW_COMMENTS_FILE}"
          gh api --paginate --slurp \
            "repos/${REPOSITORY}/pulls/${PR_NUMBER}/files?per_page=100" \
            | jq 'add // []' > "${FILES_FILE}"
          gh api --paginate -H 'Accept: application/vnd.github+json' \
            "repos/${REPOSITORY}/commits/${HEAD_SHA}/check-runs?per_page=100" \
            | jq -s '{check_runs: (map(.check_runs // []) | add // [])}' \
            > "${CHECKS_FILE}"
          gh api --paginate --slurp \
            "repos/${REPOSITORY}/commits/${HEAD_SHA}/statuses?per_page=100" \
            | jq 'add // []' > "${STATUSES_FILE}"

      - name: Collect complete GraphQL review evidence
        id: graphql_evidence
        run: python3 .trusted-cooperation/scripts/fetch-review-threads.py

      - name: Build causal cooperation report
        id: build_report
        run: python3 .trusted-cooperation/scripts/ai-review-cooperation.py report

      - name: Require merge-ready cooperation conclusion
        id: validate_report
        run: |
          set -euo pipefail
          test -s "${COMMENT_FILE}"
          jq -e '.body | type == "string" and length > 0' "${COMMENT_FILE}" >/dev/null
          conclusion="$(
            jq -r '.body' "${COMMENT_FILE}" \
              | sed -nE 's/^\*\*Overall conclusion:\*\* \*\*(READY|READY_WITH_ADVISORY_GAPS)\*\*.*$/\1/p' \
              | head -n 1
          )"
          if [ -z "${conclusion}" ]; then
            echo "Cooperation report is not merge-ready:" >&2
            jq -r '.body' "${COMMENT_FILE}" >&2
            exit 1
          fi
          echo "Validated cooperation conclusion: ${conclusion}"

      - name: Publish or update trusted cooperation report
        id: publish_report
        run: |
          set -euo pipefail
          CURRENT_HEAD="$(gh api "repos/${REPOSITORY}/pulls/${PR_NUMBER}" --jq '.head.sha')"
          if [ "${CURRENT_HEAD}" != "${EXPECTED_HEAD}" ]; then
            echo "PR head changed before publishing: ${EXPECTED_HEAD} -> ${CURRENT_HEAD}" >&2
            exit 1
          fi

          body_bytes="$(jq -r '.body' "${COMMENT_FILE}" | wc -c | tr -d ' ')"
          if [ "${body_bytes}" -gt 65000 ]; then
            echo "Cooperation report exceeds GitHub comment limit: ${body_bytes} bytes" >&2
            exit 1
          fi

          existing_id="$(
            gh api --paginate "repos/${REPOSITORY}/issues/${PR_NUMBER}/comments" \
              --jq '.[] | select(.user.login == "github-actions[bot]" and (.body | contains("<!-- ai-review-cooperation -->"))) | .id' \
              | tail -n 1
          )"
          if [ -n "${existing_id}" ]; then
            gh api --method PATCH "repos/${REPOSITORY}/issues/comments/${existing_id}" \
              -H 'Accept: application/vnd.github+json' \
              --input "${COMMENT_FILE}"
          else
            gh api --method POST "repos/${REPOSITORY}/issues/${PR_NUMBER}/comments" \
              -H 'Accept: application/vnd.github+json' \
              --input "${COMMENT_FILE}"
          fi

      - name: Publish cooperation failure diagnostic
        if: ${{ failure() && steps.verify.outcome == 'success' }}
        env:
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          REPORTER_CHECKOUT_OUTCOME: ${{ steps.reporter_checkout.outcome }}
          CONFIGURE_OUTCOME: ${{ steps.configure.outcome }}
          REST_OUTCOME: ${{ steps.rest_evidence.outcome }}
          GRAPHQL_OUTCOME: ${{ steps.graphql_evidence.outcome }}
          BUILD_OUTCOME: ${{ steps.build_report.outcome }}
          VALIDATE_OUTCOME: ${{ steps.validate_report.outcome }}
          PUBLISH_OUTCOME: ${{ steps.publish_report.outcome }}
        run: |
          set -euo pipefail
          printf -v body '%s\n' \
            '<!-- ai-review-cooperation-diagnostic -->' \
            '## AI cooperation publishing failed / Сбой публикации AI cooperation report' \
            '' \
            "Exact-head CodeRabbit verification succeeded for PR #${PR_NUMBER}, but report publishing did not complete." \
            '' \
            '| Stage / Этап | Outcome / Результат |' \
            '|---|---|' \
            "| trusted reporter checkout | ${REPORTER_CHECKOUT_OUTCOME:-unknown} |" \
            "| configure | ${CONFIGURE_OUTCOME:-unknown} |" \
            "| REST evidence | ${REST_OUTCOME:-unknown} |" \
            "| GraphQL evidence | ${GRAPHQL_OUTCOME:-unknown} |" \
            "| build report | ${BUILD_OUTCOME:-unknown} |" \
            "| validate conclusion | ${VALIDATE_OUTCOME:-unknown} |" \
            "| publish report | ${PUBLISH_OUTCOME:-unknown} |" \
            '' \
            "Run / Запуск: ${RUN_URL}"

          diagnostic_payload="${RUNNER_TEMP}/cooperation-diagnostic.json"
          jq -n --arg body "${body}" '{body: $body}' > "${diagnostic_payload}"
          existing_id="$(
            gh api --paginate "repos/${REPOSITORY}/issues/${PR_NUMBER}/comments" \
              --jq '.[] | select(.user.login == "github-actions[bot]" and (.body | contains("<!-- ai-review-cooperation-diagnostic -->"))) | .id' \
              | tail -n 1
          )"
          if [ -n "${existing_id}" ]; then
            gh api --method PATCH "repos/${REPOSITORY}/issues/comments/${existing_id}" \
              -H 'Accept: application/vnd.github+json' \
              --input "${diagnostic_payload}"
          else
            gh api --method POST "repos/${REPOSITORY}/issues/${PR_NUMBER}/comments" \
              -H 'Accept: application/vnd.github+json' \
              --input "${diagnostic_payload}"
          fi
