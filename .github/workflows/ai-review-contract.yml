name: AI review contract

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  issues: read
  pull-requests: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Wait for current-head AI review evidence
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pr = context.payload.pull_request;
            const trusted = new Set(['OWNER', 'MEMBER', 'COLLABORATOR']);
            const codexBotLogins = new Set([
              'chatgpt-codex-connector[bot]',
              'chatgpt-codex-connector',
            ]);
            const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

            // This workflow runs only when the PR is opened or its head changes.
            // GitHub supplies the PR-event and evidence timestamps, so evidence
            // must be at or after the current PR update without a clock-skew grace.
            const evidenceAfter = Date.parse(pr.updated_at);
            const currentHead = pr.head.sha.toLowerCase();
            const timeOf = (item) => Date.parse(
              item.submitted_at ?? item.created_at,
            );
            const isFresh = (item) => timeOf(item) >= evidenceAfter;
            const bodyOf = (item) => (item.body ?? '').trim();
            const isCodexBot = (user) => (
              user?.type === 'Bot' && codexBotLogins.has(user.login)
            );
            const reviewedCommitOf = (item) => bodyOf(item).match(
              /Reviewed commit:[^`]*`([0-9a-f]{7,40})`/i,
            )?.[1]?.toLowerCase();
            const matchesBodyHead = (item) => {
              const reviewed = reviewedCommitOf(item);
              return Boolean(reviewed && currentHead.startsWith(reviewed));
            };
            const matchesNativeReviewHead = (review) => {
              const commitId = review.commit_id?.toLowerCase();
              return commitId
                ? commitId === currentHead
                : matchesBodyHead(review);
            };
            const isCommand = (item, value) =>
              trusted.has(item.author_association) &&
              isFresh(item) &&
              bodyOf(item).toLowerCase() === value;

            for (let attempt = 1; attempt <= 30; attempt += 1) {
              const [comments, reviews] = await Promise.all([
                github.paginate(
                  github.rest.issues.listComments,
                  { owner, repo, issue_number: pr.number, per_page: 100 },
                ),
                github.paginate(
                  github.rest.pulls.listReviews,
                  { owner, repo, pull_number: pr.number, per_page: 100 },
                ),
              ]);

              const codexRequests = comments.filter((item) =>
                isCommand(item, '@codex review'),
              );
              const hasJulesRequest = comments.some((item) =>
                isCommand(item, '@jules review'),
              );

              const codexIssueComment = comments.find((item) => (
                isCodexBot(item.user) &&
                isFresh(item) &&
                matchesBodyHead(item)
              ));

              const codexPullReview = reviews.find((item) => (
                isCodexBot(item.user) &&
                isFresh(item) &&
                matchesNativeReviewHead(item)
              ));

              let codexReaction = false;
              if (!codexIssueComment && !codexPullReview) {
                try {
                  for (const request of codexRequests) {
                    const reactions = await github.paginate(
                      github.rest.reactions.listForIssueComment,
                      { owner, repo, comment_id: request.id, per_page: 100 },
                    );
                    if (
                      reactions.some((reaction) => {
                        const reactionTime = Date.parse(reaction.created_at);
                        return (
                          isCodexBot(reaction.user) &&
                          reaction.content === '+1' &&
                          reactionTime >= evidenceAfter &&
                          reactionTime >= Date.parse(request.created_at)
                        );
                      })
                    ) {
                      codexReaction = true;
                      break;
                    }
                  }
                } catch (error) {
                  core.warning(`Could not inspect Codex reactions: ${error.message}`);
                }
              }

              const hasCodexRequest = codexRequests.length > 0;
              const hasCodexEvidence = Boolean(
                codexIssueComment || codexPullReview || codexReaction,
              );

              if (hasCodexRequest && hasJulesRequest && hasCodexEvidence) {
                const evidenceType = codexPullReview
                  ? 'native pull request review matching current commit_id'
                  : codexIssueComment
                    ? 'issue comment with matching Reviewed commit'
                    : 'bot +1 on fresh request';

                await core.summary
                  .addHeading('AI review contract')
                  .addTable([
                    [
                      { data: 'Evidence', header: true },
                      { data: 'Result', header: true },
                    ],
                    ['Fresh @codex review request', 'yes'],
                    ['Fresh @jules review request', 'yes'],
                    ['Official Codex evidence for current head', evidenceType],
                  ])
                  .write();
                core.notice(
                  `Codex evidence verified for current head ${pr.head.sha}; Jules was requested.`,
                );
                return;
              }

              core.info(
                `Waiting for AI review evidence (attempt ${attempt}/30): ` +
                  `Codex request=${hasCodexRequest}, ` +
                  `Jules request=${hasJulesRequest}, ` +
                  `Codex head evidence=${hasCodexEvidence}`,
              );
              if (attempt < 30) await sleep(20_000);
            }

            core.setFailed(
              'After the latest PR open or head update, post fresh @codex review and @jules review comments, then wait for official Codex evidence tied to the current head through native review commit_id, a matching issue comment, or a trusted bot reaction.',
            );
