name: AI review contract

on:
  pull_request:
    # opened starts the first head-bound run; synchronize reruns after new commits change the PR head and invalidate earlier exact-head evidence.
    types: [opened, synchronize]

permissions:
  # Required for the immutable workflow-run freshness anchor.
  actions: read
  # Required to check out the verifier from GitHub's trusted base SHA.
  contents: read
  # Required for trusted exact-head review request comments and provider-limit signals.
  issues: read
  # Required for native pull-request review evidence.
  pull-requests: read

jobs:
  verify:
    name: Verify exact-head CodeRabbit review or limit waiver
    runs-on: ubuntu-latest
    timeout-minutes: 17
    steps:
      - name: Check out trusted base verifier
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          # Execute governance from the GitHub-supplied base SHA, never PR code.
          ref: ${{ github.event.pull_request.base.sha }}
          fetch-depth: 1
          persist-credentials: false
          show-progress: false
      - name: Wait for exact-head CodeRabbit evidence or explicit limit signal
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        with:
          script: |
            const verify = require('./scripts/verify-ai-review-contract.cjs');
            await verify({ github, context, core });
