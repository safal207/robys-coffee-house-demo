name: AI review contract

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  # Required for the immutable workflow-run freshness anchor.
  actions: read
  # Required to check out the trusted verifier merged on the current main baseline.
  contents: read
  # Required for trusted exact-head review request comments.
  issues: read
  # Required for native pull-request review evidence.
  pull-requests: read
  # Required for native exact-head review status evidence.
  statuses: read

jobs:
  verify:
    name: Verify exact-head independent review
    runs-on: ubuntu-latest
    timeout-minutes: 17
    steps:
      - name: Check out trusted exact-head verifier
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          # Immutable current main baseline containing the Qodo/Codex verifier.
          ref: 686e2ed6bb17a69679684ba9398cb641beb8fefa
          fetch-depth: 1
          persist-credentials: false
          show-progress: false
      - name: Wait for native exact-head active-pool evidence
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        with:
          script: |
            const verify = require('./scripts/verify-ai-review-contract.cjs');
            await verify({ github, context, core });
