name: AI review contract

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  contents: read
  issues: read
  pull-requests: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Wait for current-head AI review evidence
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pr = context.payload.pull_request;
            const trusted = new Set(['OWNER', 'MEMBER', 'COLLABORATOR']);
            const codexBot = 'chatgpt-codex-connector[bot]';
            const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

            // The event timestamp is tied to this opened/reopened/synchronize/
            // ready-for-review run. Unlike a Git commit's author/committer date,
            // it cannot be backdated by a locally created commit.
            const evidenceAfter = Date.parse(pr.updated_at) - 5_000;
            const isFresh = (item) => Date.parse(item.created_at) >= evidenceAfter;
            const bodyOf = (item) => (item.body ?? '').trim();
            const isCommand = (item, value) =>
              trusted.has(item.author_association) &&
              isFresh(item) &&
              bodyOf(item).toLowerCase() === value;

            for (let attempt = 1; attempt <= 30; attempt += 1) {
              const comments = await github.paginate(
                github.rest.issues.listComments,
                { owner, repo, issue_number: pr.number, per_page: 100 },
              );

              const hasCodexRequest = comments.some((item) =>
                isCommand(item, '@codex review'),
              );
              const hasJulesRequest = comments.some((item) =>
                isCommand(item, '@jules review'),
              );

              const codexReview = comments.find((item) => {
                if (item.user?.login !== codexBot || !isFresh(item)) return false;
                const reviewed = bodyOf(item).match(
                  /Reviewed commit:[^`]*`([0-9a-f]{7,40})`/i,
                )?.[1]?.toLowerCase();
                return Boolean(
                  reviewed && pr.head.sha.toLowerCase().startsWith(reviewed),
                );
              });

              if (hasCodexRequest && hasJulesRequest && codexReview) {
                await core.summary
                  .addHeading('AI review contract')
                  .addTable([
                    [
                      { data: 'Evidence', header: true },
                      { data: 'Result', header: true },
                    ],
                    ['Fresh @codex review request', 'yes'],
                    ['Fresh @jules review request', 'yes'],
                    ['Codex Reviewed commit matches current head', 'yes'],
                  ])
                  .write();
                core.notice(
                  `Codex reviewed current head ${pr.head.sha}; Jules was requested.`,
                );
                return;
              }

              core.info(
                `Waiting for AI review evidence (attempt ${attempt}/30): ` +
                  `Codex request=${hasCodexRequest}, ` +
                  `Jules request=${hasJulesRequest}, ` +
                  `Codex matching review=${Boolean(codexReview)}`,
              );
              if (attempt < 30) await sleep(20_000);
            }

            core.setFailed(
              'Post fresh @codex review and @jules review comments after the latest PR event, then wait for an official Codex Reviewed commit matching the current head SHA.',
            );
