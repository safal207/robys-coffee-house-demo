name: AI review contract

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  # Required for the immutable workflow-run freshness anchor.
  actions: read
  # Required to check out the verifier from the exact PR head.
  contents: read
  # Required for trusted exact-head review request comments.
  issues: read
  # Required for native pull-request review evidence.
  pull-requests: read
  # Required for native exact-head CodeRabbit commit-status evidence.
  statuses: read

jobs:
  verify:
    name: Verify exact-head independent review
    runs-on: ubuntu-latest
    timeout-minutes: 17
    steps:
      - name: Check out exact-head verifier
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - name: Wait for native exact-head CodeRabbit evidence
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        with:
          script: |
            const verify = require('./scripts/verify-ai-review-contract.cjs');
            await verify({ github, context, core });
