name: AI review contract

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  # Required for the stable GitHub-server workflow-run freshness anchor.
  actions: read
  # Required to load the verifier from the exact trusted default-branch commit for this run.
  contents: read
  # Required for trusted exact-head reviewer request comments.
  issues: read
  # Required for native exact-head pull-request review evidence.
  pull-requests: read

jobs:
  verify:
    name: Verify exact-head independent review
    runs-on: ubuntu-latest
    # One run covers one provider window. A later rerun reuses the same immutable run anchor.
    timeout-minutes: 17
    steps:
      - name: Check out trusted default-branch verifier
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.sha }}
          fetch-depth: 1
          persist-credentials: false
          show-progress: false
      - name: Wait for request-bound independent review evidence
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        with:
          script: |
            const verify = require('./scripts/verify-ai-review-target-contract.cjs');
            // The trusted target runner imports ./scripts/verify-ai-review-contract.cjs from this same default-branch checkout.
            await verify({ github, context, core });
