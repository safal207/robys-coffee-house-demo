name: AI review contract

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  contents: read
  issues: read
  pull-requests: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Wait for current-head AI review evidence
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pr = context.payload.pull_request;
            const trusted = new Set(['OWNER', 'MEMBER', 'COLLABORATOR']);
            const codexBot = 'chatgpt-codex-connector[bot]';
            const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

            const { data: commit } = await github.rest.repos.getCommit({
              owner,
              repo,
              ref: pr.head.sha,
            });
            const headTime = Date.parse(
              commit.commit.committer?.date ?? commit.commit.author?.date,
            ) - 60_000;
            const isFresh = (item) => Date.parse(item.created_at) >= headTime;
            const bodyOf = (item) => (item.body ?? '').trim();
            const isCommand = (item, value) =>
              trusted.has(item.author_association) &&
              isFresh(item) &&
              bodyOf(item).toLowerCase() === value;

            for (let attempt = 1; attempt <= 30; attempt += 1) {
              const comments = await github.paginate(
                github.rest.issues.listComments,
                { owner, repo, issue_number: pr.number, per_page: 100 },
              );

              const codexRequests = comments.filter((item) =>
                isCommand(item, '@codex review'),
              );
              const hasJulesRequest = comments.some((item) =>
                isCommand(item, '@jules review'),
              );

              const codexReview = comments.find((item) => {
                if (item.user?.login !== codexBot || !isFresh(item)) return false;
                const reviewed = bodyOf(item).match(
                  /Reviewed commit:[^`]*`([0-9a-f]{7,40})`/i,
                )?.[1]?.toLowerCase();
                return Boolean(
                  reviewed && pr.head.sha.toLowerCase().startsWith(reviewed),
                );
              });

              let codexReaction = false;
              if (!codexReview) {
                try {
                  for (const request of codexRequests) {
                    const reactions = await github.paginate(
                      github.rest.reactions.listForIssueComment,
                      { owner, repo, comment_id: request.id, per_page: 100 },
                    );
                    if (
                      reactions.some(
                        (reaction) =>
                          reaction.user?.login === codexBot &&
                          reaction.content === '+1' &&
                          isFresh(reaction),
                      )
                    ) {
                      codexReaction = true;
                      break;
                    }
                  }
                } catch (error) {
                  core.warning(`Could not inspect Codex reactions: ${error.message}`);
                }
              }

              const hasCodexRequest = codexRequests.length > 0;
              const hasCodexEvidence = Boolean(codexReview || codexReaction);

              if (hasCodexRequest && hasJulesRequest && hasCodexEvidence) {
                await core.summary
                  .addHeading('AI review contract')
                  .addTable([
                    [
                      { data: 'Evidence', header: true },
                      { data: 'Result', header: true },
                    ],
                    ['Fresh @codex review request', 'yes'],
                    ['Fresh @jules review request', 'yes'],
                    [
                      'Codex evidence for current head',
                      codexReview ? 'review comment' : 'bot reaction',
                    ],
                  ])
                  .write();
                core.notice(
                  `Codex reviewed current head ${pr.head.sha}; Jules was requested.`,
                );
                return;
              }

              core.info(
                `Waiting for AI review evidence (attempt ${attempt}/30): ` +
                  `Codex request=${hasCodexRequest}, ` +
                  `Jules request=${hasJulesRequest}, ` +
                  `Codex head evidence=${hasCodexEvidence}`,
              );
              if (attempt < 30) await sleep(20_000);
            }

            core.setFailed(
              'Post fresh @codex review and @jules review comments after the latest commit, then wait for official Codex evidence on the current head SHA.',
            );
