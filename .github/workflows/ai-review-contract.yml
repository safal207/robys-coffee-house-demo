name: AI review contract

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  # Required for the immutable workflow-run freshness anchor.
  actions: read
  # Required to check out the trusted verifier commit.
  contents: read
  # Required for native exact-head Qodo review evidence.
  pull-requests: read

jobs:
  verify:
    name: Verify exact-head independent review
    runs-on: ubuntu-latest
    timeout-minutes: 17
    steps:
      - name: Check out trusted Qodo verifier
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: 9994ca640aa74885eaa9b038809c1bcca173b9d9
          fetch-depth: 1
          persist-credentials: false
          show-progress: false
      - name: Wait for native exact-head Qodo evidence
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        with:
          script: |
            const verify = require('./scripts/verify-ai-review-contract.cjs');
            await verify({ github, context, core });
