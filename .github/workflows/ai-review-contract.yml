name: AI review contract

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  issues: read
  pull-requests: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Wait for current-head AI review evidence
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pr = context.payload.pull_request;
            const trusted = new Set(['OWNER', 'MEMBER', 'COLLABORATOR']);
            const nativeCodexLogins = new Set([
              'chatgpt-codex-connector[bot]',
              'chatgpt-codex-connector',
            ]);
            const codeRabbitLogins = new Set([
              'coderabbitai[bot]',
              'coderabbitai',
            ]);
            const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

            const evidenceAfter = Date.parse(pr.updated_at);
            const currentHead = pr.head.sha.toLowerCase();
            const timeOf = (item) => Math.max(
              0,
              ...[item.submitted_at, item.created_at, item.updated_at]
                .map((value) => Date.parse(value ?? 0))
                .filter(Number.isFinite),
            );
            const bodyOf = (item) => (item.body ?? '').trim();
            const commandLinesOf = (item) => bodyOf(item)
              .toLowerCase()
              .split(/\r?\n/)
              .map((line) => line.trim())
              .filter(Boolean);
            const isCommand = (item, value) => (
              trusted.has(item.author_association) &&
              timeOf(item) >= evidenceAfter &&
              commandLinesOf(item).includes(value)
            );
            const latestRequestAt = (requests) => requests.reduce(
              (latest, request) => Math.max(latest, timeOf(request)),
              0,
            );
            const nativeReviewMatchesHead = (review) => (
              review.commit_id?.toLowerCase() === currentHead
            );
            const requestMentionsHead = (request) => (
              bodyOf(request).toLowerCase().includes(currentHead)
            );

            for (let attempt = 1; attempt <= 30; attempt += 1) {
              const [comments, reviews] = await Promise.all([
                github.paginate(
                  github.rest.issues.listComments,
                  { owner, repo, issue_number: pr.number, per_page: 100 },
                ),
                github.paginate(
                  github.rest.pulls.listReviews,
                  { owner, repo, pull_number: pr.number, per_page: 100 },
                ),
              ]);

              const codexRequests = comments.filter((item) => isCommand(item, '@codex review'));
              const codeRabbitRequests = comments.filter((item) => (
                isCommand(item, '@coderabbitai review') && requestMentionsHead(item)
              ));
              const latestCodexRequestAt = latestRequestAt(codexRequests);
              const latestCodeRabbitRequestAt = latestRequestAt(codeRabbitRequests);

              const nativeCodexReview = reviews.find((review) => (
                nativeCodexLogins.has(review.user?.login) &&
                nativeReviewMatchesHead(review) &&
                latestCodexRequestAt > 0 &&
                timeOf(review) >= latestCodexRequestAt
              ));
              const maintainerAiAdvisory = reviews.find((review) => {
                const body = bodyOf(review);
                return (
                  trusted.has(review.author_association) &&
                  nativeReviewMatchesHead(review) &&
                  timeOf(review) >= evidenceAfter &&
                  body.includes('<!-- external-ai-advisory-attestation -->') &&
                  body.toLowerCase().includes(`head: ${currentHead}`) &&
                  body.includes('Provider: OpenAI ChatGPT') &&
                  body.includes('Provenance: owner-attested session') &&
                  body.includes('Independence: not verified') &&
                  body.includes('Result: READY')
                );
              });
              const codeRabbitReview = reviews.find((review) => (
                codeRabbitLogins.has(review.user?.login) &&
                nativeReviewMatchesHead(review) &&
                latestCodeRabbitRequestAt > 0 &&
                timeOf(review) >= latestCodeRabbitRequestAt
              ));
              const codeRabbitStatusComment = comments.find((item) => {
                const body = bodyOf(item);
                const statusTime = timeOf(item);
                return (
                  latestCodeRabbitRequestAt > 0 &&
                  codeRabbitLogins.has(item.user?.login) &&
                  statusTime >= latestCodeRabbitRequestAt &&
                  body.includes('<!-- This is an auto-generated comment: summarize by coderabbit.ai -->') &&
                  (
                    body.includes('No actionable comments were generated in the recent review.') ||
                    body.includes('No new commits to review since the last review.')
                  )
                );
              });

              const hasIndependentBotRequest = latestCodeRabbitRequestAt > 0;
              const hasIndependentBotEvidence = Boolean(codeRabbitReview || codeRabbitStatusComment);
              const hasSecondaryAiAdvisory = Boolean(nativeCodexReview || maintainerAiAdvisory);
              const advisoryProvenance = nativeCodexReview
                ? 'native Codex bot review'
                : maintainerAiAdvisory
                  ? 'owner-attested ChatGPT session (not independent)'
                  : 'missing';

              if (
                hasIndependentBotRequest &&
                hasIndependentBotEvidence &&
                hasSecondaryAiAdvisory
              ) {
                await core.summary
                  .addHeading('AI review contract')
                  .addTable([
                    [
                      { data: 'Evidence', header: true },
                      { data: 'Identity', header: true },
                      { data: 'Independent', header: true },
                      { data: 'Exact head', header: true },
                    ],
                    ['Primary review', 'CodeRabbit bot verified', 'yes', 'yes'],
                    [
                      'Secondary advisory',
                      advisoryProvenance,
                      nativeCodexReview ? 'yes' : 'no',
                      'yes',
                    ],
                  ])
                  .write();
                core.notice(
                  `Exact-head AI evidence verified for ${pr.head.sha}: independent CodeRabbit review plus ${advisoryProvenance}.`,
                );
                return;
              }

              core.info(
                `Waiting for exact-head AI evidence (attempt ${attempt}/30): ` +
                  `CodeRabbit=${hasIndependentBotRequest}/${hasIndependentBotEvidence}, ` +
                  `secondaryAdvisory=${hasSecondaryAiAdvisory} (${advisoryProvenance})`,
              );
              if (attempt < 30) await sleep(20_000);
            }

            core.setFailed(
              'Require a fresh exact-head CodeRabbit request plus bot-authored review or clean status summary, and a separately labelled exact-head secondary AI advisory. Owner-attested advisories are accepted only as non-independent evidence and must never impersonate Codex.',
            );
