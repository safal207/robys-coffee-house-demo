name: AI review contract

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  # actions: read is required for the immutable workflow-run freshness anchor.
  actions: read
  # issues: read is required for the exact-head review request comment.
  issues: read
  # pull-requests: read is required for native PR review evidence.
  pull-requests: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Check out exact head verifier
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Wait for native exact-head CodeRabbit review
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        with:
          script: |
            const verify = require('./scripts/verify-ai-review-contract.cjs');
            await verify({ github, context, core });
