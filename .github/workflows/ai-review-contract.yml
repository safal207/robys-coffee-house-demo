name: AI review contract

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  issues: read
  pull-requests: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Wait for current-head AI review evidence
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pr = context.payload.pull_request;
            const trusted = new Set(['OWNER', 'MEMBER', 'COLLABORATOR']);
            const officialAiBotLogins = new Set([
              'chatgpt-codex-connector[bot]',
              'chatgpt-codex-connector',
              'coderabbitai[bot]',
              'coderabbitai',
            ]);
            const codeRabbitLogins = new Set([
              'coderabbitai[bot]',
              'coderabbitai',
            ]);
            const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

            const evidenceAfter = Date.parse(pr.updated_at);
            const currentHead = pr.head.sha.toLowerCase();
            const timeOf = (item) => Date.parse(
              item.submitted_at ?? item.created_at,
            );
            const updatedTimeOf = (item) => Date.parse(
              item.updated_at ?? item.submitted_at ?? item.created_at,
            );
            const isFresh = (item) => timeOf(item) >= evidenceAfter;
            const bodyOf = (item) => (item.body ?? '').trim();
            const commandLinesOf = (item) => bodyOf(item)
              .toLowerCase()
              .split(/\r?\n/)
              .map((line) => line.trim())
              .filter(Boolean);
            const isOfficialAiBot = (user) => (
              user?.type === 'Bot' && officialAiBotLogins.has(user.login)
            );
            const isCodeRabbitBot = (user) => (
              isOfficialAiBot(user) && codeRabbitLogins.has(user.login)
            );
            const reviewedCommitOf = (item) => bodyOf(item).match(
              /Reviewed commit:[^`]*`([0-9a-f]{40})`/i,
            )?.[1]?.toLowerCase();
            const matchesBodyHead = (item) => (
              reviewedCommitOf(item) === currentHead
            );
            const nativeReviewMatchType = (review) => {
              const commitId = review.commit_id?.toLowerCase();
              if (commitId) return commitId === currentHead ? 'commit_id' : null;
              return matchesBodyHead(review) ? 'body' : null;
            };
            const isCommand = (item, value) =>
              trusted.has(item.author_association) &&
              isFresh(item) &&
              commandLinesOf(item).includes(value);

            for (let attempt = 1; attempt <= 30; attempt += 1) {
              const [comments, reviews] = await Promise.all([
                github.paginate(
                  github.rest.issues.listComments,
                  { owner, repo, issue_number: pr.number, per_page: 100 },
                ),
                github.paginate(
                  github.rest.pulls.listReviews,
                  { owner, repo, pull_number: pr.number, per_page: 100 },
                ),
              ]);

              const codexRequests = comments.filter((item) =>
                isCommand(item, '@codex review'),
              );
              const hasJulesRequest = comments.some((item) =>
                isCommand(item, '@jules review'),
              );
              const codeRabbitRequests = comments.filter((item) =>
                isCommand(item, '@coderabbitai review'),
              );
              const aiReactionRequests = [
                ...codexRequests,
                ...codeRabbitRequests,
              ];
              const latestCodeRabbitRequestAt = codeRabbitRequests.reduce(
                (latest, request) => Math.max(latest, Date.parse(request.created_at)),
                0,
              );

              const aiIssueComment = comments.find((item) => (
                isOfficialAiBot(item.user) &&
                isFresh(item) &&
                matchesBodyHead(item)
              ));

              const codeRabbitStatusComment = comments.find((item) => {
                const body = bodyOf(item);
                const statusTime = updatedTimeOf(item);
                return (
                  codeRabbitRequests.length > 0 &&
                  isCodeRabbitBot(item.user) &&
                  statusTime >= evidenceAfter &&
                  statusTime >= latestCodeRabbitRequestAt &&
                  body.includes('<!-- This is an auto-generated comment: summarize by coderabbit.ai -->') &&
                  body.includes('<!-- This is an auto-generated comment: skip review by coderabbit.ai -->') &&
                  body.includes('No new commits to review since the last review.')
                );
              });

              let aiPullReview = null;
              let aiPullReviewMatch = null;
              for (const review of reviews) {
                if (!isOfficialAiBot(review.user) || !isFresh(review)) continue;
                const matchType = nativeReviewMatchType(review);
                if (!matchType) continue;
                aiPullReview = review;
                aiPullReviewMatch = matchType;
                break;
              }

              let aiReaction = false;
              if (!aiIssueComment && !aiPullReview && !codeRabbitStatusComment) {
                try {
                  for (const request of aiReactionRequests) {
                    const reactions = await github.paginate(
                      github.rest.reactions.listForIssueComment,
                      { owner, repo, comment_id: request.id, per_page: 100 },
                    );
                    if (
                      reactions.some((reaction) => {
                        const reactionTime = Date.parse(reaction.created_at);
                        return (
                          isOfficialAiBot(reaction.user) &&
                          reaction.content === '+1' &&
                          reactionTime >= evidenceAfter &&
                          reactionTime >= Date.parse(request.created_at)
                        );
                      })
                    ) {
                      aiReaction = true;
                      break;
                    }
                  }
                } catch (error) {
                  core.warning(`Could not inspect AI review reactions: ${error.message}`);
                }
              }

              const hasCodexRequest = codexRequests.length > 0;
              const hasCodeRabbitRequest = codeRabbitRequests.length > 0;
              const hasAiEvidence = Boolean(
                aiIssueComment || aiPullReview || codeRabbitStatusComment || aiReaction,
              );

              if (
                hasCodexRequest &&
                hasJulesRequest &&
                hasCodeRabbitRequest &&
                hasAiEvidence
              ) {
                const evidenceType = aiPullReview
                  ? aiPullReviewMatch === 'commit_id'
                    ? `native ${aiPullReview.user.login} review matching current commit_id`
                    : `native ${aiPullReview.user.login} review with full matching Reviewed commit`
                  : aiIssueComment
                    ? `${aiIssueComment.user.login} issue comment with full matching Reviewed commit`
                    : codeRabbitStatusComment
                      ? 'fresh CodeRabbit status confirming no unreviewed commits remain'
                      : 'official AI bot +1 on fresh request';

                await core.summary
                  .addHeading('AI review contract')
                  .addTable([
                    [
                      { data: 'Evidence', header: true },
                      { data: 'Result', header: true },
                    ],
                    ['Fresh @codex review request', 'yes'],
                    ['Fresh @jules review request', 'yes'],
                    ['Fresh @coderabbitai review request', 'yes'],
                    ['Official independent AI evidence for current head', evidenceType],
                  ])
                  .write();
                core.notice(
                  `Independent AI evidence verified for current head ${pr.head.sha}; Codex, Jules and CodeRabbit were requested.`,
                );
                return;
              }

              core.info(
                `Waiting for AI review evidence (attempt ${attempt}/30): ` +
                  `Codex request=${hasCodexRequest}, ` +
                  `Jules request=${hasJulesRequest}, ` +
                  `CodeRabbit request=${hasCodeRabbitRequest}, ` +
                  `current-head AI evidence=${hasAiEvidence}`,
              );
              if (attempt < 30) await sleep(20_000);
            }

            core.setFailed(
              'After the latest PR open or head update, post fresh @codex review, @jules review and @coderabbitai review commands (one per line), then wait for official independent AI evidence tied to the current head through native review commit_id, a full matching Reviewed commit, a fresh CodeRabbit no-unreviewed-commits status, or a trusted bot reaction.',
            );
