name: Strip legacy product images

on:
  push:
    branches: [fix/mobile-product-cards]

permissions:
  contents: write

jobs:
  strip:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/mobile-product-cards
          fetch-depth: 0
      - name: Remove legacy static product images
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re
          path = Path('index.html')
          text = path.read_text()
          updated, count = re.subn(
              r'<div class="price-grid">.*?</div>',
              '<div class="price-grid" aria-live="polite"></div>',
              text,
              count=1,
              flags=re.S,
          )
          if count != 1:
              raise SystemExit('price-grid replacement failed')
          path.write_text(updated)
          PY
      - name: Commit static catalog cleanup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm .github/workflows/strip-legacy-product-images.yml
          git add index.html .github/workflows/strip-legacy-product-images.yml
          git commit -m "build: remove legacy static product images" || exit 0
          git push origin HEAD:fix/mobile-product-cards
