name: Diagnose poster gate once

on:
  pull_request:
    paths:
      - .github/workflows/diagnose-poster-gate-once.yml

permissions:
  contents: read

jobs:
  diagnose:
    if: github.head_ref == 'fix/close-logo-delivery-tail-v2'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: fix/close-logo-delivery-tail-v2
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Capture poster verifier
        id: poster
        continue-on-error: true
        run: node scripts/verify-taste-journey-posters.mjs > poster-result.log 2>&1
      - name: Upload result
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: poster-gate-result
          path: poster-result.log
          if-no-files-found: error
          retention-days: 1
      - name: Preserve verifier outcome
        if: steps.poster.outcome == 'failure'
        run: exit 1
