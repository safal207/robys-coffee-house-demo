name: iOS WebKit route gate

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ios-route-webkit:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install project dependencies
        run: npm ci

      - name: Install Playwright for the iOS WebKit gate
        run: |
          npm install --no-save --package-lock=false playwright@1.53.2
          npx playwright install --with-deps webkit

      - name: Build site
        run: npm run build

      - name: Start local site
        run: |
          python3 -m http.server 4173 --bind 127.0.0.1 > /tmp/robys-ios-server.log 2>&1 &
          echo $! > /tmp/robys-ios-server.pid
          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:4173/index.html > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat /tmp/robys-ios-server.log
          exit 1

      - name: Verify Google Maps route handoff in iPhone WebKit
        env:
          BASE_URL: http://127.0.0.1:4173
        run: node scripts/verify-ios-route-webkit.mjs

      - name: Upload iOS route evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ios-route-webkit-${{ github.run_id }}
          path: |
            qa-artifacts/ios-route-webkit.json
            qa-artifacts/ios-route-map.png
            /tmp/robys-ios-server.log
          if-no-files-found: warn
          retention-days: 14
