name: Build product images

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "src/premium-latte.b64"
      - "src/premium-croissant.b64"
      - ".github/workflows/build-product-images.yml"

permissions:
  contents: write

jobs:
  decode:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - name: Decode Latte
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p src/products
          tr -d '\r\n\t ' < src/premium-latte.b64 | base64 --decode --ignore-garbage > src/products/latte.webp
          test -s src/products/latte.webp
          file src/products/latte.webp | tee /dev/stderr | grep -q "Web/P image"

      - name: Decode Croissant
        shell: bash
        run: |
          set -euo pipefail
          tr -d '\r\n\t ' < src/premium-croissant.b64 | base64 --decode --ignore-garbage > src/products/croissant.webp
          test -s src/products/croissant.webp
          file src/products/croissant.webp | tee /dev/stderr | grep -q "Web/P image"

      - name: Validate existing product artwork
        shell: bash
        run: |
          set -euo pipefail
          for image in \
            src/products/san-sebastian.webp \
            src/products/lotus-cheesecake.webp \
            src/products/nutella-croissant.webp
          do
            test -s "$image"
            file "$image" | tee /dev/stderr | grep -q "Web/P image"
          done

      - name: Commit generated WebP files
        shell: bash
        run: |
          set -euo pipefail
          git add src/products/latte.webp src/products/croissant.webp
          if git diff --cached --quiet; then
            echo "Product images are already current."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "build: generate missing product WebP images [skip ci]"
          git push
