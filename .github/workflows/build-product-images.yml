name: Build product images

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "src/premium-latte.b64"
      - "src/premium-san-sebastian.b64"
      - "src/premium-croissant.b64"
      - "src/products/lotus-cheesecake.b64"
      - "src/products/nutella-croissant.b64"
      - ".github/workflows/build-product-images.yml"

permissions:
  contents: write

jobs:
  decode:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Decode Latte
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p src/products
          tr -d '\r\n\t ' < src/premium-latte.b64 | base64 --decode --ignore-garbage > src/products/latte.webp
          test -s src/products/latte.webp
          file src/products/latte.webp | tee /dev/stderr | grep -q "Web/P image"

      - name: Decode San Sebastian
        shell: bash
        run: |
          set -euo pipefail
          tr -d '\r\n\t ' < src/premium-san-sebastian.b64 | base64 --decode --ignore-garbage > src/products/san-sebastian.webp
          test -s src/products/san-sebastian.webp
          file src/products/san-sebastian.webp | tee /dev/stderr | grep -q "Web/P image"

      - name: Decode Croissant
        shell: bash
        run: |
          set -euo pipefail
          tr -d '\r\n\t ' < src/premium-croissant.b64 | base64 --decode --ignore-garbage > src/products/croissant.webp
          test -s src/products/croissant.webp
          file src/products/croissant.webp | tee /dev/stderr | grep -q "Web/P image"

      - name: Decode Lotus Cheesecake
        shell: bash
        run: |
          set -euo pipefail
          tr -d '\r\n\t ' < src/products/lotus-cheesecake.b64 | base64 --decode --ignore-garbage > src/products/lotus-cheesecake.webp
          test -s src/products/lotus-cheesecake.webp
          file src/products/lotus-cheesecake.webp | tee /dev/stderr | grep -q "Web/P image"

      - name: Decode Nutella Croissant
        shell: bash
        run: |
          set -euo pipefail
          tr -d '\r\n\t ' < src/products/nutella-croissant.b64 | base64 --decode --ignore-garbage > src/products/nutella-croissant.webp
          test -s src/products/nutella-croissant.webp
          file src/products/nutella-croissant.webp | tee /dev/stderr | grep -q "Web/P image"

      - name: Commit generated WebP files
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- src/products/*.webp; then
            echo "Product images are already current."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/products/*.webp
          git commit -m "build: generate stable product WebP images [skip ci]"
          git push
