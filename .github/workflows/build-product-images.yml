name: Build product images

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "src/premium-latte.b64"
      - "src/premium-san-sebastian.b64"
      - "src/premium-croissant.b64"
      - "src/products/lotus-cheesecake.b64"
      - "src/products/nutella-croissant.b64"
      - ".github/workflows/build-product-images.yml"

permissions:
  contents: write

jobs:
  decode:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Decode and validate product artwork
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p src/products

          decode_webp() {
            source_file="$1"
            target_file="$2"
            echo "Decoding ${source_file}"
            test -s "$source_file"
            tr -d '\r\n\t ' < "$source_file" | base64 --decode --ignore-garbage > "$target_file"
            test -s "$target_file"
            file "$target_file"
            file "$target_file" | grep -q "Web/P image"
          }

          decode_webp src/premium-latte.b64 src/products/latte.webp
          decode_webp src/premium-san-sebastian.b64 src/products/san-sebastian.webp
          decode_webp src/premium-croissant.b64 src/products/croissant.webp
          decode_webp src/products/lotus-cheesecake.b64 src/products/lotus-cheesecake.webp
          decode_webp src/products/nutella-croissant.b64 src/products/nutella-croissant.webp

      - name: Commit generated WebP files
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- src/products/*.webp; then
            echo "Product images are already current."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/products/*.webp
          git commit -m "build: generate stable product WebP images [skip ci]"
          git push
