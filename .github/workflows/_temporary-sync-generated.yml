name: Temporary generated runtime sync

on:
  push:
    branches: [security/mythos-foundation]

permissions:
  contents: write

jobs:
  sync:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
        with:
          ref: security/mythos-foundation
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Commit generated runtime
        run: |
          if git diff --quiet -- app.js index.html; then
            echo "Generated runtime already synchronized"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app.js index.html
          git commit -m "build: synchronize secure generated runtime"
          git push origin HEAD:security/mythos-foundation
