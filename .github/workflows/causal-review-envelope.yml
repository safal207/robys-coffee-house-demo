name: Causal review envelope

on:
  issue_comment:
    types: [created]
  workflow_run:
    workflows: [AI review contract]
    types: [completed]

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.issue.number || github.event.workflow_run.head_sha || github.run_id }}
  cancel-in-progress: true

jobs:
  build:
    if: >-
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request != null &&
       github.event.issue.state == 'open' &&
       github.event.comment.body == '/ai-cooperation report' &&
       (github.event.comment.author_association == 'OWNER' ||
        github.event.comment.author_association == 'MEMBER' ||
        github.event.comment.author_association == 'COLLABORATOR' ||
        github.event.comment.user.login == github.repository_owner)) ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.name == 'AI review contract' &&
       github.event.workflow_run.event == 'pull_request' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_sha != '')
    name: Build exact-head causal envelope
    permissions:
      actions: read
      checks: read
      contents: read
      issues: read
      pull-requests: read
      statuses: read
    runs-on: ubuntu-latest
    timeout-minutes: 8
    env:
      GH_TOKEN: ${{ github.token }}
      REPOSITORY: ${{ github.repository }}
      REPOSITORY_OWNER: ${{ github.repository_owner }}
      TRIGGER_EVENT: ${{ github.event_name }}
      PR_NUMBER: ${{ github.event.issue.number || '' }}
      TRIGGER_AUTHOR: ${{ github.event.comment.user.login || github.event.workflow_run.actor.login || '' }}
      TRIGGER_ASSOCIATION: ${{ github.event.comment.author_association || '' }}
      WORKFLOW_NAME: ${{ github.event.workflow_run.name || '' }}
      WORKFLOW_EVENT: ${{ github.event.workflow_run.event || '' }}
      WORKFLOW_CONCLUSION: ${{ github.event.workflow_run.conclusion || '' }}
      TRIGGER_HEAD_SHA: ${{ github.event.workflow_run.head_sha || '' }}

    steps:
      - name: Authorize observer trigger
        run: |
          set -euo pipefail
          case "${TRIGGER_EVENT}" in
            issue_comment)
              case "${TRIGGER_ASSOCIATION:-NONE}" in
                OWNER|MEMBER|COLLABORATOR)
                  ;;
                *)
                  if [ "${TRIGGER_AUTHOR}" != "${REPOSITORY_OWNER}" ]; then
                    echo "Unauthorized causal-envelope command actor: ${TRIGGER_AUTHOR}" >&2
                    exit 1
                  fi
                  ;;
              esac
              if ! [[ "${PR_NUMBER}" =~ ^[1-9][0-9]*$ ]]; then
                echo "Trusted command is missing a valid PR number: ${PR_NUMBER:-missing}" >&2
                exit 1
              fi
              ;;
            workflow_run)
              if [ "${WORKFLOW_NAME}" != "AI review contract" ] ||
                 [ "${WORKFLOW_EVENT}" != "pull_request" ] ||
                 [ "${WORKFLOW_CONCLUSION}" != "success" ] ||
                 [ -z "${TRIGGER_HEAD_SHA}" ]; then
                echo "Unauthorized workflow_run trigger." >&2
                exit 1
              fi
              ;;
            *)
              echo "Unsupported trigger: ${TRIGGER_EVENT}" >&2
              exit 1
              ;;
          esac

      - name: Check out trusted envelope builder
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.repository.default_branch }}
          persist-credentials: false
          show-progress: false

      - name: Resolve workflow-run pull request
        run: |
          set -euo pipefail
          if [ "${TRIGGER_EVENT}" != "workflow_run" ]; then
            exit 0
          fi

          candidates="${RUNNER_TEMP}/causal-envelope-pr-candidates.json"
          matches="${RUNNER_TEMP}/causal-envelope-pr-matches.json"
          gh api -H 'Accept: application/vnd.github+json' \
            "repos/${REPOSITORY}/commits/${TRIGGER_HEAD_SHA}/pulls?per_page=100" \
            > "${candidates}"
          jq --arg sha "${TRIGGER_HEAD_SHA}" --arg repo "${REPOSITORY}" \
            '[.[] | select(.state == "open" and .head.sha == $sha and .base.repo.full_name == $repo)]' \
            "${candidates}" > "${matches}"

          count="$(jq 'length' "${matches}")"
          if [ "${count}" != "1" ]; then
            echo "Expected exactly one open PR for ${TRIGGER_HEAD_SHA}; found ${count}." >&2
            exit 1
          fi
          resolved="$(jq -r '.[0].number' "${matches}")"
          if ! [[ "${resolved}" =~ ^[1-9][0-9]*$ ]]; then
            echo "Resolved invalid PR number: ${resolved}" >&2
            exit 1
          fi
          echo "PR_NUMBER=${resolved}" >> "${GITHUB_ENV}"

      - name: Configure evidence paths
        run: |
          prefix="${RUNNER_TEMP}/causal-envelope-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          {
            echo "PR_JSON_FILE=${prefix}-pr.json"
            echo "HEAD_COMMIT_FILE=${prefix}-head.json"
            echo "COMMENTS_FILE=${prefix}-comments.json"
            echo "REVIEWS_FILE=${prefix}-reviews.json"
            echo "REVIEW_COMMENTS_FILE=${prefix}-review-comments.json"
            echo "THREADS_FILE=${prefix}-threads.json"
            echo "CHECKS_FILE=${prefix}-checks.json"
            echo "STATUSES_FILE=${prefix}-statuses.json"
            echo "FILES_FILE=${prefix}-files.json"
            echo "CAUSAL_ENVELOPE_FILE=${RUNNER_TEMP}/causal-review-envelope.json"
          } >> "${GITHUB_ENV}"

      - name: Collect complete exact-head evidence
        run: |
          set -euo pipefail
          gh api "repos/${REPOSITORY}/pulls/${PR_NUMBER}" > "${PR_JSON_FILE}"
          state="$(jq -r '.state' "${PR_JSON_FILE}")"
          head="$(jq -r '.head.sha' "${PR_JSON_FILE}")"
          if [ "${state}" != "open" ]; then
            echo "Causal envelope requires an open pull request." >&2
            exit 1
          fi
          if [ "${TRIGGER_EVENT}" = "workflow_run" ] && [ "${TRIGGER_HEAD_SHA}" != "${head}" ]; then
            echo "Workflow trigger is stale: ${TRIGGER_HEAD_SHA} != ${head}" >&2
            exit 1
          fi

          gh api "repos/${REPOSITORY}/commits/${head}" > "${HEAD_COMMIT_FILE}"
          gh api --paginate --slurp "repos/${REPOSITORY}/issues/${PR_NUMBER}/comments?per_page=100" |
            jq 'add // []' > "${COMMENTS_FILE}"
          gh api --paginate --slurp "repos/${REPOSITORY}/pulls/${PR_NUMBER}/reviews?per_page=100" |
            jq 'add // []' > "${REVIEWS_FILE}"
          gh api --paginate --slurp "repos/${REPOSITORY}/pulls/${PR_NUMBER}/comments?per_page=100" |
            jq 'add // []' > "${REVIEW_COMMENTS_FILE}"
          gh api --paginate --slurp "repos/${REPOSITORY}/pulls/${PR_NUMBER}/files?per_page=100" |
            jq 'add // []' > "${FILES_FILE}"
          gh api --paginate -H 'Accept: application/vnd.github+json' \
            "repos/${REPOSITORY}/commits/${head}/check-runs?per_page=100" |
            jq -s '{check_runs: (map(.check_runs // []) | add // [])}' > "${CHECKS_FILE}"
          gh api --paginate --slurp "repos/${REPOSITORY}/commits/${head}/statuses?per_page=100" |
            jq 'add // []' > "${STATUSES_FILE}"

      - name: Collect complete GraphQL review threads
        run: python3 scripts/fetch-review-threads.py

      - name: Build and validate causal envelope
        run: |
          set -euo pipefail
          python3 scripts/causal_review_envelope.py build
          python3 scripts/causal_review_envelope.py validate "${CAUSAL_ENVELOPE_FILE}"
          python3 scripts/verify_causal_review_semantics.py validate "${CAUSAL_ENVELOPE_FILE}"

      - name: Recheck exact head before retaining evidence
        run: |
          set -euo pipefail
          expected="$(jq -r '.head_sha' "${CAUSAL_ENVELOPE_FILE}")"
          current="$(gh api "repos/${REPOSITORY}/pulls/${PR_NUMBER}")"
          state="$(jq -r '.state' <<<"${current}")"
          head="$(jq -r '.head.sha' <<<"${current}")"
          if [ "${state}" != "open" ] || [ "${head}" != "${expected}" ]; then
            echo "PR changed before artifact retention: state=${state} expected=${expected} current=${head}" >&2
            exit 1
          fi

      - name: Upload causal envelope
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: causal-review-envelope-${{ github.run_id }}
          path: ${{ runner.temp }}/causal-review-envelope.json
          if-no-files-found: error
          retention-days: 14

      - name: Summarize advisory record
        run: |
          {
            echo "## Robis causal review envelope"
            echo
            echo "- Record: \`$(jq -r '.record_id' "${CAUSAL_ENVELOPE_FILE}")\`"
            echo "- Exact head: \`$(jq -r '.head_sha' "${CAUSAL_ENVELOPE_FILE}")\`"
            echo "- Decision: **$(jq -r '.decision.verdict' "${CAUSAL_ENVELOPE_FILE}")**"
            echo "- Transition: \`$(jq -r '.transition.state_from' "${CAUSAL_ENVELOPE_FILE}") → $(jq -r '.transition.state_to' "${CAUSAL_ENVELOPE_FILE}")\`"
            echo "- Valid time: \`$(jq -r '.time.valid_time' "${CAUSAL_ENVELOPE_FILE}")\`"
            echo "- Transaction time: \`$(jq -r '.time.transaction_time' "${CAUSAL_ENVELOPE_FILE}")\`"
            echo
            echo "Advisory only: this artifact cannot execute, approve, or merge."
          } >> "${GITHUB_STEP_SUMMARY}"
