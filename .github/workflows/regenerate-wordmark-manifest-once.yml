name: Regenerate corrected wordmark manifest once

on:
  pull_request:
    paths:
      - .github/workflows/regenerate-wordmark-manifest-once.yml

permissions:
  contents: read

jobs:
  generate:
    if: github.head_ref == 'fix/close-logo-delivery-tail-v2'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout exact branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: fix/close-logo-delivery-tail-v2
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Build generated runtime
        run: npm run build

      - name: Generate and verify integrity manifest
        run: |
          node scripts/generate-integrity-manifest.mjs
          node scripts/generate-integrity-manifest.mjs --check
          node scripts/verify-integrity-manifest.mjs

      - name: Upload canonical manifest
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: corrected-wordmark-manifest
          path: integrity-manifest.json
          if-no-files-found: error
          retention-days: 1
