name: Reconcile offline feature with current main

on:
  pull_request:
    branches:
      - main
    types: [synchronize]

permissions:
  contents: write

jobs:
  reconcile:
    if: github.head_ref == 'fix/android-offline-download-final'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Restore current pages and apply only offline additions
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main
          git show origin/main:index.html > index.html
          git show origin/main:menu.html > menu.html
          python3 - <<'PY'
          from pathlib import Path

          index = Path('index.html')
          source = index.read_text(encoding='utf-8')
          source = source.replace("img-src 'self' data:;", "img-src 'self' data: blob:;")
          source = source.replace("worker-src 'none'", "worker-src 'self'")
          source = source.replace("trusted-types 'none'", "trusted-types robys-pwa")
          marker = '  <script type="module" src="qa.js?v=hero-7s-20260627-2"></script>'
          additions = marker + '\n  <script defer src="pwa.js?v=offline-20260627-1"></script>\n  <script defer src="android-download.js?v=android-verified-20260627-1"></script>'
          if marker not in source:
              raise SystemExit('index script marker not found')
          source = source.replace(marker, additions)
          index.write_text(source, encoding='utf-8')

          menu = Path('menu.html')
          source = menu.read_text(encoding='utf-8')
          source = source.replace("worker-src 'none'", "worker-src 'self'")
          source = source.replace("trusted-types 'none'", "trusted-types robys-pwa")
          marker = '  <link rel="stylesheet" href="menu-security.css?v=security-20260622-1" />'
          addition = marker + '\n  <script defer src="pwa.js?v=offline-20260627-1"></script>'
          if marker not in source:
              raise SystemExit('menu head marker not found')
          source = source.replace(marker, addition)
          menu.write_text(source, encoding='utf-8')
          PY

      - name: Verify reconciled production files
        shell: bash
        run: |
          set -euo pipefail
          npm ci
          npm run build
          node scripts/verify-android-download.mjs
          node scripts/verify-security-contracts.mjs
          npm run integrity:generate

      - name: Commit reconciled production branch
        shell: bash
        run: |
          set -euo pipefail
          rm .github/workflows/reconcile-current-main.yml
          npm run integrity:generate
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git diff --cached --check
          git commit -m 'fix: preserve current main pages in offline release'
          git push origin HEAD:fix/android-offline-download-final
