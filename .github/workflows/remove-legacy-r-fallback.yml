name: Remove legacy R fallback

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: remove-legacy-r-fallback
  cancel-in-progress: true

jobs:
  clean:
    if: github.actor != 'github-actions[bot]' && github.head_ref == 'agent/remove-legacy-r-fallback'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/remove-legacy-r-fallback
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Remove hidden legacy R fallbacks
        run: node scripts/remove-legacy-r-fallback.mjs

      - name: Build and regenerate integrity evidence
        run: |
          npm run build
          npm run integrity:generate

      - name: Run full checks
        run: |
          npm run check
          npm run verify:security

      - name: Upload verified cleanup
        uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2b
        with:
          name: legacy-r-cleanup
          path: |
            index.html
            menu.html
            discover.html
            integrity-manifest.json
          if-no-files-found: error
          retention-days: 1
