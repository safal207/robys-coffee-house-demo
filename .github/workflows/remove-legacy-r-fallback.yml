name: Remove legacy R fallback

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: remove-legacy-r-fallback
  cancel-in-progress: true

jobs:
  clean:
    if: github.actor != 'github-actions[bot]' && github.head_ref == 'agent/remove-legacy-r-fallback'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/remove-legacy-r-fallback
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Remove hidden legacy R fallbacks
        run: node scripts/remove-legacy-r-fallback.mjs

      - name: Build and regenerate integrity evidence
        run: |
          npm run build
          npm run integrity:generate

      - name: Run full checks
        run: |
          npm run check
          npm run verify:security

      - name: Publish verified files through GitHub Contents API
        env:
          GITHUB_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          TARGET_BRANCH: agent/remove-legacy-r-fallback
        run: |
          node <<'NODE'
          const { readFileSync } = require('node:fs');
          (async () => {
            const files = ['index.html', 'menu.html', 'discover.html', 'integrity-manifest.json'];
            const headers = {
              Accept: 'application/vnd.github+json',
              Authorization: `Bearer ${process.env.GITHUB_TOKEN}`,
              'X-GitHub-Api-Version': '2022-11-28',
              'Content-Type': 'application/json'
            };
            for (const path of files) {
              const endpoint = `https://api.github.com/repos/${process.env.REPOSITORY}/contents/${path}`;
              const current = await fetch(`${endpoint}?ref=${encodeURIComponent(process.env.TARGET_BRANCH)}`, { headers });
              if (!current.ok) throw new Error(`GET ${path}: ${current.status} ${await current.text()}`);
              const { sha } = await current.json();
              const response = await fetch(endpoint, {
                method: 'PUT',
                headers,
                body: JSON.stringify({
                  message: `fix: remove hidden legacy R fallback from ${path}`,
                  content: readFileSync(path).toString('base64'),
                  sha,
                  branch: process.env.TARGET_BRANCH
                })
              });
              if (!response.ok) throw new Error(`PUT ${path}: ${response.status} ${await response.text()}`);
              console.log(`Published ${path}`);
            }
          })().catch((error) => {
            console.error(error);
            process.exit(1);
          });
          NODE
