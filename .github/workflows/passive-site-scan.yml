name: Passive public site security scan

on:
  push:
    branches: [main]
  schedule:
    - cron: '29 3 * * 4'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: passive-site-scan-main
  cancel-in-progress: true

jobs:
  baseline:
    name: DAST-001 passive scan
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - uses: zaproxy/action-baseline@v0.15.0
        with:
          target: https://safal207.github.io/robys-coffee-house-demo/
          fail_action: false
          allow_issue_writing: false
          artifact_name: passive-scan-${{ github.run_id }}
          cmd_options: '-a'
      - name: Evaluate medium and high findings
        run: node scripts/evaluate-zap-report.mjs
      - name: Upload evaluated evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: passive-scan-evaluation-${{ github.run_id }}
          path: .artifacts/zap-evaluation.json
          if-no-files-found: warn
          retention-days: 30
