name: Agent Codex cooperation cleanup

on:
  push:
    branches:
      - governance/codex-only-reviewer

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: governance/codex-only-reviewer
          fetch-depth: 0
      - name: Replace dormant reviewer triggers
        run: |
          python3 <<'PY'
          from pathlib import Path

          workflow_path = Path('.github/workflows/ai-review-cooperation.yml')
          contract_path = Path('.github/workflows/ai-review-cooperation-contract.yml')

          workflow = workflow_path.read_text(encoding='utf-8')
          contract = contract_path.read_text(encoding='utf-8')

          for name, text in [('workflow', workflow), ('contract', contract)]:
              text = text.replace('coderabbitai[bot]', 'chatgpt-codex-connector[bot]')
              text = text.replace('coderabbitai', 'chatgpt-codex-connector')
              text = text.replace('CodeRabbit', 'Codex')
              text = text.replace(
                  "github.event.review.state == 'approved' &&",
                  "(github.event.review.state == 'approved' || github.event.review.state == 'commented') &&",
              )
              if name == 'workflow':
                  old = '''              if [ "${REVIEW_STATE}" != "approved" ]; then
                echo "Review trigger is not an approval: ${REVIEW_STATE}" >&2
                exit 1
              fi'''
                  new = '''              case "${REVIEW_STATE}" in
                approved|commented)
                  echo "Review trigger state is accepted: ${REVIEW_STATE}"
                  ;;
                *)
                  echo "Review trigger is not a submitted Codex review: ${REVIEW_STATE}" >&2
                  exit 1
                  ;;
              esac'''
                  if old not in text:
                      raise SystemExit('expected review-state authorization block not found')
                  text = text.replace(old, new)
                  text = text.replace(
                      'Authorized by native exact-head Codex bot approval.',
                      'Authorized by native exact-head Codex bot review.',
                  )
                  workflow = text
              else:
                  contract = text

          required_workflow = [
              "chatgpt-codex-connector[bot]",
              "chatgpt-codex-connector",
              "approved|commented",
              "native exact-head Codex bot review",
          ]
          missing = [token for token in required_workflow if token not in workflow]
          if missing:
              raise SystemExit(f'missing Codex workflow tokens: {missing}')
          if 'coderabbitai' in workflow.lower() or 'coderabbitai' in contract.lower():
              raise SystemExit('CodeRabbit login remains in cooperation workflow contract')

          workflow_path.write_text(workflow, encoding='utf-8')
          contract_path.write_text(contract, encoding='utf-8')
          PY
      - name: Validate updated governance files
        run: |
          ruby -e "require 'yaml'; YAML.parse_file('.github/workflows/ai-review-cooperation.yml'); YAML.parse_file('.github/workflows/ai-review-cooperation-contract.yml')"
          python3 -m py_compile scripts/ai-review-cooperation.py scripts/test-ai-review-cooperation.py
          python3 scripts/test-ai-review-cooperation.py -v
          node scripts/test-codex-review-contract.cjs
          node scripts/verify-ai-review-freshness.mjs
      - name: Commit cleanup
        run: |
          if git diff --quiet -- .github/workflows/ai-review-cooperation.yml .github/workflows/ai-review-cooperation-contract.yml; then
            echo "Cooperation workflows already use Codex-only triggers."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/ai-review-cooperation.yml .github/workflows/ai-review-cooperation-contract.yml
          git commit -m "governance: route cooperation evidence through Codex"
          git push origin HEAD:governance/codex-only-reviewer
