name: AI review cooperation recovery

on:
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number to recover / Kurtarılacak pull request numarası / Номер pull request для восстановления
        required: true
        type: string
      expected_head_sha:
        description: Exact 40-character PR head SHA / Tam 40 karakterli PR head SHA / Точный 40-символьный SHA головы PR
        required: true
        type: string
  workflow_run:
    workflows: [AI review contract]
    types: [completed]

permissions: {}

jobs:
  recover:
    if: >-
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request != null &&
       github.event.issue.state == 'open' &&
       github.event.comment.body == '/ai-cooperation recover' &&
       (github.event.comment.author_association == 'OWNER' ||
        github.event.comment.author_association == 'MEMBER' ||
        github.event.comment.author_association == 'COLLABORATOR' ||
        github.event.comment.user.login == github.repository_owner)) ||
      (github.event_name == 'workflow_dispatch' &&
       github.actor == github.repository_owner) ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.name == 'AI review contract' &&
       github.event.workflow_run.event == 'pull_request' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_sha != '')
    permissions:
      actions: read
      checks: read
      contents: read
      issues: write
      pull-requests: read
      statuses: read
    concurrency:
      group: ai-review-cooperation-recovery-${{ github.event.issue.number || inputs.pr_number || github.event.workflow_run.head_sha || github.run_id }}
      cancel-in-progress: true
    runs-on: ubuntu-latest
    timeout-minutes: 7
    env:
      GH_TOKEN: ${{ github.token }}
      REPOSITORY: ${{ github.repository }}
      REPOSITORY_OWNER: ${{ github.repository_owner }}
      TRIGGER_EVENT: ${{ github.event_name }}
      TRIGGER_AUTHOR: ${{ github.event.comment.user.login || github.event.workflow_run.actor.login || github.actor }}
      TRIGGER_ASSOCIATION: ${{ github.event.comment.author_association || '' }}
      PR_NUMBER: ${{ github.event.issue.number || inputs.pr_number || github.event.workflow_run.pull_requests[0].number || '' }}
      EXPECTED_HEAD_SHA: ${{ inputs.expected_head_sha || '' }}
      WORKFLOW_NAME: ${{ github.event.workflow_run.name || '' }}
      WORKFLOW_EVENT: ${{ github.event.workflow_run.event || '' }}
      WORKFLOW_CONCLUSION: ${{ github.event.workflow_run.conclusion || '' }}
      TRIGGER_HEAD_SHA: ${{ github.event.workflow_run.head_sha || '' }}

    steps:
      - name: Authorize recovery trigger
        id: authorize
        run: |
          set -euo pipefail

          case "${TRIGGER_EVENT}" in
            issue_comment)
              if ! [[ "${PR_NUMBER}" =~ ^[1-9][0-9]*$ ]]; then
                echo "Invalid PR number / Geçersiz PR numarası / Недопустимый номер PR: ${PR_NUMBER:-missing}" >&2
                exit 1
              fi
              case "${TRIGGER_ASSOCIATION:-NONE}" in
                OWNER|MEMBER|COLLABORATOR)
                  ;;
                *)
                  if [ "${TRIGGER_AUTHOR}" != "${REPOSITORY_OWNER}" ]; then
                    echo "Unauthorized recovery actor / Yetkisiz kurtarma aktörü / Неавторизованный участник восстановления: ${TRIGGER_AUTHOR}" >&2
                    exit 1
                  fi
                  ;;
              esac
              ;;
            workflow_dispatch)
              if ! [[ "${PR_NUMBER}" =~ ^[1-9][0-9]*$ ]]; then
                echo "Invalid PR number / Geçersiz PR numarası / Недопустимый номер PR: ${PR_NUMBER:-missing}" >&2
                exit 1
              fi
              if [ "${TRIGGER_AUTHOR}" != "${REPOSITORY_OWNER}" ]; then
                echo "workflow_dispatch recovery is owner-only / workflow_dispatch kurtarması yalnızca depo sahibine açıktır / Восстановление workflow_dispatch доступно только владельцу: ${TRIGGER_AUTHOR}" >&2
                exit 1
              fi
              if ! [[ "${EXPECTED_HEAD_SHA}" =~ ^[0-9a-f]{40}$ ]]; then
                echo "workflow_dispatch requires an exact 40-character head SHA / workflow_dispatch tam 40 karakterli head SHA gerektirir / workflow_dispatch требует точный 40-символьный SHA головы" >&2
                exit 1
              fi
              ;;
            workflow_run)
              if [ "${WORKFLOW_NAME}" != "AI review contract" ] || [ "${WORKFLOW_EVENT}" != "pull_request" ] || [ "${WORKFLOW_CONCLUSION}" != "success" ]; then
                echo "Unauthorized workflow_run recovery trigger / Yetkisiz workflow_run kurtarma tetikleyicisi / Недоверенный триггер восстановления workflow_run: name=${WORKFLOW_NAME:-missing} event=${WORKFLOW_EVENT:-missing} conclusion=${WORKFLOW_CONCLUSION:-missing}" >&2
                exit 1
              fi
              if ! [[ "${TRIGGER_HEAD_SHA}" =~ ^[0-9a-f]{40}$ ]]; then
                echo "workflow_run recovery requires an exact 40-character head SHA / workflow_run kurtarması tam 40 karakterli head SHA gerektirir / Восстановление workflow_run требует точный 40-символьный SHA головы" >&2
                exit 1
              fi
              ;;
            *)
              echo "Unsupported recovery event / Desteklenmeyen kurtarma olayı / Неподдерживаемое событие восстановления: ${TRIGGER_EVENT}" >&2
              exit 1
              ;;
          esac

      - name: Checkout trusted reporter code
        id: checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.repository.default_branch }}
          persist-credentials: false

      - name: Resolve workflow-run pull request
        id: resolve_pr
        run: |
          set -euo pipefail

          if [ "${TRIGGER_EVENT}" != "workflow_run" ]; then
            if ! [[ "${PR_NUMBER}" =~ ^[1-9][0-9]*$ ]]; then
              echo "Trusted trigger is missing a valid PR number / Güvenilir tetikleyicide geçerli PR numarası eksik / В доверенном триггере отсутствует допустимый номер PR" >&2
              exit 1
            fi
            exit 0
          fi

          candidates_file="${RUNNER_TEMP}/recovery-workflow-run-pr-candidates.json"
          gh api -H 'Accept: application/vnd.github+json' \
            "repos/${REPOSITORY}/commits/${TRIGGER_HEAD_SHA}/pulls?per_page=100" \
            > "${candidates_file}"

          matches_file="${RUNNER_TEMP}/recovery-workflow-run-pr-matches.json"
          jq --arg sha "${TRIGGER_HEAD_SHA}" --arg repo "${REPOSITORY}" \
            '[.[] | select(.state == "open" and .head.sha == $sha and .base.repo.full_name == $repo)]' \
            "${candidates_file}" > "${matches_file}"

          match_count="$(jq 'length' "${matches_file}")"
          if [ "${match_count}" != "1" ]; then
            echo "Expected exactly one open PR for workflow head / İş akışı head SHA'sı için tam bir açık PR bekleniyordu / Для SHA головы workflow ожидался ровно один открытый PR: ${TRIGGER_HEAD_SHA}; found/bulundu/найдено ${match_count}" >&2
            exit 1
          fi

          resolved_pr="$(jq -r '.[0].number' "${matches_file}")"
          if ! [[ "${resolved_pr}" =~ ^[1-9][0-9]*$ ]]; then
            echo "Resolved invalid PR number / Geçersiz PR numarası çözümlendi / Получен недопустимый номер PR: ${resolved_pr}" >&2
            exit 1
          fi
          echo "PR_NUMBER=${resolved_pr}" >> "${GITHUB_ENV}"
          echo "Resolved workflow head to PR / İş akışı head SHA'sı PR'a çözümlendi / SHA головы workflow сопоставлен с PR: ${TRIGGER_HEAD_SHA} -> #${resolved_pr}"

      - name: Configure cooperation temp paths
        id: configure
        run: |
          set -euo pipefail
          prefix="${RUNNER_TEMP}/cooperation-recovery-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          {
            echo "PR_JSON_FILE=${prefix}-pr.json"
            echo "HEAD_COMMIT_FILE=${prefix}-head.json"
            echo "COMMENTS_FILE=${prefix}-comments.json"
            echo "REVIEWS_FILE=${prefix}-reviews.json"
            echo "REVIEW_COMMENTS_FILE=${prefix}-review-comments.json"
            echo "THREADS_FILE=${prefix}-threads.json"
            echo "RAW_CHECKS_FILE=${prefix}-checks-raw.json"
            echo "CHECKS_FILE=${prefix}-checks.json"
            echo "STATUSES_FILE=${prefix}-statuses.json"
            echo "FILES_FILE=${prefix}-files.json"
            echo "COMMENT_FILE=${prefix}-comment.json"
          } >> "${GITHUB_ENV}"

      - name: Collect exact-head REST evidence
        id: rest_evidence
        run: |
          set -euo pipefail

          gh api "repos/${REPOSITORY}/pulls/${PR_NUMBER}" > "${PR_JSON_FILE}"
          PR_STATE="$(jq -r '.state' "${PR_JSON_FILE}")"
          if [ "${PR_STATE}" != "open" ]; then
            echo "Recovery requires an open pull request / Kurtarma açık bir pull request gerektirir / Для восстановления требуется открытый pull request; state/durum/состояние=${PR_STATE:-missing}" >&2
            exit 1
          fi

          HEAD_SHA="$(jq -r '.head.sha' "${PR_JSON_FILE}")"
          if ! [[ "${HEAD_SHA}" =~ ^[0-9a-f]{40}$ ]]; then
            echo "GitHub returned an invalid PR head SHA / GitHub geçersiz PR head SHA döndürdü / GitHub вернул недопустимый SHA головы PR: ${HEAD_SHA}" >&2
            exit 1
          fi
          if [ -n "${EXPECTED_HEAD_SHA}" ] && [ "${EXPECTED_HEAD_SHA}" != "${HEAD_SHA}" ]; then
            echo "Recovery input is stale / Kurtarma girdisi eski / Входные данные восстановления устарели: expected/beklenen/ожидался ${EXPECTED_HEAD_SHA}, current/geçerli/текущий ${HEAD_SHA}" >&2
            exit 1
          fi
          if [ "${TRIGGER_EVENT}" = "workflow_run" ] && [ "${TRIGGER_HEAD_SHA}" != "${HEAD_SHA}" ]; then
            echo "Workflow trigger is not bound to the current PR head / İş akışı tetikleyicisi mevcut PR head SHA'sına bağlı değil / Триггер workflow не привязан к текущей голове PR: ${TRIGGER_HEAD_SHA} != ${HEAD_SHA}" >&2
            exit 1
          fi

          gh api "repos/${REPOSITORY}/commits/${HEAD_SHA}" > "${HEAD_COMMIT_FILE}"
          gh api --paginate --slurp \
            "repos/${REPOSITORY}/issues/${PR_NUMBER}/comments?per_page=100" \
            | jq 'add // []' > "${COMMENTS_FILE}"
          gh api --paginate --slurp \
            "repos/${REPOSITORY}/pulls/${PR_NUMBER}/reviews?per_page=100" \
            | jq 'add // []' > "${REVIEWS_FILE}"
          gh api --paginate --slurp \
            "repos/${REPOSITORY}/pulls/${PR_NUMBER}/comments?per_page=100" \
            | jq 'add // []' > "${REVIEW_COMMENTS_FILE}"
          gh api --paginate --slurp \
            "repos/${REPOSITORY}/pulls/${PR_NUMBER}/files?per_page=100" \
            | jq 'add // []' > "${FILES_FILE}"
          gh api --paginate -H 'Accept: application/vnd.github+json' \
            "repos/${REPOSITORY}/commits/${HEAD_SHA}/check-runs?per_page=100" \
            | jq -s '{check_runs: (map(.check_runs // []) | add // [])}' \
            > "${CHECKS_FILE}"
          gh api --paginate --slurp \
            "repos/${REPOSITORY}/commits/${HEAD_SHA}/statuses?per_page=100" \
            | jq 'add // []' > "${STATUSES_FILE}"

      - name: Collect complete GraphQL review evidence
        id: graphql_evidence
        run: python3 scripts/fetch-review-threads.py

      - name: Build causal cooperation report
        id: build_report
        run: python3 scripts/ai-review-cooperation.py report

      - name: Publish or update cooperation report
        id: publish_report
        run: |
          set -euo pipefail

          EVIDENCE_HEAD="$(jq -r '.head.sha' "${PR_JSON_FILE}")"
          CURRENT_STATE="$(gh api "repos/${REPOSITORY}/pulls/${PR_NUMBER}" --jq '.state')"
          if [ "${CURRENT_STATE}" != "open" ]; then
            echo "PR was closed before publishing the recovery report / Kurtarma raporu yayımlanmadan önce PR kapatıldı / PR был закрыт до публикации отчета восстановления" >&2
            exit 1
          fi

          CURRENT_HEAD="$(gh api "repos/${REPOSITORY}/pulls/${PR_NUMBER}" --jq '.head.sha')"
          if [ "${CURRENT_HEAD}" != "${EVIDENCE_HEAD}" ]; then
            echo "PR head changed before publishing / PR head SHA yayımlamadan önce değişti / Голова PR изменилась до публикации: ${EVIDENCE_HEAD} -> ${CURRENT_HEAD}" >&2
            exit 1
          fi
          if [ -n "${EXPECTED_HEAD_SHA}" ] && [ "${CURRENT_HEAD}" != "${EXPECTED_HEAD_SHA}" ]; then
            echo "PR head no longer matches recovery input / PR head SHA artık kurtarma girdisiyle eşleşmiyor / Голова PR больше не совпадает с входом восстановления: ${EXPECTED_HEAD_SHA} -> ${CURRENT_HEAD}" >&2
            exit 1
          fi
          if [ "${TRIGGER_EVENT}" = "workflow_run" ] && [ "${CURRENT_HEAD}" != "${TRIGGER_HEAD_SHA}" ]; then
            echo "PR head no longer matches workflow trigger / PR head SHA artık iş akışı tetikleyicisiyle eşleşmiyor / Голова PR больше не совпадает с триггером workflow: ${TRIGGER_HEAD_SHA} -> ${CURRENT_HEAD}" >&2
            exit 1
          fi

          test -s "${COMMENT_FILE}"
          jq -e '.body | type == "string" and length > 0' "${COMMENT_FILE}" >/dev/null
          body_bytes="$(jq -r '.body' "${COMMENT_FILE}" | wc -c | tr -d ' ')"
          if [ "${body_bytes}" -gt 65000 ]; then
            echo "Cooperation report exceeds GitHub comment limit / İşbirliği raporu GitHub yorum sınırını aşıyor / Отчет о взаимодействии превышает лимит комментария GitHub: ${body_bytes} bytes/bayt/байт" >&2
            exit 1
          fi

          existing_id="$(
            gh api --paginate "repos/${REPOSITORY}/issues/${PR_NUMBER}/comments" \
              --jq '.[] | select(.user.login == "github-actions[bot]" and (.body | contains("<!-- ai-review-cooperation -->"))) | .id' \
              | tail -n 1
          )"

          if [ -n "${existing_id}" ]; then
            gh api --method PATCH "repos/${REPOSITORY}/issues/comments/${existing_id}" \
              -H 'Accept: application/vnd.github+json' \
              --input "${COMMENT_FILE}"
          else
            gh api --method POST "repos/${REPOSITORY}/issues/${PR_NUMBER}/comments" \
              -H 'Accept: application/vnd.github+json' \
              --input "${COMMENT_FILE}"
          fi

      - name: Publish recovery failure diagnostic
        if: ${{ failure() }}
        env:
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          AUTHORIZE_OUTCOME: ${{ steps.authorize.outcome }}
          CHECKOUT_OUTCOME: ${{ steps.checkout.outcome }}
          RESOLVE_PR_OUTCOME: ${{ steps.resolve_pr.outcome }}
          CONFIGURE_OUTCOME: ${{ steps.configure.outcome }}
          REST_OUTCOME: ${{ steps.rest_evidence.outcome }}
          GRAPHQL_OUTCOME: ${{ steps.graphql_evidence.outcome }}
          BUILD_OUTCOME: ${{ steps.build_report.outcome }}
          PUBLISH_OUTCOME: ${{ steps.publish_report.outcome }}
        run: |
          set -euo pipefail

          if ! [[ "${PR_NUMBER:-}" =~ ^[1-9][0-9]*$ ]]; then
            {
              echo '## AI cooperation recovery diagnostic / AI işbirliği kurtarma tanısı / Диагностика восстановления AI-взаимодействия'
              echo
              echo 'The workflow-run recovery could not resolve a unique open PR, so no PR comment was published.'
              echo 'workflow_run kurtarması benzersiz bir açık PR çözümleyemedi; bu nedenle PR yorumu yayımlanmadı.'
              echo 'Восстановление workflow_run не смогло однозначно определить открытый PR, поэтому комментарий в PR не опубликован.'
              echo
              echo "- Trigger event / Tetikleyici olayı / Событие триггера: \`${TRIGGER_EVENT:-missing}\`"
              echo "- Trigger head / Tetikleyici head SHA / SHA головы триггера: \`${TRIGGER_HEAD_SHA:-missing}\`"
              echo "- Workflow / İş akışı / Workflow: \`${WORKFLOW_NAME:-missing}\`"
              echo "- Workflow event / İş akışı olayı / Событие workflow: \`${WORKFLOW_EVENT:-missing}\`"
              echo "- Workflow conclusion / İş akışı sonucu / Результат workflow: \`${WORKFLOW_CONCLUSION:-missing}\`"
              echo "- Resolve PR / PR çözümleme / Определение PR: \`${RESOLVE_PR_OUTCOME:-unknown}\`"
              echo "- Run / Çalıştırma / Запуск: ${RUN_URL}"
            } >> "${GITHUB_STEP_SUMMARY}"
            echo "Cannot publish a PR diagnostic without a valid PR number; details were written to the run summary / Geçerli PR numarası olmadan PR tanısı yayımlanamaz; ayrıntılar çalıştırma özetine yazıldı / Невозможно опубликовать диагностику в PR без допустимого номера; подробности записаны в сводку запуска" >&2
            exit 0
          fi

          printf -v body '%s\n' \
            '<!-- ai-review-cooperation-diagnostic -->' \
            '## AI cooperation recovery failed / AI işbirliği kurtarması başarısız / Сбой восстановления AI-взаимодействия' \
            '' \
            "The trusted recovery reporter did not publish a cooperation report for PR #${PR_NUMBER}." \
            "Güvenilir kurtarma raporlayıcısı PR #${PR_NUMBER} için işbirliği raporunu yayımlamadı." \
            "Доверенный репортер восстановления не опубликовал отчет о взаимодействии для PR #${PR_NUMBER}." \
            '' \
            '| Stage / Aşama / Этап | Outcome / Sonuç / Результат |' \
            '|---|---|' \
            "| authorize / yetkilendirme / авторизация | ${AUTHORIZE_OUTCOME:-unknown} |" \
            "| resolve PR / PR çözümleme / определение PR | ${RESOLVE_PR_OUTCOME:-unknown} |" \
            "| checkout / kaynak kodu alma / получение кода | ${CHECKOUT_OUTCOME:-unknown} |" \
            "| configure / yapılandırma / настройка | ${CONFIGURE_OUTCOME:-unknown} |" \
            "| REST evidence / REST kanıtı / REST-доказательства | ${REST_OUTCOME:-unknown} |" \
            "| GraphQL evidence / GraphQL kanıtı / GraphQL-доказательства | ${GRAPHQL_OUTCOME:-unknown} |" \
            "| build report / rapor oluşturma / построение отчета | ${BUILD_OUTCOME:-unknown} |" \
            "| publish report / raporu yayımlama / публикация отчета | ${PUBLISH_OUTCOME:-unknown} |" \
            '' \
            "Run / Çalıştırma / Запуск: ${RUN_URL}"

          payload="${RUNNER_TEMP}/cooperation-recovery-diagnostic.json"
          jq -n --arg body "${body}" '{body: $body}' > "${payload}"
          existing_id="$(
            gh api --paginate "repos/${REPOSITORY}/issues/${PR_NUMBER}/comments" \
              --jq '.[] | select(.user.login == "github-actions[bot]" and (.body | contains("<!-- ai-review-cooperation-diagnostic -->"))) | .id' \
              | tail -n 1
          )"
          if [ -n "${existing_id}" ]; then
            gh api --method PATCH "repos/${REPOSITORY}/issues/comments/${existing_id}" \
              -H 'Accept: application/vnd.github+json' \
              --input "${payload}"
          else
            gh api --method POST "repos/${REPOSITORY}/issues/${PR_NUMBER}/comments" \
              -H 'Accept: application/vnd.github+json' \
              --input "${payload}"
          fi
