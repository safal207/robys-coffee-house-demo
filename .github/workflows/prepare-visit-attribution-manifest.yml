name: Diagnose P1 assertion
on:
  push:
    branches: [feat/visit-attribution-v0]
  pull_request:
    branches: [main]
permissions:
  contents: read
jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false
      - shell: bash
        run: |
          set -o pipefail
          node scripts/verify-p1-interface-contracts.mjs 2>&1 | tail -n 12
