name: Diagnose SEO assertion
on:
  push:
    branches: [feat/visit-attribution-v0]
  pull_request:
    branches: [main]
permissions:
  contents: read
jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - shell: bash
        run: |
          set -o pipefail
          git clone -q --depth=1 --branch feat/visit-attribution-v0 https://github.com/safal207/robys-coffee-house-demo.git repo
          cd repo
          node scripts/verify-seo-content-deploy.mjs 2>&1 | tail -n 12
