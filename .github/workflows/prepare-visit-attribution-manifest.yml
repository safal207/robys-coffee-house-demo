name: Diagnose Instagram URLs
on:
  push:
    branches: [feat/visit-attribution-v0]
  pull_request:
    branches: [main]
permissions:
  contents: read
jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - shell: bash
        run: |
          git clone -q --depth=1 --branch feat/visit-attribution-v0 https://github.com/safal207/robys-coffee-house-demo.git repo
          cd repo
          node --input-type=module - <<'NODE'
          import { readFileSync } from "node:fs";
          const html = `${readFileSync("index.html", "utf8")}\n${readFileSync("menu.html", "utf8")}`;
          const urls = Array.from(html.matchAll(/href=["'](https:\/\/www\.instagram\.com\/[^"']+)["']/gi), match => match[1]);
          console.log(JSON.stringify(urls, null, 2));
          NODE
