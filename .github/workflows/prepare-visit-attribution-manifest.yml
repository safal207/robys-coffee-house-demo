name: Prepare visit attribution manifest

on:
  push:
    branches:
      - feat/visit-attribution-v0

permissions:
  contents: write

jobs:
  prepare:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: node --check analytics.js
      - run: npm run verify:visit-attribution
      - run: npm run test:visit-attribution
      - run: npm run typecheck
      - run: npm run build
      - run: npm run integrity:generate
      - run: npm run verify:integrity

      - name: Commit generated manifest
        run: |
          if git diff --quiet -- integrity-manifest.json; then
            echo "Integrity manifest is already current."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add integrity-manifest.json
          git commit -m "chore: regenerate integrity manifest [skip ci]"
          git push
