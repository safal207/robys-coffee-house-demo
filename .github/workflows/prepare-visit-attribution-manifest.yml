name: Diagnose attribution regression
on:
  push:
    branches: [feat/visit-attribution-v0]
  pull_request:
    branches: [main]
permissions:
  contents: read
jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run integrity:generate
      - name: Run check with focused log
        shell: bash
        run: |
          set -o pipefail
          npm run check 2>&1 | tail -n 180
