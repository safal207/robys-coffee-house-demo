name: Diagnose product contracts
on:
  push:
    branches: [feat/visit-attribution-v0]
  pull_request:
    branches: [main]
permissions:
  contents: read
jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Social offer
        run: npm run verify:social-offer
      - name: Android download
        run: node scripts/verify-android-download.mjs
      - name: Regression contracts
        run: node scripts/verify-regression-contracts.mjs
      - name: Menu content
        run: npm run verify:menu-content
      - name: Instagram tools
        run: npm run verify:instagram-tools
      - name: Menu share
        run: npm run verify:menu-share
