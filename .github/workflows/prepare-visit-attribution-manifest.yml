name: Diagnose final contract modules
on:
  push:
    branches: [feat/visit-attribution-v0]
  pull_request:
    branches: [main]
permissions:
  contents: read
jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Module one
        run: node scripts/verify-visual-contract.mjs
      - name: Module two
        run: node scripts/verify-performance-contract.mjs
      - name: Module three
        run: node scripts/verify-live-contract.mjs
      - name: Module four
        run: node scripts/verify-security-contracts.mjs
      - name: Aggregate
        run: node scripts/verify-regression-contracts.mjs
