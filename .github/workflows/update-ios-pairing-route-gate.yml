name: Update iOS pairing route gate

on:
  push:
    branches:
      - feat/hero-pairing-cta

permissions:
  contents: write

jobs:
  update:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout feature branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: feat/hero-pairing-cta
          persist-credentials: true

      - name: Update iOS route contract
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("scripts/verify-ios-route-webkit.mjs")
          source = path.read_text(encoding="utf-8")
          anchor = '''  const routeLinks = page.locator(`a[href^="${routePrefix}"]`);'''
          replacement = '''  if (pathname === "index.html") {
            const heroPrimary = page.locator(".hero-actions .button-primary");
            assert.equal(await heroPrimary.getAttribute("href"), "menu.html#pairing-offers", "hero primary CTA must route to pairing offers");
            assert.equal(await heroPrimary.getAttribute("target"), null, "pairing CTA must stay in the current customer journey");
          }

          const routeLinks = page.locator(`a[href^="${routePrefix}"]`);'''
          if anchor not in source:
              raise SystemExit("Route-link anchor was not found")
          source = source.replace(anchor, replacement, 1)
          source = source.replace('await verifyPage("index.html", 4);', 'await verifyPage("index.html", 3);', 1)
          source = source.replace(
              'console.log("✅ iOS WebKit route gate passed: every route CTA opens a non-blank Google Maps driving route.");',
              'console.log("✅ iOS WebKit route gate passed: hero opens pairing offers and every retained route CTA opens a non-blank Google Maps driving route.");',
              1,
          )
          path.write_text(source, encoding="utf-8")
          PY

      - name: Commit exact contract update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/verify-ios-route-webkit.mjs
          git commit -m "test: align iOS route gate with pairing-first hero"
          git push origin HEAD:feat/hero-pairing-cta
