name: Install approved SVG wordmark

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

permissions:
  contents: write

jobs:
  install:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out PR branch
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: feat/photo-referenced-organic-logo
          fetch-depth: 1
          persist-credentials: true

      - name: Replace browser lettering with SVG masters
        shell: bash
        run: |
          rm -f src/brand/robys-primary-approved.svg
          cat > brand-photo-logo.css <<'CSS'
          /* Approved asset-based Roby's identity. Letterforms live inside SVG paths,
             so rendering no longer depends on browser fonts or CSS stretching. */
          .brand-copy{
            display:block!important;
            position:relative!important;
            width:180px!important;
            height:58px!important;
            flex:0 0 auto!important;
            background:url("src/brand/robys-compact-master-v1.svg?v=20260721-master-1") center/contain no-repeat!important;
            color:transparent!important;
            font-size:0!important;
            line-height:0!important;
          }

          .brand-copy strong,
          .brand-copy small{
            position:absolute!important;
            width:1px!important;
            height:1px!important;
            margin:-1px!important;
            padding:0!important;
            overflow:hidden!important;
            clip:rect(0 0 0 0)!important;
            clip-path:inset(50%)!important;
            white-space:nowrap!important;
            border:0!important;
            background:none!important;
          }

          .brand-copy strong::before,
          .brand-copy strong::after{
            content:none!important;
            display:none!important;
          }

          .site-header .brand,
          .discover-header .brand{
            overflow:hidden!important;
          }

          .site-header .brand-copy,
          .discover-header .brand-copy{
            width:286px!important;
            height:58px!important;
            background-image:url("src/brand/robys-primary-master-v1.svg?v=20260721-master-1")!important;
          }

          .menu-page-brand .brand-copy{
            width:min(530px,84vw)!important;
            height:112px!important;
            background-image:url("src/brand/robys-primary-master-v1.svg?v=20260721-master-1")!important;
          }

          .menu-page-mark::before{
            border:0!important;
            border-radius:0!important;
            background:url("src/brand/robys-mark-master-v1.svg?v=20260721-master-1") center/contain no-repeat!important;
          }

          @media(max-width:680px){
            .site-header .brand,
            .discover-header .brand{
              max-width:128px!important;
              padding:6px 8px!important;
              overflow:hidden!important;
            }

            .site-header .brand-copy,
            .discover-header .brand-copy{
              display:block!important;
              width:108px!important;
              height:39px!important;
              background-image:url("src/brand/robys-compact-master-v1.svg?v=20260721-master-1")!important;
            }

            .menu-page-brand .brand-copy{
              width:min(370px,84vw)!important;
              height:84px!important;
            }
          }

          @media(max-width:390px){
            .site-header .brand,
            .discover-header .brand{
              max-width:112px!important;
              padding:5px 7px!important;
            }

            .site-header .brand-copy,
            .discover-header .brand-copy{
              width:96px!important;
              height:35px!important;
            }
          }

          @media(max-width:340px){
            .discover-header .brand{
              width:96px!important;
              max-width:96px!important;
              padding:5px 6px!important;
            }

            body.discover-page .discover-header .brand-copy{
              display:block!important;
              width:82px!important;
              height:31px!important;
              background-image:url("src/brand/robys-compact-master-v1.svg?v=20260721-master-1")!important;
            }
          }
          CSS

          cat > scripts/test-photo-logo.mjs <<'JS'
          #!/usr/bin/env node
          import assert from "node:assert/strict";
          import { existsSync, readFileSync } from "node:fs";

          const bootstrap = readFileSync(new URL("../bootstrap.js", import.meta.url), "utf8");
          const stylesheet = readFileSync(new URL("../brand-photo-logo.css", import.meta.url), "utf8");
          const serviceWorker = readFileSync(new URL("../sw.js", import.meta.url), "utf8");

          const assets = [
            "src/brand/robys-primary-master-v1.svg",
            "src/brand/robys-compact-master-v1.svg",
            "src/brand/robys-mobile-master-v1.svg",
            "src/brand/robys-mark-master-v1.svg",
          ];

          for (const asset of assets) {
            assert.equal(existsSync(new URL(`../${asset}`, import.meta.url)), true, `missing SVG master: ${asset}`);
          }

          assert.match(bootstrap, /brand-photo-logo\.css\?v=20260721-svg-master-1/);
          assert.match(stylesheet, /robys-primary-master-v1\.svg\?v=20260721-master-1/);
          assert.match(stylesheet, /robys-compact-master-v1\.svg\?v=20260721-master-1/);
          assert.match(stylesheet, /robys-mark-master-v1\.svg\?v=20260721-master-1/);
          assert.match(stylesheet, /\.brand-copy strong::before,[\s\S]*?content:none!important/);
          assert.doesNotMatch(stylesheet, /font-family:/, "visual wordmark must not depend on browser fonts");
          assert.doesNotMatch(stylesheet, /scaleX\(/, "visual wordmark must not be synthesized with CSS transforms");

          for (const asset of assets) {
            const escaped = asset.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
            assert.match(serviceWorker, new RegExp(escaped));
          }
          assert.match(serviceWorker, /brand-photo-logo\.css\?v=20260721-svg-master-1/);
          assert.match(serviceWorker, /pathname\.endsWith\("\/src\/brand\/robys-primary-master-v1\.svg"\)/);
          assert.match(serviceWorker, /pathname\.endsWith\("\/src\/brand\/robys-compact-master-v1\.svg"\)/);
          assert.match(serviceWorker, /pathname\.endsWith\("\/src\/brand\/robys-mobile-master-v1\.svg"\)/);
          assert.match(serviceWorker, /pathname\.endsWith\("\/src\/brand\/robys-mark-master-v1\.svg"\)/);

          console.log("PASS: approved SVG-path Roby's wordmark contract");
          JS

      - name: Revision bootstrap and service worker
        shell: python
        run: |
          from pathlib import Path
          import re

          bootstrap = Path("bootstrap.js")
          text = bootstrap.read_text()
          text, count = re.subn(
              r'photoLogo\.href = "brand-photo-logo\.css\?v=[^"]+";',
              'photoLogo.href = "brand-photo-logo.css?v=20260721-svg-master-1";',
              text,
          )
          if count != 1:
              raise SystemExit(f"expected one bootstrap stylesheet revision, found {count}")
          bootstrap.write_text(text)

          sw = Path("sw.js")
          text = sw.read_text()
          text = re.sub(
              r'const CACHE_VERSION = "[^"]+";',
              'const CACHE_VERSION = "robys-offline-v23-20260721-svg-master";',
              text,
              count=1,
          )
          text, count = re.subn(
              r'"\.\/brand-photo-logo\.css\?v=[^"]+"',
              '"./brand-photo-logo.css?v=20260721-svg-master-1"',
              text,
              count=1,
          )
          if count != 1:
              raise SystemExit(f"expected one service-worker CSS revision, found {count}")

          css_line = '  "./brand-photo-logo.css?v=20260721-svg-master-1",'
          asset_lines = [
              '  "./src/brand/robys-primary-master-v1.svg?v=20260721-master-1",',
              '  "./src/brand/robys-compact-master-v1.svg?v=20260721-master-1",',
              '  "./src/brand/robys-mobile-master-v1.svg?v=20260721-master-1",',
              '  "./src/brand/robys-mark-master-v1.svg?v=20260721-master-1",',
          ]
          for line in asset_lines:
              text = text.replace(line + "\n", "")
          text = text.replace(css_line, css_line + "\n" + "\n".join(asset_lines))

          anchor = '    url.pathname.endsWith("/src/brand/robys-organic-ring.svg");'
          replacement = (
              '    url.pathname.endsWith("/src/brand/robys-primary-master-v1.svg") ||\n'
              '    url.pathname.endsWith("/src/brand/robys-compact-master-v1.svg") ||\n'
              '    url.pathname.endsWith("/src/brand/robys-mobile-master-v1.svg") ||\n'
              '    url.pathname.endsWith("/src/brand/robys-mark-master-v1.svg") ||\n'
              + anchor
          )
          if 'pathname.endsWith("/src/brand/robys-primary-master-v1.svg")' not in text:
              if anchor not in text:
                  raise SystemExit("service-worker exact-revision anchor not found")
              text = text.replace(anchor, replacement)
          sw.write_text(text)

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify approved SVG contract
        run: node scripts/test-photo-logo.mjs

      - name: Generate exact integrity manifest
        run: npm run integrity:generate

      - name: Commit SVG integration and remove helper
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/install-approved-svg-wordmark-v1.yml
          git add bootstrap.js brand-photo-logo.css integrity-manifest.json scripts/test-photo-logo.mjs sw.js src/brand
          git commit -m "feat: replace CSS lettering with approved SVG masters"
          git push origin HEAD:feat/photo-referenced-organic-logo
