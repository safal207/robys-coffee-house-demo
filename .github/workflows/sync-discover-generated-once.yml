name: Sync discover generated files once

on:
  pull_request:
    branches: [main]
    types: [synchronize, reopened]

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/discover-two-approved-pairings
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Build and generate manifest
        run: |
          npm run build
          node scripts/generate-integrity-manifest.mjs
      - name: Commit exact generated state when needed
        run: |
          if git diff --quiet; then
            echo "Generated files are already current."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app.js featured-gallery.js social-offer.js discover-rotation.js index.html discover.html integrity-manifest.json
          git commit -m "chore: sync generated Taste Journey runtime"
          git push origin HEAD:feat/discover-two-approved-pairings
