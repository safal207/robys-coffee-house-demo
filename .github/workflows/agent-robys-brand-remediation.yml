name: Agent Roby's brand remediation

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: agent-robys-brand-remediation
  cancel-in-progress: true

jobs:
  remediate:
    if: github.actor != 'github-actions[bot]' && github.head_ref == 'agent/fix-robys-brand-consistency'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/fix-robys-brand-consistency
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Syntax-check remediation helper
        run: node --check scripts/agent-fix-robys-brand.mjs

      - name: Apply bounded remediation
        shell: bash
        run: |
          set -o pipefail
          node scripts/agent-fix-robys-brand.mjs 2>&1 | tee /tmp/robys-brand-remediation.log

      - name: Persist apply diagnostics
        if: failure()
        run: |
          cp /tmp/robys-brand-remediation.log docs/brand/agent-remediation-failure.log
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/brand/agent-remediation-failure.log
          git commit -m "chore: record brand remediation failure"
          git push origin HEAD:agent/fix-robys-brand-consistency

      - name: Build and regenerate integrity evidence
        run: |
          npm run build
          npm run integrity:generate

      - name: Run full repository checks
        shell: bash
        run: |
          set -o pipefail
          {
            npm run check || {
              npm run integrity:generate
              npm run check
            }
            npm run verify:security
          } 2>&1 | tee /tmp/robys-brand-check.log

      - name: Persist check diagnostics
        if: failure()
        run: |
          cp /tmp/robys-brand-check.log docs/brand/agent-remediation-failure.log
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/brand/agent-remediation-failure.log
          git commit -m "chore: record brand verification failure"
          git push origin HEAD:agent/fix-robys-brand-consistency

      - name: Remove temporary agent files
        run: |
          rm scripts/agent-fix-robys-brand.mjs
          rm .github/workflows/agent-robys-brand-remediation.yml
          rm -f docs/brand/agent-remediation-failure.log

      - name: Commit verified remediation
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "fix: normalize Roby's brand delivery"
          git push origin HEAD:agent/fix-robys-brand-consistency
