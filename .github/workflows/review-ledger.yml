name: Review disposition contract

on:
  pull_request:
  pull_request_review:
    types: [submitted, edited, dismissed]
  pull_request_review_comment:
    types: [created, edited, deleted]
  issue_comment:
    types: [created, edited, deleted]

concurrency:
  group: review-ledger-${{ github.event.pull_request.number || github.event.issue.number || github.run_id }}
  cancel-in-progress: true

permissions: {}

jobs:
  review-ledger:
    name: REVIEW-LEDGER exact-head findings
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      issues: read
      pull-requests: read

    steps:
      - name: Require provider-neutral PDG-001 depth D6
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const payloadPr = context.payload.pull_request;
            const issuePr = context.payload.issue?.pull_request;
            const prNumber = payloadPr?.number ?? (issuePr ? context.payload.issue.number : null);
            if (!prNumber) {
              core.notice('Event is not associated with a pull request.');
              return;
            }

            const pr = (await github.rest.pulls.get({ owner, repo, pull_number: prNumber })).data;
            const head = pr.head.sha.toLowerCase();
            const [reviewComments, reviews, issueComments] = await Promise.all([
              github.paginate(github.rest.pulls.listReviewComments, { owner, repo, pull_number: prNumber, per_page: 100 }),
              github.paginate(github.rest.pulls.listReviews, { owner, repo, pull_number: prNumber, per_page: 100 }),
              github.paginate(github.rest.issues.listComments, { owner, repo, issue_number: prNumber, per_page: 100 }),
            ]);

            const trustedAssociations = new Set(['OWNER', 'MEMBER', 'COLLABORATOR']);
            const automatedReviewers = new Set([
              'chatgpt-codex-connector',
              'chatgpt-codex-connector[bot]',
              'github-advanced-security',
              'github-advanced-security[bot]',
            ]);
            const reviewHeads = new Map(reviews.map((review) => [review.id, review.commit_id?.toLowerCase()]));
            const timeOf = (item) => Math.max(
              0,
              ...[item.submitted_at, item.created_at, item.updated_at]
                .map((value) => Date.parse(value ?? 0))
                .filter(Number.isFinite),
            );
            const createdTimeOf = (item) => Date.parse(item.created_at ?? 0) || 0;
            const exactHeadBody = (body) => new RegExp(`(^|[^0-9a-f])${head}([^0-9a-f]|$)`, 'i').test(body ?? '');
            const reviewedCommitOf = (body) => (
              /Reviewed\s+commit\s*:\s*[*_]*\s*`?([0-9a-f]{7,40})`?/i.exec(body ?? '')?.[1]?.toLowerCase() ?? null
            );
            const isExactHeadCommit = (candidate) => Boolean(candidate) && head.startsWith(candidate);
            const hasFindingSeverity = (body) => {
              const text = String(body ?? '');
              if (/\bP[0-3]\b/i.test(text)) return true;
              return [...text.matchAll(/_([^_\n]+)_/g)].some(([, segment]) => (
                /\b(?:blocker|critical|major|minor)\b/i.test(segment.replace(/[`*_>#\[\]()!]+/g, ' '))
              ));
            };
            const isFinalCodexCommentEvidence = (item) => {
              const body = String(item?.body ?? '');
              return (
                /here are some automated review suggestions for this pull request/i.test(body) ||
                /\bcodex review\s*:\s*(?:did(?:n't| not) find|found no|no)\b[^\n]{0,100}\b(?:issue|issues|problem|problems)\b/i.test(body) ||
                /\bcodex review\s*:\s*(?:complete|completed)\b/i.test(body)
              );
            };
            const isTrustedAttestation = (item) => {
              if (!trustedAssociations.has(item.author_association)) return false;
              const body = String(item.body ?? '').replaceAll('`', '');
              const explicit = /^Independent-Review:\s*PDG-001\s*$/im.test(body) &&
                /^Outcome:\s*(?:accepted|approved)\s*$/im.test(body) &&
                new RegExp(`^Head:\\s*${head}\\s*$`, 'im').test(body);
              const mergeReady = new RegExp(`^/merge-ready\\s+${head}\\s*$`, 'im').test(body);
              return explicit || mergeReady;
            };
            const isDispositionReply = (reply) => {
              const body = (reply.body ?? '').replaceAll('`', '');
              const disposition = /^Disposition:\s*(accepted|rejected-with-evidence|superseded)\s*$/im.test(body);
              const exactHead = new RegExp(`^Head:\\s*${head}\\s*$`, 'im').test(body);
              return disposition && exactHead && trustedAssociations.has(reply.author_association);
            };
            const isIssueDispositionFor = (reply, finding) => {
              const body = (reply.body ?? '').replaceAll('`', '');
              const reference = new RegExp(`^Disposition-For-Issue-Comment:\\s*${finding.id}\\s*$`, 'im').test(body);
              return reference && createdTimeOf(reply) >= createdTimeOf(finding) && timeOf(reply) >= timeOf(finding) && isDispositionReply(reply);
            };

            const humanApprovals = reviews.filter((review) => (
              review.state === 'APPROVED' &&
              review.commit_id?.toLowerCase() === head &&
              trustedAssociations.has(review.author_association)
            ));
            const maintainerAttestations = issueComments.filter(isTrustedAttestation);
            const optionalAutomatedEvidence = [
              ...reviews.filter((review) => (
                automatedReviewers.has(review.user?.login) && review.commit_id?.toLowerCase() === head
              )),
              ...reviewComments.filter((comment) => (
                automatedReviewers.has(comment.user?.login) && reviewHeads.get(comment.pull_request_review_id) === head
              )),
              ...issueComments.filter((comment) => {
                const login = comment.user?.login;
                if (!automatedReviewers.has(login)) return false;
                if (login?.startsWith('chatgpt-codex-connector')) {
                  return isFinalCodexCommentEvidence(comment) &&
                    (exactHeadBody(comment.body) || isExactHeadCommit(reviewedCommitOf(comment.body)));
                }
                return exactHeadBody(comment.body);
              }),
            ];
            const independentEvidence = [...humanApprovals, ...maintainerAttestations, ...optionalAutomatedEvidence];
            if (independentEvidence.length === 0) {
              core.setFailed(`PDG-001 depth D4 incomplete: no exact-head human approval, maintainer attestation or optional automated review for ${head}.`);
              return;
            }

            const reviewFindings = reviewComments.filter((finding) => (
              !finding.in_reply_to_id &&
              automatedReviewers.has(finding.user?.login) &&
              reviewHeads.get(finding.pull_request_review_id) === head &&
              hasFindingSeverity(finding.body)
            ));
            const issueCommentFindings = issueComments.filter((finding) => (
              automatedReviewers.has(finding.user?.login) &&
              exactHeadBody(finding.body) &&
              hasFindingSeverity(finding.body)
            ));
            const missingReviewFindings = reviewFindings
              .filter((finding) => !reviewComments.some((reply) => reply.in_reply_to_id === finding.id && isDispositionReply(reply)))
              .map((finding) => ({ source: 'review-comment', finding }));
            const missingIssueFindings = issueCommentFindings
              .filter((finding) => !issueComments.some((reply) => isIssueDispositionFor(reply, finding)))
              .map((finding) => ({ source: 'issue-comment', finding }));
            const missing = [...missingReviewFindings, ...missingIssueFindings];
            if (missing.length > 0) {
              const locations = missing.map(({ source, finding }) => (
                source === 'issue-comment' ? `issue-comment:${finding.id}` : `${finding.path}:${finding.line ?? finding.original_line ?? '-'}`
              ));
              core.setFailed(`PDG-001 depth D5 incomplete: missing dispositions for ${missing.length} finding(s): ${locations.join(', ')}`);
              return;
            }

            const dispositionReplies = [
              ...reviewFindings.flatMap((finding) => reviewComments.filter((reply) => reply.in_reply_to_id === finding.id && isDispositionReply(reply))),
              ...issueCommentFindings.flatMap((finding) => issueComments.filter((reply) => isIssueDispositionFor(reply, finding))),
            ];
            const latestPrerequisiteAt = Math.max(
              0,
              ...independentEvidence.map(timeOf),
              ...dispositionReplies.map(timeOf),
            );
            const seals = issueComments.filter((item) => {
              const body = (item.body ?? '').replaceAll('`', '');
              return trustedAssociations.has(item.author_association) &&
                /^Proof-Depth-Seal:\s*PDG-001\s*$/im.test(body) &&
                new RegExp(`^Head:\\s*${head}\\s*$`, 'im').test(body) &&
                /^Depth:\s*D6\s*$/im.test(body);
            });
            const seal = seals.sort((left, right) => timeOf(right) - timeOf(left))[0];
            if (!seal) {
              core.setFailed(`PDG-001 depth D6 incomplete: no maintainer proof seal for ${head}.`);
              return;
            }
            if (timeOf(seal) <= latestPrerequisiteAt) {
              core.setFailed(`PDG-001 proof seal is stale for ${head}; seal again after the latest independent evidence and dispositions.`);
              return;
            }

            core.notice(
              `PDG-001 depth D6 sealed for ${head}: provider-neutral independent evidence accepted; ` +
              `${reviewFindings.length + issueCommentFindings.length} exact-head finding(s) dispositioned.`,
            );
