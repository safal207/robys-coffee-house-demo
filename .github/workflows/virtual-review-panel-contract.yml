name: Virtual review panel contract

on:
  pull_request:
    paths:
      - ".github/workflows/virtual-review-panel-contract.yml"
      - ".github/workflows/virtual-review-panel-verify.yml"
      - "scripts/virtual_review_panel.py"
      - "scripts/verify_virtual_panel_hardening.py"
      - "scripts/test_virtual_review_panel.py"
      - "scripts/test_virtual_panel_hardening.py"
      - "qa/virtual-review-panel.schema.json"
      - "qa/virtual-review-panel-roles.json"
      - "qa/virtual-review-panel.example.json"
      - "docs/virtual-review-panel-v1.md"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate role-separated virtual panel
    runs-on: ubuntu-latest
    timeout-minutes: 6

    steps:
      - name: Check out exact pull request head
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
          show-progress: false

      - name: Compile implementation and tests
        run: |
          python3 -m py_compile \
            scripts/virtual_review_panel.py \
            scripts/verify_virtual_panel_hardening.py \
            scripts/test_virtual_review_panel.py \
            scripts/test_virtual_panel_hardening.py

      - name: Run mutation tests
        run: |
          python3 scripts/test_virtual_review_panel.py -v
          python3 scripts/test_virtual_panel_hardening.py -v

      - name: Validate canonical panel record
        run: |
          python3 scripts/virtual_review_panel.py validate qa/virtual-review-panel.example.json
          python3 scripts/verify_virtual_panel_hardening.py qa/virtual-review-panel.example.json

      - name: Verify deterministic normalization
        run: |
          python3 scripts/virtual_review_panel.py normalize \
            qa/virtual-review-panel.example.json \
            "${RUNNER_TEMP}/normalized-panel-1.json"
          python3 scripts/virtual_review_panel.py normalize \
            "${RUNNER_TEMP}/normalized-panel-1.json" \
            "${RUNNER_TEMP}/normalized-panel-2.json"
          diff -u "${RUNNER_TEMP}/normalized-panel-1.json" "${RUNNER_TEMP}/normalized-panel-2.json"

      - name: Verify schema and role registry
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          schema = json.loads(Path("qa/virtual-review-panel.schema.json").read_text(encoding="utf-8"))
          roles = json.loads(Path("qa/virtual-review-panel-roles.json").read_text(encoding="utf-8"))
          example = json.loads(Path("qa/virtual-review-panel.example.json").read_text(encoding="utf-8"))

          expected = [
              "causal_architect",
              "temporal_provenance",
              "adversarial_semantics",
              "authority_safety",
              "ci_reliability",
          ]

          assert schema["$schema"] == "https://json-schema.org/draft/2020-12/schema"
          assert schema["properties"]["schema_version"]["const"] == "robis.virtual-review-panel.v1"
          assert schema["properties"]["activation"]["properties"]["external_lane_satisfied"]["const"] is False
          assert schema["properties"]["implementation"]["properties"]["external_provider_substitute"]["const"] is False
          assert schema["properties"]["authority"]["properties"]["can_execute"]["const"] is False
          assert schema["properties"]["authority"]["properties"]["can_approve"]["const"] is False
          assert schema["properties"]["authority"]["properties"]["can_merge"]["const"] is False

          assert [item["id"] for item in roles["roles"]] == expected
          assert [item["id"] for item in example["roles"]] == expected
          assert example["implementation"]["mode"] == "single_model_role_simulation"
          assert len(example["implementation"]["providers"]) == 1
          assert example["activation"]["external_lane_satisfied"] is False
          assert example["decision"]["verdict"] == "FIX_THEN_RERUN"
          assert example["dissent"]
          PY

      - name: Parse workflow YAML
        run: |
          ruby -e "require 'yaml'; YAML.parse_file('.github/workflows/virtual-review-panel-contract.yml'); YAML.parse_file('.github/workflows/virtual-review-panel-verify.yml')"

      - name: Verify observer trust and authority boundaries
        run: |
          set -euo pipefail
          verifier=.github/workflows/virtual-review-panel-verify.yml

          grep -Fq "permissions: {}" "${verifier}"
          grep -Fq "contents: read" "${verifier}"
          grep -Fq "issues: read" "${verifier}"
          grep -Fq "pull-requests: read" "${verifier}"
          ! grep -Fq "contents: write" "${verifier}"
          ! grep -Fq "issues: write" "${verifier}"
          ! grep -Fq "pull-requests: write" "${verifier}"
          ! grep -Fq "pull_request_target" "${verifier}"

          grep -Fq "github.event.repository.default_branch" "${verifier}"
          grep -Fq "persist-credentials: false" "${verifier}"
          grep -Fq "python3 trusted/scripts/virtual_review_panel.py validate" "${verifier}"
          grep -Fq "python3 trusted/scripts/verify_virtual_panel_hardening.py" "${verifier}"
          grep -Fq "record_head != current_head" "${verifier}"
          grep -Fq "actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02" "${verifier}"

          grep -Fq '"external_provider_substitute":false' qa/virtual-review-panel.example.json
          grep -Fq '"can_merge":false' qa/virtual-review-panel.example.json
          grep -Fq '"external_lane_satisfied":false' qa/virtual-review-panel.example.json
