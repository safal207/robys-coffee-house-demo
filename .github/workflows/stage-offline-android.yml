name: Stage offline Android release

on:
  push:
    branches:
      - fix/android-download-offline

permissions:
  contents: write

jobs:
  stage-release:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: fix/android-download-offline

      - name: Assemble reviewed APK
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p downloads
          cat downloads/android-v1.1/part-*.b64 | base64 --decode > downloads/robys-coffee-house-v1.1.apk
          echo 'f188c2f0ab820d514c9c1bd75734e3d76f8203f89d4a1604fd08da43fd7910a6  downloads/robys-coffee-house-v1.1.apk' | sha256sum --check --strict
          test "$(stat -c %s downloads/robys-coffee-house-v1.1.apk)" = '25231'
          unzip -t downloads/robys-coffee-house-v1.1.apk

      - name: Wire service worker and direct download
        shell: python
        run: |
          import json
          from pathlib import Path

          for name in ("index.html", "menu.html"):
              path = Path(name)
              html = path.read_text(encoding="utf-8")
              html = html.replace("worker-src 'none'", "worker-src 'self'")
              pwa = '  <script defer src="pwa.js?v=offline-20260627-1"></script>'
              if pwa not in html:
                  html = html.replace("</head>", f"{pwa}\n</head>", 1)
              if name == "index.html":
                  android = '  <script defer src="android-download.js?v=android-direct-20260627-1"></script>'
                  if android not in html:
                      html = html.replace(pwa, f"{pwa}\n{android}", 1)
              path.write_text(html, encoding="utf-8")

          package_path = Path("package.json")
          package = json.loads(package_path.read_text(encoding="utf-8"))
          regression = package["scripts"]["verify:regression"]
          offline_gate = "node scripts/verify-offline-contract.mjs"
          if offline_gate not in regression:
              regression = regression.replace(
                  "node scripts/verify-android-download.mjs",
                  "node scripts/verify-android-download.mjs && node scripts/verify-offline-contract.mjs"
              )
          package["scripts"]["verify:regression"] = regression
          package_path.write_text(json.dumps(package, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")

      - name: Remove assembly sources
        shell: bash
        run: |
          rm -rf downloads/android-v1.1
          rm -f .github/workflows/stage-offline-android.yml

      - name: Build and verify
        shell: bash
        run: |
          set -euo pipefail
          npm ci
          npm run build
          npm run integrity:generate
          npm run check

      - name: Commit staged release
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git diff --cached --check
          git commit -m 'fix: ship direct Android download and offline menu'
          git push origin HEAD:fix/android-download-offline
