name: Finalize pairing CTA HTML

on:
  push:
    branches:
      - feat/hero-pairing-cta

permissions:
  contents: write

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout feature branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: feat/hero-pairing-cta
          persist-credentials: true

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Make pairing CTA the static HTML source of truth
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("index.html")
          html = path.read_text(encoding="utf-8")
          old = '<a class="button button-primary" href="https://www.google.com/maps/dir/?api=1&destination=Roby%27s+Coffee+House+Gazipasa&travelmode=driving" target="_blank" rel="noopener noreferrer" data-i18n="getDirections">Yol Tarifi Al</a>'
          new = '<a class="button button-primary" href="menu.html#pairing-offers" data-analytics-action="pairing_click" data-localized data-tr="Bugünün Eşleşmesini Gör" data-en="See Today\'s Pairing" data-ru="Смотреть сочетание дня">Bugünün Eşleşmesini Gör</a>'
          if old not in html:
              raise SystemExit("Expected legacy hero route CTA was not found")
          html = html.replace(old, new, 1)
          html = html.replace('analytics.js?v=perf-20260621-5', 'analytics.js?v=pairing-cta-20260704-1', 1)
          path.write_text(html, encoding="utf-8")
          PY

      - name: Refresh generated runtime and integrity manifest
        run: |
          npm run build
          npm run integrity:generate

      - name: Commit exact generated result
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html app.js featured-gallery.js social-offer.js integrity-manifest.json
          git commit -m "feat: make pairing CTA the static hero default"
          git push origin HEAD:feat/hero-pairing-cta
