name: PR 140 finalize v3 renderer

on:
  push:
    branches:
      - feat/cool-lime-macaron-hq-poster

permissions:
  contents: write

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Build generated runtimes and synchronized cache keys
        run: npm run build

      - name: Verify focused poster contract
        run: npm run verify:taste-journey-posters

      - name: Regenerate canonical integrity manifest
        run: npm run integrity:generate

      - name: Verify generated evidence
        run: |
          npm run typecheck
          node --check discover-rotation-v3.js
          npm run verify:integrity

      - name: Remove one-shot workflow
        run: git rm .github/workflows/pr140-v3-build-finalize.yml

      - name: Commit generated files and manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "build: finalize revisioned v3 poster renderer"
          git push
