name: AI review cooperation contract

on:
  pull_request:
    paths:
      - .github/workflows/ai-review-contract.yml
      - .github/workflows/ai-review-cooperation.yml
      - .github/workflows/ai-review-cooperation-contract.yml
      - .github/workflows/grok-review.yml
      - .github/workflows/review-ledger.yml
      - .github/workflows/traceability.yml
      - scripts/ai-review-cooperation.py
      - scripts/fetch-review-threads.py
      - scripts/grok-review.py
      - scripts/test-ai-review-cooperation.py
      - scripts/verify-ai-review-contract.cjs
      - scripts/verify-ai-review-freshness.mjs
      - scripts/verify-ai-style-review-matrix.mjs
      - docs/ai-review-cooperation-policy.md

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - name: Checkout pull request
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
          show-progress: false

      - name: Compile reviewer scripts
        run: >-
          python3 -m py_compile
          scripts/ai-review-cooperation.py
          scripts/fetch-review-threads.py
          scripts/grok-review.py
          scripts/test-ai-review-cooperation.py

      - name: Run offline cooperation contracts
        run: python3 scripts/test-ai-review-cooperation.py -v

      - name: Parse workflow YAML and JavaScript
        run: |
          ruby -e "require 'yaml'; %w[
            .github/workflows/ai-review-contract.yml
            .github/workflows/ai-review-cooperation.yml
            .github/workflows/grok-review.yml
            .github/workflows/review-ledger.yml
          ].each { |path| YAML.parse_file(path) }"
          node --check scripts/verify-ai-review-contract.cjs
          node --check scripts/verify-ai-review-freshness.mjs
          node --check scripts/verify-ai-style-review-matrix.mjs

      - name: Verify mandatory Qodo exact-head lane
        run: |
          python3 - <<'PY'
          from pathlib import Path

          workflow = Path('.github/workflows/ai-review-contract.yml').read_text(encoding='utf-8')
          verifier = Path('scripts/verify-ai-review-contract.cjs').read_text(encoding='utf-8')
          corpus = workflow + '\n' + verifier
          required = [
              'actions: read', 'issues: read', 'pull-requests: read',
              'QODO_LOGINS', 'QODO_COMMAND', '/qodo review',
              'TRUSTED_ASSOCIATIONS', 'headUpdateAnchor', 'currentHead',
              'commit_id', 'review.user?.type === "Bot"',
              'issues.listComments', 'pulls.listReviews',
              'qodoRequestAt > 0 && qodoReview',
              'Math.max(headUpdateAnchor, qodoRequestAt)',
              'submitted after that trusted request',
          ]
          forbidden = ['CodeRabbit (required)', 'CODERABBIT_STATUS_CONTEXT', 'codeRabbitRequestAt']
          missing = [token for token in required if token not in corpus]
          leaked = [token for token in forbidden if token in corpus]
          if missing or leaked:
              raise SystemExit(f'Qodo contract drift: missing={missing}, forbidden={leaked}')
          PY

      - name: Verify cooperation reporter trust boundary
        run: |
          python3 - <<'PY'
          from pathlib import Path

          workflow = Path('.github/workflows/ai-review-cooperation.yml').read_text(encoding='utf-8')
          required = [
              "github.event.comment.body == '/ai-cooperation report'",
              "github.event.review.state == 'approved'",
              "github.event.review.state == 'commented'",
              "github.event.review.state == 'changes_requested'",
              "github.event.review.commit_id == github.event.pull_request.head.sha",
              "github.event.review.user.type == 'Bot'",
              "github.event.review.user.login == 'qodo-code-review[bot]'",
              "github.event.review.user.login == 'qodo-code-review'",
              "github.event.workflow_run.name == 'AI review contract'",
              "github.event.workflow_run.conclusion == 'success'",
              'Authorized by native exact-head Qodo bot review.',
              'Workflow trigger is not bound to the current PR head',
              'PR head changed before publishing',
              'github.event.repository.default_branch',
              'persist-credentials: false',
              'cancel-in-progress: true',
          ]
          forbidden = ['pull_request_target', 'contents: write']
          missing = [token for token in required if token not in workflow]
          leaked = [token for token in forbidden if token in workflow]
          if missing or leaked:
              raise SystemExit(f'Cooperation reporter drift: missing={missing}, forbidden={leaked}')
          PY
          ruby <<'RUBY'
          require 'yaml'
          workflow = YAML.load_file('.github/workflows/ai-review-cooperation.yml')
          raise 'workflow permissions must default to none' unless workflow['permissions'] == {}
          expected = {
            'actions' => 'read', 'checks' => 'read', 'contents' => 'read',
            'issues' => 'write', 'pull-requests' => 'read', 'statuses' => 'read',
          }
          actual = workflow.dig('jobs', 'report', 'permissions')
          raise "unexpected reporter permissions: #{actual.inspect}" unless actual == expected
          concurrency = workflow.dig('jobs', 'report', 'concurrency')
          raise 'missing safe cancellation' unless concurrency && concurrency['cancel-in-progress'] == true
          RUBY

      - name: Verify Qodo ledger and D6 boundary
        run: |
          python3 - <<'PY'
          from pathlib import Path

          ledger = Path('.github/workflows/review-ledger.yml').read_text(encoding='utf-8')
          required = [
              'const qodoEvidence = reviews.filter(',
              'qodoLogins.has(item.user?.login)',
              "item.user?.type === 'Bot'",
              "item.state !== 'PENDING'",
              "item.state !== 'DISMISSED'",
              'item.commit_id?.toLowerCase() === head',
              'no native Qodo exact-head evidence',
              'Qodo lacks E4/E5 exact-head evidence',
              '<!-- deepseek-pr-review -->', '<!-- grok-pr-review -->',
              "item.user?.login === 'github-actions[bot]'",
              'Proof-Depth-Seal:', 'Depth:\\s*D6',
          ]
          missing = [token for token in required if token not in ledger]
          for reviewer in ['CodeRabbit', 'Codex', 'Jules', 'DeepSeek', 'Grok']:
              if reviewer not in ledger:
                  missing.append(f'supplemental:{reviewer}')
          reports = ledger.split('const reports = issueComments.filter', 1)[1].split('const report =', 1)[0]
          if 'trustedAssociations' in reports:
              missing.append('bot-only cooperation report trust boundary')
          if missing:
              raise SystemExit('Ledger drift: ' + ', '.join(missing))
          PY

      - name: Verify Grok advisory reviewer
        run: |
          python3 - <<'PY'
          from pathlib import Path

          workflow = Path('.github/workflows/grok-review.yml').read_text(encoding='utf-8')
          script = Path('scripts/grok-review.py').read_text(encoding='utf-8')
          tests = Path('scripts/test-ai-review-cooperation.py').read_text(encoding='utf-8')
          policy = Path('docs/ai-review-cooperation-policy.md').read_text(encoding='utf-8')
          corpus = workflow + '\n' + script + '\n' + tests + '\n' + policy
          required = [
              '/grok review', '/grok deep-review',
              "github.event.issue.state == 'open'",
              "github.event.comment.author_association == 'OWNER'",
              "github.event.comment.author_association == 'MEMBER'",
              "github.event.comment.author_association == 'COLLABORATOR'",
              'XAI_API_KEY:', 'secrets.XAI_API_KEY', 'GROK_MODEL: grok-4.5',
              'https://api.x.ai/v1/chat/completions',
              'Authorization', 'Bearer', '<!-- grok-pr-review -->',
              'Reviewed commit: `{expected_head}`',
              'PR head changed before publishing',
              'PR_NOT_OPEN', 'current_state',
              'English', 'Türkçe', 'Русский',
              'STALE_HEAD', 'MISSING_CONFIGURATION', 'RATE_LIMITED',
              'PROVIDER_UNAVAILABLE', 'timeout=240',
              'RETRY_DELAYS_SECONDS = (2, 5)',
              'Qodo and required CI remain authoritative.',
              'test -s "${COMMENT_FILE}"',
              'contains($marker)', 'body_bytes=', '65000',
              'expected_binding=', 'contains($binding)',
              'test_grok_multilingual_label_without_canonical_binding_does_not_count',
              'XAI_API_KEY',
          ]
          forbidden = ['pull_request_target', 'contents: write', 'Return the review in Russian.']
          missing = [token for token in required if token not in corpus]
          leaked = [token for token in forbidden if token in workflow + '\n' + script]
          if missing or leaked:
              raise SystemExit(f'Grok reviewer drift: missing={missing}, forbidden={leaked}')
          PY
          ruby <<'RUBY'
          require 'yaml'
          workflow = YAML.load_file('.github/workflows/grok-review.yml')
          expected = {
            'contents' => 'read', 'issues' => 'read', 'pull-requests' => 'write',
          }
          raise "unexpected Grok permissions: #{workflow['permissions'].inspect}" unless workflow['permissions'] == expected
          RUBY

      - name: Verify causal cooperation invariants
        run: |
          python3 - <<'PY'
          from pathlib import Path

          script = Path('scripts/ai-review-cooperation.py').read_text(encoding='utf-8')
          policy = Path('docs/ai-review-cooperation-policy.md').read_text(encoding='utf-8')
          ledger = Path('.github/workflows/review-ledger.yml').read_text(encoding='utf-8')
          corpus = script + policy + ledger
          required = [
              '<!-- ai-review-cooperation -->', 'BOT_LOGINS',
              "login_of(item) == 'github-actions[bot]'", 'REQUIRED_CHECKS',
              'BOOTSTRAP_NOT_ON_DEFAULT_BRANCH', 'NO_CURRENT_HEAD_EVIDENCE',
              'FIX_THEN_RERUN', 'flowchart TD', 'not a majority vote',
              'STALE_HEAD', 'PERMISSION_ERROR', '/qodo review',
              'Qodo', 'Grok', 'GROK_MARKER', 'immutable_head_anchor',
              'qodo_request_at', 'active_submitted_review',
              "state not in {'PENDING', 'DISMISSED'}",
          ]
          missing = [token for token in required if token not in corpus]
          if missing:
              raise SystemExit('Missing cooperation invariants: ' + ', '.join(missing))
          PY
