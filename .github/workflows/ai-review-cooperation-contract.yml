name: AI review cooperation contract

on:
  pull_request:
    paths:
      - .github/workflows/ai-review-cooperation.yml
      - .github/workflows/ai-review-cooperation-contract.yml
      - .github/workflows/review-ledger.yml
      - .github/workflows/traceability.yml
      - scripts/ai-review-cooperation.py
      - scripts/render-ci-proof-summary.mjs
      - scripts/fetch-review-threads.py
      - scripts/test-ai-review-cooperation.py
      - scripts/test-ai-review-cooperation-workflow.rb
      - docs/ai-review-cooperation-policy.md

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout pull request
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
          show-progress: false

      - name: Compile cooperation scripts
        run: >-
          python3 -m py_compile
          scripts/ai-review-cooperation.py
          scripts/fetch-review-threads.py
          scripts/test-ai-review-cooperation.py

      - name: Run offline cooperation contracts
        id: offline-tests
        continue-on-error: true
        run: python3 scripts/test-ai-review-cooperation.py -v > "${RUNNER_TEMP}/cooperation-tests.log" 2>&1

      - name: Upload failed cooperation test log
        if: steps.offline-tests.outcome == 'failure'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: cooperation-test-failure-${{ github.run_id }}
          path: ${{ runner.temp }}/cooperation-tests.log
          if-no-files-found: error
          retention-days: 3

      - name: Surface failed cooperation contracts
        if: steps.offline-tests.outcome == 'failure'
        run: |
          tail -n 100 "${RUNNER_TEMP}/cooperation-tests.log"
          exit 1

      - name: Parse workflow YAML
        run: ruby -e "require 'yaml'; YAML.parse_file('.github/workflows/ai-review-cooperation.yml'); YAML.parse_file('.github/workflows/ai-review-cooperation-contract.yml'); YAML.parse_file('.github/workflows/review-ledger.yml'); YAML.parse_file('.github/workflows/traceability.yml')"

      - name: Verify trusted workflow-run handoff
        run: ruby scripts/test-ai-review-cooperation-workflow.rb
