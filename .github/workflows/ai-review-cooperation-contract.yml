name: AI review cooperation contract

on:
  pull_request:
    paths:
      - .github/workflows/ai-review-cooperation.yml
      - .github/workflows/ai-review-cooperation-contract.yml
      - scripts/ai-review-cooperation.py
      - scripts/fetch-review-threads.py
      - scripts/test-ai-review-cooperation.py
      - docs/ai-review-cooperation-policy.md

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout pull request
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
          show-progress: false

      - name: Compile cooperation scripts
        run: >-
          python3 -m py_compile
          scripts/ai-review-cooperation.py
          scripts/fetch-review-threads.py
          scripts/test-ai-review-cooperation.py

      - name: Run offline cooperation contracts
        id: offline-tests
        continue-on-error: true
        run: python3 scripts/test-ai-review-cooperation.py -v > "${RUNNER_TEMP}/cooperation-tests.log" 2>&1

      - name: Upload failed cooperation test log
        if: steps.offline-tests.outcome == 'failure'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: cooperation-test-failure-${{ github.run_id }}
          path: ${{ runner.temp }}/cooperation-tests.log
          if-no-files-found: error
          retention-days: 3

      - name: Surface failed cooperation contracts
        if: steps.offline-tests.outcome == 'failure'
        run: |
          tail -n 100 "${RUNNER_TEMP}/cooperation-tests.log"
          exit 1

      - name: Parse workflow YAML
        run: ruby -e "require 'yaml'; YAML.parse_file('.github/workflows/ai-review-cooperation.yml'); YAML.parse_file('.github/workflows/ai-review-cooperation-contract.yml')"

      - name: Verify least privilege and trusted command
        run: |
          grep -Fq "github.event.comment.body == '/ai-cooperation report'" .github/workflows/ai-review-cooperation.yml
          grep -Fq "author_association == 'OWNER'" .github/workflows/ai-review-cooperation.yml
          grep -Fq "author_association == 'MEMBER'" .github/workflows/ai-review-cooperation.yml
          grep -Fq "author_association == 'COLLABORATOR'" .github/workflows/ai-review-cooperation.yml
          grep -Fq 'default_branch' .github/workflows/ai-review-cooperation.yml
          grep -Fq 'persist-credentials: false' .github/workflows/ai-review-cooperation.yml
          grep -Fq 'RUNNER_TEMP' .github/workflows/ai-review-cooperation.yml
          grep -Fq 'GITHUB_ENV' .github/workflows/ai-review-cooperation.yml
          ! grep -Fq 'runner.temp' .github/workflows/ai-review-cooperation.yml
          ! grep -Fq 'contents: write' .github/workflows/ai-review-cooperation.yml
          ! grep -Fq 'pull_request_target' .github/workflows/ai-review-cooperation.yml
          ruby <<'RUBY'
          require 'yaml'
          workflow = YAML.load_file('.github/workflows/ai-review-cooperation.yml')
          raise 'workflow permissions must default to none' unless workflow['permissions'] == {}
          permissions = workflow.dig('jobs', 'report', 'permissions')
          expected = {
            'checks' => 'read',
            'contents' => 'read',
            'issues' => 'write',
            'pull-requests' => 'read',
          }
          raise "unexpected job permissions: #{permissions.inspect}" unless permissions == expected
          RUBY

      - name: Verify complete evidence collection
        run: |
          grep -Fq 'check-runs?per_page=100' .github/workflows/ai-review-cooperation.yml
          grep -Fq -- '--paginate' .github/workflows/ai-review-cooperation.yml
          grep -Fq 'scripts/fetch-review-threads.py' .github/workflows/ai-review-cooperation.yml
          grep -Fq 'while True:' scripts/fetch-review-threads.py
          grep -Fq 'hasNextPage' scripts/fetch-review-threads.py
          grep -Fq 'COMMENTS_QUERY' scripts/fetch-review-threads.py
          grep -Fq 'EVIDENCE_TRUNCATED' scripts/ai-review-cooperation.py
          grep -Fq 'PR head changed before publishing' .github/workflows/ai-review-cooperation.yml

      - name: Verify causal trust and policy taxonomy
        run: |
          grep -Fq '<!-- ai-review-cooperation -->' scripts/ai-review-cooperation.py
          grep -Fq 'BOT_LOGINS' scripts/ai-review-cooperation.py
          grep -Fq "login_of(item) == 'github-actions[bot]'" scripts/ai-review-cooperation.py
          grep -Fq 'REQUIRED_CHECKS' scripts/ai-review-cooperation.py
          grep -Fq 'BOOTSTRAP_NOT_ON_DEFAULT_BRANCH' scripts/ai-review-cooperation.py
          grep -Fq 'NO_CURRENT_HEAD_EVIDENCE' scripts/ai-review-cooperation.py
          grep -Fq 'FIX_THEN_RERUN' scripts/ai-review-cooperation.py
          grep -Fq "level='E4' if actionable else 'E5'" scripts/ai-review-cooperation.py
          grep -Fq 'flowchart TD' scripts/ai-review-cooperation.py
          grep -Fq 'STALE_HEAD' docs/ai-review-cooperation-policy.md
          grep -Fq 'PERMISSION_ERROR' docs/ai-review-cooperation-policy.md
          grep -Fq 'not a majority vote' scripts/ai-review-cooperation.py

      - name: Verify job-scoped cancellation
        run: |
          ruby -e "require 'yaml'; workflow = YAML.load_file('.github/workflows/ai-review-cooperation.yml'); raise 'workflow-level concurrency is unsafe' if workflow.key?('concurrency'); concurrency = workflow.dig('jobs', 'report', 'concurrency'); raise 'missing job concurrency' unless concurrency && concurrency['cancel-in-progress'] == true && concurrency['group'].include?('ai-review-cooperation-')"
