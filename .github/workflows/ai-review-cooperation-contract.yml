name: AI review cooperation contract

on:
  pull_request:
    paths:
      - .github/workflows/ai-review-contract.yml
      - .github/workflows/ai-review-cooperation.yml
      - .github/workflows/ai-review-cooperation-contract.yml
      - .github/workflows/coderabbit-reserve.yml
      - .github/workflows/coderabbit-reserve-contract.yml
      - .github/workflows/review-ledger.yml
      - .github/workflows/traceability.yml
      - .github/pull_request_template.md
      - scripts/ai-review-cooperation.py
      - scripts/coderabbit-reserve.cjs
      - scripts/fetch-review-threads.py
      - scripts/test-ai-review-cooperation.py
      - scripts/test-coderabbit-reserve.cjs
      - scripts/test-codex-review-contract.cjs
      - qa/reviewer-roster.json
      - qa/review-route-policy.json
      - qa/proof-depth-graph.json
      - docs/ai-review-cooperation-policy.md
      - docs/proof-depth-graph.md

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout pull request
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
          show-progress: false

      - name: Compile and run CodeRabbit-required cooperation tests
        run: |
          python3 -m py_compile scripts/ai-review-cooperation.py scripts/fetch-review-threads.py scripts/test-ai-review-cooperation.py
          python3 scripts/test-ai-review-cooperation.py -v
          node --check scripts/coderabbit-reserve.cjs
          node scripts/test-coderabbit-reserve.cjs
          node scripts/test-codex-review-contract.cjs
          node scripts/verify-ai-review-freshness.mjs
          node scripts/verify-proof-depth-graph.mjs
          node scripts/test-proof-depth-graph.mjs
          node scripts/test-ci-proof-summary.mjs

      - name: Parse workflow YAML
        run: >-
          ruby -e "require 'yaml';
          YAML.parse_file('.github/workflows/ai-review-contract.yml');
          YAML.parse_file('.github/workflows/ai-review-cooperation.yml');
          YAML.parse_file('.github/workflows/ai-review-cooperation-contract.yml');
          YAML.parse_file('.github/workflows/coderabbit-reserve.yml');
          YAML.parse_file('.github/workflows/coderabbit-reserve-contract.yml');
          YAML.parse_file('.github/workflows/review-ledger.yml');
          YAML.parse_file('.github/workflows/traceability.yml')"

      - name: Verify reviewer role boundary
        run: |
          set -euo pipefail
          verifier=scripts/verify-ai-review-contract.cjs
          reporter=scripts/ai-review-cooperation.py
          scheduler=scripts/coderabbit-reserve.cjs
          workflow=.github/workflows/ai-review-cooperation.yml
          ai_workflow=.github/workflows/ai-review-contract.yml
          ledger=.github/workflows/review-ledger.yml
          policy=docs/ai-review-cooperation-policy.md
          template=.github/pull_request_template.md
          roster=qa/reviewer-roster.json
          routes=qa/review-route-policy.json

          grep -Fq 'ACTIVE_PROVIDER_NAMES: ["CodeRabbit"]' "${verifier}"
          grep -Fq 'provider-limit-bypass' "${verifier}"
          grep -Fq 'hasPositiveLimitSignal' "${verifier}"
          grep -Fq "ACTIVE_REVIEWERS = {'CodeRabbit'}" "${reporter}"
          grep -Fq "ADVISORY_REVIEWERS = {'Codex', 'Jules', 'DeepSeek'}" "${reporter}"
          grep -Fq "DORMANT_REVIEWERS = {'Qodo'}" "${reporter}"
          grep -Fq 'provider limit waived' "${reporter}"
          grep -Fq 'INITIAL_REQUIRED_REQUEST' "${scheduler}"
          grep -Fq 'PROVIDER_LIMIT_WAIVED' "${scheduler}"
          grep -Fq 'Verify exact-head CodeRabbit review or limit waiver' "${ai_workflow}"
          grep -Fq '@coderabbitai review' "${template}"
          grep -Fq 'provider-limit signal activates the narrow waiver' "${template}"
          grep -Fq 'Codex, Jules and DeepSeek are treated as advisory only' "${template}"
          grep -Fq 'const codeRabbitRequests = issueComments' "${ledger}"
          grep -Fq 'const hasPositiveLimitSignal = (body) => {' "${ledger}"
          grep -Fq 'provider-limit-waived' "${ledger}"
          grep -Fq "new Set(['CodeRabbit', 'Codex', 'Jules', 'DeepSeek'])" "${ledger}"
          grep -Fq 'Disposition-For-Issue-Comment' "${ledger}"
          grep -Fq 'timeOf(reply) >= timeOf(finding)' "${ledger}"
          grep -Fq '"id": "coderabbit"' "${roster}"
          grep -Fq '"binding": true' "${roster}"
          grep -Fq '"providerLimitWaivers"' "${roster}"
          grep -Fq '"actor": "coderabbit"' "${routes}"
          grep -Fq '"status": "QUOTA_EXHAUSTED"' "${routes}"
          grep -Fq 'CodeRabbit is the required request-bound AI reviewer' "${policy}"
          grep -Fq 'explicit authenticated CodeRabbit limit' "${policy}"
          grep -Fq 'Qodo is disabled' "${policy}"
          ! grep -Fqi 'qodo-code-review' "${workflow}"

      - name: Verify event and permission boundary
        run: |
          set -euo pipefail
          workflow=.github/workflows/ai-review-cooperation.yml
          grep -Fq 'issue_comment:' "${workflow}"
          grep -Fq 'workflow_run:' "${workflow}"
          grep -Fq 'workflows: [AI review contract]' "${workflow}"
          grep -Fq 'types: [completed]' "${workflow}"
          grep -Fq "github.event.comment.body == '/ai-cooperation report'" "${workflow}"
          grep -Fq "github.event.workflow_run.name == 'AI review contract'" "${workflow}"
          grep -Fq "github.event.workflow_run.conclusion == 'success'" "${workflow}"
          grep -Fq 'persist-credentials: false' "${workflow}"
          grep -Fq 'default_branch' "${workflow}"
          ! grep -Fq 'pull_request_review:' "${workflow}"
          ! grep -Fq 'pull_request_target' "${workflow}"
          ! grep -Fq 'contents: write' "${workflow}"
          ! grep -Fq 'actions: write' "${workflow}"

          ruby <<'RUBY'
          require 'yaml'
          workflow = YAML.load_file('.github/workflows/ai-review-cooperation.yml')
          raise 'workflow permissions must default to none' unless workflow['permissions'] == {}
          expected = {
            'actions' => 'read',
            'checks' => 'read',
            'contents' => 'read',
            'issues' => 'write',
            'pull-requests' => 'read',
            'statuses' => 'read',
          }
          actual = workflow.dig('jobs', 'report', 'permissions')
          raise "unexpected job permissions: #{actual.inspect}" unless actual == expected
          RUBY

      - name: Verify trusted trigger and concurrency
        run: |
          ruby <<'RUBY'
          require 'yaml'
          def normalize(value)
            value.to_s.gsub(/\s+/, '')
          end
          workflow = YAML.load_file('.github/workflows/ai-review-cooperation.yml')
          job = workflow.dig('jobs', 'report')
          guard = normalize(job['if'])
          required = [
            "github.event_name=='issue_comment'",
            "github.event.issue.state=='open'",
            "github.event.comment.body=='/ai-cooperationreport'",
            "github.event_name=='workflow_run'",
            "github.event.workflow_run.name=='AIreviewcontract'",
            "github.event.workflow_run.event=='pull_request'",
            "github.event.workflow_run.conclusion=='success'",
            "github.event.workflow_run.head_sha!=''",
          ]
          missing = required.reject { |token| guard.include?(token) }
          raise "trigger guard drifted: #{missing.inspect}" unless missing.empty?
          concurrency = job['concurrency']
          raise 'cancel-in-progress must remain enabled' unless concurrency['cancel-in-progress'] == true
          group = concurrency['group'].to_s
          raise 'concurrency must partition by PR or workflow head' unless group.include?('github.event.issue.number') && group.include?('github.event.workflow_run.head_sha')
          RUBY

      - name: Verify exact-head collection and publication
        run: |
          set -euo pipefail
          workflow=.github/workflows/ai-review-cooperation.yml
          grep -Fq 'commits/${TRIGGER_HEAD_SHA}/pulls?per_page=100' "${workflow}"
          grep -Fq '.state == "open" and .head.sha == $sha and .base.repo.full_name == $repo' "${workflow}"
          grep -Fq 'Expected exactly one open PR for workflow head' "${workflow}"
          grep -Fq 'Workflow trigger is not bound to the current PR head' "${workflow}"
          grep -Fq 'gh api --paginate --slurp' "${workflow}"
          grep -Fq 'python3 scripts/fetch-review-threads.py' "${workflow}"
          grep -Fq 'python3 scripts/ai-review-cooperation.py report' "${workflow}"
          grep -Fq 'PR head changed before publishing' "${workflow}"
          grep -Fq '<!-- ai-review-cooperation -->' "${workflow}"
          grep -Fq '.user.login == "github-actions[bot]"' "${workflow}"
          grep -Fq '65000' "${workflow}"

      - name: Validate embedded programs
        run: |
          ruby <<'RUBY'
          require 'yaml'
          require 'tempfile'
          cooperation = YAML.load_file('.github/workflows/ai-review-cooperation.yml')
          cooperation.dig('jobs', 'report', 'steps').each_with_index do |step, index|
            next unless step['run']
            Tempfile.create(["cooperation-step-#{index}", '.sh']) do |file|
              file.write(step['run'].to_s)
              file.flush
              unless system('bash', '-n', file.path, out: File::NULL, err: File::NULL)
                raise "invalid shell syntax in cooperation step #{index}: #{step['name']}"
              end
            end
          end
          ledger = YAML.load_file('.github/workflows/review-ledger.yml')
          script = ledger.dig('jobs', 'review-ledger', 'steps', 0, 'with', 'script')
          raise 'missing review-ledger script' unless script
          Tempfile.create(['review-ledger', '.js']) do |file|
            file.write("(async () => {\n#{script}\n})();\n")
            file.flush
            unless system('node', '--check', file.path, out: File::NULL, err: File::NULL)
              raise 'invalid JavaScript syntax in review-ledger'
            end
          end
          RUBY
