name: AI review cooperation contract

on:
  pull_request:
    paths:
      - .github/workflows/ai-review-cooperation.yml
      - .github/workflows/ai-review-cooperation-contract.yml
      - .github/workflows/review-ledger.yml
      - .github/workflows/traceability.yml
      - scripts/ai-review-cooperation.py
      - scripts/render-ci-proof-summary.mjs
      - scripts/fetch-review-threads.py
      - scripts/test-ai-review-cooperation.py
      - docs/ai-review-cooperation-policy.md

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout pull request
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
          show-progress: false

      - name: Compile cooperation scripts
        run: >-
          python3 -m py_compile
          scripts/ai-review-cooperation.py
          scripts/fetch-review-threads.py
          scripts/test-ai-review-cooperation.py

      - name: Run offline cooperation contracts
        id: offline-tests
        continue-on-error: true
        run: python3 scripts/test-ai-review-cooperation.py -v > "${RUNNER_TEMP}/cooperation-tests.log" 2>&1

      - name: Upload failed cooperation test log
        if: steps.offline-tests.outcome == 'failure'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: cooperation-test-failure-${{ github.run_id }}
          path: ${{ runner.temp }}/cooperation-tests.log
          if-no-files-found: error
          retention-days: 3

      - name: Surface failed cooperation contracts
        if: steps.offline-tests.outcome == 'failure'
        run: |
          tail -n 100 "${RUNNER_TEMP}/cooperation-tests.log"
          exit 1

      - name: Parse workflow YAML
        run: ruby -e "require 'yaml'; YAML.parse_file('.github/workflows/ai-review-cooperation.yml'); YAML.parse_file('.github/workflows/ai-review-cooperation-contract.yml'); YAML.parse_file('.github/workflows/review-ledger.yml'); YAML.parse_file('.github/workflows/traceability.yml')"

      - name: Verify least privilege and event declarations
        run: |
          grep -Fq 'pull_request_review:' .github/workflows/ai-review-cooperation.yml
          grep -Fq 'workflow_run:' .github/workflows/ai-review-cooperation.yml
          grep -Fq 'workflows: [AI review contract]' .github/workflows/ai-review-cooperation.yml
          grep -Fq 'types: [completed]' .github/workflows/ai-review-cooperation.yml
          grep -Fq 'default_branch' .github/workflows/ai-review-cooperation.yml
          grep -Fq 'persist-credentials: false' .github/workflows/ai-review-cooperation.yml
          ! grep -Fq 'contents: write' .github/workflows/ai-review-cooperation.yml
          ! grep -Fq 'pull_request_target' .github/workflows/ai-review-cooperation.yml
          ruby <<'RUBY'
          require 'yaml'
          workflow = YAML.load_file('.github/workflows/ai-review-cooperation.yml')
          raise 'workflow permissions must default to none' unless workflow['permissions'] == {}
          expected = {
            'checks' => 'read',
            'contents' => 'read',
            'issues' => 'write',
            'pull-requests' => 'read',
            'statuses' => 'read',
          }
          actual = workflow.dig('jobs', 'report', 'permissions')
          raise "unexpected job permissions: #{actual.inspect}" unless actual == expected
          RUBY

      - name: Verify exact trusted trigger semantics
        run: |
          ruby <<'RUBY'
          require 'yaml'

          def normalize_expression(value)
            output = +''
            quote = nil
            escaped = false
            value.to_s.each_char do |char|
              if quote
                output << char
                if escaped
                  escaped = false
                elsif char == '\\'
                  escaped = true
                elsif char == quote
                  quote = nil
                end
              elsif char == "'" || char == '"'
                quote = char
                output << char
              elsif char.match?(/\s/)
                next
              else
                output << char
              end
            end
            raise 'unterminated quoted literal' if quote
            output
          end

          workflow = YAML.load_file('.github/workflows/ai-review-cooperation.yml')
          job = workflow.dig('jobs', 'report')
          expected_guard = <<~'EXPR'
            (github.event_name == 'issue_comment' &&
             github.event.issue.pull_request != null &&
             github.event.comment.body == '/ai-cooperation report' &&
             (github.event.comment.author_association == 'OWNER' ||
              github.event.comment.author_association == 'MEMBER' ||
              github.event.comment.author_association == 'COLLABORATOR' ||
              github.event.comment.user.login == github.repository_owner)) ||
            (github.event_name == 'pull_request_review' &&
             github.event.review.state == 'approved' &&
             github.event.review.commit_id == github.event.pull_request.head.sha &&
             github.event.review.user.type == 'Bot' &&
             (github.event.review.user.login == 'coderabbitai[bot]' ||
              github.event.review.user.login == 'coderabbitai')) ||
            (github.event_name == 'workflow_run' &&
             github.event.workflow_run.name == 'AI review contract' &&
             github.event.workflow_run.event == 'pull_request' &&
             github.event.workflow_run.conclusion == 'success' &&
             github.event.workflow_run.head_sha != '')
          EXPR
          raise 'job trigger guard drifted' unless normalize_expression(job['if']) == normalize_expression(expected_guard)

          concurrency = job['concurrency']
          raise 'cancel-in-progress must remain enabled' unless concurrency['cancel-in-progress'] == true
          expected_group_source = <<~'EXPR'
            ai-review-cooperation-__EXPR_OPEN__
              ((github.event_name == 'issue_comment' &&
                github.event.issue.pull_request != null &&
                github.event.comment.body == '/ai-cooperation report' &&
                (github.event.comment.author_association == 'OWNER' ||
                 github.event.comment.author_association == 'MEMBER' ||
                 github.event.comment.author_association == 'COLLABORATOR' ||
                 github.event.comment.user.login == github.repository_owner)) ||
               (github.event_name == 'pull_request_review' &&
                github.event.review.state == 'approved' &&
                github.event.review.commit_id == github.event.pull_request.head.sha &&
                github.event.review.user.type == 'Bot' &&
                (github.event.review.user.login == 'coderabbitai[bot]' ||
                 github.event.review.user.login == 'coderabbitai'))) &&
              (github.event.issue.number || github.event.pull_request.number) ||
              (github.event_name == 'workflow_run' &&
               github.event.workflow_run.name == 'AI review contract' &&
               github.event.workflow_run.event == 'pull_request' &&
               github.event.workflow_run.conclusion == 'success' &&
               github.event.workflow_run.head_sha != '' &&
               format('workflow-{0}', github.event.workflow_run.head_sha)) ||
              github.run_id
            }}
          EXPR
          expected_group = expected_group_source.sub('__EXPR_OPEN__', '$' + '{{')
          raise 'concurrency trust partition drifted' unless normalize_expression(concurrency['group']) == normalize_expression(expected_group)
          RUBY

      - name: Verify trigger environment mappings
        run: |
          ruby <<'RUBY'
          require 'yaml'
          env = YAML.load_file('.github/workflows/ai-review-cooperation.yml').dig('jobs', 'report', 'env')
          required = {
            'PR_NUMBER' => 'github.event.issue.number || github.event.pull_request.number || github.event.workflow_run.pull_requests[0].number',
            'TRIGGER_EVENT' => 'github.event_name',
            'TRIGGER_AUTHOR' => 'github.event.comment.user.login || github.event.review.user.login || github.event.workflow_run.actor.login',
            'TRIGGER_HEAD_SHA' => "github.event.review.commit_id || github.event.workflow_run.head_sha || ''",
            'WORKFLOW_NAME' => "github.event.workflow_run.name || ''",
            'WORKFLOW_EVENT' => "github.event.workflow_run.event || ''",
            'WORKFLOW_CONCLUSION' => "github.event.workflow_run.conclusion || ''",
          }
          missing = required.reject { |key, token| env.fetch(key, '').include?(token) }
          raise "trigger environment drifted: #{missing.inspect}" unless missing.empty?
          RUBY

      - name: Execute authorization matrix
        run: |
          ruby <<'RUBY'
          require 'yaml'
          require 'open3'
          require 'tempfile'
          workflow = YAML.load_file('.github/workflows/ai-review-cooperation.yml')
          authorization = workflow.dig('jobs', 'report', 'steps').first
          raise 'authorization must remain first' unless authorization['name'] == 'Authorize cooperation trigger'
          script = authorization['run'].to_s
          base = {
            'REPOSITORY_OWNER' => 'repo-owner', 'TRIGGER_EVENT' => '', 'TRIGGER_AUTHOR' => '',
            'TRIGGER_ASSOCIATION' => '', 'REVIEW_STATE' => '', 'REVIEW_COMMIT' => '',
            'REVIEW_USER_TYPE' => '', 'PR_HEAD_SHA' => '', 'WORKFLOW_NAME' => '',
            'WORKFLOW_EVENT' => '', 'WORKFLOW_CONCLUSION' => '', 'PR_NUMBER' => '',
            'TRIGGER_HEAD_SHA' => '',
          }
          cases = [
            ['trusted owner', true, {'TRIGGER_EVENT'=>'issue_comment','TRIGGER_AUTHOR'=>'member','TRIGGER_ASSOCIATION'=>'OWNER'}],
            ['CodeRabbit bot', true, {'TRIGGER_EVENT'=>'pull_request_review','TRIGGER_AUTHOR'=>'coderabbitai[bot]','REVIEW_STATE'=>'approved','REVIEW_COMMIT'=>'abc','REVIEW_USER_TYPE'=>'Bot','PR_HEAD_SHA'=>'abc'}],
            ['workflow run without payload PR', true, {'TRIGGER_EVENT'=>'workflow_run','WORKFLOW_NAME'=>'AI review contract','WORKFLOW_EVENT'=>'pull_request','WORKFLOW_CONCLUSION'=>'success','TRIGGER_HEAD_SHA'=>'abc'}],
            ['attacker', false, {'TRIGGER_EVENT'=>'issue_comment','TRIGGER_AUTHOR'=>'attacker','TRIGGER_ASSOCIATION'=>'NONE'}],
            ['human review', false, {'TRIGGER_EVENT'=>'pull_request_review','TRIGGER_AUTHOR'=>'human','REVIEW_STATE'=>'approved','REVIEW_COMMIT'=>'abc','REVIEW_USER_TYPE'=>'User','PR_HEAD_SHA'=>'abc'}],
            ['stale approval', false, {'TRIGGER_EVENT'=>'pull_request_review','TRIGGER_AUTHOR'=>'coderabbitai[bot]','REVIEW_STATE'=>'approved','REVIEW_COMMIT'=>'old','REVIEW_USER_TYPE'=>'Bot','PR_HEAD_SHA'=>'new'}],
            ['wrong workflow', false, {'TRIGGER_EVENT'=>'workflow_run','WORKFLOW_NAME'=>'Other','WORKFLOW_EVENT'=>'pull_request','WORKFLOW_CONCLUSION'=>'success','TRIGGER_HEAD_SHA'=>'abc'}],
            ['failed workflow', false, {'TRIGGER_EVENT'=>'workflow_run','WORKFLOW_NAME'=>'AI review contract','WORKFLOW_EVENT'=>'pull_request','WORKFLOW_CONCLUSION'=>'failure','TRIGGER_HEAD_SHA'=>'abc'}],
            ['missing workflow head', false, {'TRIGGER_EVENT'=>'workflow_run','WORKFLOW_NAME'=>'AI review contract','WORKFLOW_EVENT'=>'pull_request','WORKFLOW_CONCLUSION'=>'success'}],
          ]
          Tempfile.create(['cooperation-auth', '.sh']) do |file|
            file.write(script); file.flush; File.chmod(0o700, file.path)
            cases.each do |name, expected, values|
              _out, err, status = Open3.capture3(base.merge(values), 'bash', file.path)
              raise "authorization matrix failed for #{name}: #{err}" unless status.success? == expected
            end
          end
          RUBY

      - name: Verify deterministic PR resolution
        run: |
          ruby <<'RUBY'
          require 'yaml'
          workflow = YAML.load_file('.github/workflows/ai-review-cooperation.yml')
          steps = workflow.dig('jobs', 'report', 'steps')
          checkout_index = steps.index { |step| step['name'] == 'Checkout trusted reporter code' }
          resolve_index = steps.index { |step| step['name'] == 'Resolve workflow-run pull request' }
          configure_index = steps.index { |step| step['name'] == 'Configure cooperation temp paths' }
          raise 'missing PR resolution step' unless resolve_index
          raise 'PR resolution must run after trusted checkout and before configuration' unless checkout_index < resolve_index && resolve_index < configure_index
          run = steps[resolve_index]['run'].to_s
          required = [
            'commits/${TRIGGER_HEAD_SHA}/pulls?per_page=100',
            '.state == "open"', '.head.sha == $sha', '.base.repo.full_name == $repo',
            'Expected exactly one open PR', 'match_count', 'GITHUB_ENV', 'PR_NUMBER=',
          ]
          missing = required.reject { |token| run.include?(token) }
          raise "incomplete PR resolver: #{missing.inspect}" unless missing.empty?
          RUBY
          fixture='[
            {"number":184,"state":"open","head":{"sha":"abc"},"base":{"repo":{"full_name":"owner/repo"}}},
            {"number":185,"state":"closed","head":{"sha":"abc"},"base":{"repo":{"full_name":"owner/repo"}}},
            {"number":186,"state":"open","head":{"sha":"other"},"base":{"repo":{"full_name":"owner/repo"}}}
          ]'
          matches="$(printf '%s' "$fixture" | jq --arg sha abc --arg repo owner/repo '[.[] | select(.state == "open" and .head.sha == $sha and .base.repo.full_name == $repo)]')"
          test "$(printf '%s' "$matches" | jq 'length')" = '1'
          test "$(printf '%s' "$matches" | jq -r '.[0].number')" = '184'

      - name: Verify workflow-run exact-head recheck
        run: |
          grep -Fq 'Workflow trigger is not bound to the current PR head' .github/workflows/ai-review-cooperation.yml
          grep -Fq '[ "${TRIGGER_EVENT}" = "workflow_run" ] && [ "${TRIGGER_HEAD_SHA}" != "${HEAD_SHA}" ]' .github/workflows/ai-review-cooperation.yml

      - name: Verify complete evidence collection
        run: |
          grep -Fq 'check-runs?per_page=100' .github/workflows/ai-review-cooperation.yml
          grep -Fq 'statuses?per_page=100' .github/workflows/ai-review-cooperation.yml
          grep -Fq 'STATUSES_FILE' .github/workflows/ai-review-cooperation.yml
          grep -Fq -- '--paginate' .github/workflows/ai-review-cooperation.yml
          grep -Fq 'scripts/fetch-review-threads.py' .github/workflows/ai-review-cooperation.yml
          grep -Fq 'hasNextPage' scripts/fetch-review-threads.py
          grep -Fq 'EVIDENCE_TRUNCATED' scripts/ai-review-cooperation.py
          grep -Fq 'PR head changed before publishing' .github/workflows/ai-review-cooperation.yml

      - name: Verify failure diagnostics cannot spoof evidence
        run: |
          ruby <<'RUBY'
          require 'yaml'
          trusted = '<!-- ai-review-cooperation -->'
          diagnostic = '<!-- ai-review-cooperation-diagnostic -->'
          raise 'diagnostic aliases trusted marker' if diagnostic.include?(trusted)
          workflow = YAML.load_file('.github/workflows/ai-review-cooperation.yml')
          step = workflow.dig('jobs','report','steps').find { |item| item['name'] == 'Publish reporter failure diagnostic' }
          raise 'missing failure diagnostic' unless step && step['if'].to_s.include?('failure()')
          run = step['run'].to_s
          required = [diagnostic, 'RESOLVE_OUTCOME', 'existing_diagnostic_id', '--method PATCH', '--method POST']
          missing = required.reject { |token| run.include?(token) }
          raise "incomplete diagnostic: #{missing.inspect}" unless missing.empty?
          forbidden = ['toJson(github)', '$' + '{{ github.token }}', 'GH_TOKEN:', 'cat <<']
          leaked = forbidden.select { |token| run.include?(token) }
          raise "diagnostic leaks context: #{leaked.inspect}" unless leaked.empty?
          ledger = File.read('.github/workflows/review-ledger.yml', encoding: 'UTF-8')
          reports = ledger.split('const reports = issueComments.filter',2)[1].split('const report =',2)[0]
          raise 'ledger accepts diagnostics' if reports.include?(diagnostic)
          RUBY

      - name: Verify causal trust and ledger boundaries
        run: |
          python3 - <<'PY'
          from pathlib import Path
          script = Path('scripts/ai-review-cooperation.py').read_text(encoding='utf-8')
          policy = Path('docs/ai-review-cooperation-policy.md').read_text(encoding='utf-8')
          ledger = Path('.github/workflows/review-ledger.yml').read_text(encoding='utf-8')
          required = [
              '<!-- ai-review-cooperation -->', 'BOT_LOGINS', "login_of(item) == 'github-actions[bot]'",
              'REQUIRED_CHECKS', 'BOOTSTRAP_NOT_ON_DEFAULT_BRANCH', 'NO_CURRENT_HEAD_EVIDENCE',
              'FIX_THEN_RERUN', 'flowchart TD', 'not a majority vote',
              'STALE_HEAD', 'PERMISSION_ERROR', 'const codeRabbitEvidence = [',
              'no native CodeRabbit exact-head evidence', "item.user?.login === 'github-actions[bot]'",
          ]
          corpus = script + policy + ledger
          missing = [token for token in required if token not in corpus]
          reports = ledger.split('const reports = issueComments.filter',1)[1].split('const report =',1)[0]
          if 'trustedAssociations' in reports:
              missing.append('bot-only cooperation report trust boundary')
          if missing:
              raise SystemExit('Missing cooperation invariants: ' + ', '.join(missing))
          PY

      - name: Verify job-scoped cancellation
        run: |
          ruby -e "require 'yaml'; workflow = YAML.load_file('.github/workflows/ai-review-cooperation.yml'); raise 'workflow-level concurrency is unsafe' if workflow.key?('concurrency'); concurrency = workflow.dig('jobs','report','concurrency'); raise 'missing safe concurrency' unless concurrency && concurrency['cancel-in-progress'] == true && concurrency['group'].include?('github.run_id') && concurrency['group'].include?('workflow-{0}')"
