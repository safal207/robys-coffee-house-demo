name: Asset compatibility

on:
  pull_request:
    paths:
      - ".github/workflows/asset-compatibility.yml"
      - "src/products/gallery-v2/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  convert:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Convert gallery posters to WebP
        run: |
          mkdir -p gallery-compatible
          for source in src/products/gallery-v2/*.avif; do
            name="$(basename "${source%.avif}")"
            ffmpeg -hide_banner -loglevel error \
              -i "$source" \
              -frames:v 1 -c:v libwebp -q:v 90 \
              "gallery-compatible/${name}.webp"
          done
          file gallery-compatible/*.webp
      - uses: actions/upload-artifact@v4
        with:
          name: gallery-compatible-webp
          path: gallery-compatible/*.webp
          if-no-files-found: error
          retention-days: 1
