name: Sync gallery generated files

on:
  pull_request:
    paths:
      - ".github/workflows/sync-gallery-generated.yml"
      - "src/featured-gallery.ts"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Update static fallback and generated runtime
        run: |
          python3 <<'PY'
          from pathlib import Path
          path = Path('index.html')
          html = path.read_text()
          html = html.replace('content="20260626-2"', 'content="20260626-3"')
          products = ['latte', 'san-sebastian', 'iced-latte', 'nutella-croissant', 'lotus-cheesecake']
          for product in products:
              html = html.replace(
                  f'src/products/gallery-v2/{product}.avif?v=20260626-2',
                  f'src/products/gallery-v3/{product}.webp?v=20260626-3'
              )
          path.write_text(html)
          PY
          npm ci
          npm run build
      - name: Commit synchronized files
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add featured-gallery.js index.html
          if git diff --cached --quiet; then
            echo 'Generated files are already current.'
          else
            git commit -m 'build: sync WebP gallery runtime [skip ci]'
            git push origin HEAD:${{ github.head_ref }}
          fi
