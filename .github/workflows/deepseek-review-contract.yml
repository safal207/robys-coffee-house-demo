name: DeepSeek review contract

on:
  pull_request:
    paths:
      - .github/workflows/deepseek-review.yml
      - .github/workflows/deepseek-review-contract.yml
      - scripts/deepseek-review.py
      - scripts/test-deepseek-review.py

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout pull request
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Compile reviewer scripts
        run: python3 -m py_compile scripts/deepseek-review.py scripts/test-deepseek-review.py

      - name: Run offline reviewer contracts
        run: python3 scripts/test-deepseek-review.py -v

      - name: Parse workflow YAML
        run: ruby -e "require 'yaml'; YAML.parse_file('.github/workflows/deepseek-review.yml'); YAML.parse_file('.github/workflows/deepseek-review-contract.yml')"

      - name: Verify pinned inference interface
        run: |
          grep -Fq 'actions/ai-inference@b81b2afb8390ee6839b494a404766bef6493c7d9' .github/workflows/deepseek-review.yml
          grep -Fq 'max-tokens: 3000' .github/workflows/deepseek-review.yml
          ! grep -Fq 'max-completion-tokens' .github/workflows/deepseek-review.yml
          grep -Fq 'ref: ${{ github.event.repository.default_branch }}' .github/workflows/deepseek-review.yml
          grep -Fq 'persist-credentials: false' .github/workflows/deepseek-review.yml
