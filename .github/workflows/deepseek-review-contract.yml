name: DeepSeek review contract

on:
  pull_request:
    paths:
      - .github/workflows/deepseek-review.yml
      - .github/workflows/deepseek-review-contract.yml
      - scripts/deepseek-review.py
      - scripts/test-deepseek-review.py

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout pull request
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Compile reviewer scripts
        run: python3 -m py_compile scripts/deepseek-review.py scripts/test-deepseek-review.py

      - name: Run offline reviewer contracts
        run: python3 scripts/test-deepseek-review.py -v

      - name: Parse workflow YAML
        run: ruby -e "require 'yaml'; YAML.parse_file('.github/workflows/deepseek-review.yml'); YAML.parse_file('.github/workflows/deepseek-review-contract.yml')"

      - name: Verify job-scoped cancellation
        run: |
          ruby -e "require 'yaml'; workflow = YAML.load_file('.github/workflows/deepseek-review.yml'); raise 'workflow-level concurrency can be cancelled by untrusted comments' if workflow.key?('concurrency'); concurrency = workflow.dig('jobs', 'review', 'concurrency'); raise 'missing trusted job concurrency' unless concurrency && concurrency['cancel-in-progress'] == true && concurrency['group'].include?('deepseek-review-')"

      - name: Verify official API and trust boundaries
        run: |
          grep -Fq 'DEEPSEEK_API_KEY:' .github/workflows/deepseek-review.yml
          grep -Fq 'secrets.DEEPSEEK_API_KEY' .github/workflows/deepseek-review.yml
          grep -Fq 'python3 scripts/deepseek-review.py infer' .github/workflows/deepseek-review.yml
          grep -Fq 'Publish or update reviewer result' .github/workflows/deepseek-review.yml
          grep -Fq -- '--method PATCH' .github/workflows/deepseek-review.yml
          grep -Fq 'EXPECTED_HEAD:' .github/workflows/deepseek-review.yml
          grep -Fq 'PR head changed before publishing' .github/workflows/deepseek-review.yml
          grep -Fq 'runner.temp' .github/workflows/deepseek-review.yml
          ! grep -Fq '/tmp/deepseek-review-' scripts/deepseek-review.py
          grep -Fq '<!-- deepseek-pr-review -->' scripts/deepseek-review.py
          grep -Fq 'https://api.deepseek.com/chat/completions' scripts/deepseek-review.py
          grep -Fq "'deepseek-v4-flash'" scripts/deepseek-review.py
          grep -Fq "'deepseek-v4-pro'" scripts/deepseek-review.py
          ! grep -Fq 'actions/ai-inference@' .github/workflows/deepseek-review.yml
          ! grep -Fq 'models: read' .github/workflows/deepseek-review.yml
          ! grep -Fq 'pull_request_target' .github/workflows/deepseek-review.yml
          grep -Fq 'default_branch' .github/workflows/deepseek-review.yml
          grep -Fq 'persist-credentials: false' .github/workflows/deepseek-review.yml
          grep -Fq "author_association == 'OWNER'" .github/workflows/deepseek-review.yml
          grep -Fq "author_association == 'MEMBER'" .github/workflows/deepseek-review.yml
          grep -Fq "author_association == 'COLLABORATOR'" .github/workflows/deepseek-review.yml
          ruby <<'RUBY'
          require 'yaml'
          workflow = YAML.load_file('.github/workflows/deepseek-review.yml')
          permissions = workflow.fetch('permissions')
          expected = {
            'contents' => 'read',
            'issues' => 'write',
            'pull-requests' => 'read',
          }
          raise "unexpected permissions: #{permissions.inspect}" unless permissions == expected
          RUBY
