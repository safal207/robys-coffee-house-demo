name: Adversarial browser contract

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: '17 2 * * 4'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: adversarial-browser-${{ github.ref }}
  cancel-in-progress: true

jobs:
  browser-probes:
    name: ADV-001 browser probes
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Install isolated browser runtime
        run: npm install --no-save --package-lock=false playwright@1.52.0
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
      - name: Run browser probes
        run: |
          mkdir -p .artifacts
          set -o pipefail
          node scripts/adversarial-browser.mjs 2>&1 | tee .artifacts/adversarial-browser.log
      - name: Upload evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: adversarial-browser-${{ github.run_id }}
          path: |
            .artifacts/adversarial-browser-report.json
            .artifacts/adversarial-browser.log
          if-no-files-found: warn
          retention-days: 30
