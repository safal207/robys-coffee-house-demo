name: Adversarial browser contract

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: '17 2 * * 4'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: adversarial-browser-${{ github.ref }}
  cancel-in-progress: true

jobs:
  browser-probes:
    name: ADV-001 browser probes
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Verify encoded Android package
        run: node scripts/verify-direct-android.mjs
      - name: Install isolated browser runtime
        run: npm install --no-save --package-lock=false playwright@1.53.2
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
      - name: Run browser probes
        run: |
          mkdir -p .artifacts
          set -o pipefail
          node scripts/adversarial-browser.mjs 2>&1 | tee .artifacts/adversarial-browser.log
      - name: Run Android download and offline probes
        env:
          BASE_URL: http://127.0.0.1:4173
        run: |
          python3 -m http.server 4173 --bind 127.0.0.1 > .artifacts/offline-server.log 2>&1 &
          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:4173/index.html > /dev/null; then
              break
            fi
            sleep 1
          done
          set -o pipefail
          node scripts/verify-offline-browser.mjs 2>&1 | tee .artifacts/offline-android.log
      - name: Upload evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: adversarial-browser-${{ github.run_id }}
          path: |
            .artifacts/adversarial-browser-report.json
            .artifacts/adversarial-browser.log
            .artifacts/offline-android.log
            .artifacts/offline-server.log
          if-no-files-found: warn
          retention-days: 30
