name: UX integrity preview

on:
  pull_request:

permissions:
  contents: read

jobs:
  generate-integrity-preview:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout exact head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Generate exact-head integrity manifest
        run: npm run integrity:generate

      - name: Upload generated manifest
        uses: actions/upload-artifact@v4
        with:
          name: ux-integrity-preview-${{ github.run_id }}
          path: integrity-manifest.json
          if-no-files-found: error
          retention-days: 1
