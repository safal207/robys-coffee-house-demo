name: Sync analytics manifest once

on:
  push:
    branches:
      - fix/analytics-destination-boundaries-v2
    paths:
      - .github/workflows/sync-analytics-manifest-once.yml

permissions:
  contents: write

jobs:
  sync:
    if: github.event.head_commit.message == 'ci: sync exact analytics manifest once'
    runs-on: ubuntu-24.04
    steps:
      - name: Check out branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: fix/analytics-destination-boundaries-v2
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24.4.1
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Regenerate exact manifest
        run: |
          npm run build
          npm run integrity:generate

      - name: Commit exact generated bytes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add integrity-manifest.json
          git diff --cached --quiet && exit 0
          git commit -m "chore: sync exact analytics integrity manifest [skip ci]"
          git push origin HEAD:fix/analytics-destination-boundaries-v2
