name: Visual regression

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  stage-seo-artifact:
    if: github.event.pull_request.head.ref == 'feat/seo-social-preview'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout SEO branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Apply SEO metadata
        run: python scripts/stage-seo-preview.py

      - name: Rebuild integrity metadata
        run: |
          set -euo pipefail
          npm ci
          npm run build
          npm run integrity:generate

      - name: Upload staged SEO files
        uses: actions/upload-artifact@v4
        with:
          name: staged-seo-${{ github.run_id }}
          path: |
            index.html
            menu.html
            sitemap.xml
            integrity-manifest.json
            app.js
            featured-gallery.js
            social-offer.js
          if-no-files-found: error
          retention-days: 2

  visual-regression:
    name: VISUAL-001 screenshot diff
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout current branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          path: current

      - name: Checkout pull request base
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha || 'main' }}
          path: baseline

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: current/package-lock.json

      - name: Install current dependencies
        working-directory: current
        run: npm ci

      - name: Install baseline dependencies
        working-directory: baseline
        run: npm ci

      - name: Build current branch
        working-directory: current
        run: npm run build

      - name: Verify Instagram tools contract
        working-directory: current
        run: npm run verify:instagram-tools

      - name: Build base branch
        working-directory: baseline
        run: npm run build

      - name: Install visual comparison tools
        working-directory: current
        run: npm install --no-save --package-lock=false playwright@1.52.0 pixelmatch@6.0.0 pngjs@7.0.0

      - name: Install deterministic Chromium
        working-directory: current
        run: npx playwright install --with-deps chromium

      - name: Compare screenshots with base branch
        id: screenshot_compare
        continue-on-error: true
        working-directory: current
        env:
          VISUAL_CURRENT_DIR: ${{ github.workspace }}/current
          VISUAL_BASELINE_DIR: ${{ github.workspace }}/baseline
          VISUAL_RESULTS_DIR: ${{ github.workspace }}/current/visual-results
        run: node scripts/visual-regression.mjs

      - name: Validate reviewed visual change
        working-directory: current
        env:
          VISUAL_RESULTS_DIR: ${{ github.workspace }}/current/visual-results
        run: node scripts/verify-reviewed-visual-change.mjs

      - name: Audit rapid mobile menu scrolling
        working-directory: current
        env:
          SCROLL_RESULTS_DIR: ${{ github.workspace }}/current/visual-results/scroll-audit
        run: node scripts/menu-scroll-regression.mjs

      - name: Upload visual evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-regression-${{ github.run_id }}
          path: current/visual-results
          if-no-files-found: warn
          retention-days: 14
