name: Apply pairing catalog parity

on:
  push:
    branches:
      - fix/close-pairing-catalog-tail

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout fresh main-based branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: fix/close-pairing-catalog-tail
          persist-credentials: true

      - name: Synchronize pairing catalog with active journeys
        run: |
          python - <<'PY'
          from pathlib import Path

          menu_path = Path("menu-data.js")
          menu = menu_path.read_text(encoding="utf-8")
          old = '''      {
                id: "cool-lime-macaron-pairing",
                name: { tr: "Cool Lime + Makaron", en: "Cool Lime + Macaron", ru: "Cool Lime + макарон" },
                description: {
                  tr: "Taste Journey eşleşme teklifi",
                  en: "Taste Journey pairing offer",
                  ru: "Предложение Taste Journey"
                },
                price: 290
              }'''.replace("        ", "")
          new = '''      {
                id: "cool-lime-macaron-pairing",
                journeyId: "cool-lime-macaron",
                name: { tr: "Cool Lime + Makaron", en: "Cool Lime + Macaron", ru: "Cool Lime + макарон" },
                description: {
                  tr: "Taste Journey eşleşme teklifi",
                  en: "Taste Journey pairing offer",
                  ru: "Предложение Taste Journey"
                },
                price: 290
              },
              {
                id: "iced-san-sebastian-pairing",
                journeyId: "iced-san-sebastian",
                name: { tr: "Buzlu Latte + San Sebastian", en: "Iced Latte + San Sebastian Cheesecake", ru: "Айс-латте + чизкейк Сан-Себастьян" },
                description: {
                  tr: "Taste Journey eşleşme teklifi · güncel menü toplamı",
                  en: "Taste Journey pairing offer · current menu total",
                  ru: "Предложение Taste Journey · сумма текущих цен меню"
                },
                price: 370
              }'''.replace("        ", "")
          if old not in menu:
              raise SystemExit("Expected singleton pairing block was not found")
          menu_path.write_text(menu.replace(old, new, 1), encoding="utf-8")

          journeys_path = Path("discover-journeys-v2.js")
          journeys = journeys_path.read_text(encoding="utf-8")
          old_export = 'const ACTIVE_PAIRING_IDS = ["cool-lime-macaron", "iced-san-sebastian"];'
          new_export = 'export const ACTIVE_PAIRING_IDS = ["cool-lime-macaron", "iced-san-sebastian"];'
          if old_export not in journeys:
              raise SystemExit("Expected ACTIVE_PAIRING_IDS declaration was not found")
          journeys_path.write_text(journeys.replace(old_export, new_export, 1), encoding="utf-8")

          verifier = Path("scripts/verify-pairing-cta.mjs")
          source = verifier.read_text(encoding="utf-8")
          parity_import = 'import "./verify-pairing-catalog-parity.mjs";\n'
          if parity_import not in source:
              source = source.replace('import "./verify-pairing-cta-static.mjs";\n', 'import "./verify-pairing-cta-static.mjs";\n' + parity_import, 1)
          verifier.write_text(source, encoding="utf-8")
          PY

          cat > scripts/verify-pairing-catalog-parity.mjs <<'EOF'
          import assert from "node:assert/strict";
          import { menuCategories } from "../menu-data.js";
          import { ACTIVE_PAIRING_IDS, journeys } from "../discover-journeys-v2.js";

          const pairingCategory = menuCategories.find((category) => category.id === "pairing-offers");
          assert.ok(pairingCategory, "pairing-offers category is missing");

          const offers = pairingCategory.items ?? [];
          assert.ok(offers.length >= 2, "pairing destination must expose at least two active offers");

          const journeyIds = ACTIVE_PAIRING_IDS;
          const journeyById = new Map(journeys.map((journey) => [journey.id, journey]));
          const offerIds = offers.map((offer) => offer.journeyId);

          assert.equal(new Set(journeyIds).size, journeyIds.length, "ACTIVE_PAIRING_IDS contains duplicates");
          assert.equal(new Set(offerIds).size, offerIds.length, "menu pairing offers contain duplicate journeyId values");
          assert.deepEqual([...offerIds].sort(), [...journeyIds].sort(), "menu pairing offers must match active Discover journeys exactly");

          for (const offer of offers) {
            assert.equal(typeof offer.journeyId, "string", `${offer.id}: journeyId is required`);
            const journey = journeyById.get(offer.journeyId);
            assert.ok(journey, `${offer.id}: referenced journey does not exist`);
            assert.deepEqual(offer.name, journey.title, `${offer.id}: localized title drifted from Discover`);
            assert.ok(Number.isInteger(offer.price) && offer.price > 0, `${offer.id}: price must be a positive integer`);
            assert.ok(menuCategories.some((category) => category.id === journey.primary.category), `${offer.id}: primary category is missing from menu`);
            assert.ok(menuCategories.some((category) => category.id === journey.companion.category), `${offer.id}: companion category is missing from menu`);
          }

          const icedOffer = offers.find((offer) => offer.journeyId === "iced-san-sebastian");
          assert.equal(icedOffer?.price, 370, "Iced Latte + San Sebastian must use the current 180 + 190 menu total");

          console.log(`✅ PAIRING-CATALOG-001: ${offers.length} menu offers exactly match ${journeyIds.length} active Discover journeys.`);
          EOF

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Verify parity and refresh generated evidence
        run: |
          node scripts/verify-pairing-catalog-parity.mjs
          npm run build
          npm run integrity:generate

      - name: Commit exact catalog correction
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: close pairing catalog delivery tail"
          git push origin HEAD:fix/close-pairing-catalog-tail
