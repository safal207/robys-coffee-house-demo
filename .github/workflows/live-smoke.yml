name: Live customer journey smoke

on:
  push:
    branches: [main]
  schedule:
    - cron: '17 5 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: live-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  live-smoke:
    name: LIVE-001 published browser smoke
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Checkout expected release
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install repository dependencies
        run: npm ci

      - name: Install smoke browser tooling
        run: npm install --no-save --package-lock=false playwright@1.52.0

      - name: Install deterministic Chromium
        run: npx playwright install --with-deps chromium

      - name: Verify published customer journeys
        env:
          ROBYS_LIVE_BASE: https://safal207.github.io/robys-coffee-house-demo/
          ROBYS_LIVE_ATTEMPTS: 15
          ROBYS_LIVE_DELAY_MS: 20000
          ROBYS_LIVE_REPORT: live-smoke-report.json
        run: node scripts/live-smoke.mjs

      - name: Upload live smoke evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: live-smoke-${{ github.run_id }}
          path: live-smoke-report.json
          if-no-files-found: warn
          retention-days: 14
