name: Grok PR review

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: read
  pull-requests: write

jobs:
  review:
    if: >-
      github.event.issue.pull_request != null &&
      (github.event.comment.body == '/grok review' ||
       github.event.comment.body == '/grok deep-review') &&
      (github.event.comment.author_association == 'OWNER' ||
       github.event.comment.author_association == 'MEMBER' ||
       github.event.comment.author_association == 'COLLABORATOR')
    concurrency:
      group: grok-review-${{ github.event.issue.number }}
      cancel-in-progress: true
    runs-on: ubuntu-latest
    timeout-minutes: 12
    env:
      GH_TOKEN: ${{ github.token }}
      REPOSITORY: ${{ github.repository }}
      PR_NUMBER: ${{ github.event.issue.number }}

    steps:
      - name: Checkout trusted reviewer code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.repository.default_branch }}
          persist-credentials: false
          show-progress: false

      - name: Configure reviewer temp paths
        run: |
          prefix="${RUNNER_TEMP}/grok-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          {
            echo "PR_JSON_FILE=${prefix}-pr.json"
            echo "DIFF_FILE=${prefix}-pr.diff"
            echo "CURRENT_PR_JSON_FILE=${prefix}-current-pr.json"
            echo "PROMPT_FILE=${prefix}-prompt.txt"
            echo "RESPONSE_FILE=${prefix}-response.txt"
            echo "COMMENT_FILE=${prefix}-comment.json"
            echo "ERROR_FILE=${prefix}-error.json"
          } >> "${GITHUB_ENV}"

      - name: Fetch current PR input
        run: |
          gh api "repos/${REPOSITORY}/pulls/${PR_NUMBER}" > "${PR_JSON_FILE}"
          head_repo="$(jq -r '.head.repo.full_name' "${PR_JSON_FILE}")"
          test "${head_repo}" = "${REPOSITORY}"
          gh api -H 'Accept: application/vnd.github.v3.diff' \
            "repos/${REPOSITORY}/pulls/${PR_NUMBER}" > "${DIFF_FILE}"

      - name: Prepare current-head review input
        id: prepare
        env:
          COMMAND: ${{ github.event.comment.body }}
          GROK_MODEL: grok-4.5
        run: python3 scripts/grok-review.py prepare

      - name: Run xAI Grok review
        env:
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          MODEL: ${{ steps.prepare.outputs.model }}
          MODE: ${{ steps.prepare.outputs.mode }}
        run: python3 scripts/grok-review.py infer

      - name: Re-read PR head
        run: gh api "repos/${REPOSITORY}/pulls/${PR_NUMBER}" > "${CURRENT_PR_JSON_FILE}"

      - name: Build current-head review comment
        env:
          HEAD_SHA: ${{ steps.prepare.outputs.head_sha }}
          MODEL: ${{ steps.prepare.outputs.model }}
          MODE: ${{ steps.prepare.outputs.mode }}
          TRUNCATED: ${{ steps.prepare.outputs.truncated }}
        run: python3 scripts/grok-review.py publish

      - name: Build failure comment
        if: failure()
        env:
          HEAD_SHA: ${{ steps.prepare.outputs.head_sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: python3 scripts/grok-review.py failure

      - name: Publish reviewer result
        if: always()
        env:
          EXPECTED_HEAD: ${{ steps.prepare.outputs.head_sha }}
        run: |
          test -f "${COMMENT_FILE}"
          if [ -n "${EXPECTED_HEAD}" ]; then
            current_head="$(gh api "repos/${REPOSITORY}/pulls/${PR_NUMBER}" --jq '.head.sha')"
            if [ "${current_head}" != "${EXPECTED_HEAD}" ]; then
              echo "PR head changed before publishing: ${EXPECTED_HEAD} -> ${current_head}" >&2
              exit 1
            fi
          fi
          gh api --method POST "repos/${REPOSITORY}/issues/${PR_NUMBER}/comments" \
            --input "${COMMENT_FILE}"
