name: Agent refresh integrity

on:
  push:
    branches:
      - agent/clean-pairing-cards

permissions:
  contents: write

jobs:
  refresh:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/clean-pairing-cards
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Regenerate public integrity manifest
        run: node scripts/generate-integrity-manifest.mjs
      - name: Commit generated evidence
        run: |
          if git diff --quiet -- integrity-manifest.json; then
            echo "Integrity manifest is already current."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add integrity-manifest.json
          git commit -m "chore: refresh integrity manifest"
          git push origin HEAD:agent/clean-pairing-cards
