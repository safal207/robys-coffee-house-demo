name: Virtual review panel verification

on:
  issue_comment:
    types: [created]

permissions: {}

jobs:
  verify:
    if: >-
      github.event.issue.pull_request != null &&
      github.event.issue.state == 'open' &&
      startsWith(github.event.comment.body, '/virtual-panel verify ') &&
      (github.event.comment.author_association == 'OWNER' ||
       github.event.comment.author_association == 'MEMBER' ||
       github.event.comment.author_association == 'COLLABORATOR' ||
       github.event.comment.user.login == github.repository_owner)
    name: Verify exact-head virtual panel record
    permissions:
      contents: read
      issues: read
      pull-requests: read
    runs-on: ubuntu-latest
    timeout-minutes: 6
    env:
      GH_TOKEN: ${{ github.token }}
      REPOSITORY: ${{ github.repository }}
      PR_NUMBER: ${{ github.event.issue.number }}
      COMMAND_BODY: ${{ github.event.comment.body }}
    steps:
      - name: Check out trusted validator
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.repository.default_branch }}
          path: trusted
          persist-credentials: false
          show-progress: false

      - name: Resolve command and current pull request head
        run: |
          set -euo pipefail
          record_path="$(printf '%s\n' "${COMMAND_BODY}" | head -n 1 | sed 's#^/virtual-panel verify ##')"
          if [ "${record_path}" != "qa/virtual-review-panel.example.json" ] &&
             ! [[ "${record_path}" =~ ^qa/virtual-panels/[A-Za-z0-9._/-]+\.json$ ]]; then
            echo "Record path must be the canonical example or qa/virtual-panels/<safe-name>.json" >&2
            exit 1
          fi
          if [[ "${record_path}" == *".."* || "${record_path}" == *"//"* ]]; then
            echo "Record path contains a forbidden traversal or empty segment." >&2
            exit 1
          fi
          pull_json="${RUNNER_TEMP}/pull.json"
          gh api "repos/${REPOSITORY}/pulls/${PR_NUMBER}" > "${pull_json}"
          state="$(jq -r '.state' "${pull_json}")"
          current_head="$(jq -r '.head.sha' "${pull_json}")"
          if [ "${state}" != "open" ] || ! [[ "${current_head}" =~ ^[0-9a-f]{40}$ ]]; then
            echo "Virtual panel verification requires an open PR with a full head SHA." >&2
            exit 1
          fi
          {
            echo "RECORD_PATH=${record_path}"
            echo "CURRENT_HEAD=${current_head}"
            echo "RECORD_FILE=${RUNNER_TEMP}/virtual-review-panel.json"
          } >> "${GITHUB_ENV}"

      - name: Download record bytes from exact pull request head
        run: |
          set -euo pipefail
          gh api "repos/${REPOSITORY}/contents/${RECORD_PATH}?ref=${CURRENT_HEAD}" --jq '.content' |
            tr -d '\n' | base64 --decode > "${RECORD_FILE}"
          test -s "${RECORD_FILE}"

      - name: Validate schema, semantic rules, and embedded evidence bytes
        run: |
          python3 trusted/scripts/validate_virtual_panel_schema.py \
            trusted/qa/virtual-review-panel.schema.json "${RECORD_FILE}"
          python3 trusted/scripts/verify_virtual_panel_hardening.py "${RECORD_FILE}"
          python3 trusted/scripts/virtual_review_panel.py validate "${RECORD_FILE}"

      - name: Verify subject and exact-head identity
        run: |
          python3 - <<'PY'
          import json, os
          from pathlib import Path
          record=json.loads(Path(os.environ["RECORD_FILE"]).read_text())
          subject=record["subject"]
          record_head=subject["head_sha"]
          current_head=os.environ["CURRENT_HEAD"]
          if subject["repository"] != os.environ["REPOSITORY"]: raise SystemExit("record repository does not match the workflow repository")
          if subject["pull_request"] != int(os.environ["PR_NUMBER"]): raise SystemExit("record pull request does not match the command target")
          if record_head != current_head: raise SystemExit(f"record_head != current_head: {record_head} != {current_head}")
          if record["activation"]["external_lane_satisfied"] is not False: raise SystemExit("virtual panel must not satisfy the external reviewer lane")
          PY

      - name: Upload verified advisory record
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: virtual-review-panel-pr-${{ github.event.issue.number }}-${{ env.CURRENT_HEAD }}
          path: ${{ env.RECORD_FILE }}
          if-no-files-found: error
          retention-days: 14

      - name: Summarize advisory boundary
        run: |
          {
            echo "## Virtual review panel verified"
            echo
            echo "- PR: #${PR_NUMBER}"
            echo "- Exact head: \`${CURRENT_HEAD}\`"
            echo "- Record: \`${RECORD_PATH}\`"
            echo "- Embedded evidence bytes: SHA-256 and byte size recomputed"
            echo "- External reviewer lane satisfied: **no**"
            echo "- Authority: advisory only; no execution, approval, or merge"
          } >> "${GITHUB_STEP_SUMMARY}"
