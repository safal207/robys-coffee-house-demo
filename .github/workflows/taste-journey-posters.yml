name: Taste Journey poster contract

on:
  pull_request:
    paths:
      - ".github/workflows/taste-journey-posters.yml"
      - "discover-rotation.css"
      - "discover-rotation.js"
      - "discover.html"
      - "integrity-manifest.json"
      - "package.json"
      - "scripts/verify-taste-journey-posters.mjs"
      - "src/discover-rotation.ts"
      - "src/pairings-data/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  verify-posters:
    name: TASTE-POSTER-001 full poster gate
    runs-on: ubuntu-latest
    steps:
      - name: Check out pull request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Build generated runtime
        run: npm run build

      - name: Verify final poster assets and renderer
        run: npm run verify:taste-journey-posters

      - name: Generate integrity manifest
        run: npm run integrity:generate

      - name: Upload generated manifest
        uses: actions/upload-artifact@v4
        with:
          name: taste-journey-integrity-manifest
          path: integrity-manifest.json
          if-no-files-found: error
          retention-days: 7

      - name: Synchronize manifest on the pull request branch
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          HEAD_BRANCH: ${{ github.event.pull_request.head.ref }}
        with:
          script: |
            const fs = require('node:fs');
            const path = 'integrity-manifest.json';
            const content = fs.readFileSync(path).toString('base64');
            const current = await github.rest.repos.getContent({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path,
              ref: process.env.HEAD_BRANCH
            });
            const existing = Buffer.from(current.data.content, 'base64');
            const generated = Buffer.from(content, 'base64');
            if (existing.equals(generated)) {
              core.info('Integrity manifest is already current.');
              return;
            }
            await github.rest.repos.createOrUpdateFileContents({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path,
              branch: process.env.HEAD_BRANCH,
              message: 'chore: synchronize integrity manifest',
              sha: current.data.sha,
              content
            });
