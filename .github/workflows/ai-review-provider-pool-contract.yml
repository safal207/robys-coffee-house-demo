name: AI review provider pool contract

on:
  pull_request:
    paths:
      - .github/workflows/ai-review-contract.yml
      - .github/workflows/ai-review-provider-pool-contract.yml
      - scripts/verify-ai-review-contract.cjs
      - scripts/test-ai-review-provider-pool.cjs
      - docs/ai-review-cooperation-policy.md

concurrency:
  group: ai-review-provider-pool-contract-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    name: Verify provider-pool contract
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout pull request
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
          show-progress: false

      - name: Run provider-pool unit contract
        run: |
          node --check scripts/verify-ai-review-contract.cjs
          node --check scripts/test-ai-review-provider-pool.cjs
          node scripts/test-ai-review-provider-pool.cjs

      - name: Parse workflow YAML
        run: |
          ruby -e "require 'yaml'; YAML.parse_file('.github/workflows/ai-review-contract.yml'); YAML.parse_file('.github/workflows/ai-review-provider-pool-contract.yml')"

      - name: Verify workflow structure and least privilege
        run: |
          ruby <<'RUBY'
          require 'yaml'

          trusted = YAML.load_file('.github/workflows/ai-review-contract.yml')
          expected_permissions = {
            'actions' => 'read', 'contents' => 'read', 'issues' => 'read',
            'pull-requests' => 'read',
          }
          raise "unexpected trusted workflow name: #{trusted['name'].inspect}" unless trusted['name'] == 'AI review contract'
          raise "unexpected permissions: #{trusted['permissions'].inspect}" unless trusted['permissions'] == expected_permissions

          trusted_triggers = trusted['on'] || trusted[true]
          raise "unexpected trusted triggers: #{trusted_triggers.inspect}" unless trusted_triggers.is_a?(Hash) && trusted_triggers.keys == ['pull_request']
          pull_request_trigger = trusted_triggers['pull_request']
          expected_types = ['opened', 'synchronize', 'reopened']
          raise "unexpected pull_request trigger: #{pull_request_trigger.inspect}" unless pull_request_trigger.is_a?(Hash) && pull_request_trigger.keys == ['types'] && pull_request_trigger['types'] == expected_types

          verify_job = trusted.dig('jobs', 'verify')
          raise 'missing trusted verify job' unless verify_job.is_a?(Hash)
          raise "unexpected trusted job name: #{verify_job['name'].inspect}" unless verify_job['name'] == 'Verify exact-head independent review'
          raise "unexpected trusted runner: #{verify_job['runs-on'].inspect}" unless verify_job['runs-on'] == 'ubuntu-latest'
          raise "unexpected trusted timeout: #{verify_job['timeout-minutes'].inspect}" unless verify_job['timeout-minutes'] == 17

          expected_ref = '$' + '{{ github.event.repository.default_branch }}'
          expected_script = "const verify = require('./scripts/verify-ai-review-contract.cjs');\nawait verify({ github, context, core });\n"
          expected_steps = [
            {
              'name' => 'Check out trusted default-branch verifier',
              'uses' => 'actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683',
              'with' => {
                'ref' => expected_ref,
                'fetch-depth' => 1,
                'persist-credentials' => false,
                'show-progress' => false,
              },
            },
            {
              'name' => 'Wait for request-bound independent review evidence',
              'uses' => 'actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b',
              'with' => { 'script' => expected_script },
            },
          ]
          actual_steps = verify_job['steps']
          raise "trusted verifier steps drifted: #{actual_steps.inspect}" unless actual_steps == expected_steps

          provider = YAML.load_file('.github/workflows/ai-review-provider-pool-contract.yml')
          raise "unexpected provider workflow name: #{provider['name'].inspect}" unless provider['name'] == 'AI review provider pool contract'
          provider_triggers = provider['on'] || provider[true]
          raise "unexpected provider triggers: #{provider_triggers.inspect}" unless provider_triggers.is_a?(Hash) && provider_triggers.keys == ['pull_request']
          concurrency = provider['concurrency']
          raise 'missing provider-pool concurrency' unless concurrency
          expected_group = 'ai-review-provider-pool-contract-' + '$' + '{{ github.event.pull_request.number }}'
          raise "unexpected concurrency group: #{concurrency['group'].inspect}" unless concurrency['group'] == expected_group
          raise 'stale runs must be cancelled' unless concurrency['cancel-in-progress'] == true
          raise 'provider-pool job must be named' unless provider.dig('jobs', 'verify', 'name') == 'Verify provider-pool contract'
          RUBY

      - name: Verify fail-closed provider-pool invariants
        run: |
          python3 - <<'PY'
          from pathlib import Path

          verifier = Path('scripts/verify-ai-review-contract.cjs').read_text(encoding='utf-8')
          tests = Path('scripts/test-ai-review-provider-pool.cjs').read_text(encoding='utf-8')
          policy = Path('docs/ai-review-cooperation-policy.md').read_text(encoding='utf-8')
          provider_workflow = Path('.github/workflows/ai-review-provider-pool-contract.yml').read_text(encoding='utf-8')
          corpus = verifier + '\n' + tests + '\n' + policy + '\n' + provider_workflow
          required = [
              'QODO_COMMAND = "/qodo review"',
              'CODERABBIT_COMMAND = "@coderabbitai review"',
              'CODEX_COMMAND = "@codex review"',
              'MIN_QODO_REQUEST_GAP_MS = 15 * 60 * 1000',
              'SECOND_QODO_TIMEOUT_MS = 15 * 60 * 1000',
              'review.user?.type === "Bot"',
              'review.commit_id?.toLowerCase() === currentHead',
              'review.state !== "PENDING"',
              'review.state !== "DISMISSED"',
              'primaryFailure: "QODO_TIMEOUT_2"',
              'AI_REVIEW_WORKFLOW_NAME = "AI review contract"',
              'github.rest.actions.getWorkflowRun',
              'run.id !== currentRunId',
              'run.name !== AI_REVIEW_WORKFLOW_NAME',
              'run.event !== "pull_request"',
              'run.head_sha?.toLowerCase() !== currentHead',
              'hasExactHeadBinding',
              'exact head:',
              'GITHUB_RUN_ID',
              'GITHUB_RUN_ATTEMPT',
              'same failed workflow run',
              'Simulates a later attempt of the same workflow run',
              'A reaction, acknowledgement, status-only result',
              'provider-pool contract: ok',
              'two trusted exact-head `/qodo review` requests',
              'Codex or CodeRabbit',
              'default branch',
              'expected_steps',
              'actual_steps == expected_steps',
          ]
          forbidden_verifier = [
              'codeRabbitStatus',
              'successful exact-head commit status after the request',
              'maintainer-authored proxy does count',
              'headUpdateAnchor = parseTime(run.data.created_at)',
              'actions.listWorkflowRunsForRepo',
              'run.pull_requests',
              'Math.min(...anchors)',
          ]
          missing = [token for token in required if token not in corpus]
          leaked = [token for token in forbidden_verifier if token in verifier]
          if missing or leaked:
              raise SystemExit(f'provider-pool drift: missing={missing}, forbidden={leaked}')
          PY
