name: Build reviewed gallery posters

on:
  pull_request:
    paths:
      - ".github/workflows/build-reviewed-gallery.yml"

permissions:
  contents: write

jobs:
  build-posters:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install Chromium renderer
        run: |
          npm install --no-save --package-lock=false --ignore-scripts @playwright/test@1.55.0
          npx playwright install --with-deps chromium
      - name: Render reviewed full posters
        run: |
          mkdir -p src/products/gallery-v4 gallery-v4-evidence
          node <<'NODE'
          const fs = require('node:fs');
          const { chromium } = require('@playwright/test');

          function binaryDataUrl(path, mime) {
            return `data:${mime};base64,${fs.readFileSync(path).toString('base64')}`;
          }

          function encodedDataUrl(path, mime = 'image/webp') {
            return `data:${mime};base64,${fs.readFileSync(path, 'utf8').replace(/\s+/g, '')}`;
          }

          const products = [
            {
              id: 'latte',
              source: binaryDataUrl('src/products/latte.webp', 'image/webp'),
              price: '180 ₺',
              badge: { left: 474, top: 142, width: 148, height: 150, radius: 75, background: '#371e11', border: '#dab15f', text: '#f5dcaa', size: 36 }
            },
            {
              id: 'san-sebastian',
              source: encodedDataUrl('src/premium-san-sebastian.b64'),
              price: '190 ₺',
              badge: { left: 222, top: 151, width: 202, height: 85, radius: 18, background: '#3e2113', border: '#dba446', text: '#f7d691', size: 38 }
            },
            {
              id: 'iced-latte',
              source: binaryDataUrl('src/products/gallery-v2/iced-latte.avif', 'image/avif'),
              price: '180 ₺',
              badge: { left: 42, top: 493, width: 192, height: 97, radius: 18, background: '#27180f', border: '#bf9866', text: '#ebd5b9', size: 45 }
            },
            {
              id: 'nutella-croissant',
              source: encodedDataUrl('src/products/nutella-croissant.b64'),
              price: '170 ₺',
              badge: { left: 290, top: 184, width: 156, height: 76, radius: 22, background: '#a95311', border: '#f5c46e', text: '#fff4dc', size: 32 }
            },
            {
              id: 'lotus-cheesecake',
              source: binaryDataUrl('src/products/file_00000000d248720a8ca18bad97b2053a.png', 'image/png'),
              price: '190 ₺',
              badge: { left: 176, top: 198, width: 289, height: 89, radius: 24, background: '#361d10', border: '#dfa93e', text: '#f7c853', size: 45 }
            }
          ];

          (async () => {
            const browser = await chromium.launch();
            const page = await browser.newPage({ viewport: { width: 640, height: 640 }, deviceScaleFactor: 1 });
            const evidence = [];

            for (const product of products) {
              const b = product.badge;
              await page.setContent(`<!doctype html>
                <style>
                  *{box-sizing:border-box}
                  html,body{margin:0;width:640px;height:640px;overflow:hidden;background:transparent}
                  #poster{position:relative;width:640px;height:640px;overflow:hidden}
                  img{display:block;width:640px;height:640px;object-fit:contain;object-position:center}
                  .price{position:absolute;left:${b.left}px;top:${b.top}px;width:${b.width}px;height:${b.height}px;border:${Math.max(3, Math.round(b.width / 80))}px solid ${b.border};border-radius:${b.radius}px;background:${b.background};color:${b.text};display:grid;place-items:center;font:700 ${b.size}px/1 Georgia,'Times New Roman',serif;letter-spacing:.01em;box-shadow:0 3px 10px rgba(0,0,0,.18)}
                </style>
                <div id="poster"><img id="source" src="${product.source}" alt=""><div class="price">${product.price}</div></div>`);

              const image = page.locator('#source');
              await image.evaluate(async element => {
                const img = element;
                if (!img.complete) await new Promise((resolve, reject) => {
                  img.addEventListener('load', resolve, { once: true });
                  img.addEventListener('error', reject, { once: true });
                });
                if (img.naturalWidth === 0) throw new Error(`Could not decode ${img.src.slice(0, 64)}`);
                await img.decode();
              });

              const png = await page.locator('#poster').screenshot({ animations: 'disabled', omitBackground: true });
              fs.writeFileSync(`gallery-v4-evidence/${product.id}.png`, png);

              const webpBase64 = await page.evaluate(async pngBase64 => {
                const image = new Image();
                image.src = `data:image/png;base64,${pngBase64}`;
                await image.decode();
                const canvas = document.createElement('canvas');
                canvas.width = 640;
                canvas.height = 640;
                const context = canvas.getContext('2d');
                if (!context) throw new Error('Canvas 2D context unavailable');
                context.drawImage(image, 0, 0, 640, 640);
                return canvas.toDataURL('image/webp', 0.92).split(',')[1];
              }, png.toString('base64'));

              const webp = Buffer.from(webpBase64, 'base64');
              fs.writeFileSync(`src/products/gallery-v4/${product.id}.webp`, webp);
              evidence.push(`data:image/png;base64,${png.toString('base64')}`);
            }

            await page.setViewportSize({ width: 1600, height: 320 });
            await page.setContent(`<!doctype html><style>html,body{margin:0;width:1600px;height:320px;overflow:hidden;background:#f5efe8}.row{display:flex}.row img{width:320px;height:320px;object-fit:contain}</style><div class="row">${evidence.map(src => `<img src="${src}">`).join('')}</div>`);
            await page.screenshot({ path: 'gallery-v4-evidence/contact-sheet.png', animations: 'disabled' });
            await browser.close();
          })().catch(error => {
            console.error(error);
            process.exitCode = 1;
          });
          NODE
          file src/products/gallery-v4/*.webp
      - name: Switch gallery runtime to reviewed assets
        run: |
          python3 <<'PY'
          from pathlib import Path
          import re

          paths = [
              Path('src/featured-gallery.ts'),
              Path('qa/gallery.spec.ts'),
              Path('scripts/verify-gallery-assets.sh'),
              Path('index.html')
          ]
          for path in paths:
              text = path.read_text()
              text = text.replace('gallery-v3', 'gallery-v4')
              text = text.replace('20260626-3', '20260626-4')
              path.write_text(text)

          source = Path('src/featured-gallery.ts')
          text = source.read_text()
          iced = re.compile(r'(id: "iced-latte",.*?price: )150', re.S)
          text, count = iced.subn(r'\g<1>180', text, count=1)
          if count != 1:
              raise SystemExit('Could not update Iced Latte price')
          source.write_text(text)

          index = Path('index.html')
          html = index.read_text().replace('Iced Latte, 150 Turkish lira', 'Iced Latte, 180 Turkish lira')
          index.write_text(html)
          PY
          npm ci
          npm run build
      - name: Upload reviewed poster evidence
        uses: actions/upload-artifact@v4
        with:
          name: reviewed-gallery-v4
          path: gallery-v4-evidence
          if-no-files-found: error
          retention-days: 7
      - name: Commit reviewed assets and remove temporary tooling
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git rm -r --ignore-unmatch src/products/gallery-v3
          git rm --ignore-unmatch .github/workflows/build-reviewed-gallery.yml .github/workflows/media-inventory.yml
          git add src/products/gallery-v4 src/featured-gallery.ts featured-gallery.js index.html qa/gallery.spec.ts scripts/verify-gallery-assets.sh scripts/build.mjs featured-gallery.css
          git commit -m 'assets: use reviewed full gallery posters'
          git push origin HEAD:${{ github.head_ref }}
