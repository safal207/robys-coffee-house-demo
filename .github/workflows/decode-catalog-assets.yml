name: Stabilize catalog

on:
  push:
    branches:
      - fix/robys-catalog-stability

permissions:
  contents: write

jobs:
  stabilize:
    if: ${{ !contains(github.event.head_commit.message, '[catalog-stable]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/robys-catalog-stability
      - name: Decode product artwork
        run: python3 scripts/decode_catalog_assets.py
      - name: Patch static catalog
        run: |
          python3 scripts/patch_catalog_markup.py
          python3 scripts/patch_shop.py
          python3 scripts/patch_qa.py
          python3 scripts/patch_catalog_styles.py
          rm -f products-extra.js src/premium-*.b64 src/products/*.b64
      - name: Commit repaired catalog
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: stabilize mobile product catalog [catalog-stable]" || exit 0
          git push origin HEAD:fix/robys-catalog-stability
