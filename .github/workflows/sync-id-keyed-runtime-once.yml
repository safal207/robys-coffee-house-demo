name: Sync id-keyed runtime once

on:
  pull_request:
    branches: [main]
    types: [synchronize, reopened]

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/discover-two-approved-pairings
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: node scripts/generate-integrity-manifest.mjs
      - name: Commit generated files
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add discover-rotation.js discover.html integrity-manifest.json
          git commit -m "chore: sync id-keyed generated runtime"
          git push origin HEAD:feat/discover-two-approved-pairings
