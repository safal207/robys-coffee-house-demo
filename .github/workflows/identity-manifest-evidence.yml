name: Identity manifest evidence

on:
  push:
    branches:
      - agent/robis-logo-implementation-v1
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-manifest:
    name: Generate exact-head integrity manifest
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout exact head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.ref_name }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Capture identity contract evidence
        id: identity
        continue-on-error: true
        run: npm run verify:brand-identity > identity-verifier.log 2>&1

      - name: Generate exact-head manifest
        run: npm run integrity:generate

      - name: Upload generated evidence
        uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2b
        with:
          name: identity-manifest-${{ github.event.pull_request.head.sha || github.sha }}
          path: |
            integrity-manifest.json
            identity-verifier.log
          if-no-files-found: error
          retention-days: 3

      - name: Enforce identity contract
        if: always()
        run: |
          cat identity-verifier.log
          test "${{ steps.identity.outcome }}" = "success"

      - name: Commit exact-head integrity manifest
        if: github.event_name == 'push'
        run: |
          if git diff --quiet -- integrity-manifest.json; then
            echo "Integrity manifest is already current."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add integrity-manifest.json
          git commit -m "chore: refresh identity integrity manifest"
          git push origin HEAD:${GITHUB_REF_NAME}
