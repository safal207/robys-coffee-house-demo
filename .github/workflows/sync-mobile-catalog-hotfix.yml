name: Sync mobile catalog hotfix

on:
  push:
    branches: [fix/mobile-product-cards]

permissions:
  contents: write

jobs:
  sync:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/mobile-product-cards
          fetch-depth: 0
      - name: Bust catalog cache
        run: |
          sed -i 's/products-extra.js?v=products-20260621-13/products-extra.js?v=products-20260621-16/' index.html
          sed -i 's/content="20260621-13"/content="20260621-16"/' index.html
      - name: Commit cache bust
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm .github/workflows/sync-mobile-catalog-hotfix.yml
          git add index.html .github/workflows/sync-mobile-catalog-hotfix.yml
          git commit -m "build: publish compact mobile catalog" || exit 0
          git push origin HEAD:fix/mobile-product-cards
