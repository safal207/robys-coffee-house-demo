name: APK reconstruction diagnostic

on:
  pull_request:
    branches:
      - main
    types: [synchronize]

permissions:
  contents: read

jobs:
  diagnostic:
    if: github.head_ref == 'fix/android-offline-download-clean'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Calculate reconstructed APK contract
        run: |
          mkdir -p .artifacts
          node --input-type=module <<'NODE' | tee .artifacts/apk-diagnostic.txt
          import { createHash } from 'node:crypto';
          import { readFileSync, writeFileSync } from 'node:fs';
          const paths = Array.from({ length: 6 }, (_, index) => `downloads/android-v1.1/part-${String(index + 1).padStart(2, '0')}.b64`);
          const encoded = paths.map((path) => readFileSync(path, 'utf8')).join('').replace(/\s+/g, '');
          const apk = Buffer.from(encoded, 'base64');
          writeFileSync('.artifacts/reconstructed.apk', apk);
          console.log(JSON.stringify({
            bytes: apk.length,
            sha256: createHash('sha256').update(apk).digest('hex'),
            signature: apk.subarray(0, 2).toString('ascii'),
            entries: ['AndroidManifest.xml', 'classes.dex', 'resources.arsc', 'META-INF/ROBYS-RE.SF', 'META-INF/ROBYS-RE.RSA'].map((name) => [name, apk.toString('latin1').includes(name)])
          }, null, 2));
          NODE
      - uses: actions/upload-artifact@v4
        with:
          name: apk-diagnostic-${{ github.run_id }}
          path: .artifacts
          retention-days: 1
