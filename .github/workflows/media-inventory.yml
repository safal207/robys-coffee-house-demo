name: Media source inventory

on:
  pull_request:
    paths:
      - ".github/workflows/media-inventory.yml"

permissions:
  contents: read

jobs:
  inventory:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Collect media inventory
        run: |
          mkdir -p media-inventory/files
          find . -type f \
            ! -path './.git/*' \
            | sort > media-inventory/all-files.txt
          find . -type f \
            ! -path './.git/*' \
            \( -iname '*.png' -o -iname '*.jpg' -o -iname '*.jpeg' -o -iname '*.webp' -o -iname '*.avif' -o -iname '*.svg' -o -iname '*.gif' -o -iname '*.b64' -o -iname '*.base64.txt' -o -path './.asset-upload/*' \) \
            -print0 | while IFS= read -r -d '' file; do
              mkdir -p "media-inventory/files/$(dirname "$file")"
              cp "$file" "media-inventory/files/$file"
            done
          find media-inventory/files -type f -exec file {} \; | sort > media-inventory/media-types.txt
          du -ah media-inventory/files | sort -h > media-inventory/media-sizes.txt
      - uses: actions/upload-artifact@v4
        with:
          name: repository-media-inventory
          path: media-inventory
          if-no-files-found: error
          retention-days: 1
