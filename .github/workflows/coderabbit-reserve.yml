name: CodeRabbit reserve windows

on:
  schedule:
    # Europe/Istanbul is UTC+3 year-round: 09:00, 13:00 and 19:00 local time.
    - cron: '0 6 * * *'
    - cron: '0 10 * * *'
    - cron: '0 16 * * *'
  workflow_dispatch:
    inputs:
      pr_number:
        description: Optional open pull request number to evaluate
        required: false
        type: string
      expected_head_sha:
        description: Optional full exact head SHA for stale-dispatch protection
        required: false
        type: string

permissions: {}

concurrency:
  group: coderabbit-reserve-${{ github.event.schedule || inputs.pr_number || github.run_id }}
  cancel-in-progress: false

jobs:
  reserve:
    name: Dispatch bounded advisory reserve
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      issues: write
      pull-requests: read
    steps:
      - name: Check out trusted default-branch dispatcher
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 1
          persist-credentials: false
          show-progress: false
      - name: Evaluate Codex fallback and request CodeRabbit reserve
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        with:
          script: |
            const dispatch = require('./scripts/coderabbit-reserve.cjs');
            await dispatch({ github, context, core });
