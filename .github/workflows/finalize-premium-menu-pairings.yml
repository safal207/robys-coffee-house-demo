name: Finalize premium menu pairings

on:
  pull_request:
    types: [synchronize]
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'feat/premium-menu-pairing-cards'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout feature branch without persisted credentials
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: feat/premium-menu-pairing-cards
          persist-credentials: false
          fetch-depth: 1

      - name: Apply indentation-safe transformation
        run: |
          python3 - <<'PY'
          from pathlib import Path
          from textwrap import dedent
          import re

          def sub_once(path, pattern, replacement, *, flags=0):
              file_path = Path(path)
              source = file_path.read_text(encoding='utf-8')
              updated, count = re.subn(pattern, replacement, source, count=1, flags=flags)
              if count != 1:
                  raise SystemExit(f'Expected one replacement in {path}: {pattern[:80]}')
              file_path.write_text(updated, encoding='utf-8')

          sub_once(
              'menu.html',
              r'<link rel="stylesheet" href="menu\.css\?v=[^"]+" />',
              '<link rel="stylesheet" href="menu.css?v=premium-pairings-20260707-1" />',
          )

          sub_once(
              'menu.html',
              r'  <header class="site-header">.*?  </header>',
              dedent('''
                <header class="site-header">
                  <div class="container header-inner">
                    <a class="menu-page-back" href="index.html">
                      <span class="menu-page-back-icon" aria-hidden="true">←</span>
                      <span data-menu-copy="back">Kafeye dön</span>
                    </a>
                    <div class="language-switcher" aria-label="Language selector">
                      <button class="lang-button active" type="button" data-lang="tr">TR</button>
                      <button class="lang-button" type="button" data-lang="en">EN</button>
                      <button class="lang-button" type="button" data-lang="ru">RU</button>
                    </div>
                  </div>
                </header>''').strip(),
              flags=re.S,
          )

          sub_once(
              'menu.html',
              r'    <section class="menu-page-hero">.*?    </section>',
              dedent('''
                    <section class="menu-page-hero">
                      <div class="container menu-page-hero-inner">
                        <a class="brand menu-page-brand" href="index.html" aria-label="Roby's Coffee House">
                          <span class="brand-mark">R</span>
                          <span class="brand-copy">
                            <strong>ROBY'S</strong>
                            <small>COFFEE HOUSE</small>
                            <span class="menu-page-brand-tagline">FRESH COFFEE, DAILY</span>
                          </span>
                        </a>
                        <div class="menu-page-hero-copy">
                          <p class="eyebrow">ROBY'S COFFEE HOUSE · GAZİPAŞA</p>
                          <h1 data-menu-copy="pageTitle">Tam Menü</h1>
                          <p data-menu-copy="pageLead">Kahveler, soğuk içecekler, çaylar, tatlılar ve atıştırmalıklar.</p>
                        </div>
                      </div>
                    </section>''').rstrip(),
              flags=re.S,
          )

          menu_data = Path('menu-data.js')
          data = menu_data.read_text(encoding='utf-8')
          name_line = '    name: { tr: "Taste Journey Eşleşmeleri", en: "Taste Journey Pairings", ru: "Сочетания Taste Journey" },\n'
          lead_line = '    lead: { tr: "Anınız için seçilmiş içecek ve tatlı eşleşmeleri.", en: "Drink and dessert pairings selected for your moment.", ru: "Идеальные сочетания напитков и десертов для вашего момента." },\n'
          if lead_line not in data:
              if data.count(name_line) != 1:
                  raise SystemExit('Pairing category name not found exactly once')
              data = data.replace(name_line, name_line + lead_line, 1)
          menu_data.write_text(data, encoding='utf-8')

          sub_once(
              'menu-data.js',
              r'      \{\n        id: "cool-lime-macaron-pairing".*?\n        price: 290\n      \},',
              dedent('''
                    {
                      id: "cool-lime-macaron-pairing",
                      journeyId: "cool-lime-macaron",
                      pricingMode: "approved-offer",
                      name: { tr: "Cool Lime + Makaron", en: "Cool Lime + Macaron", ru: "Cool Lime + макарон" },
                      description: {
                        tr: "Ferah lime ve yumuşak fıstıklı makaron.",
                        en: "Bright lime and a delicate pistachio macaron.",
                        ru: "Освежающий лайм и нежный фисташковый макарон."
                      },
                      image: "src/pairings-data/final/cool-lime-macaron-hq.webp",
                      imageAlt: {
                        tr: "Buzlu Cool Lime ve fıstıklı makaron",
                        en: "Iced Cool Lime with a pistachio macaron",
                        ru: "Cool Lime со льдом и фисташковый макарон"
                      },
                      price: 290
                    },''').rstrip(),
              flags=re.S,
          )

          sub_once(
              'menu-data.js',
              r'      \{\n        id: "iced-san-sebastian-pairing".*?\n        price: 370\n      \}',
              dedent('''
                    {
                      id: "iced-san-sebastian-pairing",
                      journeyId: "iced-san-sebastian",
                      pricingMode: "menu-total",
                      name: { tr: "Buzlu Latte + San Sebastian", en: "Iced Latte + San Sebastian Cheesecake", ru: "Айс-латте + чизкейк Сан-Себастьян" },
                      description: {
                        tr: "Klasik buzlu latte ve kremamsı San Sebastian.",
                        en: "Classic iced latte with creamy San Sebastian cheesecake.",
                        ru: "Классический айс-латте и кремовый чизкейк Сан-Себастьян."
                      },
                      image: "src/pairings-data/approved/iced-san-sebastian-hq.png",
                      imageAlt: {
                        tr: "Buzlu latte ve San Sebastian cheesecake",
                        en: "Iced latte with San Sebastian cheesecake",
                        ru: "Айс-латте и чизкейк Сан-Себастьян"
                      },
                      price: 370
                    }''').rstrip(),
              flags=re.S,
          )

          sub_once(
              'menu-page.js',
              r'function createItem\(item\) \{.*?\n\}\n\nfunction createGroup',
              dedent('''
                function createItem(item) {
                  const visual = Boolean(item.image);
                  const row = document.createElement(visual ? "article" : "div");
                  row.className = visual ? "full-menu-item full-menu-item--visual" : "full-menu-item";

                  const copy = document.createElement("div");
                  copy.className = "full-menu-item-copy";

                  const name = document.createElement("strong");
                  name.textContent = localized(item.name);
                  copy.append(name);

                  if (item.description) {
                    const description = document.createElement("p");
                    description.textContent = localized(item.description);
                    copy.append(description);
                  }

                  const price = document.createElement("strong");
                  price.className = "full-menu-price";
                  price.textContent = formatPrice(item.price);

                  if (visual) {
                    const media = document.createElement("div");
                    media.className = "full-menu-item-media";

                    const image = document.createElement("img");
                    image.src = item.image;
                    image.alt = localized(item.imageAlt ?? item.name);
                    image.loading = "lazy";
                    image.decoding = "async";
                    image.width = 1024;
                    image.height = 1024;
                    media.append(image);

                    const details = document.createElement("div");
                    details.className = "full-menu-item-details";
                    details.append(copy, price);
                    row.append(media, details);
                    return row;
                  }

                  const dots = document.createElement("span");
                  dots.className = "full-menu-dots";
                  dots.setAttribute("aria-hidden", "true");
                  row.append(copy, dots, price);
                  return row;
                }

                function createGroup''').strip(),
              flags=re.S,
          )

          sub_once(
              'menu-page.js',
              r'  section\.className = "full-menu-panel";\n  section\.id = category\.id;',
              '  section.className = "full-menu-panel";\n  section.classList.toggle("full-menu-panel--featured", category.id === "pairing-offers");\n  section.id = category.id;',
          )

          sub_once(
              'menu-page.js',
              r'  const title = document\.createElement\("h2"\);\n  title\.textContent = localized\(category\.name\);\n  header\.append\(icon, title\);\n  section\.append\(header\);',
              dedent('''
                  const heading = document.createElement("div");
                  heading.className = "full-menu-panel-heading";

                  const title = document.createElement("h2");
                  title.textContent = localized(category.name);
                  heading.append(title);

                  if (category.lead) {
                    const lead = document.createElement("p");
                    lead.textContent = localized(category.lead);
                    heading.append(lead);
                  }

                  header.append(icon, heading);
                  section.append(header);''').rstrip(),
          )

          css_path = Path('menu.css')
          css = css_path.read_text(encoding='utf-8')
          if '/* PREMIUM-MENU-PAIRINGS-V1 */' not in css:
              css += dedent('''

                /* PREMIUM-MENU-PAIRINGS-V1 */
                .menu-page{--cream:#f6f0e8;--paper:#fffaf3;background:var(--cream)}
                .menu-page .header-inner{grid-template-columns:minmax(0,1fr) auto;min-height:68px}
                .menu-page .menu-page-back{display:inline-flex;max-width:min(100%,240px);align-items:center;justify-self:start;gap:9px;padding:10px 16px}
                .menu-page-back-icon{font-size:1.35rem;font-weight:400;line-height:1}
                .menu-page-hero{padding:34px 0 46px;background:linear-gradient(180deg,#fffaf3 0%,#f8f1e8 100%)}
                .menu-page-hero-inner{display:flex;align-items:stretch;flex-direction:column;gap:0}
                .menu-page-brand{align-self:center;margin:0 auto 44px;padding:0;color:var(--brand-wordmark-ink);background:transparent;border:0;border-radius:0;box-shadow:none}
                .menu-page-brand .brand-copy{width:250px}
                .menu-page-brand .brand-copy strong{width:50px;height:50px;border-width:10px;border-top-color:#ef4652;border-right-color:#c91c2d;border-bottom-color:#d32636;border-left-color:#e23845;filter:drop-shadow(0 5px 9px rgba(211,38,54,.12))}
                .menu-page-brand .brand-copy strong::before,.menu-page-brand .brand-copy strong::after{font-size:3.05rem}
                .menu-page-brand .brand-copy strong::before{right:calc(100% + 5px)}
                .menu-page-brand .brand-copy strong::after{left:calc(100% + 5px)}
                .menu-page-brand .brand-copy small{margin-top:10px!important;font-size:.72rem!important;letter-spacing:.25em!important}
                .menu-page-brand-tagline{display:block;margin-top:10px;color:var(--brand-wordmark-ink);font:700 .48rem/1 var(--sans);letter-spacing:.42em;text-align:center;white-space:nowrap}
                .menu-page-hero-copy{width:100%}
                .menu-page-hero-copy .eyebrow{margin-bottom:14px;color:#7d736e}
                .menu-search input{background:rgba(255,250,243,.96)}
                .menu-category-chip{background:rgba(255,250,243,.86);border-color:rgba(47,39,37,.12)}
                .full-menu-panel-heading{min-width:0}
                .full-menu-panel-heading p{max-width:650px;margin:10px 0 0;color:var(--muted);font-size:.82rem;line-height:1.5}
                .full-menu-panel--featured{grid-column:1/-1;background:linear-gradient(180deg,#fffaf3 0%,#fffdf9 100%)}
                .full-menu-panel--featured .full-menu-list{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:18px}
                .full-menu-item--visual{display:grid;grid-template-columns:minmax(0,.96fr) minmax(0,1.04fr);gap:0;overflow:hidden;background:#fff;border:1px solid rgba(47,39,37,.12);border-radius:22px;box-shadow:0 16px 36px rgba(36,28,27,.07)}
                .full-menu-item-media{min-height:250px;overflow:hidden;background:#e8ded1}
                .full-menu-item-media img{width:100%;height:100%;object-fit:cover;transition:transform .5s cubic-bezier(.2,.7,.2,1)}
                .full-menu-item--visual:hover .full-menu-item-media img{transform:scale(1.025)}
                .full-menu-item-details{display:flex;min-width:0;flex-direction:column;justify-content:space-between;gap:24px;padding:26px}
                .full-menu-item--visual .full-menu-item-copy strong{font-size:1.35rem;line-height:1.16}
                .full-menu-item--visual .full-menu-item-copy p{margin-top:11px;font-size:.82rem;line-height:1.55}
                .full-menu-item--visual .full-menu-price{font-size:1.5rem;line-height:1}
                @media(max-width:900px){.full-menu-panel--featured .full-menu-list{grid-template-columns:1fr}.full-menu-item--visual{grid-template-columns:minmax(0,.9fr) minmax(0,1.1fr)}}
                @media(max-width:680px){.menu-page .header-inner{grid-template-columns:minmax(0,1fr) auto;gap:12px;min-height:58px}.menu-page .menu-page-back{max-width:170px;justify-self:start;padding:8px 11px;font-size:.68rem}.menu-page-hero{padding:30px 0 34px}.menu-page-brand{margin-bottom:34px;padding:0}.menu-page-brand .brand-copy{width:220px}.menu-page-brand .brand-copy strong{width:44px;height:44px;border-width:9px}.menu-page-brand .brand-copy strong::before,.menu-page-brand .brand-copy strong::after{font-size:2.65rem}.menu-page-brand .brand-copy small{font-size:.64rem!important}.menu-page-brand-tagline{font-size:.42rem;letter-spacing:.36em}.full-menu-panel-heading p{font-size:.76rem}.full-menu-item--visual{grid-template-columns:1fr}.full-menu-item-media{min-height:0;aspect-ratio:16/10}.full-menu-item-details{gap:20px;padding:21px 20px 22px}.full-menu-item--visual .full-menu-item-copy strong{font-size:1.16rem}.full-menu-item--visual .full-menu-price{font-size:1.3rem}}
                @media(max-width:390px){.menu-page .header-inner{gap:8px}.menu-page .menu-page-back{max-width:150px;padding-inline:9px}.menu-page-brand .brand-copy{width:202px}.menu-page-brand .brand-copy strong{width:40px;height:40px;border-width:8px}.menu-page-brand .brand-copy strong::before,.menu-page-brand .brand-copy strong::after{font-size:2.4rem}.menu-page-brand .brand-copy small{font-size:.58rem!important}.menu-page-brand-tagline{font-size:.38rem}}
              ''')
          css_path.write_text(css, encoding='utf-8')
          PY

      - name: Regenerate and validate integrity evidence
        run: |
          node scripts/generate-integrity-manifest.mjs
          node --check menu-page.js
          node scripts/verify-pairing-catalog-parity.mjs
          node scripts/verify-pairing-cta.mjs
          node scripts/generate-integrity-manifest.mjs --check

      - name: Remove temporary workflows
        run: rm .github/workflows/apply-premium-menu-pairings-once.yml .github/workflows/trigger-premium-menu-pairings-on-pr.yml .github/workflows/finalize-premium-menu-pairings.yml

      - name: Commit and push final branch
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: add premium menu pairing cards"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push origin HEAD:feat/premium-menu-pairing-cards
