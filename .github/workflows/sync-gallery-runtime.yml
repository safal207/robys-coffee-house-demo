name: Synchronize gallery runtime

on:
  push:
    branches:
      - gallery-original-quality-v5
    paths:
      - .github/workflows/sync-gallery-runtime.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: gallery-original-quality-v5
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build canonical runtime
        run: npm run build

      - name: Commit synchronized runtime
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add featured-gallery.js index.html
          if git diff --cached --quiet; then
            echo "Runtime is already synchronized."
            exit 0
          fi
          git commit -m "build: synchronize gallery runtime revision"
          git push origin HEAD:gallery-original-quality-v5
