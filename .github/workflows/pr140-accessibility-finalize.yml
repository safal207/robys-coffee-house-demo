name: PR 140 accessibility finalize

on:
  push:
    branches:
      - feat/cool-lime-macaron-hq-poster

concurrency:
  group: pr140-accessibility-finalize-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: Build and validate with read-only token
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch without persisted credentials
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install locked dependencies
        run: npm ci --no-audit --no-fund

      - name: Build generated runtimes and cache keys
        run: npm run build

      - name: Verify poster and accessibility contract
        run: npm run verify:taste-journey-posters

      - name: Regenerate canonical integrity manifest
        run: npm run integrity:generate

      - name: Verify generated evidence
        run: |
          npm run typecheck
          node --check discover-rotation.js
          node --check discover-rotation-v2.js
          node --check discover-rotation-v3.js
          node --check sw.js
          npm run verify:integrity

      - name: Stage allowlisted generated outputs
        run: |
          mkdir generated
          cp discover-rotation.js generated/
          cp discover-rotation-v2.js generated/
          cp discover-rotation-v3.js generated/
          cp discover.html generated/
          cp sw.js generated/
          cp integrity-manifest.json generated/

      - name: Upload validated generated outputs
        uses: actions/upload-artifact@v4
        with:
          name: pr140-accessibility-generated
          path: generated
          if-no-files-found: error
          retention-days: 1

  commit:
    name: Commit only validated generated outputs
    needs: validate
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Check out current branch
        uses: actions/checkout@v4
        with:
          ref: feat/cool-lime-macaron-hq-poster
          fetch-depth: 0

      - name: Download validated outputs
        uses: actions/download-artifact@v4
        with:
          name: pr140-accessibility-generated
          path: /tmp/pr140-accessibility-generated

      - name: Copy allowlisted outputs and remove one-shot workflow
        run: |
          cp /tmp/pr140-accessibility-generated/discover-rotation.js ./discover-rotation.js
          cp /tmp/pr140-accessibility-generated/discover-rotation-v2.js ./discover-rotation-v2.js
          cp /tmp/pr140-accessibility-generated/discover-rotation-v3.js ./discover-rotation-v3.js
          cp /tmp/pr140-accessibility-generated/discover.html ./discover.html
          cp /tmp/pr140-accessibility-generated/sw.js ./sw.js
          cp /tmp/pr140-accessibility-generated/integrity-manifest.json ./integrity-manifest.json
          git rm .github/workflows/pr140-accessibility-finalize.yml

      - name: Commit validated outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add discover-rotation.js discover-rotation-v2.js discover-rotation-v3.js discover.html sw.js integrity-manifest.json
          git commit -m "build: finalize accessible Cool Lime poster runtime"
          git push
