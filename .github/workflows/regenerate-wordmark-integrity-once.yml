name: Generate wordmark integrity artifact once

on:
  pull_request:
    paths:
      - .github/workflows/regenerate-wordmark-integrity-once.yml

permissions:
  contents: read

concurrency:
  group: generate-wordmark-integrity-artifact-once
  cancel-in-progress: false

jobs:
  generate:
    if: github.head_ref == 'fix/close-logo-delivery-tail-v2'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout feature branch without credentials
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: fix/close-logo-delivery-tail-v2
          persist-credentials: false

      - name: Verify exact wordmark behavior
        run: |
          node --check discover-weather-guard.js
          node --check scripts/test-brand-wordmark.mjs
          node scripts/test-brand-wordmark.mjs

      - name: Generate and verify integrity manifest
        run: |
          node scripts/generate-integrity-manifest.mjs
          node scripts/generate-integrity-manifest.mjs --check

      - name: Upload generated integrity manifest
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: generated-wordmark-integrity
          path: integrity-manifest.json
          if-no-files-found: error
          retention-days: 1
