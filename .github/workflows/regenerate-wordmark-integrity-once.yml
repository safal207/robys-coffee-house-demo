name: Diagnose wordmark contract once

on:
  pull_request:
    paths:
      - .github/workflows/regenerate-wordmark-integrity-once.yml

permissions:
  contents: read

concurrency:
  group: diagnose-wordmark-contract-once
  cancel-in-progress: false

jobs:
  diagnose:
    if: github.head_ref == 'fix/close-logo-delivery-tail-v2'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout feature branch without credentials
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: fix/close-logo-delivery-tail-v2
          persist-credentials: false

      - name: Verify exact wordmark behavior
        run: |
          set -o pipefail
          {
            node --check discover-weather-guard.js
            node --check scripts/test-brand-wordmark.mjs
            node scripts/test-brand-wordmark.mjs
          } 2>&1 | tee wordmark-test.log

      - name: Upload focused result log
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: wordmark-test-result
          path: wordmark-test.log
          if-no-files-found: error
          retention-days: 1
