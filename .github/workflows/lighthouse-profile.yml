name: Lighthouse profiles

on:
  workflow_call:

env:
  LHCI_VERSION: "0.15.1"
  LIGHTHOUSE_ENFORCE: "false"

jobs:
  mobile:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: command -v ffprobe >/dev/null 2>&1 || (sudo apt-get update && sudo apt-get install -y ffmpeg)
      - run: npm run verify:media
      - run: node scripts/run-lighthouse-profile.mjs mobile
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-mobile-${{ github.sha }}
          path: |
            .lighthouseci/
            lighthouse/reports/mobile-summary.json
            lighthouse/reports/mobile-regression-report.json
            lighthouse/reports/mobile-status.json
          if-no-files-found: warn
          retention-days: 30

  desktop:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: command -v ffprobe >/dev/null 2>&1 || (sudo apt-get update && sudo apt-get install -y ffmpeg)
      - run: npm run verify:media
      - run: node scripts/run-lighthouse-profile.mjs desktop
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-desktop-${{ github.sha }}
          path: |
            .lighthouseci/
            lighthouse/reports/desktop-summary.json
            lighthouse/reports/desktop-regression-report.json
            lighthouse/reports/desktop-status.json
          if-no-files-found: warn
          retention-days: 30
