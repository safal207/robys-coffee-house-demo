name: Lighthouse profiles

on:
  workflow_call:

env:
  LHCI_VERSION: "0.15.1"
  LIGHTHOUSE_ENFORCE: "true"

jobs:
  profile:
    strategy:
      fail-fast: false
      matrix:
        profile: [mobile, desktop]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: command -v ffprobe >/dev/null 2>&1 || (sudo apt-get update && sudo apt-get install -y ffmpeg)
      - run: npm run verify:media
      - run: node scripts/run-lighthouse-profile.mjs "${{ matrix.profile }}"
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-${{ matrix.profile }}-${{ github.sha }}
          path: |
            .lighthouseci/
            lighthouse/reports/
          include-hidden-files: true
          if-no-files-found: warn
          retention-days: 30
