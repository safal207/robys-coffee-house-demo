name: Sync clean Taste Journey once

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

concurrency:
  group: sync-clean-taste-journey-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  sync:
    if: github.head_ref == 'feat/taste-journey-two-pairings-clean' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/taste-journey-two-pairings-clean
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Align public PWA registration URLs
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const pwa = fs.readFileSync('pwa.js', 'utf8');
          const revision = pwa.match(/SERVICE_WORKER_URL = "sw\.js\?v=([^"]+)"/)?.[1];
          if (!revision) throw new Error('Missing service-worker revision');
          for (const file of ['index.html', 'menu.html']) {
            const html = fs.readFileSync(file, 'utf8');
            fs.writeFileSync(file, html.replace(/pwa\.js\?v=[^"]+/g, `pwa.js?v=${revision}`));
          }
          NODE
      - name: Build and generate exact manifest
        run: |
          npm run build
          node scripts/generate-integrity-manifest.mjs
      - name: Verify clean merged state
        run: npm run check
      - name: Commit generated state when needed
        run: |
          git add app.js featured-gallery.js social-offer.js discover-rotation.js discover-rotation-v2.js index.html menu.html discover.html integrity-manifest.json
          if git diff --cached --quiet; then
            echo "Generated state is already current."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: sync clean Taste Journey generated state"
          git push origin HEAD:feat/taste-journey-two-pairings-clean
