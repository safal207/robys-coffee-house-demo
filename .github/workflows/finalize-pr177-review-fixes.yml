name: Finalize PR 177 review fixes

on:
  push:
    branches:
      - feat/premium-menu-pairing-cards

permissions:
  contents: write

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out exact branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: feat/premium-menu-pairing-cards
          fetch-depth: 1
          persist-credentials: false

      - name: Apply verified independent-review fixes
        run: |
          python3 - <<'PY'
          import json
          import subprocess
          from pathlib import Path

          js_path = Path('menu-page.js')
          js = js_path.read_text(encoding='utf-8')
          old = '  row.className = visual ? "full-menu-item full-menu-item--visual" : "full-menu-item";\n'
          new = old + '  if (visual) row.dataset.pairing = item.journeyId ?? item.id;\n'
          if new not in js:
              if js.count(old) != 1:
                  raise SystemExit('Expected menu item class assignment exactly once')
              js = js.replace(old, new, 1)
          js_path.write_text(js, encoding='utf-8')

          css_path = Path('menu.css')
          css = css_path.read_text(encoding='utf-8')
          replacements = {
              '.full-menu-item--visual img[src*="pairing-cool-lime-macaron"]': '.full-menu-item--visual[data-pairing="cool-lime-macaron"] .full-menu-item-media img',
              '.full-menu-item--visual:hover img[src*="pairing-cool-lime-macaron"]': '.full-menu-item--visual[data-pairing="cool-lime-macaron"]:hover .full-menu-item-media img',
              '.full-menu-item--visual img[src*="pairing-iced-san-sebastian"]': '.full-menu-item--visual[data-pairing="iced-san-sebastian"] .full-menu-item-media img',
              '.full-menu-item--visual:hover img[src*="pairing-iced-san-sebastian"]': '.full-menu-item--visual[data-pairing="iced-san-sebastian"]:hover .full-menu-item-media img',
          }
          for source, target in replacements.items():
              if source not in css:
                  raise SystemExit(f'Missing expected CSS selector: {source}')
              css = css.replace(source, target)
          css_path.write_text(css, encoding='utf-8')

          not_found_path = Path('404.html')
          not_found = not_found_path.read_text(encoding='utf-8')
          old_revision = 'pwa.js?v=20260627-1'
          new_revision = 'pwa.js?v=offline-20260707-8'
          if old_revision not in not_found:
              raise SystemExit('Expected stale 404 PWA revision exactly once')
          not_found = not_found.replace(old_revision, new_revision, 1)
          not_found_path.write_text(not_found, encoding='utf-8')

          def blob_sha(path: str) -> str:
              return subprocess.check_output(['git', 'hash-object', path], text=True).strip()

          registry_path = Path('qa/reviewed-visual-changes.d/pairing-catalog-pricing-v2.json')
          registry = json.loads(registry_path.read_text(encoding='utf-8'))
          record = next(
              (item for item in registry['reviewedChanges'] if item['id'] == 'premium-menu-pairing-cards-v1'),
              None,
          )
          if record is None:
              raise SystemExit('Missing premium-menu-pairing-cards-v1 approval record')
          record['contentBindings']['menu.css'] = blob_sha('menu.css')
          record['contentBindings']['menu-page.js'] = blob_sha('menu-page.js')
          registry_path.write_text(
              json.dumps(registry, ensure_ascii=False, separators=(',', ':')) + '\n',
              encoding='utf-8',
          )
          PY

      - name: Regenerate and validate evidence
        run: |
          npm ci --ignore-scripts
          npm run build
          node scripts/generate-integrity-manifest.mjs
          npm run verify:integrity
          npm run verify:taste-journey-posters
          node scripts/verify-pairing-catalog-parity.mjs
          node scripts/verify-pairing-cta.mjs
          node --check menu-page.js
          grep -F 'pwa.js?v=offline-20260707-8' 404.html
          grep -F 'data-pairing="cool-lime-macaron"' menu.css
          grep -F 'data-pairing="iced-san-sebastian"' menu.css

      - name: Remove one-time workflow
        run: rm .github/workflows/finalize-pr177-review-fixes.yml

      - name: Commit exact review fixes and generated evidence
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: close final menu review findings"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push origin HEAD:feat/premium-menu-pairing-cards
