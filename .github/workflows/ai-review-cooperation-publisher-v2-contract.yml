name: AI review cooperation publisher v2 contract

on:
  pull_request:
    paths:
      - .github/workflows/ai-review-cooperation-publisher-v2.yml
      - .github/workflows/ai-review-cooperation-publisher-v2-contract.yml
      - scripts/ai-review-cooperation.py
      - scripts/fetch-review-threads.py

permissions:
  contents: read

concurrency:
  group: ai-review-cooperation-publisher-v2-contract-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify publisher v2 contract
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout pull request
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
          show-progress: false

      - name: Parse workflow YAML
        run: >-
          ruby -e "require 'yaml';
          YAML.parse_file('.github/workflows/ai-review-cooperation-publisher-v2.yml');
          YAML.parse_file('.github/workflows/ai-review-cooperation-publisher-v2-contract.yml')"

      - name: Verify events and exact permissions
        run: |
          ruby <<'RUBY'
          require 'yaml'
          workflow = YAML.load_file('.github/workflows/ai-review-cooperation-publisher-v2.yml')
          raise 'workflow permissions must default to none' unless workflow['permissions'] == {}
          expected = {
            'actions' => 'read',
            'checks' => 'read',
            'contents' => 'read',
            'issues' => 'write',
            'pull-requests' => 'write',
            'statuses' => 'read',
          }
          actual = workflow.dig('jobs', 'publish', 'permissions')
          raise "unexpected publisher permissions: #{actual.inspect}" unless actual == expected
          RUBY
          workflow=.github/workflows/ai-review-cooperation-publisher-v2.yml
          grep -Fq 'workflow_run:' "${workflow}"
          grep -Fq 'workflows: [AI review contract]' "${workflow}"
          grep -Fq 'types: [completed]' "${workflow}"
          grep -Fq 'workflow_dispatch:' "${workflow}"
          grep -Fq 'persist-credentials: false' "${workflow}"
          ! grep -Fq 'pull_request_target' "${workflow}"
          ! grep -Fq 'contents: write' "${workflow}"
          ! grep -Fq 'actions: write' "${workflow}"

      - name: Verify exact guard and concurrency
        run: |
          ruby <<'RUBY'
          require 'yaml'

          def normalize(value)
            output = +''
            quote = nil
            escaped = false
            value.to_s.each_char do |character|
              if quote
                output << character
                if escaped
                  escaped = false
                elsif character == '\\'
                  escaped = true
                elsif character == quote
                  quote = nil
                end
              elsif character == "'" || character == '"'
                quote = character
                output << character
              elsif character.match?(/\s/)
                next
              else
                output << character
              end
            end
            raise 'unterminated quoted literal' if quote
            output
          end

          workflow = YAML.load_file('.github/workflows/ai-review-cooperation-publisher-v2.yml')
          job = workflow.dig('jobs', 'publish')
          expected_guard = <<~'EXPR'
            (github.event_name == 'workflow_run' &&
             github.event.workflow_run.name == 'AI review contract' &&
             github.event.workflow_run.event == 'pull_request' &&
             github.event.workflow_run.conclusion == 'success' &&
             github.event.workflow_run.head_sha != '') ||
            (github.event_name == 'workflow_dispatch' &&
             github.actor == github.repository_owner)
          EXPR
          raise 'publisher guard drifted' unless normalize(job['if']) == normalize(expected_guard)

          expected_group = 'ai-review-cooperation-publisher-v2-' + '$' + '{{ github.event.workflow_run.head_sha || inputs.pr_number || github.run_id }}'
          concurrency = workflow['concurrency']
          raise 'publisher cancellation must remain enabled' unless concurrency['cancel-in-progress'] == true
          raise 'publisher concurrency drifted' unless normalize(concurrency['group']) == normalize(expected_group)
          RUBY

      - name: Execute authorization matrix
        run: |
          ruby <<'RUBY'
          require 'yaml'
          require 'open3'
          require 'tempfile'
          workflow = YAML.load_file('.github/workflows/ai-review-cooperation-publisher-v2.yml')
          step = workflow.dig('jobs', 'publish', 'steps').first
          raise 'authorization must be first' unless step['name'] == 'Authorize publisher trigger'
          script = step['run'].to_s
          sha = 'a' * 40
          base = {
            'TRIGGER_EVENT' => '', 'WORKFLOW_NAME' => '', 'WORKFLOW_EVENT' => '',
            'WORKFLOW_CONCLUSION' => '', 'TRIGGER_HEAD_SHA' => '', 'PR_NUMBER' => '',
            'EXPECTED_HEAD_SHA' => '', 'GITHUB_ACTOR' => '', 'REPOSITORY_OWNER' => 'owner',
          }
          cases = [
            ['trusted workflow run', true, {'TRIGGER_EVENT'=>'workflow_run','WORKFLOW_NAME'=>'AI review contract','WORKFLOW_EVENT'=>'pull_request','WORKFLOW_CONCLUSION'=>'success','TRIGGER_HEAD_SHA'=>sha}],
            ['owner dispatch', true, {'TRIGGER_EVENT'=>'workflow_dispatch','GITHUB_ACTOR'=>'owner','PR_NUMBER'=>'203','EXPECTED_HEAD_SHA'=>sha}],
            ['wrong workflow', false, {'TRIGGER_EVENT'=>'workflow_run','WORKFLOW_NAME'=>'Other','WORKFLOW_EVENT'=>'pull_request','WORKFLOW_CONCLUSION'=>'success','TRIGGER_HEAD_SHA'=>sha}],
            ['failed workflow', false, {'TRIGGER_EVENT'=>'workflow_run','WORKFLOW_NAME'=>'AI review contract','WORKFLOW_EVENT'=>'pull_request','WORKFLOW_CONCLUSION'=>'failure','TRIGGER_HEAD_SHA'=>sha}],
            ['workflow missing SHA', false, {'TRIGGER_EVENT'=>'workflow_run','WORKFLOW_NAME'=>'AI review contract','WORKFLOW_EVENT'=>'pull_request','WORKFLOW_CONCLUSION'=>'success'}],
            ['non-owner dispatch', false, {'TRIGGER_EVENT'=>'workflow_dispatch','GITHUB_ACTOR'=>'member','PR_NUMBER'=>'203','EXPECTED_HEAD_SHA'=>sha}],
            ['dispatch missing PR', false, {'TRIGGER_EVENT'=>'workflow_dispatch','GITHUB_ACTOR'=>'owner','EXPECTED_HEAD_SHA'=>sha}],
            ['unsupported event', false, {'TRIGGER_EVENT'=>'push'}],
          ]
          Tempfile.create(['publisher-v2-auth', '.sh']) do |file|
            file.write(script)
            file.flush
            cases.each do |name, expected, values|
              _out, err, status = Open3.capture3(base.merge(values), 'bash', file.path)
              raise "authorization case failed: #{name}: #{err}" unless status.success? == expected
            end
          end
          RUBY

      - name: Verify exact PR resolution and freshness
        run: |
          set -euo pipefail
          workflow=.github/workflows/ai-review-cooperation-publisher-v2.yml
          grep -Fq 'commits/${TRIGGER_HEAD_SHA}/pulls?per_page=100' "${workflow}"
          grep -Fq '.state == "open" and .head.sha == $sha and .base.repo.full_name == $repo' "${workflow}"
          grep -Fq 'Expected one open exact-head PR' "${workflow}"
          grep -Fq 'PR_NUMBER=${resolved}' "${workflow}"
          grep -Fq 'EXPECTED_HEAD_SHA=${TRIGGER_HEAD_SHA}' "${workflow}"
          grep -Fq 'if [ "${head}" != "${EXPECTED_HEAD_SHA}" ]' "${workflow}"
          grep -Fq '[ "${current_head}" != "${evidence_head}" ]' "${workflow}"
          grep -Fq '[ "${current_head}" != "${EXPECTED_HEAD_SHA}" ]' "${workflow}"

      - name: Verify canonical publication boundary
        run: |
          set -euo pipefail
          workflow=.github/workflows/ai-review-cooperation-publisher-v2.yml
          grep -Fq 'python3 scripts/fetch-review-threads.py' "${workflow}"
          grep -Fq 'python3 scripts/ai-review-cooperation.py report' "${workflow}"
          grep -Fq '<!-- ai-review-cooperation -->' "${workflow}"
          grep -Fq '.user.login == "github-actions[bot]"' "${workflow}"
          grep -Fq 'issues/${PR_NUMBER}/comments' "${workflow}"
          grep -Fq 'GITHUB_STEP_SUMMARY' "${workflow}"

      - name: Validate embedded shell programs
        run: |
          ruby <<'RUBY'
          require 'yaml'
          require 'tempfile'
          workflow = YAML.load_file('.github/workflows/ai-review-cooperation-publisher-v2.yml')
          workflow.dig('jobs', 'publish', 'steps').each_with_index do |step, index|
            next unless step['run']
            Tempfile.create(["publisher-v2-step-#{index}", '.sh']) do |file|
              file.write(step['run'].to_s)
              file.flush
              unless system('bash', '-n', file.path, out: File::NULL, err: File::NULL)
                raise "invalid shell syntax in step #{index}: #{step['name']}"
              end
            end
          end
          RUBY
