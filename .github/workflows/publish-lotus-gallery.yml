name: Publish Lotus gallery image

on:
  push:
    branches: [feat/lotus-gallery-image]

permissions:
  contents: write

jobs:
  publish:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/lotus-gallery-image
          fetch-depth: 0
      - name: Bust catalog cache
        run: |
          sed -i 's/content="20260621-17"/content="20260621-18"/' index.html
          sed -i 's/products-extra.js?v=products-20260621-17/products-extra.js?v=products-20260621-18/' index.html
      - name: Commit published asset versions
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm .github/workflows/publish-lotus-gallery.yml
          git add index.html .github/workflows/publish-lotus-gallery.yml
          git commit -m "build: publish Lotus cheesecake gallery image" || exit 0
          git push origin HEAD:feat/lotus-gallery-image
