name: Remove integrity refresh helper

on:
  push:
    branches:
      - feat/ios-home-screen-install
    paths:
      - .github/workflows/refresh-integrity-once.yml

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: feat/ios-home-screen-install
          fetch-depth: 0

      - name: Remove this one-shot workflow
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/refresh-integrity-once.yml
          git commit -m "ci: remove one-shot integrity refresh"
          git push origin HEAD:feat/ios-home-screen-install
