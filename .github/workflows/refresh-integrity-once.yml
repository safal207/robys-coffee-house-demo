name: Refresh integrity manifest once

on:
  push:
    branches:
      - feat/ios-home-screen-install
    paths:
      - .github/workflows/refresh-integrity-once.yml

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: feat/ios-home-screen-install
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Generate canonical integrity manifest
        run: npm run integrity:generate

      - name: Commit generated manifest when changed
        run: |
          if git diff --quiet -- integrity-manifest.json; then
            echo "Integrity manifest is already canonical."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add integrity-manifest.json
          git commit -m "chore: restore canonical integrity manifest"
          git push origin HEAD:feat/ios-home-screen-install
