name: Analytics destination boundaries

on:
  pull_request:
    paths:
      - analytics.js
      - integrity-manifest.json
      - scripts/verify-analytics-destination-boundaries.mjs
      - .github/workflows/analytics-destination-boundaries.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out exact head
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24.4.1

      - name: Verify analytics destination boundaries
        run: node scripts/verify-analytics-destination-boundaries.mjs

      - name: Generate protected-file manifest
        run: node scripts/generate-integrity-manifest.mjs

      - name: Upload generated manifest evidence
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: analytics-integrity-manifest-${{ github.run_id }}
          path: integrity-manifest.json
          if-no-files-found: error
          retention-days: 7
