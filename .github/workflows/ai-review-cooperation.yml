name: AI review cooperation report

on:
  issue_comment:
    types: [created]
  workflow_run:
    workflows: [AI review contract]
    types: [completed]

permissions: {}

jobs:
  report:
    if: >-
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request != null &&
       github.event.issue.state == 'open' &&
       github.event.comment.body == '/ai-cooperation report' &&
       (github.event.comment.author_association == 'OWNER' ||
        github.event.comment.author_association == 'MEMBER' ||
        github.event.comment.author_association == 'COLLABORATOR' ||
        github.event.comment.user.login == github.repository_owner)) ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.name == 'AI review contract' &&
       github.event.workflow_run.event == 'pull_request' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_sha != '')
    permissions:
      actions: read
      checks: read
      contents: read
      issues: write
      pull-requests: read
      statuses: read
    concurrency:
      group: ai-review-cooperation-${{ github.event.issue.number || github.event.workflow_run.head_sha || github.run_id }}
      cancel-in-progress: true
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      GH_TOKEN: ${{ github.token }}
      REPOSITORY: ${{ github.repository }}
      REPOSITORY_OWNER: ${{ github.repository_owner }}
      TRIGGER_EVENT: ${{ github.event_name }}
      PR_NUMBER: ${{ github.event.issue.number || '' }}
      TRIGGER_AUTHOR: ${{ github.event.comment.user.login || github.event.workflow_run.actor.login || '' }}
      TRIGGER_ASSOCIATION: ${{ github.event.comment.author_association || '' }}
      WORKFLOW_NAME: ${{ github.event.workflow_run.name || '' }}
      WORKFLOW_EVENT: ${{ github.event.workflow_run.event || '' }}
      WORKFLOW_CONCLUSION: ${{ github.event.workflow_run.conclusion || '' }}
      TRIGGER_HEAD_SHA: ${{ github.event.workflow_run.head_sha || '' }}

    steps:
      - name: Authorize cooperation trigger
        run: |
          set -euo pipefail
          case "${TRIGGER_EVENT}" in
            issue_comment)
              case "${TRIGGER_ASSOCIATION:-NONE}" in
                OWNER|MEMBER|COLLABORATOR)
                  ;;
                *)
                  if [ "${TRIGGER_AUTHOR}" != "${REPOSITORY_OWNER}" ]; then
                    echo "Unauthorized cooperation-report command actor: ${TRIGGER_AUTHOR}" >&2
                    exit 1
                  fi
                  ;;
              esac
              if ! [[ "${PR_NUMBER}" =~ ^[1-9][0-9]*$ ]]; then
                echo "Trusted command is missing a valid PR number: ${PR_NUMBER:-missing}" >&2
                exit 1
              fi
              ;;
            workflow_run)
              if [ "${WORKFLOW_NAME}" != "AI review contract" ] ||
                 [ "${WORKFLOW_EVENT}" != "pull_request" ] ||
                 [ "${WORKFLOW_CONCLUSION}" != "success" ] ||
                 [ -z "${TRIGGER_HEAD_SHA}" ]; then
                echo "Unauthorized workflow_run trigger: name=${WORKFLOW_NAME:-missing} event=${WORKFLOW_EVENT:-missing} conclusion=${WORKFLOW_CONCLUSION:-missing} head=${TRIGGER_HEAD_SHA:-missing}" >&2
                exit 1
              fi
              ;;
            *)
              echo "Unsupported cooperation trigger event: ${TRIGGER_EVENT}" >&2
              exit 1
              ;;
          esac

      - name: Checkout trusted reporter code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.repository.default_branch }}
          persist-credentials: false
          show-progress: false

      - name: Resolve workflow-run pull request
        run: |
          set -euo pipefail
          if [ "${TRIGGER_EVENT}" != "workflow_run" ]; then
            exit 0
          fi

          candidates_file="${RUNNER_TEMP}/workflow-run-pr-candidates.json"
          gh api -H 'Accept: application/vnd.github+json' \
            "repos/${REPOSITORY}/commits/${TRIGGER_HEAD_SHA}/pulls?per_page=100" \
            > "${candidates_file}"

          matches_file="${RUNNER_TEMP}/workflow-run-pr-matches.json"
          jq --arg sha "${TRIGGER_HEAD_SHA}" --arg repo "${REPOSITORY}" \
            '[.[] | select(.state == "open" and .head.sha == $sha and .base.repo.full_name == $repo)]' \
            "${candidates_file}" > "${matches_file}"

          match_count="$(jq 'length' "${matches_file}")"
          if [ "${match_count}" != "1" ]; then
            echo "Expected exactly one open PR for workflow head ${TRIGGER_HEAD_SHA}; found ${match_count}." >&2
            exit 1
          fi

          resolved_pr="$(jq -r '.[0].number' "${matches_file}")"
          if ! [[ "${resolved_pr}" =~ ^[1-9][0-9]*$ ]]; then
            echo "Resolved invalid PR number: ${resolved_pr}" >&2
            exit 1
          fi
          echo "PR_NUMBER=${resolved_pr}" >> "${GITHUB_ENV}"

      - name: Configure cooperation evidence paths
        run: |
          prefix="${RUNNER_TEMP}/cooperation-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          {
            echo "PR_JSON_FILE=${prefix}-pr.json"
            echo "HEAD_COMMIT_FILE=${prefix}-head.json"
            echo "COMMENTS_FILE=${prefix}-comments.json"
            echo "REVIEWS_FILE=${prefix}-reviews.json"
            echo "REVIEW_COMMENTS_FILE=${prefix}-review-comments.json"
            echo "THREADS_FILE=${prefix}-threads.json"
            echo "CHECKS_FILE=${prefix}-checks.json"
            echo "STATUSES_FILE=${prefix}-statuses.json"
            echo "FILES_FILE=${prefix}-files.json"
            echo "COMMENT_FILE=${prefix}-comment.json"
          } >> "${GITHUB_ENV}"

      - name: Collect complete exact-head evidence
        run: |
          set -euo pipefail
          gh api "repos/${REPOSITORY}/pulls/${PR_NUMBER}" > "${PR_JSON_FILE}"
          state="$(jq -r '.state' "${PR_JSON_FILE}")"
          head="$(jq -r '.head.sha' "${PR_JSON_FILE}")"
          if [ "${state}" != "open" ]; then
            echo "Cooperation report requires an open pull request." >&2
            exit 1
          fi
          if [ "${TRIGGER_EVENT}" = "workflow_run" ] && [ "${TRIGGER_HEAD_SHA}" != "${head}" ]; then
            echo "Workflow trigger is not bound to the current PR head: ${TRIGGER_HEAD_SHA} != ${head}" >&2
            exit 1
          fi

          gh api "repos/${REPOSITORY}/commits/${head}" > "${HEAD_COMMIT_FILE}"
          gh api --paginate --slurp "repos/${REPOSITORY}/issues/${PR_NUMBER}/comments?per_page=100" | jq 'add // []' > "${COMMENTS_FILE}"
          gh api --paginate --slurp "repos/${REPOSITORY}/pulls/${PR_NUMBER}/reviews?per_page=100" | jq 'add // []' > "${REVIEWS_FILE}"
          gh api --paginate --slurp "repos/${REPOSITORY}/pulls/${PR_NUMBER}/comments?per_page=100" | jq 'add // []' > "${REVIEW_COMMENTS_FILE}"
          gh api --paginate --slurp "repos/${REPOSITORY}/pulls/${PR_NUMBER}/files?per_page=100" | jq 'add // []' > "${FILES_FILE}"
          gh api --paginate -H 'Accept: application/vnd.github+json' \
            "repos/${REPOSITORY}/commits/${head}/check-runs?per_page=100" \
            | jq -s '{check_runs: (map(.check_runs // []) | add // [])}' > "${CHECKS_FILE}"
          gh api --paginate --slurp "repos/${REPOSITORY}/commits/${head}/statuses?per_page=100" | jq 'add // []' > "${STATUSES_FILE}"

      - name: Collect complete GraphQL review threads
        run: python3 scripts/fetch-review-threads.py

      - name: Build Codex-only cooperation report
        run: python3 scripts/ai-review-cooperation.py report

      - name: Publish or update cooperation report
        run: |
          set -euo pipefail
          expected_head="$(jq -r '.head.sha' "${PR_JSON_FILE}")"
          current="$(gh api "repos/${REPOSITORY}/pulls/${PR_NUMBER}")"
          current_state="$(jq -r '.state' <<<"${current}")"
          current_head="$(jq -r '.head.sha' <<<"${current}")"
          if [ "${current_state}" != "open" ]; then
            echo "PR was closed before publishing the cooperation report." >&2
            exit 1
          fi
          if [ "${current_head}" != "${expected_head}" ]; then
            echo "PR head changed before publishing: ${expected_head} -> ${current_head}" >&2
            exit 1
          fi

          test -s "${COMMENT_FILE}"
          jq -e '.body | type == "string" and length > 0' "${COMMENT_FILE}" >/dev/null
          body_bytes="$(jq -r '.body' "${COMMENT_FILE}" | wc -c | tr -d ' ')"
          if [ "${body_bytes}" -gt 65000 ]; then
            echo "Cooperation report body is too large: ${body_bytes} bytes" >&2
            exit 1
          fi

          existing_id="$(
            gh api --paginate "repos/${REPOSITORY}/issues/${PR_NUMBER}/comments?sort=created&direction=asc&per_page=100" \
              --jq '.[] | select(.user.login == "github-actions[bot]" and (.body | contains("<!-- ai-review-cooperation -->"))) | .id' \
              | tail -n 1
          )"
          if [ -n "${existing_id}" ]; then
            gh api --method PATCH "repos/${REPOSITORY}/issues/comments/${existing_id}" \
              -H 'Accept: application/vnd.github+json' --input "${COMMENT_FILE}"
          else
            gh api --method POST "repos/${REPOSITORY}/issues/${PR_NUMBER}/comments" \
              -H 'Accept: application/vnd.github+json' --input "${COMMENT_FILE}"
          fi

      - name: Summarize reporter failure
        if: ${{ failure() }}
        run: |
          {
            echo "## AI cooperation reporter failed"
            echo
            echo "Trigger: ${TRIGGER_EVENT}"
            echo "Head: ${TRIGGER_HEAD_SHA:-unknown}"
            echo "Qodo and CodeRabbit remain disabled; this diagnostic does not count as reviewer evidence."
          } >> "${GITHUB_STEP_SUMMARY}"
