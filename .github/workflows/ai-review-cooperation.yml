name: AI review cooperation report

on:
  issue_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  workflow_run:
    workflows: [AI review contract]
    types: [completed]

permissions: {}

jobs:
  report:
    if: >-
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request != null &&
       github.event.comment.body == '/ai-cooperation report' &&
       (github.event.comment.author_association == 'OWNER' ||
        github.event.comment.author_association == 'MEMBER' ||
        github.event.comment.author_association == 'COLLABORATOR' ||
        github.event.comment.user.login == github.repository_owner)) ||
      (github.event_name == 'pull_request_review' &&
       github.event.review.state != 'pending' &&
       github.event.review.state != 'dismissed' &&
       github.event.review.commit_id == github.event.pull_request.head.sha &&
       github.event.review.user.type == 'Bot' &&
       (github.event.review.user.login == 'qodo-code-review' ||
        github.event.review.user.login == 'qodo-code-review[bot]' ||
        github.event.review.user.login == 'chatgpt-codex-connector' ||
        github.event.review.user.login == 'chatgpt-codex-connector[bot]')) ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.name == 'AI review contract' &&
       github.event.workflow_run.event == 'pull_request_target' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_sha != '')
    permissions:
      actions: read
      checks: read
      contents: read
      issues: write
      pull-requests: read
    concurrency:
      group: >-
        ai-review-cooperation-${{
          ((github.event_name == 'issue_comment' &&
            github.event.issue.pull_request != null &&
            github.event.comment.body == '/ai-cooperation report' &&
            (github.event.comment.author_association == 'OWNER' ||
             github.event.comment.author_association == 'MEMBER' ||
             github.event.comment.author_association == 'COLLABORATOR' ||
             github.event.comment.user.login == github.repository_owner)) ||
           (github.event_name == 'pull_request_review' &&
            github.event.review.state != 'pending' &&
            github.event.review.state != 'dismissed' &&
            github.event.review.commit_id == github.event.pull_request.head.sha &&
            github.event.review.user.type == 'Bot' &&
            (github.event.review.user.login == 'qodo-code-review' ||
             github.event.review.user.login == 'qodo-code-review[bot]' ||
             github.event.review.user.login == 'chatgpt-codex-connector' ||
             github.event.review.user.login == 'chatgpt-codex-connector[bot]'))) &&
          (github.event.issue.number || github.event.pull_request.number) ||
          (github.event_name == 'workflow_run' &&
           github.event.workflow_run.name == 'AI review contract' &&
           github.event.workflow_run.event == 'pull_request_target' &&
           github.event.workflow_run.conclusion == 'success' &&
           github.event.workflow_run.head_sha != '' &&
           format('workflow-{0}', github.event.workflow_run.head_sha)) ||
          github.run_id
        }}
      cancel-in-progress: true
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      GH_TOKEN: ${{ github.token }}
      REPOSITORY: ${{ github.repository }}
      REPOSITORY_OWNER: ${{ github.repository_owner }}
      TRIGGER_EVENT: ${{ github.event_name }}
      PR_NUMBER: ${{ github.event.issue.number || github.event.pull_request.number || github.event.workflow_run.pull_requests[0].number }}
      TRIGGER_AUTHOR: ${{ github.event.comment.user.login || github.event.review.user.login || github.event.workflow_run.actor.login }}
      TRIGGER_ASSOCIATION: ${{ github.event.comment.author_association || github.event.review.author_association || '' }}
      REVIEW_STATE: ${{ github.event.review.state || '' }}
      REVIEW_COMMIT: ${{ github.event.review.commit_id || '' }}
      REVIEW_USER_TYPE: ${{ github.event.review.user.type || '' }}
      PR_HEAD_SHA: ${{ github.event.pull_request.head.sha || '' }}
      WORKFLOW_NAME: ${{ github.event.workflow_run.name || '' }}
      WORKFLOW_EVENT: ${{ github.event.workflow_run.event || '' }}
      WORKFLOW_CONCLUSION: ${{ github.event.workflow_run.conclusion || '' }}
      TRIGGER_HEAD_SHA: ${{ github.event.review.commit_id || github.event.workflow_run.head_sha || '' }}

    steps:
      - name: Authorize cooperation trigger
        id: authorize
        run: |
          set -euo pipefail
          echo "Cooperation trigger event: ${TRIGGER_EVENT}"
          echo "Cooperation trigger actor: ${TRIGGER_AUTHOR}"
          echo "GitHub author association: ${TRIGGER_ASSOCIATION:-NONE}"
          echo "Repository owner: ${REPOSITORY_OWNER}"

          case "${TRIGGER_EVENT}" in
            issue_comment)
              case "${TRIGGER_ASSOCIATION:-NONE}" in
                OWNER|MEMBER|COLLABORATOR)
                  echo "Authorized command by trusted repository association."
                  ;;
                *)
                  if [ "${TRIGGER_AUTHOR}" != "${REPOSITORY_OWNER}" ]; then
                    echo "Unauthorized cooperation-report command actor: ${TRIGGER_AUTHOR}" >&2
                    exit 1
                  fi
                  echo "Authorized command by exact repository-owner identity."
                  ;;
              esac
              ;;
            pull_request_review)
              case "${REVIEW_STATE}" in
                pending|dismissed|'')
                  echo "Review trigger is not an active submitted review: ${REVIEW_STATE:-missing}" >&2
                  exit 1
                  ;;
              esac
              if [ -z "${REVIEW_COMMIT}" ] || [ -z "${PR_HEAD_SHA}" ] || [ "${REVIEW_COMMIT}" != "${PR_HEAD_SHA}" ]; then
                echo "Review trigger is not bound to the current PR head: ${REVIEW_COMMIT:-missing} != ${PR_HEAD_SHA:-missing}" >&2
                exit 1
              fi
              if [ "${REVIEW_USER_TYPE}" != "Bot" ]; then
                echo "Review trigger actor is not a bot: ${REVIEW_USER_TYPE:-missing}" >&2
                exit 1
              fi
              case "${TRIGGER_AUTHOR}" in
                qodo-code-review|qodo-code-review\[bot\]|chatgpt-codex-connector|chatgpt-codex-connector\[bot\])
                  echo "Authorized by native exact-head active reviewer Bot."
                  ;;
                *)
                  echo "Unauthorized review trigger actor: ${TRIGGER_AUTHOR}" >&2
                  exit 1
                  ;;
              esac
              ;;
            workflow_run)
              if [ "${WORKFLOW_NAME}" != "AI review contract" ] || [ "${WORKFLOW_EVENT}" != "pull_request_target" ] || [ "${WORKFLOW_CONCLUSION}" != "success" ]; then
                echo "Unauthorized workflow_run trigger: name=${WORKFLOW_NAME:-missing} event=${WORKFLOW_EVENT:-missing} conclusion=${WORKFLOW_CONCLUSION:-missing}" >&2
                exit 1
              fi
              if [ -z "${TRIGGER_HEAD_SHA}" ]; then
                echo "workflow_run trigger is missing head SHA." >&2
                exit 1
              fi
              echo "Authorized by successful AI review contract workflow_run."
              ;;
            *)
              echo "Unsupported cooperation trigger event: ${TRIGGER_EVENT}" >&2
              exit 1
              ;;
          esac

      - name: Checkout trusted reporter code
        id: checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.repository.default_branch }}
          persist-credentials: false

      - name: Resolve workflow-run pull request
        id: resolve_pr
        run: |
          set -euo pipefail
          if [ "${TRIGGER_EVENT}" != "workflow_run" ]; then
            if [ -z "${PR_NUMBER}" ]; then
              echo "Trusted trigger is missing a PR number." >&2
              exit 1
            fi
            echo "PR number supplied by event payload: ${PR_NUMBER}"
            exit 0
          fi

          candidates_file="${RUNNER_TEMP}/workflow-run-pr-candidates.json"
          gh api -H 'Accept: application/vnd.github+json' \
            "repos/${REPOSITORY}/commits/${TRIGGER_HEAD_SHA}/pulls?per_page=100" \
            > "${candidates_file}"

          matches_file="${RUNNER_TEMP}/workflow-run-pr-matches.json"
          jq --arg sha "${TRIGGER_HEAD_SHA}" --arg repo "${REPOSITORY}" \
            '[.[] | select(.state == "open" and .head.sha == $sha and .base.repo.full_name == $repo)]' \
            "${candidates_file}" > "${matches_file}"

          match_count="$(jq 'length' "${matches_file}")"
          if [ "${match_count}" != "1" ]; then
            echo "Expected exactly one open PR for workflow head ${TRIGGER_HEAD_SHA}; found ${match_count}." >&2
            exit 1
          fi

          resolved_pr="$(jq -r '.[0].number' "${matches_file}")"
          if ! [[ "${resolved_pr}" =~ ^[1-9][0-9]*$ ]]; then
            echo "Resolved invalid PR number: ${resolved_pr}" >&2
            exit 1
          fi
          echo "PR_NUMBER=${resolved_pr}" >> "${GITHUB_ENV}"
          echo "Resolved workflow head ${TRIGGER_HEAD_SHA} to PR #${resolved_pr}."

      - name: Configure cooperation temp paths
        id: configure
        run: |
          prefix="${RUNNER_TEMP}/cooperation-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          {
            echo "PR_JSON_FILE=${prefix}-pr.json"
            echo "HEAD_COMMIT_FILE=${prefix}-head.json"
            echo "COMMENTS_FILE=${prefix}-comments.json"
            echo "REVIEWS_FILE=${prefix}-reviews.json"
            echo "REVIEW_COMMENTS_FILE=${prefix}-review-comments.json"
            echo "THREADS_FILE=${prefix}-threads.json"
            echo "RAW_CHECKS_FILE=${prefix}-checks-raw.json"
            echo "CHECKS_FILE=${prefix}-checks.json"
            echo "STATUSES_FILE=${prefix}-statuses.json"
            echo "FILES_FILE=${prefix}-files.json"
            echo "COMMENT_FILE=${prefix}-comment.json"
          } >> "${GITHUB_ENV}"

      - name: Collect exact-head REST evidence
        id: rest_evidence
        run: |
          set -euo pipefail
          gh api "repos/${REPOSITORY}/pulls/${PR_NUMBER}" > "${PR_JSON_FILE}"
          HEAD_SHA="$(jq -r '.head.sha' "${PR_JSON_FILE}")"
          if [ "${TRIGGER_EVENT}" = "workflow_run" ] && [ "${TRIGGER_HEAD_SHA}" != "${HEAD_SHA}" ]; then
            echo "Workflow trigger is not bound to the current PR head: ${TRIGGER_HEAD_SHA} != ${HEAD_SHA}" >&2
            exit 1
          fi
          gh api "repos/${REPOSITORY}/commits/${HEAD_SHA}" > "${HEAD_COMMIT_FILE}"
          gh api --paginate --slurp \
            "repos/${REPOSITORY}/issues/${PR_NUMBER}/comments?per_page=100" \
            | jq 'add // []' > "${COMMENTS_FILE}"
          gh api --paginate --slurp \
            "repos/${REPOSITORY}/pulls/${PR_NUMBER}/reviews?per_page=100" \
            | jq 'add // []' > "${REVIEWS_FILE}"
          gh api --paginate --slurp \
            "repos/${REPOSITORY}/pulls/${PR_NUMBER}/comments?per_page=100" \
            | jq 'add // []' > "${REVIEW_COMMENTS_FILE}"
          gh api --paginate --slurp \
            "repos/${REPOSITORY}/pulls/${PR_NUMBER}/files?per_page=100" \
            | jq 'add // []' > "${FILES_FILE}"
          gh api --paginate -H 'Accept: application/vnd.github+json' \
            "repos/${REPOSITORY}/commits/${HEAD_SHA}/check-runs?per_page=100" \
            | jq -s '{check_runs: (map(.check_runs // []) | add // [])}' \
            > "${CHECKS_FILE}"
          printf '[]\n' > "${STATUSES_FILE}"

      - name: Collect complete GraphQL review evidence
        id: graphql_evidence
        run: python3 scripts/fetch-review-threads.py

      - name: Build causal cooperation report
        id: build_report
        run: python3 scripts/ai-review-cooperation.py report

      - name: Publish or update cooperation report
        id: publish_report
        run: |
          set -euo pipefail

          EXPECTED_HEAD="$(jq -r '.head.sha' "${PR_JSON_FILE}")"
          CURRENT_HEAD="$(gh api "repos/${REPOSITORY}/pulls/${PR_NUMBER}" --jq '.head.sha')"
          if [ "${CURRENT_HEAD}" != "${EXPECTED_HEAD}" ]; then
            echo "PR head changed before publishing: ${EXPECTED_HEAD} -> ${CURRENT_HEAD}" >&2
            exit 1
          fi

          test -s "${COMMENT_FILE}"
          jq -e '.body | type == "string" and length > 0' "${COMMENT_FILE}" >/dev/null
          body_bytes="$(jq -r '.body' "${COMMENT_FILE}" | wc -c | tr -d ' ')"
          echo "Cooperation report body bytes: ${body_bytes}"
          if [ "${body_bytes}" -gt 65000 ]; then
            echo "Cooperation report body is too large for a GitHub issue comment: ${body_bytes} bytes" >&2
            exit 1
          fi

          existing_id="$(
            gh api --paginate "repos/${REPOSITORY}/issues/${PR_NUMBER}/comments" \
              --jq '.[] | select(.user.login == "github-actions[bot]" and (.body | contains("<!-- ai-review-cooperation -->"))) | .id' \
              | tail -n 1
          )"

          if [ -n "${existing_id}" ]; then
            echo "Updating existing cooperation report comment ${existing_id}"
            gh api --method PATCH "repos/${REPOSITORY}/issues/comments/${existing_id}" \
              -H 'Accept: application/vnd.github+json' \
              --input "${COMMENT_FILE}"
          else
            echo "Creating new cooperation report comment"
            gh api --method POST "repos/${REPOSITORY}/issues/${PR_NUMBER}/comments" \
              -H 'Accept: application/vnd.github+json' \
              --input "${COMMENT_FILE}"
          fi

      - name: Publish reporter failure diagnostic
        if: ${{ failure() }}
        env:
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          AUTHORIZE_OUTCOME: ${{ steps.authorize.outcome }}
          CHECKOUT_OUTCOME: ${{ steps.checkout.outcome }}
          RESOLVE_OUTCOME: ${{ steps.resolve_pr.outcome }}
          CONFIGURE_OUTCOME: ${{ steps.configure.outcome }}
          REST_OUTCOME: ${{ steps.rest_evidence.outcome }}
          GRAPHQL_OUTCOME: ${{ steps.graphql_evidence.outcome }}
          BUILD_OUTCOME: ${{ steps.build_report.outcome }}
          PUBLISH_OUTCOME: ${{ steps.publish_report.outcome }}
        run: |
          set -euo pipefail
          printf -v body '%s\n' \
            '<!-- ai-review-cooperation-diagnostic -->' \
            '## AI cooperation reporter failed / AI işbirliği raporlayıcısı başarısız / Сбой репортера AI-взаимодействия' \
            '' \
            "The trusted reporter did not publish a cooperation report for PR #${PR_NUMBER:-unknown}." \
            "Güvenilir raporlayıcı PR #${PR_NUMBER:-unknown} için işbirliği raporunu yayımlamadı." \
            "Доверенный репортер не опубликовал отчет о взаимодействии для PR #${PR_NUMBER:-unknown}." \
            '' \
            '| Stage / Aşama / Этап | Outcome / Sonuç / Результат |' \
            '|---|---|' \
            "| authorize / yetkilendirme / авторизация | ${AUTHORIZE_OUTCOME:-unknown} |" \
            "| checkout / kaynak kodu alma / получение кода | ${CHECKOUT_OUTCOME:-unknown} |" \
            "| resolve PR / PR çözümleme / определение PR | ${RESOLVE_OUTCOME:-unknown} |" \
            "| configure / yapılandırma / настройка | ${CONFIGURE_OUTCOME:-unknown} |" \
            "| REST evidence / REST kanıtı / REST-доказательства | ${REST_OUTCOME:-unknown} |" \
            "| GraphQL evidence / GraphQL kanıtı / GraphQL-доказательства | ${GRAPHQL_OUTCOME:-unknown} |" \
            "| build report / rapor oluşturma / построение отчета | ${BUILD_OUTCOME:-unknown} |" \
            "| publish report / raporu yayımlama / публикация отчета | ${PUBLISH_OUTCOME:-unknown} |" \
            '' \
            "Run / Çalıştırma / Запуск: ${RUN_URL}"

          if ! [[ "${PR_NUMBER:-}" =~ ^[1-9][0-9]*$ ]]; then
            echo "Cannot publish diagnostic because PR resolution did not produce a valid PR number." >&2
            exit 1
          fi
          diagnostic_payload="${RUNNER_TEMP}/cooperation-diagnostic.json"
          jq -n --arg body "${body}" '{body: $body}' > "${diagnostic_payload}"
          existing_diagnostic_id="$(
            gh api --paginate "repos/${REPOSITORY}/issues/${PR_NUMBER}/comments" \
              --jq '.[] | select(.user.login == "github-actions[bot]" and (.body | contains("<!-- ai-review-cooperation-diagnostic -->"))) | .id' \
              | tail -n 1
          )"

          if [ -n "${existing_diagnostic_id}" ]; then
            gh api --method PATCH "repos/${REPOSITORY}/issues/comments/${existing_diagnostic_id}" \
              -H 'Accept: application/vnd.github+json' \
              --input "${diagnostic_payload}"
          else
            gh api --method POST "repos/${REPOSITORY}/issues/${PR_NUMBER}/comments" \
              -H 'Accept: application/vnd.github+json' \
              --input "${diagnostic_payload}"
          fi
