name: AI review cooperation report

on:
  issue_comment:
    types: [created]

permissions:
  checks: read
  contents: read
  issues: write
  pull-requests: read

jobs:
  report:
    if: >-
      github.event.issue.pull_request != null &&
      github.event.comment.body == '/ai-cooperation report' &&
      (github.event.comment.author_association == 'OWNER' ||
       github.event.comment.author_association == 'MEMBER' ||
       github.event.comment.author_association == 'COLLABORATOR')
    concurrency:
      group: ai-review-cooperation-${{ github.event.issue.number }}
      cancel-in-progress: true
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      GH_TOKEN: ${{ github.token }}
      REPOSITORY: ${{ github.repository }}
      PR_NUMBER: ${{ github.event.issue.number }}

    steps:
      - name: Checkout trusted reporter code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.repository.default_branch }}
          persist-credentials: false

      - name: Collect exact-head evidence
        run: |
          gh api "repos/${REPOSITORY}/pulls/${PR_NUMBER}" > /tmp/cooperation-pr.json
          HEAD_SHA="$(jq -r '.head.sha' /tmp/cooperation-pr.json)"
          gh api "repos/${REPOSITORY}/commits/${HEAD_SHA}" > /tmp/cooperation-head-commit.json
          gh api --paginate --slurp \
            "repos/${REPOSITORY}/issues/${PR_NUMBER}/comments?per_page=100" \
            | jq 'add' > /tmp/cooperation-comments.json
          gh api --paginate --slurp \
            "repos/${REPOSITORY}/pulls/${PR_NUMBER}/reviews?per_page=100" \
            | jq 'add' > /tmp/cooperation-reviews.json
          gh api --paginate --slurp \
            "repos/${REPOSITORY}/pulls/${PR_NUMBER}/comments?per_page=100" \
            | jq 'add' > /tmp/cooperation-review-comments.json
          gh api --paginate --slurp \
            "repos/${REPOSITORY}/pulls/${PR_NUMBER}/files?per_page=100" \
            | jq 'add' > /tmp/cooperation-files.json
          gh api -H 'Accept: application/vnd.github+json' \
            "repos/${REPOSITORY}/commits/${HEAD_SHA}/check-runs?per_page=100" \
            > /tmp/cooperation-checks.json
          OWNER="${REPOSITORY%%/*}"
          NAME="${REPOSITORY#*/}"
          gh api graphql \
            -f owner="${OWNER}" \
            -f name="${NAME}" \
            -F number="${PR_NUMBER}" \
            -f query='query($owner:String!,$name:String!,$number:Int!){repository(owner:$owner,name:$name){pullRequest(number:$number){reviewThreads(first:100){nodes{isResolved comments(first:100){nodes{body createdAt author{login} commit{oid}}}}}}}}' \
            > /tmp/cooperation-threads.json

      - name: Build causal cooperation report
        env:
          PR_JSON_FILE: /tmp/cooperation-pr.json
          HEAD_COMMIT_FILE: /tmp/cooperation-head-commit.json
          COMMENTS_FILE: /tmp/cooperation-comments.json
          REVIEWS_FILE: /tmp/cooperation-reviews.json
          REVIEW_COMMENTS_FILE: /tmp/cooperation-review-comments.json
          THREADS_FILE: /tmp/cooperation-threads.json
          CHECKS_FILE: /tmp/cooperation-checks.json
          FILES_FILE: /tmp/cooperation-files.json
          COMMENT_FILE: /tmp/ai-review-cooperation-comment.json
        run: python3 scripts/ai-review-cooperation.py report

      - name: Reject stale report
        run: |
          EXPECTED_HEAD="$(jq -r '.head.sha' /tmp/cooperation-pr.json)"
          CURRENT_HEAD="$(gh api "repos/${REPOSITORY}/pulls/${PR_NUMBER}" --jq '.head.sha')"
          test "${CURRENT_HEAD}" = "${EXPECTED_HEAD}"

      - name: Publish or update cooperation report
        run: |
          existing_id="$(
            gh api --paginate "repos/${REPOSITORY}/issues/${PR_NUMBER}/comments" \
              --jq '.[] | select(.user.login == "github-actions[bot]" and (.body | contains("<!-- ai-review-cooperation -->"))) | .id' \
              | tail -n 1
          )"
          if [ -n "${existing_id}" ]; then
            gh api --method PATCH "repos/${REPOSITORY}/issues/comments/${existing_id}" \
              --input /tmp/ai-review-cooperation-comment.json
          else
            gh api --method POST "repos/${REPOSITORY}/issues/${PR_NUMBER}/comments" \
              --input /tmp/ai-review-cooperation-comment.json
          fi
