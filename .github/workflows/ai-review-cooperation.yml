name: AI review cooperation report

on:
  issue_comment:
    types: [created]

permissions: {}

jobs:
  report:
    if: >-
      github.event.issue.pull_request != null &&
      github.event.comment.body == '/ai-cooperation report' &&
      (github.event.comment.author_association == 'OWNER' ||
       github.event.comment.author_association == 'MEMBER' ||
       github.event.comment.author_association == 'COLLABORATOR')
    permissions:
      checks: read
      contents: read
      issues: write
      pull-requests: read
    concurrency:
      group: ai-review-cooperation-${{ github.event.issue.number }}
      cancel-in-progress: true
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      GH_TOKEN: ${{ github.token }}
      REPOSITORY: ${{ github.repository }}
      PR_NUMBER: ${{ github.event.issue.number }}
      PR_JSON_FILE: ${{ runner.temp }}/cooperation-${{ github.run_id }}-${{ github.run_attempt }}-pr.json
      HEAD_COMMIT_FILE: ${{ runner.temp }}/cooperation-${{ github.run_id }}-${{ github.run_attempt }}-head.json
      COMMENTS_FILE: ${{ runner.temp }}/cooperation-${{ github.run_id }}-${{ github.run_attempt }}-comments.json
      REVIEWS_FILE: ${{ runner.temp }}/cooperation-${{ github.run_id }}-${{ github.run_attempt }}-reviews.json
      REVIEW_COMMENTS_FILE: ${{ runner.temp }}/cooperation-${{ github.run_id }}-${{ github.run_attempt }}-review-comments.json
      THREADS_FILE: ${{ runner.temp }}/cooperation-${{ github.run_id }}-${{ github.run_attempt }}-threads.json
      CHECKS_FILE: ${{ runner.temp }}/cooperation-${{ github.run_id }}-${{ github.run_attempt }}-checks.json
      FILES_FILE: ${{ runner.temp }}/cooperation-${{ github.run_id }}-${{ github.run_attempt }}-files.json
      COMMENT_FILE: ${{ runner.temp }}/cooperation-${{ github.run_id }}-${{ github.run_attempt }}-comment.json

    steps:
      - name: Checkout trusted reporter code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.repository.default_branch }}
          persist-credentials: false

      - name: Collect exact-head REST evidence
        run: |
          gh api "repos/${REPOSITORY}/pulls/${PR_NUMBER}" > "${PR_JSON_FILE}"
          HEAD_SHA="$(jq -r '.head.sha' "${PR_JSON_FILE}")"
          gh api "repos/${REPOSITORY}/commits/${HEAD_SHA}" > "${HEAD_COMMIT_FILE}"
          gh api --paginate --slurp \
            "repos/${REPOSITORY}/issues/${PR_NUMBER}/comments?per_page=100" \
            | jq 'add // []' > "${COMMENTS_FILE}"
          gh api --paginate --slurp \
            "repos/${REPOSITORY}/pulls/${PR_NUMBER}/reviews?per_page=100" \
            | jq 'add // []' > "${REVIEWS_FILE}"
          gh api --paginate --slurp \
            "repos/${REPOSITORY}/pulls/${PR_NUMBER}/comments?per_page=100" \
            | jq 'add // []' > "${REVIEW_COMMENTS_FILE}"
          gh api --paginate --slurp \
            "repos/${REPOSITORY}/pulls/${PR_NUMBER}/files?per_page=100" \
            | jq 'add // []' > "${FILES_FILE}"
          gh api --paginate -H 'Accept: application/vnd.github+json' \
            "repos/${REPOSITORY}/commits/${HEAD_SHA}/check-runs?per_page=100" \
            | jq -s '{check_runs: (map(.check_runs // []) | add // [])}' \
            > "${CHECKS_FILE}"

      - name: Collect complete GraphQL review evidence
        run: python3 scripts/fetch-review-threads.py

      - name: Build causal cooperation report
        run: python3 scripts/ai-review-cooperation.py report

      - name: Publish or update cooperation report
        run: |
          EXPECTED_HEAD="$(jq -r '.head.sha' "${PR_JSON_FILE}")"
          CURRENT_HEAD="$(gh api "repos/${REPOSITORY}/pulls/${PR_NUMBER}" --jq '.head.sha')"
          if [ "${CURRENT_HEAD}" != "${EXPECTED_HEAD}" ]; then
            echo "PR head changed before publishing: ${EXPECTED_HEAD} -> ${CURRENT_HEAD}" >&2
            exit 1
          fi
          test -f "${COMMENT_FILE}"
          existing_id="$(
            gh api --paginate "repos/${REPOSITORY}/issues/${PR_NUMBER}/comments" \
              --jq '.[] | select(.user.login == "github-actions[bot]" and (.body | contains("<!-- ai-review-cooperation -->"))) | .id' \
              | tail -n 1
          )"
          if [ -n "${existing_id}" ]; then
            gh api --method PATCH "repos/${REPOSITORY}/issues/comments/${existing_id}" \
              --input "${COMMENT_FILE}"
          else
            gh api --method POST "repos/${REPOSITORY}/issues/${PR_NUMBER}/comments" \
              --input "${COMMENT_FILE}"
          fi
