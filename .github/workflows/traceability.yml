name: Feature traceability contract

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  traceability:
    name: TRACE-001 feature matrix
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout exact head
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Validate feature, state and layer traceability
        run: npm run verify:traceability
