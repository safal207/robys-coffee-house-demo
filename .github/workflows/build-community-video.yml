name: Finalize native community reel

on:
  push:
    branches:
      - feature/instagram-reel-footer
    paths:
      - .github/workflows/build-community-video.yml
  pull_request:
    branches:
      - main
    types: [synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  finalize:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: feature/instagram-reel-footer
          fetch-depth: 1
          show-progress: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Reconstruct and install native reel
        run: node scripts/finalize-community-video.mjs

      - name: Refresh integrity manifest
        run: npm run integrity:generate

      - name: Verify application and both videos
        run: |
          npm run check
          npm run verify:media

      - name: Remove one-time build helpers
        run: rm -f scripts/finalize-community-video.mjs .github/workflows/build-community-video.yml

      - name: Commit final community reel
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: play the Roby's community reel natively"
          git push origin HEAD:feature/instagram-reel-footer
