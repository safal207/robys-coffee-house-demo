name: Temporary apply PR 167 synchronized tree

on:
  push:
    branches:
      - fix/close-pairing-catalog-tail

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out PR branch
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Apply exact synchronized tree
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin \
            refs/heads/sync/pr-167-main-20260706:refs/remotes/origin/sync/pr-167-main-20260706
          git read-tree --reset -u origin/sync/pr-167-main-20260706
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all
          git diff --cached --check
          git commit -m "chore: rebase PR #167 onto trusted main"
          git push origin HEAD:fix/close-pairing-catalog-tail
