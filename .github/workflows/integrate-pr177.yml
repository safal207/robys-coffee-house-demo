name: Publish reviewer policy alignment

on:
  push:
    branches: [integrate-pr177-main]

permissions:
  contents: write
  issues: write
  statuses: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      EXPECTED_HEAD: 247b20cf51410a7f39bd141dfc1dfda5fa42ef96
      TARGET_BRANCH: fix/reviewer-policy-alignment
    steps:
      - name: Check out governance branch
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: fix/reviewer-policy-alignment
          fetch-depth: 0
      - name: Apply reviewed governance patch
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$EXPECTED_HEAD"
          git config user.name "Roby's governance bot"
          git config user.email "governance@users.noreply.github.com"
          git fetch origin integrate-pr177-main
          git show origin/integrate-pr177-main:qa/governance-policy-alignment.patch.gz.b64 \
            | base64 --decode \
            | gzip --decompress \
            > /tmp/governance.patch
          git apply -p1 --check /tmp/governance.patch
          git apply -p1 /tmp/governance.patch
      - name: Install dependencies
        run: npm ci
      - name: Validate policy alignment
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/test-ai-review-cooperation.py -v
          node scripts/verify-proof-depth-graph.mjs
          node scripts/test-proof-depth-graph.mjs
          node --check scripts/verify-ai-review-contract.cjs
          npm run typecheck
          npm run build
          npm run verify:security
          npm run verify:adversarial
      - name: Commit and push governance fix
        id: push
        shell: bash
        run: |
          set -euo pipefail
          git add .github/workflows/ai-review-cooperation.yml .github/workflows/review-ledger.yml docs/proof-depth-graph.md qa/proof-depth-graph.json scripts/ai-review-cooperation.py scripts/test-ai-review-cooperation.py scripts/test-proof-depth-graph.mjs scripts/verify-proof-depth-graph.mjs
          git commit -m "fix: align reviewer governance with CodeRabbit policy"
          sha="$(git rev-parse HEAD)"
          git push origin "HEAD:${TARGET_BRANCH}"
          echo "sha=$sha" >> "$GITHUB_OUTPUT"
      - name: Publish result
        if: always()
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: '${{ job.status }}' === 'success' ? 'success' : 'failure',
              context: 'Governance publication',
              description: `result:${{ job.status }} run-id:${context.runId}`,
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: 176,
              body: `<!-- reviewer-policy-alignment-result -->\nGovernance alignment run: ${context.runId}\nResult: ${{ job.status }}\nHead: ${{ steps.push.outputs.sha || 'not-pushed' }}`,
            });
