name: Optimize PR177 menu runtime

on:
  push:
    branches: [integrate-pr177-main]

permissions:
  contents: write
  issues: write

jobs:
  optimize:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      EXPECTED_HEAD: 445feb47bdf8dd532cd549fabfbd06301e0fae15
      TARGET_BRANCH: feat/premium-menu-pairing-cards
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: feat/premium-menu-pairing-cards
          fetch-depth: 0
      - name: Add menu-only offline runtime
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$EXPECTED_HEAD"
          git config user.name "Roby's integration bot"
          git config user.email "integration@users.noreply.github.com"
          cat > menu-pwa.js <<'EOF'
          const SERVICE_WORKER_URL = "sw.js?v=offline-20260707-ios-install-3";
          function syncConnectivityState() {
            document.documentElement.classList.toggle("is-offline", !navigator.onLine);
          }
          function trustedScriptUrl(value) {
            if (!window.trustedTypes) return value;
            const policy = window.trustedTypes.createPolicy("robys-menu-pwa", {
              createScriptURL(candidate) {
                if (candidate !== SERVICE_WORKER_URL) throw new TypeError("Unexpected script URL");
                return candidate;
              }
            });
            return policy.createScriptURL(value);
          }
          syncConnectivityState();
          window.addEventListener("online", syncConnectivityState);
          window.addEventListener("offline", syncConnectivityState);
          if ("serviceWorker" in navigator) {
            window.addEventListener("load", async () => {
              try {
                const registration = await navigator.serviceWorker.register(trustedScriptUrl(SERVICE_WORKER_URL), { scope: "./" });
                await navigator.serviceWorker.ready;
                document.documentElement.dataset.offlineReady = "true";
                registration.update().catch(() => {});
              } catch (error) {
                document.documentElement.dataset.offlineReady = "false";
                console.warn("Roby's offline mode could not start", error);
              }
            }, { once: true });
          }
          EOF
          python - <<'PY'
          from pathlib import Path
          menu = Path("menu.html")
          text = menu.read_text()
          old = "pwa.js?v=offline-20260707-ios-install-3"
          if text.count(old) != 1:
              raise SystemExit("unexpected menu PWA reference")
          menu.write_text(text.replace(old, "menu-pwa.js?v=offline-20260707-menu-1", 1))
          sw = Path("sw.js")
          text = sw.read_text()
          anchor = '  "./menu-page.js",\n'
          entry = '  "./menu-pwa.js",\n'
          if entry not in text:
              if anchor not in text:
                  raise SystemExit("service-worker anchor missing")
              text = text.replace(anchor, anchor + entry, 1)
          sw.write_text(text)
          PY
          node scripts/generate-integrity-manifest.mjs
      - run: npm ci
      - name: Validate optimized tree
        run: |
          npm run typecheck
          npm run build
          node --check menu-pwa.js
          node --check pwa.js
          node --check sw.js
          npm run verify:integrity
          npm run verify:performance
          npm run verify:pairing-cta
          npm run verify:menu-content
          npm run verify:security
          npm run verify:adversarial
      - name: Commit and push
        id: push
        shell: bash
        run: |
          set -euo pipefail
          git add menu-pwa.js menu.html sw.js integrity-manifest.json
          git commit -m "perf: keep mobile install runtime off menu page"
          sha="$(git rev-parse HEAD)"
          git push origin "HEAD:${TARGET_BRANCH}"
          echo "sha=$sha" >> "$GITHUB_OUTPUT"
      - uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: 176,
              body: `<!-- pr177-menu-pwa-result -->\nPR177 optimized head: ${{ steps.push.outputs.sha }}\nWorkflow run: ${context.runId}`,
            });
