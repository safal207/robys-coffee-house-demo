name: Refresh pairing CTA generated files

on:
  push:
    branches:
      - feat/hero-pairing-cta

permissions:
  contents: write

jobs:
  refresh:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout feature branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: feat/hero-pairing-cta
          persist-credentials: true

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Refresh generated runtime and integrity manifest
        run: |
          npm run build
          npm run integrity:generate

      - name: Commit generated files
        run: |
          if git diff --quiet -- app.js index.html featured-gallery.js social-offer.js discover.html discover-v2.js discover-rotation.js discover-rotation-v2.js discover-rotation-v3.js sw.js integrity-manifest.json; then
            echo "Generated files are already current."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app.js index.html featured-gallery.js social-offer.js discover.html discover-v2.js discover-rotation.js discover-rotation-v2.js discover-rotation-v3.js sw.js integrity-manifest.json
          git commit -m "chore: refresh pairing CTA generated files"
          git push origin HEAD:feat/hero-pairing-cta
