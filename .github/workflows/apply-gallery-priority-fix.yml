name: Apply gallery priority fix

on:
  push:
    branches:
      - gallery-original-quality-v5
    paths:
      - .github/workflows/apply-gallery-priority-fix.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: gallery-original-quality-v5
          fetch-depth: 0

      - name: Apply targeted priority change
        run: node scripts/lower-gallery-network-priority.mjs

      - name: Commit generated change
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/featured-gallery.ts featured-gallery.js index.html
          if git diff --cached --quiet; then
            echo "Priority adjustment already applied."
            exit 0
          fi
          git commit -m "perf: keep gallery eager without competing with hero"
          git push origin HEAD:gallery-original-quality-v5
