name: Verify generated runtime

on:
  pull_request:
    branches: [main]
    paths:
      - '**/*.css'
      - '**/*.js'
      - '**/*.mjs'
      - '**/*.cjs'
      - '**/*.html'
      - 'src/**'
      - 'scripts/**'
      - 'app.js'
      - 'index.html'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - '.github/workflows/typescript-build.yml'
  push:
    branches: [main]
    paths:
      - '**/*.css'
      - '**/*.js'
      - '**/*.mjs'
      - '**/*.cjs'
      - '**/*.html'
      - 'src/**'
      - 'scripts/**'
      - 'app.js'
      - 'index.html'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - '.github/workflows/typescript-build.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Ensure ffprobe is available
        run: |
          if ! command -v ffprobe >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y ffmpeg
          fi
          ffprobe -version | head -n 1

      - name: Type-check source
        run: npm run typecheck

      - name: Build generated runtime
        run: npm run build

      - name: Upload generated runtime for inspection
        uses: actions/upload-artifact@v4
        with:
          name: generated-runtime-${{ github.sha }}
          path: |
            app.js
            index.html
          retention-days: 3

      - name: Verify JavaScript syntax
        run: node --check app.js

      - name: Verify IIFE and deferred loading contract
        run: node scripts/verify-bundle.mjs

      - name: Verify canonical media assets
        run: npm run verify:media

      - name: Reject unreachable runtime CSS and JavaScript
        run: npm run audit:deps -- --check

      - name: Upload dependency graph report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-graph-${{ github.sha }}
          path: .artifacts/dependency-graph.json
          retention-days: 7

      - name: Reject stale generated files
        run: git diff --exit-code -- app.js index.html
