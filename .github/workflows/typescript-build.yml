name: Verify generated runtime

on:
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'scripts/**'
      - 'app.js'
      - 'index.html'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - '.github/workflows/typescript-build.yml'
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'scripts/**'
      - 'app.js'
      - 'index.html'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - '.github/workflows/typescript-build.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Type-check source
        run: npm run typecheck

      - name: Build generated runtime
        run: npm run build

      - name: Bootstrap committed runtime on this PR only
        if: github.event_name == 'pull_request' && github.head_ref == 'fix/deterministic-build'
        run: |
          if ! git diff --quiet -- app.js index.html; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add app.js index.html
            git commit -m "build: synchronize generated runtime"
            git push origin HEAD:${{ github.head_ref }}
          fi

      - name: Verify JavaScript syntax
        run: node --check app.js

      - name: Verify IIFE and deferred loading contract
        run: node scripts/verify-bundle.mjs

      - name: Reject stale generated files
        run: git diff --exit-code -- app.js index.html
