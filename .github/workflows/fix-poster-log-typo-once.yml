name: Fix poster log typo once

on:
  pull_request:
    branches: [main]
    types: [synchronize, reopened]

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/discover-two-approved-pairings
          fetch-depth: 0
      - name: Fix exact typo
        run: sed -i 's/ACTIVE_IDS\.gength/ACTIVE_IDS.length/' scripts/verify-taste-journey-posters.mjs
      - name: Commit exact fix
        run: |
          if git diff --quiet -- scripts/verify-taste-journey-posters.mjs; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/verify-taste-journey-posters.mjs
          git commit -m "test: fix poster contract evidence count"
          git push origin HEAD:feat/discover-two-approved-pairings
