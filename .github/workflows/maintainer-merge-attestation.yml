name: Maintainer attestation updater

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review, edited]
  issue_comment:
    types: [created, edited, deleted]

# The workflow writes one commit-status gate and never checks out or executes PR code.
permissions:
  contents: read
  issues: read
  pull-requests: read
  statuses: write

jobs:
  update:
    name: Update current-head attestation status
    if: >-
      github.event_name == 'pull_request_target' ||
      (
        github.event.issue.pull_request &&
        github.event.issue.state == 'open' &&
        (
          github.event.comment.author_association == 'OWNER' ||
          github.event.comment.author_association == 'MEMBER' ||
          github.event.comment.author_association == 'COLLABORATOR'
        )
      )
    concurrency:
      group: maintainer-attestation-${{ github.event.pull_request.number || github.event.issue.number }}
      queue: max
      cancel-in-progress: false
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      SOLO_MAINTAINER_LOGIN: ${{ vars.SOLO_MAINTAINER_LOGIN || github.repository_owner }}
      STATUS_CONTEXT: Maintainer merge attestation
    steps:
      - name: Evaluate explicit maintainer decision
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const expectedLogin = process.env.SOLO_MAINTAINER_LOGIN
              .trim()
              .toLowerCase();
            const statusContext = process.env.STATUS_CONTEXT;
            const commandPattern = /^\/merge-(ready|hold) ([0-9a-f]{40})$/i;
            const parseCommand = (body) => body?.match(commandPattern) ?? null;

            const pr = context.eventName === 'pull_request_target'
              ? context.payload.pull_request
              : (await github.rest.pulls.get({
                  owner,
                  repo,
                  pull_number: context.payload.issue.number,
                })).data;

            if (!pr || pr.base.ref !== 'main' || pr.state !== 'open') {
              core.notice('Not an open pull request targeting main; no status changed.');
              return;
            }

            const setStatus = async (state, description) => {
              await github.rest.repos.createCommitStatus({
                owner,
                repo,
                sha: pr.head.sha,
                state,
                context: statusContext,
                description: description.slice(0, 140),
                target_url: pr.html_url,
              });
            };

            let permission;
            try {
              permission = await github.rest.repos.getCollaboratorPermissionLevel({
                owner,
                repo,
                username: expectedLogin,
              });
            } catch (error) {
              await setStatus('failure', 'Could not verify configured solo maintainer permission.');
              core.setFailed(`Permission verification failed: ${error.message}`);
              return;
            }

            if (permission.data.permission !== 'admin') {
              await setStatus('failure', 'Configured solo maintainer does not currently have admin permission.');
              return;
            }

            if (context.eventName === 'pull_request_target') {
              const description = pr.draft
                ? 'Draft PR: final maintainer decision is not requested yet.'
                : `Awaiting /merge-ready ${pr.head.sha} from ${expectedLogin}.`;
              await setStatus('pending', description);
              return;
            }

            const comment = context.payload.comment;
            const action = context.payload.action;
            const authorLogin = comment?.user?.login?.toLowerCase();
            const actorLogin = context.payload.sender?.login?.toLowerCase();
            const currentMatch = parseCommand(comment?.body);
            const previousMatch = parseCommand(context.payload.changes?.body?.from);

            if (action === 'edited' || action === 'deleted') {
              if (
                authorLogin === expectedLogin &&
                (currentMatch || previousMatch)
              ) {
                await setStatus(
                  'failure',
                  actorLogin === expectedLogin
                    ? 'Decision evidence was mutated; post a fresh append-only merge decision.'
                    : 'Decision evidence was mutated by another actor; fresh maintainer evidence is required.',
                );
              }
              return;
            }

            if (
              action !== 'created' ||
              authorLogin !== expectedLogin ||
              actorLogin !== expectedLogin ||
              comment?.user?.type === 'Bot' ||
              authorLogin?.endsWith('[bot]')
            ) {
              core.notice('Comment creation is not a trusted maintainer decision event.');
              return;
            }

            if (!currentMatch) {
              core.notice('Trusted maintainer comment is not an exact merge decision command.');
              return;
            }

            const decision = currentMatch[1].toLowerCase();
            const referencedSha = currentMatch[2].toLowerCase();
            if (referencedSha !== pr.head.sha.toLowerCase()) {
              await setStatus('failure', 'Maintainer decision references a stale or different head SHA.');
              return;
            }

            if (decision === 'hold') {
              await setStatus('failure', 'Maintainer placed the current head on hold.');
              return;
            }

            await setStatus('success', `Explicit current-head decision by ${expectedLogin}.`);
