name: Maintainer attestation updater

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, edited]
  issue_comment:
    types: [created, edited, deleted]

permissions:
  contents: read
  issues: read
  pull-requests: read
  statuses: write

jobs:
  update:
    name: Update current-head attestation status
    if: >-
      github.event_name == 'pull_request' ||
      (
        github.event.issue.pull_request &&
        github.event.issue.state == 'open' &&
        (
          github.event.comment.author_association == 'OWNER' ||
          github.event.comment.author_association == 'MEMBER' ||
          github.event.comment.author_association == 'COLLABORATOR'
        )
      )
    concurrency:
      group: maintainer-attestation-${{ github.event.pull_request.number || github.event.issue.number }}
      cancel-in-progress: false
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      SOLO_MAINTAINER_LOGIN: ${{ vars.SOLO_MAINTAINER_LOGIN || github.repository_owner }}
      STATUS_CONTEXT: Maintainer merge attestation
      BASELINE_CONTEXT: Maintainer attestation baseline
    steps:
      - name: Evaluate explicit maintainer decision
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const expectedLogin = process.env.SOLO_MAINTAINER_LOGIN
              .trim()
              .toLowerCase();
            const statusContext = process.env.STATUS_CONTEXT;
            const baselineContext = process.env.BASELINE_CONTEXT;
            const commandPattern = /^\/merge-(ready|hold)\s+([0-9a-f]{40})\s*$/i;
            const baselinePattern = /^cutoff:(\d+)$/;

            const pr = context.eventName === 'pull_request'
              ? context.payload.pull_request
              : (await github.rest.pulls.get({
                  owner,
                  repo,
                  pull_number: context.payload.issue.number,
                })).data;

            if (!pr || pr.base.ref !== 'main' || pr.state !== 'open') {
              core.notice('Not an open pull request targeting main; no status changed.');
              return;
            }

            const createStatus = async (statusContextName, state, description) => {
              return github.rest.repos.createCommitStatus({
                owner,
                repo,
                sha: pr.head.sha,
                state,
                context: statusContextName,
                description: description.slice(0, 140),
                target_url: pr.html_url,
              });
            };

            const setStatus = (state, description) => (
              createStatus(statusContext, state, description)
            );

            let permission;
            try {
              permission = await github.rest.repos.getCollaboratorPermissionLevel({
                owner,
                repo,
                username: expectedLogin,
              });
            } catch (error) {
              await setStatus('failure', 'Could not verify configured solo maintainer permission.');
              core.setFailed(`Permission verification failed: ${error.message}`);
              return;
            }

            if (permission.data.permission !== 'admin') {
              await setStatus('failure', 'Configured solo maintainer does not currently have admin permission.');
              return;
            }

            const parseCommand = (body) => body?.trim().match(commandPattern) ?? null;
            const activityTime = (comment) => Date.parse(comment.created_at);

            const listStatuses = async () => github.paginate(
              github.rest.repos.listCommitStatusesForRef,
              { owner, repo, ref: pr.head.sha, per_page: 100 },
            );

            const latestBaselineCutoff = (statuses) => statuses
              .filter((status) => status.context === baselineContext)
              .map((status) => Number(status.description?.match(baselinePattern)?.[1]))
              .filter(Number.isFinite)
              .sort((left, right) => left - right)
              .at(-1);

            const writeBaseline = async (cutoff) => {
              await createStatus(
                baselineContext,
                'success',
                `cutoff:${cutoff}`,
              );
            };

            const reevaluateFromCurrentComments = async (evidenceAfter) => {
              const comments = await github.paginate(
                github.rest.issues.listComments,
                { owner, repo, issue_number: pr.number, per_page: 100 },
              );

              const decisions = comments
                .filter((comment) => (
                  comment.user?.login?.toLowerCase() === expectedLogin &&
                  comment.user?.type !== 'Bot' &&
                  !comment.user?.login?.endsWith('[bot]') &&
                  comment.created_at === comment.updated_at &&
                  activityTime(comment) > evidenceAfter
                ))
                .map((comment) => {
                  const match = parseCommand(comment.body);
                  if (!match) return null;
                  return {
                    id: Number(comment.id),
                    createdAt: activityTime(comment),
                    decision: match[1].toLowerCase(),
                    sha: match[2].toLowerCase(),
                  };
                })
                .filter(Boolean)
                .sort((left, right) => (
                  left.createdAt - right.createdAt || left.id - right.id
                ));

              const latest = decisions.at(-1);
              if (!latest) {
                await setStatus(
                  'failure',
                  `Awaiting /merge-ready ${pr.head.sha} from ${expectedLogin}.`,
                );
                return;
              }

              if (latest.sha !== pr.head.sha.toLowerCase()) {
                await setStatus('failure', 'Latest maintainer decision references a stale or different head SHA.');
                return;
              }

              if (latest.decision === 'hold') {
                await setStatus('failure', 'Maintainer placed the current head on hold.');
                return;
              }

              await setStatus('success', `Explicit current-head decision by ${expectedLogin}.`);
            };

            const statuses = await listStatuses();
            const storedCutoff = latestBaselineCutoff(statuses);

            if (context.eventName === 'pull_request') {
              const eventCutoff = Date.parse(pr.updated_at);
              const effectiveCutoff = Math.max(
                eventCutoff,
                Number.isFinite(storedCutoff) ? storedCutoff : 0,
              );

              await writeBaseline(effectiveCutoff);

              if (pr.draft) {
                await setStatus('pending', 'Draft PR: final maintainer decision is not requested yet.');
                return;
              }

              await reevaluateFromCurrentComments(effectiveCutoff);
              return;
            }

            const comment = context.payload.comment;
            const authorLogin = comment?.user?.login?.toLowerCase();
            const actorLogin = context.payload.sender?.login?.toLowerCase();
            const action = context.payload.action;
            const currentMatch = parseCommand(comment?.body);
            const previousMatch = parseCommand(context.payload.changes?.body?.from);

            if (action === 'edited' || action === 'deleted') {
              if (
                authorLogin === expectedLogin &&
                (currentMatch || previousMatch)
              ) {
                const mutationCutoff = Math.max(
                  Date.now(),
                  Number.isFinite(storedCutoff) ? storedCutoff : 0,
                );
                await writeBaseline(mutationCutoff);
                await setStatus(
                  'failure',
                  actorLogin === expectedLogin
                    ? 'A decision comment was mutated; post a fresh append-only merge decision.'
                    : 'A decision comment was mutated by another actor; fresh maintainer evidence is required.',
                );
              }
              return;
            }

            if (
              action !== 'created' ||
              authorLogin !== expectedLogin ||
              actorLogin !== expectedLogin ||
              comment?.user?.type === 'Bot' ||
              authorLogin?.endsWith('[bot]')
            ) {
              core.notice('Comment creation is not a trusted maintainer decision event.');
              return;
            }

            if (!Number.isFinite(storedCutoff)) {
              await setStatus('failure', 'PR-event attestation baseline is missing; rerun the pull-request workflow.');
              return;
            }

            await reevaluateFromCurrentComments(storedCutoff);
