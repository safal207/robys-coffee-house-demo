name: Maintainer attestation updater

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, edited]
  issue_comment:
    types: [created, edited, deleted]

permissions:
  contents: read
  issues: read
  pull-requests: read
  statuses: write

jobs:
  update:
    name: Update current-head attestation status
    if: >-
      github.event_name == 'pull_request' ||
      (github.event.issue.pull_request && github.event.issue.state == 'open')
    concurrency:
      group: maintainer-attestation-${{ github.event.pull_request.number || github.event.issue.number }}
      cancel-in-progress: false
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      SOLO_MAINTAINER_LOGIN: ${{ vars.SOLO_MAINTAINER_LOGIN || github.repository_owner }}
      STATUS_CONTEXT: Maintainer merge attestation
    steps:
      - name: Evaluate explicit maintainer decision
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const expectedLogin = process.env.SOLO_MAINTAINER_LOGIN
              .trim()
              .toLowerCase();
            const statusContext = process.env.STATUS_CONTEXT;
            const commandPattern = /^\/merge-(ready|hold)\s+([0-9a-f]{40})\s*$/i;

            const pr = context.eventName === 'pull_request'
              ? context.payload.pull_request
              : (await github.rest.pulls.get({
                  owner,
                  repo,
                  pull_number: context.payload.issue.number,
                })).data;

            if (!pr || pr.base.ref !== 'main' || pr.state !== 'open') {
              core.notice('Not an open pull request targeting main; no status changed.');
              return;
            }

            const setStatus = async (state, description) => {
              return github.rest.repos.createCommitStatus({
                owner,
                repo,
                sha: pr.head.sha,
                state,
                context: statusContext,
                description: description.slice(0, 140),
                target_url: pr.html_url,
              });
            };

            const permission = await github.rest.repos.getCollaboratorPermissionLevel({
              owner,
              repo,
              username: expectedLogin,
            });
            if (permission.data.permission !== 'admin') {
              await setStatus('failure', 'Configured solo maintainer does not currently have admin permission.');
              return;
            }

            const parseCommand = (body) => body?.trim().match(commandPattern) ?? null;
            const activityTime = (comment) => Date.parse(
              comment.updated_at ?? comment.created_at,
            );

            const listContextStatuses = async () => {
              const statuses = await github.paginate(
                github.rest.repos.listCommitStatusesForRef,
                { owner, repo, ref: pr.head.sha, per_page: 100 },
              );
              return statuses.filter((status) => status.context === statusContext);
            };

            const latestInvalidation = (statuses, notBefore = 0) => statuses
              .filter((status) => (
                status.state !== 'success' &&
                Date.parse(status.created_at) >= notBefore
              ))
              .sort((left, right) => {
                const timeDelta = Date.parse(left.created_at) - Date.parse(right.created_at);
                return timeDelta || Number(left.id) - Number(right.id);
              })
              .at(-1);

            const reevaluateFromCurrentComments = async (evidenceAfter) => {
              const comments = await github.paginate(
                github.rest.issues.listComments,
                { owner, repo, issue_number: pr.number, per_page: 100 },
              );

              const decisions = comments
                .filter((comment) => (
                  comment.user?.login?.toLowerCase() === expectedLogin &&
                  comment.user?.type !== 'Bot' &&
                  !comment.user?.login?.endsWith('[bot]') &&
                  activityTime(comment) >= evidenceAfter
                ))
                .map((comment) => {
                  const match = parseCommand(comment.body);
                  if (!match) return null;
                  return {
                    id: Number(comment.id),
                    activityAt: activityTime(comment),
                    decision: match[1].toLowerCase(),
                    sha: match[2].toLowerCase(),
                  };
                })
                .filter(Boolean)
                .sort((left, right) => (
                  left.activityAt - right.activityAt || left.id - right.id
                ));

              const latest = decisions.at(-1);
              if (!latest) {
                await setStatus(
                  'failure',
                  `Awaiting /merge-ready ${pr.head.sha} from ${expectedLogin}.`,
                );
                return;
              }

              if (latest.sha !== pr.head.sha.toLowerCase()) {
                await setStatus('failure', 'Latest maintainer decision references a stale or different head SHA.');
                return;
              }

              if (latest.decision === 'hold') {
                await setStatus('failure', 'Maintainer placed the current head on hold.');
                return;
              }

              await setStatus('success', `Explicit current-head decision by ${expectedLogin}.`);
            };

            if (pr.draft) {
              await setStatus('pending', 'Draft PR: final maintainer decision is not requested yet.');
              return;
            }

            const statuses = await listContextStatuses();

            if (context.eventName === 'pull_request') {
              const eventTime = Date.parse(pr.updated_at);
              const eventInvalidation = latestInvalidation(statuses, eventTime);

              if (!eventInvalidation) {
                await setStatus(
                  'failure',
                  `Fresh /merge-ready ${pr.head.sha} is required after this PR event.`,
                );
                return;
              }

              await reevaluateFromCurrentComments(Date.parse(eventInvalidation.created_at));
              return;
            }

            const baseline = latestInvalidation(statuses);
            if (!baseline) {
              await setStatus('failure', 'Attestation baseline is missing; a fresh merge decision is required.');
              return;
            }

            await reevaluateFromCurrentComments(Date.parse(baseline.created_at));
