name: Maintainer attestation updater

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review, converted_to_draft, edited]
  issue_comment:
    types: [created, edited, deleted]

# Writes only commit-status evidence; pull-request code is never checked out or run.
permissions:
  contents: read
  issues: read
  pull-requests: read
  statuses: write

jobs:
  update:
    name: Update current-head attestation status
    if: >-
      github.event_name == 'pull_request_target' ||
      (
        github.event.issue.pull_request &&
        github.event.issue.state == 'open' &&
        (
          github.event.comment.author_association == 'OWNER' ||
          github.event.comment.author_association == 'MEMBER' ||
          github.event.comment.author_association == 'COLLABORATOR'
        )
      )
    concurrency:
      group: maintainer-attestation-${{ github.event.pull_request.number || github.event.issue.number }}
      queue: max
      cancel-in-progress: true
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      SOLO_MAINTAINER_LOGIN: ${{ vars.SOLO_MAINTAINER_LOGIN || github.repository_owner }}
      STATUS_CONTEXT: Maintainer merge attestation
      MUTATION_CONTEXT: Maintainer attestation mutation cursor
      RUN_CONTEXT: Maintainer attestation run cursor
    steps:
      - name: Recompute current-head maintainer decision
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const expectedLogin = process.env.SOLO_MAINTAINER_LOGIN.trim().toLowerCase();
            const statusContext = process.env.STATUS_CONTEXT;
            const mutationContext = process.env.MUTATION_CONTEXT;
            const runContext = process.env.RUN_CONTEXT;
            const currentRunId = Number(context.runId);
            const commandPattern = /^\/merge-(ready|hold) ([0-9a-f]{40})$/i;
            const mutationCursorPattern = /^comment-id:(\d+)$/;
            const runCursorPattern = /^run-id:(\d+)$/;
            const parseCommand = (body) => body?.match(commandPattern) ?? null;
            const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

            const pr = context.eventName === 'pull_request_target'
              ? context.payload.pull_request
              : (await github.rest.pulls.get({
                  owner,
                  repo,
                  pull_number: context.payload.issue.number,
                })).data;

            if (!pr || pr.base.ref !== 'main' || pr.state !== 'open') {
              core.notice('Not an open pull request targeting main.');
              return;
            }

            const createStatus = async (name, state, description) => {
              await github.rest.repos.createCommitStatus({
                owner,
                repo,
                sha: pr.head.sha,
                state,
                context: name,
                description: description.slice(0, 140),
                target_url: pr.html_url,
              });
            };
            const setGate = (state, description) => createStatus(
              statusContext,
              state,
              description,
            );

            try {
              const permission = await github.rest.repos.getCollaboratorPermissionLevel({
                owner,
                repo,
                username: expectedLogin,
              });
              if (permission.data.permission !== 'admin') {
                await setGate('failure', 'Configured solo maintainer does not have admin permission.');
                return;
              }
            } catch (error) {
              await setGate('failure', 'Could not verify configured solo maintainer permission.');
              core.setFailed(`Permission verification failed: ${error.message}`);
              return;
            }

            await createStatus(runContext, 'success', `run-id:${currentRunId}`);

            let eventMutationId = 0;
            if (context.eventName === 'issue_comment') {
              const comment = context.payload.comment;
              const action = context.payload.action;
              const author = comment?.user?.login?.toLowerCase();
              const before = parseCommand(context.payload.changes?.body?.from);
              const after = parseCommand(comment?.body);
              if (
                (action === 'edited' || action === 'deleted') &&
                author === expectedLogin &&
                (before || after)
              ) {
                eventMutationId = Number(comment.id) || 0;
                await createStatus(
                  mutationContext,
                  'success',
                  `comment-id:${eventMutationId}`,
                );
              }
            }

            const loadCurrentState = async () => {
              const [currentPrResponse, comments, statuses] = await Promise.all([
                github.rest.pulls.get({
                  owner,
                  repo,
                  pull_number: pr.number,
                }),
                github.paginate(
                  github.rest.issues.listComments,
                  { owner, repo, issue_number: pr.number, per_page: 100 },
                ),
                github.paginate(
                  github.rest.repos.listCommitStatusesForRef,
                  { owner, repo, ref: pr.head.sha, per_page: 100 },
                ),
              ]);

              const storedMutationId = statuses
                .filter((status) => status.context === mutationContext)
                .map((status) => Number(status.description?.match(mutationCursorPattern)?.[1]))
                .filter(Number.isFinite)
                .sort((a, b) => a - b)
                .at(-1) ?? 0;

              const newestRunId = statuses
                .filter((status) => status.context === runContext)
                .map((status) => Number(status.description?.match(runCursorPattern)?.[1]))
                .filter(Number.isFinite)
                .sort((a, b) => a - b)
                .at(-1) ?? currentRunId;

              const decisions = comments
                .filter((comment) => (
                  comment.user?.login?.toLowerCase() === expectedLogin &&
                  comment.user?.type !== 'Bot' &&
                  !comment.user?.login?.endsWith('[bot]') &&
                  comment.created_at === comment.updated_at
                ))
                .map((comment) => {
                  const match = parseCommand(comment.body);
                  return match ? {
                    id: Number(comment.id),
                    decision: match[1].toLowerCase(),
                    sha: match[2].toLowerCase(),
                  } : null;
                })
                .filter(Boolean)
                .sort((a, b) => a.id - b.id);

              return {
                currentPr: currentPrResponse.data,
                latest: decisions.at(-1),
                mutationId: Math.max(storedMutationId, eventMutationId),
                newestRunId,
              };
            };

            const reduceState = (snapshot) => {
              if (snapshot.newestRunId > currentRunId) {
                return { stale: true };
              }
              if (
                snapshot.currentPr.state !== 'open' ||
                snapshot.currentPr.base.ref !== 'main' ||
                snapshot.currentPr.head.sha !== pr.head.sha
              ) {
                return { stale: true };
              }
              if (snapshot.currentPr.draft) {
                return {
                  state: 'pending',
                  description: 'Draft PR: final maintainer decision is not requested yet.',
                };
              }

              const latest = snapshot.latest;
              if (!latest) {
                return {
                  state: snapshot.mutationId > 0 ? 'failure' : 'pending',
                  description: snapshot.mutationId > 0
                    ? 'Decision evidence was mutated; post a fresh append-only command.'
                    : `Awaiting /merge-ready ${pr.head.sha} from ${expectedLogin}.`,
                };
              }
              if (snapshot.mutationId >= latest.id) {
                return {
                  state: 'failure',
                  description: 'Latest decision evidence was mutated; post a newer command.',
                };
              }
              if (latest.sha !== pr.head.sha.toLowerCase()) {
                return {
                  state: 'failure',
                  description: 'Latest maintainer decision references another head SHA.',
                };
              }
              if (latest.decision === 'hold') {
                return {
                  state: 'failure',
                  description: 'Maintainer placed the current head on hold.',
                };
              }
              return {
                state: 'success',
                description: `Explicit current-head decision by ${expectedLogin}.`,
              };
            };

            const initialResult = reduceState(await loadCurrentState());
            if (initialResult.stale) {
              core.notice('A newer attestation run or pull-request head superseded this run.');
              return;
            }

            // Only the newest observed run may touch the public gate. This avoids
            // an older out-of-order run regressing a newer final result to pending.
            await setGate('pending', `Recomputing maintainer decision in run ${currentRunId}.`);

            if (initialResult.state !== 'success') {
              await setGate(initialResult.state, initialResult.description);
              return;
            }

            // A ready decision is re-read after a short cancellation window. The
            // monotonic run cursor prevents an older run from publishing success
            // after a newer event has started, while the second state read catches
            // hold/edit/delete evidence that arrived during this run.
            await sleep(1000);
            const finalResult = reduceState(await loadCurrentState());
            if (finalResult.stale) {
              core.notice('A newer attestation run or pull-request head superseded final success.');
              return;
            }
            await setGate(finalResult.state, finalResult.description);
