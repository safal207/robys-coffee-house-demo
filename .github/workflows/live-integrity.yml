name: Live deployment integrity

on:
  push:
    branches: [main]
  schedule:
    - cron: '11 5 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: live-integrity-main
  cancel-in-progress: true

jobs:
  verify:
    name: INTEGRITY-001 public digest verification
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Wait for GitHub Pages publication
        run: |
          local_build="$(sed -n 's/.*name="robys-build" content="\([^"]*\)".*/\1/p' index.html | head -1)"
          for attempt in {1..30}; do
            page_url="https://safal207.github.io/robys-coffee-house-demo/?integrity-wait=${attempt}"
            manifest_url="https://safal207.github.io/robys-coffee-house-demo/integrity-manifest.json?integrity-wait=${attempt}"
            remote_build="$(curl --fail --silent "$page_url" | sed -n 's/.*name="robys-build" content="\([^"]*\)".*/\1/p' | head -1 || true)"
            manifest_build="$(curl --fail --silent "$manifest_url" | sed -n 's/.*"build": "\([^"]*\)".*/\1/p' | head -1 || true)"
            if test -n "$local_build" && test "$remote_build" = "$local_build" && test "$manifest_build" = "$local_build"; then
              echo "Published build and integrity manifest are ready: $local_build"
              exit 0
            fi
            echo "Waiting for Pages: local=$local_build page=$remote_build manifest=$manifest_build"
            sleep 10
          done
          echo "GitHub Pages did not publish the expected page and manifest in time"
          exit 1
      - name: Verify every published digest
        run: node scripts/verify-live-integrity.mjs
      - name: Upload integrity evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: live-integrity-${{ github.run_id }}
          path: .artifacts/live-integrity-report.json
          if-no-files-found: warn
          retention-days: 30
