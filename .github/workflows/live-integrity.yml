name: Live deployment integrity

on:
  push:
    branches: [main]
  schedule:
    - cron: '11 5 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: live-integrity-main
  cancel-in-progress: true

jobs:
  verify:
    name: INTEGRITY-001 public digest verification
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci

      - name: Detect pending manifest refresh
        run: |
          npm run integrity:generate
          if git diff --quiet -- integrity-manifest.json; then
            echo "INTEGRITY_REFRESH_REQUIRED=false" >> "$GITHUB_ENV"
            echo "Committed manifest matches the checked-out content."
          elif test "$GITHUB_EVENT_NAME" = "push"; then
            echo "INTEGRITY_REFRESH_REQUIRED=true" >> "$GITHUB_ENV"
            echo "Content changed before its manifest refresh; refresh-integrity owns final public verification."
          else
            echo "Manifest is stale during a scheduled/manual integrity check."
            git diff -- integrity-manifest.json
            exit 1
          fi

      - name: Delegate content-changing push to manifest refresh
        if: env.INTEGRITY_REFRESH_REQUIRED == 'true'
        run: echo "Final digest verification will run inside Refresh integrity manifest after its bot commit is published."

      - name: Wait for GitHub Pages publication
        if: env.INTEGRITY_REFRESH_REQUIRED != 'true'
        run: |
          local_build="$(sed -n 's/.*name="robys-build" content="\([^"]*\)".*/\1/p' index.html | head -1)"
          local_menu_sha="$(node -e 'const m=require("./integrity-manifest.json"); process.stdout.write(m.files.find((f)=>f.path==="menu.html").sha256)')"
          for attempt in {1..30}; do
            page_url="https://safal207.github.io/robys-coffee-house-demo/?integrity-wait=${attempt}"
            manifest_url="https://safal207.github.io/robys-coffee-house-demo/integrity-manifest.json?integrity-wait=${attempt}"
            remote_build="$(curl --fail --silent "$page_url" | sed -n 's/.*name="robys-build" content="\([^"]*\)".*/\1/p' | head -1 || true)"
            curl --fail --silent "$manifest_url" > /tmp/remote-integrity-manifest.json || true
            manifest_build="$(node -e 'const fs=require("fs"); try { const m=JSON.parse(fs.readFileSync("/tmp/remote-integrity-manifest.json","utf8")); process.stdout.write(m.build || ""); } catch {}')"
            remote_menu_sha="$(node -e 'const fs=require("fs"); try { const m=JSON.parse(fs.readFileSync("/tmp/remote-integrity-manifest.json","utf8")); process.stdout.write(m.files?.find((f)=>f.path==="menu.html")?.sha256 || ""); } catch {}')"
            if test -n "$local_build" \
              && test "$remote_build" = "$local_build" \
              && test "$manifest_build" = "$local_build" \
              && test "$remote_menu_sha" = "$local_menu_sha"; then
              echo "Published build and integrity manifest are ready: build=$local_build menu_sha=$local_menu_sha"
              exit 0
            fi
            echo "Waiting for Pages: local=$local_build page=$remote_build manifest=$manifest_build local_menu_sha=$local_menu_sha remote_menu_sha=$remote_menu_sha"
            sleep 10
          done
          echo "GitHub Pages did not publish the expected page and manifest in time"
          exit 1

      - name: Verify every published digest
        if: env.INTEGRITY_REFRESH_REQUIRED != 'true'
        run: node scripts/verify-live-integrity.mjs

      - name: Upload integrity evidence
        if: always() && env.INTEGRITY_REFRESH_REQUIRED != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: live-integrity-${{ github.run_id }}
          path: .artifacts/live-integrity-report.json
          if-no-files-found: warn
          retention-days: 30
