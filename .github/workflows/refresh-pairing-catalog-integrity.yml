name: Refresh pairing catalog integrity once

on:
  pull_request:
    paths:
      - "menu-data.js"
      - "qa/menu-content-baseline.json"
      - ".github/workflows/refresh-pairing-catalog-integrity.yml"

permissions:
  contents: write

jobs:
  refresh:
    if: github.head_ref == 'fix/close-pairing-catalog-tail' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout feature branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: fix/close-pairing-catalog-tail
          persist-credentials: true

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Generate exact integrity manifest
        run: npm run integrity:generate

      - name: Commit generated manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add integrity-manifest.json
          if git diff --cached --quiet; then
            echo "Integrity manifest is already current."
            exit 0
          fi
          git commit -m "chore: refresh pairing catalog integrity"
          git push origin HEAD:fix/close-pairing-catalog-tail
