name: Stage offline Android feature

on:
  push:
    branches:
      - fix/android-download-offline
  pull_request:
    branches:
      - main
    types:
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  stage-offline-feature:
    if: github.ref_name == 'fix/android-download-offline' || github.event.pull_request.head.ref == 'fix/android-download-offline'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: fix/android-download-offline
          fetch-depth: 0

      - name: Reconcile latest main without losing feature work
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git merge -s ours origin/main -m 'Merge latest main into offline Android feature'
          git checkout origin/main -- lighthouse-live-summary.json lighthouse-summary.json sitemap.xml integrity-manifest.json

      - name: Preserve latest SEO metadata
        shell: python
        run: |
          from pathlib import Path

          path = Path('index.html')
          html = path.read_text(encoding='utf-8')

          replacements = {
              "<meta name=\"description\" content=\"Roby's Coffee House — Gazipaşa'da iyi kahve, tatlılar ve sakin anlar.\" />": "<meta name=\"description\" content=\"Gazipaşa'da taze kahve, latte, soğuk içecekler, cheesecake ve kruvasan. Roby's Coffee House menüsünü keşfedin ve kolayca yol tarifi alın.\" />",
              "<meta name=\"robots\" content=\"index,follow,max-image-preview:large\" />": "<meta name=\"robots\" content=\"index,follow,max-image-preview:large,max-snippet:-1,max-video-preview:-1\" />\n  <meta name=\"geo.region\" content=\"TR-07\" />\n  <meta name=\"geo.placename\" content=\"Gazipaşa, Antalya\" />",
              "<meta property=\"og:title\" content=\"Roby's Coffee House | Gazipaşa\" />": "<meta property=\"og:title\" content=\"Roby's Coffee House Gazipaşa | Kahve, Tatlı & Sakin Atmosfer\" />",
              "<meta property=\"og:description\" content=\"Good coffee. Calm moments in Gazipaşa.\" />": "<meta property=\"og:description\" content=\"Gazipaşa'da taze kahve, soğuk içecekler, cheesecake ve kruvasan. Menüyü inceleyin, konumu açın ve Roby's atmosferini keşfedin.\" />",
              "<meta property=\"og:locale\" content=\"tr_TR\" />": "<meta property=\"og:locale\" content=\"tr_TR\" />\n  <meta property=\"og:locale:alternate\" content=\"en_US\" />\n  <meta property=\"og:locale:alternate\" content=\"ru_RU\" />",
              "<meta property=\"og:image\" content=\"https://safal207.github.io/robys-coffee-house-demo/src/robys-hero-poster.jpg\" />": "<meta property=\"og:image\" content=\"https://safal207.github.io/robys-coffee-house-demo/src/robys-hero-poster.jpg\" />\n  <meta property=\"og:image:secure_url\" content=\"https://safal207.github.io/robys-coffee-house-demo/src/robys-hero-poster.jpg\" />\n  <meta property=\"og:image:type\" content=\"image/jpeg\" />",
              "<meta property=\"og:image:alt\" content=\"Roby's Coffee House in Gazipaşa\" />": "<meta property=\"og:image:alt\" content=\"Roby's Coffee House Gazipaşa kahve ve tatlı atmosferi\" />",
              "<meta name=\"twitter:title\" content=\"Roby's Coffee House | Gazipaşa\" />": "<meta name=\"twitter:title\" content=\"Roby's Coffee House Gazipaşa | Kahve & Tatlı\" />",
              "<meta name=\"twitter:description\" content=\"Good coffee. Calm moments in Gazipaşa.\" />": "<meta name=\"twitter:description\" content=\"Taze kahve, cheesecake, kruvasan ve sakin bir atmosfer. Menüyü keşfedin ve Roby's Coffee House'a yol tarifi alın.\" />",
              "<meta name=\"twitter:image:alt\" content=\"Roby's Coffee House in Gazipaşa\" />": "<meta name=\"twitter:image:alt\" content=\"Roby's Coffee House Gazipaşa kahve ve tatlı atmosferi\" />",
              "<title>Roby's Coffee House | Gazipaşa</title>": "<title>Roby's Coffee House Gazipaşa | Kahve & Tatlı</title>",
              "\"name\": \"Roby's Coffee House\",\n    \"url\"": "\"name\": \"Roby's Coffee House\",\n    \"description\": \"Gazipaşa'da taze kahve, soğuk içecekler, cheesecake, kruvasan ve sakin bir kafe atmosferi.\",\n    \"slogan\": \"İyi kahve. Sakin anlar.\",\n    \"url\"",
              "\"hasMenu\": \"https://safal207.github.io/robys-coffee-house-demo/menu.html\",\n    \"address\"": "\"hasMenu\": \"https://safal207.github.io/robys-coffee-house-demo/menu.html\",\n    \"priceRange\": \"₺₺\",\n    \"currenciesAccepted\": \"TRY\",\n    \"areaServed\": {\n      \"@type\": \"City\",\n      \"name\": \"Gazipaşa, Antalya\"\n    },\n    \"address\"",
              "\"servesCuisine\": [\"Coffee\", \"Desserts\"]": "\"servesCuisine\": [\"Coffee\", \"Desserts\", \"Croissants\", \"Sandwiches\"]"
          }

          for old, new in replacements.items():
              if old in html:
                  html = html.replace(old, new, 1)

          path.write_text(html, encoding='utf-8')

      - name: Build and verify full feature
        shell: bash
        run: |
          set -euo pipefail
          npm ci
          npm run build
          npm run integrity:generate
          npm run check

      - name: Commit reconciled feature
        shell: bash
        run: |
          set -euo pipefail
          git add -A
          git diff --cached --check
          if git diff --cached --quiet; then
            echo 'Feature branch is already reconciled.'
            exit 0
          fi
          git commit -m 'chore: reconcile offline feature with latest main'
          git push origin HEAD:fix/android-download-offline
