name: Finalize clean SVG master tree

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

permissions:
  contents: write

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out PR branch
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: feat/photo-referenced-organic-logo
          fetch-depth: 1
          persist-credentials: true

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Remove temporary files
        run: |
          git rm .github/workflows/finalize-svg-master-tree.yml
          git rm qa/.svg-master-trigger

      - name: Verify SVG master contract
        run: node scripts/test-photo-logo.mjs

      - name: Generate exact integrity manifest
        run: npm run integrity:generate

      - name: Commit clean final tree
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add integrity-manifest.json
          git commit -m "chore: finalize clean SVG master tree"
          git push origin HEAD:feat/photo-referenced-organic-logo
