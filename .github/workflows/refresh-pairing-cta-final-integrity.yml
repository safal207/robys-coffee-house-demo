name: Refresh pairing CTA final integrity

on:
  push:
    branches:
      - feat/hero-pairing-cta

permissions:
  contents: write

jobs:
  refresh:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout feature branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: feat/hero-pairing-cta
          persist-credentials: true

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Refresh integrity manifest
        run: npm run integrity:generate

      - name: Commit generated integrity evidence
        run: |
          if git diff --quiet -- integrity-manifest.json; then
            echo "Integrity manifest is already current."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add integrity-manifest.json
          git commit -m "chore: refresh pairing CTA final integrity"
          git push origin HEAD:feat/hero-pairing-cta
