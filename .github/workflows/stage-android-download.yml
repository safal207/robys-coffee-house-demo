name: Stage Android app download

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  stage-android-download:
    if: github.event.pull_request.head.ref == 'feat/android-app-download'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: feat/android-app-download

      - name: Assemble and verify signed APK
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p downloads
          cat .apk-staging/part-*.b64 | base64 --decode > downloads/robys-coffee-house-v1.1.apk
          echo 'f188c2f0ab820d514c9c1bd75734e3d76f8203f89d4a1604fd08da43fd7910a6  downloads/robys-coffee-house-v1.1.apk' | sha256sum --check --strict
          test "$(stat -c %s downloads/robys-coffee-house-v1.1.apk)" = '25231'
          unzip -t downloads/robys-coffee-house-v1.1.apk

      - name: Add localized Android download section
        shell: python
        run: |
          from pathlib import Path

          index = Path('index.html')
          html = index.read_text(encoding='utf-8')

          style_anchor = '  <link rel="stylesheet" href="community-reel.css?v=20260626-2" />'
          style_link = '  <link rel="stylesheet" href="android-app.css?v=android-download-20260627-1" />'
          if style_link not in html:
              if style_anchor not in html:
                  raise SystemExit('Android stylesheet anchor not found')
              html = html.replace(style_anchor, f'{style_anchor}\n{style_link}', 1)

          section = '''    <section class="android-app-section" id="android-app" aria-labelledby="android-app-title">
      <div class="container">
        <div class="android-app-card">
          <div class="android-app-copy">
            <p class="eyebrow" data-localized data-tr="ROBY'S MOBİL" data-en="ROBY'S MOBILE" data-ru="ROBY'S В ТЕЛЕФОНЕ">ROBY'S MOBİL</p>
            <h2 id="android-app-title"><span data-localized data-tr="Roby's cebinizde." data-en="Roby's in your pocket." data-ru="Roby's в вашем телефоне.">Roby's cebinizde.</span><br /><em data-localized data-tr="Kahveye daha yakın." data-en="Closer to your coffee." data-ru="Ещё ближе к кофе.">Kahveye daha yakın.</em></h2>
            <p class="android-app-description" data-localized data-tr="Menüye, yol tarifine ve güncel Roby's deneyimine tek dokunuşla ulaşın." data-en="Open the menu, directions and the latest Roby's experience with one tap." data-ru="Открывайте меню, маршрут и актуальный Roby's одним касанием.">Menüye, yol tarifine ve güncel Roby's deneyimine tek dokunuşla ulaşın.</p>
            <div class="android-app-actions">
              <a class="android-download-button" href="downloads/robys-coffee-house-v1.1.apk" download="robys-coffee-house-v1.1.apk" type="application/vnd.android.package-archive" aria-label="Android uygulamasını indir">
                <span class="android-download-icon" aria-hidden="true"><span class="android-download-line"></span></span>
                <span data-localized data-tr="Android uygulamasını indir" data-en="Download the Android app" data-ru="Скачать приложение для Android">Android uygulamasını indir</span>
              </a>
              <span class="android-app-meta">APK · v1.1</span>
            </div>
            <p class="android-app-note" data-localized data-tr="İndirme doğrudan bu siteden başlar. Android, kurulum için tarayıcınıza izin vermenizi isteyebilir." data-en="The download starts directly from this site. Android may ask you to allow installation from your browser." data-ru="Скачивание начнётся прямо с сайта. Android может попросить разрешить установку из браузера.">İndirme doğrudan bu siteden başlar. Android, kurulum için tarayıcınıza izin vermenizi isteyebilir.</p>
          </div>
          <div class="android-app-device" aria-hidden="true">
            <div class="android-app-screen">
              <div class="android-app-screen-brand"><span class="android-app-screen-mark">R</span><span class="android-app-screen-name"><strong>ROBY'S</strong><span>COFFEE HOUSE</span></span></div>
              <div class="android-app-screen-copy"><strong>Good coffee.<br />Calm moments.</strong><span>Gazipaşa · Antalya</span></div>
              <div class="android-app-screen-pill"></div>
            </div>
          </div>
        </div>
      </div>
    </section>
'''
          section_anchor = '    <section class="section visit-section" id="visit">'
          if 'class="android-app-section"' not in html:
              if section_anchor not in html:
                  raise SystemExit('Visit section anchor not found')
              html = html.replace(section_anchor, f'{section}{section_anchor}', 1)

          index.write_text(html, encoding='utf-8')

          regression = Path('scripts/verify-regression-contracts.mjs')
          source = regression.read_text(encoding='utf-8')
          android_import = 'import "./verify-android-download.mjs";'
          if android_import not in source:
              source = f'{android_import}\n{source}'
          regression.write_text(source, encoding='utf-8')

      - name: Remove temporary assembly sources
        shell: bash
        run: |
          rm -rf .apk-staging

      - name: Build, refresh integrity and run full checks
        shell: bash
        run: |
          set -euo pipefail
          npm ci
          npm run build
          npm run integrity:generate
          npm run check

      - name: Commit Android download feature
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git diff --cached --check
          if git diff --cached --quiet; then
            echo 'Android download feature is already staged.'
            exit 0
          fi
          git commit -m 'feat: add direct Android app download'
          git push origin HEAD:feat/android-app-download
